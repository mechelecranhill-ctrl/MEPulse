<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Trend Dashboard (Improved Dummy)</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --ios-blue:#007AFF;
    --ios-green:#34C759;
    --ios-red:#FF3B30;
    --bg:#f2f2f7;
}

body{
    margin:0;
    font-family:-apple-system,system-ui,sans-serif;
    background:var(--bg);
    padding:15px;
}

/* HEADER */
.header{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.title{
    font-size:18px;
    font-weight:800;
    color:var(--ios-blue);
}

.subtitle{
    font-size:12px;
    color:#8e8e93;
}

/* LIFECYCLE */
.lifecycle{
    display:flex;
    align-items:center;
    gap:8px;
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    overflow-x:auto;
}

.step{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:70px;
}

.dot{
    width:28px;
    height:28px;
    border-radius:50%;
    background:#e5e5ea;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.done .dot{background:var(--ios-green); color:white;}
.current .dot{background:var(--ios-blue); color:white;}
.overdue .dot{background:var(--ios-red); color:white;}

.line{
    flex:1;
    height:3px;
    background:#e5e5ea;
    border-radius:2px;
}

/* SUMMARY */
.summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:12px;
    border-radius:15px;
    text-align:center;
}

.label{
    font-size:10px;
    color:#8e8e93;
    font-weight:700;
}

.value{
    font-size:16px;
    font-weight:800;
    margin-top:5px;
    color:var(--ios-blue);
}

/* CHART */
.chartBox{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th,td{
    padding:10px;
    font-size:12px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#f9f9fb;
}

/* MOBILE */
@media(max-width:768px){
    .summary{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">CONTRACT HEALTH DASHBOARD</div>
    <div class="subtitle">Improved Dummy - Realistic Interim Claim Pattern</div>
</div>

<!-- LIFECYCLE -->
<div class="lifecycle">
    <div class="step done"><div class="dot"><i class="fa fa-check"></i></div><span>AWARD</span></div>
    <div class="line"></div>

    <div class="step done"><div class="dot"><i class="fa fa-check"></i></div><span>WO</span></div>
    <div class="line"></div>

    <div class="step current"><div class="dot"><i class="fa fa-clock"></i></div><span>INTERIM</span></div>
    <div class="line"></div>

    <div class="step"><div class="dot">4</div><span>CPC</span></div>
    <div class="line"></div>

    <div class="step"><div class="dot">6</div><span>CMGD</span></div>
    <div class="line"></div>

    <div class="step"><div class="dot">12</div><span>SFA</span></div>
</div>

<!-- SUMMARY -->
<div class="summary">
    <div class="card">
        <div class="label">CONTRACT VALUE</div>
        <div class="value">RM 500,000</div>
    </div>

    <div class="card">
        <div class="label">USED</div>
        <div class="value" id="usedValue">RM 275,000</div>
    </div>

    <div class="card">
        <div class="label">BALANCE</div>
        <div class="value">RM 225,000</div>
    </div>

    <div class="card">
        <div class="label">PROGRESS</div>
        <div class="value">55%</div>
    </div>
</div>

<!-- CHART -->
<div class="chartBox">
    <canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
    <th>Month</th>
    <th>Planned</th>
    <th>Actual</th>
    <th>Variance</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>

/* =========================
   REALISTIC M&E PATTERN
========================= */

const months = ["Jan","Feb","Mar","Apr","May","Jun"];

/* Planned smooth */
const planned = [80000,80000,80000,80000,80000,80000];

/* Interim claim (selang-seli realistic) */
const actual = [
    0,        // Jan - no claim
    55000,    // Feb - first interim
    0,        // Mar - idle
    120000,   // Apr - big claim (progress catch up)
    40000,    // May - small claim
    60000     // Jun - steady claim
];

/* =========================
   CHART
========================= */

const ctx = document.getElementById('chart');

new Chart(ctx,{
    type:'line',
    data:{
        labels:months,
        datasets:[
            {
                label:'Planned',
                data:planned,
                borderColor:'#8e8e93',
                borderDash:[6,4],
                fill:false,
                tension:0.3
            },
            {
                label:'Actual Interim Claims',
                data:actual,
                borderColor:'#007AFF',
                backgroundColor:'rgba(0,122,255,0.15)',
                fill:true,
                tension:0.35,
                pointRadius:5,
                pointBackgroundColor:'#007AFF'
            }
        ]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{position:'top'}
        },
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }
});

/* =========================
   TABLE BUILD
========================= */

const tableBody = document.getElementById('tableBody');

months.forEach((m,i)=>{

    const variance = actual[i] - planned[i];
    const color = variance > 0 ? '#FF3B30' : '#34C759';

    tableBody.innerHTML += `
        <tr>
            <td>${m}</td>
            <td>RM ${planned[i].toLocaleString()}</td>
            <td>RM ${actual[i].toLocaleString()}</td>
            <td style="color:${color}; font-weight:700;">
                RM ${variance.toLocaleString()}
            </td>
        </tr>
    `;
});

</script>

</body>
</html>
