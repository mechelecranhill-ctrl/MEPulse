<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Trend Dashboard (Improved Dummy)</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root{
    --ios-blue:#007AFF;
    --ios-green:#34C759;
    --ios-red:#FF3B30;
    --bg:#f2f2f7;
}

body{
    margin:0;
    font-family:-apple-system,system-ui,sans-serif;
    background:var(--bg);
    padding:15px;
}

/* HEADER */
.header{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.title{
    font-size:18px;
    font-weight:800;
    color:var(--ios-blue);
}

.subtitle{
    font-size:12px;
    color:#8e8e93;
}

/* LIFECYCLE */
.lifecycle{
    display:flex;
    align-items:center;
    gap:8px;
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    overflow-x:auto;
}

.step{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:70px;
}

.dot{
    width:28px;
    height:28px;
    border-radius:50%;
    background:#e5e5ea;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.done .dot{background:var(--ios-green); color:white;}
.current .dot{background:var(--ios-blue); color:white;}
.overdue .dot{background:var(--ios-red); color:white;}

.line{
    flex:1;
    height:3px;
    background:#e5e5ea;
    border-radius:2px;
}

/* SUMMARY */
.summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:12px;
    border-radius:15px;
    text-align:center;
}

.label{
    font-size:10px;
    color:#8e8e93;
    font-weight:700;
}

.value{
    font-size:16px;
    font-weight:800;
    margin-top:5px;
    color:var(--ios-blue);
}

/* CHART */
.chartBox{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th,td{
    padding:10px;
    font-size:12px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#f9f9fb;
}

/* MOBILE */
@media(max-width:768px){
    .summary{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">CONTRACT HEALTH DASHBOARD</div>
    <div class="subtitle">Memuatkan data kontrak...</div>
</div>

<div class="lifecycle">
    <div class="step done"><div class="dot"><i class="fa fa-check"></i></div><span>AWARD</span></div>
    <div class="line"></div>

    <div class="step done"><div class="dot"><i class="fa fa-check"></i></div><span>WO</span></div>
    <div class="line"></div>

    <div class="step current"><div class="dot"><i class="fa fa-clock"></i></div><span>INTERIM</span></div>
    <div class="line"></div>

    <div class="step"><div class="dot">CPC</div></div>
    <div class="line"></div>

    <div class="step"><div class="dot">CMGD</div></div>
    <div class="line"></div>

    <div class="step"><div class="dot">SFA</div></div>
</div>

<div class="summary">
    <div class="card">
        <div class="label">CONTRACT VALUE</div>
        <div class="value" id="contractValue">RM 0.00</div>
    </div>

    <div class="card">
        <div class="label">USED</div>
        <div class="value" id="usedValue">RM 0.00</div>
    </div>

    <div class="card">
        <div class="label">BALANCE</div>
        <div class="value" id="balanceValue">RM 0.00</div>
    </div>

    <div class="card">
        <div class="label">PROGRESS</div>
        <div class="value" id="progressValue">0%</div>
    </div>
</div>

<div class="chartBox">
    <canvas id="chart"></canvas>
</div>

<table>
<thead>
<tr>
    <th>Month</th>
    <th>Planned</th>
    <th>Actual</th>
    <th>Variance</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SB_URL="https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const supabase = window.supabase.createClient(SB_URL, SB_KEY);
let chartInstance = null;

function formatRM(value){
    return "RM " + Number(value || 0).toLocaleString("en-MY", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

async function loadDashboard(){
    try{
        // ID ditukar kepada format Integer (int4) tanpa tanda pembuka/penutup kata ("")
        const contractId = 2;

        /* ==========================
           CONTRACT FETCH
        ========================== */
        const { data:contract, error:contractError } = await supabase
            .from("contract")
            .select("*")
            .eq("id", contractId)
            .maybeSingle(); // Menggunakan maybeSingle untuk elakkan ralat gandaan baris data

        if(contractError) throw contractError;

        if(!contract) {
            document.querySelector(".subtitle").innerHTML = `<span style="color:red;font-weight:bold;">Ralat: Kontrak ID ${contractId} tidak dijumpai!</span>`;
            return;
        }

        document.querySelector(".subtitle").innerHTML =
            (contract.contract_code || "N/A") + " • " + (contract.contract_name || "Tiada Nama Kontrak");

        /* ==========================
           INTERIMS FETCH
        ========================== */
        const { data:interims, error:interimError } = await supabase
            .from("interims")
            .select("*")
            .eq("contract_id", contractId)
            .order("claim_date");

        if(interimError) throw interimError;

        const contractValue = Number(contract.contract_sum || 0);
        const safeInterims = interims || [];
        
        const totalUsed = safeInterims.reduce((sum, row) => 
            sum + Number(row.net_amount || row.claim_amount || 0), 0
        );

        const balance = contractValue - totalUsed;
        const progress = contractValue ? ((totalUsed / contractValue) * 100).toFixed(1) : 0;

        /* ==========================
           KPI INTERFACE UPDATE
        ========================== */
        document.getElementById("contractValue").innerText = formatRM(contractValue);
        document.getElementById("usedValue").innerText = formatRM(totalUsed);
        document.getElementById("balanceValue").innerText = formatRM(balance);
        document.getElementById("progressValue").innerText = progress + "%";

        /* ==========================
           MONTHLY DATA PROCESSING
        ========================== */
        const monthlyMap = {};

        safeInterims.forEach(item => {
            if(!item.claim_date) return;
            const date = new Date(item.claim_date);
            const month = date.toLocaleString("en", { month: "short" });
            monthlyMap[month] = (monthlyMap[month] || 0) + Number(item.net_amount || item.claim_amount || 0);
        });

        let months = Object.keys(monthlyMap);
        let actual = Object.values(monthlyMap);

        if(months.length === 0) {
            months = ["Jan", "Feb", "Mar"];
            actual = [0, 0, 0];
        }

        const planned = months.map(() => contractValue / 12);

        buildChart(months, planned, actual);
        buildTable(Object.keys(monthlyMap), planned, actual);
        updateLifecycle(contract, safeInterims);

    } catch(err) {
        console.error("Ralat Papan Pemuka:", err);
        alert(err.message || "Gagal memuatkan data dari pangkalan data.");
    }
}

function buildChart(months, planned, actual){
    const ctx = document.getElementById("chart");
    if(!ctx) return;
    if(chartInstance){ chartInstance.destroy(); }

    chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: months,
            datasets: [
                { label: "Planned", data: planned, borderColor: "#8e8e93", borderDash: [6,4], fill: false, tension: 0.3 },
                { label: "Actual Interim Claims", data: actual, borderColor: "#007AFF", backgroundColor: "rgba(0,122,255,0.15)", fill: true, tension: 0.35, pointRadius: 5 }
            ]
        },
        options: { responsive: true, plugins: { legend: { position: "top" } }, scales: { y: { beginAtZero: true } } }
    });
}

function buildTable(months, planned, actual){
    const body = document.getElementById("tableBody");
    if(!body) return;
    body.innerHTML = "";

    if(months.length === 0) {
        body.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#8e8e93;">Tiada rekod tuntutan interim ditemui</td></tr>`;
        return;
    }

    months.forEach((m, i) => {
        const variance = (actual[i] || 0) - (planned[i] || 0);
        const color = variance > 0 ? "#FF3B30" : "#34C759";
        body.innerHTML += `<tr><td>${m}</td><td>${formatRM(planned[i])}</td><td>${formatRM(actual[i])}</td><td style="color:${color}; font-weight:700;">${formatRM(variance)}</td></tr>`;
    });
}

function updateLifecycle(contract, interims){
    const steps = document.querySelectorAll(".step");
    if(!steps.length) return;
    steps.forEach(s => s.classList.remove("done", "current", "overdue"));

    if(interims.length > 0){
        steps[0].classList.add("done"); steps[1].classList.add("done"); steps[2].classList.add("current");
    } else {
        steps[0].classList.add("done"); steps[1].classList.add("current");
    }

    if(contract && contract.contract_end){
        const today = new Date();
        const endDate = new Date(contract.contract_end);
        if(!isNaN(endDate.getTime()) && today > endDate){
            steps[2].classList.remove("current"); steps[2].classList.add("done"); steps[3].classList.add("current");
        }
    }
}

window.addEventListener("DOMContentLoaded", () => { loadDashboard(); });
</script>

</body>
</html>
