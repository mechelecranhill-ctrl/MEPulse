<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Eksekutif - Sistem Kelulusan Kontrak</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-12">

    <header class="bg-blue-700 text-white shadow-md p-5 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-file-signature mr-2"></i>Sistem Kelulusan Kontrak</h1>
            <span class="bg-amber-600 px-4 py-1.5 rounded-full text-sm font-semibold border border-amber-500">
                Mod: Eksekutif
            </span>
        </div>
    </header>

    <div class="container mx-auto px-4">
        <section class="bg-white rounded-xl shadow-md p-6 border-t-4 border-amber-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-700">
                    <i class="fa-solid fa-user-tie text-amber-500 mr-2"></i>Dashboard Executive
                </h2>
                <span class="text-xs bg-amber-100 text-amber-800 font-bold px-2.5 py-1 rounded">Menapis: BLUEFORM</span>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Work ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Kontrak</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="table-exec" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="4" class="px-6 py-4 text-center text-gray-400">Memuatkan data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function fetchDashboard() {
            try {
                const { data: workOrders, error } = await supabaseClient
                    .from('work_orders')
                    .select(`
                        work_id,
                        status,
                        contract (contract_name)
                    `)
                    .eq('status', 'BLUEFORM'); // Hanya tapis data berkaitan sahaja

                if (error) throw error;

                const tbody = document.getElementById('table-exec');
                tbody.innerHTML = '';

                if (workOrders.length === 0) {
                    showEmptyRow('table-exec', 'Tiada kontrak berstatus BLUEFORM.');
                    return;
                }

                workOrders.forEach(item => {
                    let contractName = 'Tiada Maklumat';
                    if (item.contract) {
                        contractName = Array.isArray(item.contract) ? item.contract[0]?.contract_name : item.contract.contract_name;
                    }

                    const row = `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap font-mono text-sm text-gray-900">${item.work_id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${contractName || 'Tiada Nama'}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-amber-100 text-amber-800">
                                    ${item.status}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <button onclick="approveContract('${item.work_id}', 'APP-EXEC')" 
                                        class="text-white px-4 py-1.5 rounded-lg text-xs font-semibold shadow-sm transition-all cursor-pointer bg-amber-600 hover:bg-amber-700">
                                    <i class="fa-solid fa-check mr-1"></i> Approve (Exec)
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

            } catch (err) {
                console.error("Ralat memuat data:", err.message);
                alert("Gagal memuatkan data: " + err.message);
            }
        }

        function showEmptyRow(tableId, message) {
            document.getElementById(tableId).innerHTML = `
                <tr>
                    <td colspan="4" class="px-6 py-8 text-center text-sm text-gray-400 italic">
                        <i class="fa-solid fa-inbox block text-xl mb-1 text-gray-300"></i> ${message}
                    </td>
                </tr>`;
        }

        async function approveContract(workId, nextStatus) {
            if (!confirm(`Adakah anda pasti untuk menukar status Work ID: ${workId} ke ${nextStatus}?`)) return;

            try {
                const { error } = await supabaseClient
                    .from('work_orders')
                    .update({ status: nextStatus })
                    .eq('work_id', workId);

                if (error) throw error;

                alert(`Berjaya dikemaskini ke status ${nextStatus}!`);
                fetchDashboard();

            } catch (err) {
                console.error("Ralat semasa kelulusan:", err.message);
                alert("Gagal mengemaskini status: " + err.message);
            }
        }

        window.onload = fetchDashboard;
    </script>
</body>
</html>
