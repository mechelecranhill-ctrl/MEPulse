<!DOCTYPE html>
<html lang="ms">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contract Forms</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body{
            background: linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%);
            margin:0;
            min-height:100vh;
            overflow-x:hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--ios-blue); transition: 0.2s;
            margin-right: 15px;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .main-content{
            width:100%;
            padding:90px 20px 20px;
            display:flex;
            justify-content:center;
            align-items:flex-start;
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); 
            width: 100%;
            max-width: 700px;
            transition: transform 0.2s;
        }

        .menu-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border: 1px solid transparent;
            color: #333;
        }
        .menu-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.8); }
        .menu-item.active { 
            border-color: var(--ios-blue);
            background: var(--ios-blue);
            color: white;
        }

        .page { display: none; width: 100%; justify-content: center; } 
        .page.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-size: 10px; font-weight: 700; color: #4b4b4b; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255, 255, 255, 0.4); font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ios-blue); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .excel-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 11px; margin-top: 10px; }
        .excel-table th { background: #f1f1f1; padding: 8px; text-align: left; }
        .excel-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .funding-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }
        .sec-desc { font-size: 9px; color: #555; display: block; margin-bottom: 4px; line-height: 1.2; font-weight: 500; text-transform: none; }

        .form-tabs{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.form-tabs button{
    border:none;
    padding:12px 16px;
    border-radius:12px;
    background:white;
    cursor:pointer;
}
        @media (max-width: 768px){
            
            body{
                flex-direction: column;
                height: auto;
                overflow-y: auto;
                overflow-x: hidden;
            }

    
            .sidebar{
                width: 100%;
                height: auto; 
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.4);
                position: sticky;
                top: 0;
                z-index: 9999;
                backdrop-filter: blur(20px);
            }
            .sidebar-header{
                padding: 14px 16px;
            }
            .sidebar-content{
                padding: 12px;
                display: flex;
                gap: 10px;
                overflow-x: auto;
                overflow-y: hidden;
                flex-wrap: nowrap;
                scrollbar-width: none;
            }
            .sidebar-content::-webkit-scrollbar{
                display:none;
            }
            .menu-item{
                min-width: max-content;
                margin-bottom: 0;
                padding: 12px 16px;
                border-radius: 14px;
                font-size: 13px;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .menu-item:hover{
                transform:none;
            }
            .main-content{
                padding: 14px;
                width: 100%;
                overflow-x: hidden;
            }
            .page{
                width: 100%;
            }
            .glass-card{
                padding: 18px;
                border-radius: 22px;  
                max-width: 100%;
                margin-bottom: 25px;
            }
            h3{
                font-size: 18px;
                line-height: 1.3;
            }
            label{
                font-size: 10px;
                margin-top: 14px;
                margin-bottom: 4px;
            }

            input,
            select,
            textarea{
                font-size: 16px;
                padding: 14px;
                border-radius: 14px;
                min-height: 48px;
            }

    textarea{
        min-height: 90px;
    }

    .btn-primary{
        padding: 16px;
        font-size: 15px;
        border-radius: 16px;
        margin-top: 16px;
    }

    .funding-grid{
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 12px;
    }

    #i_section_inputs_container{
        grid-template-columns: 1fr !important;
    }

    div[style*="grid-template-columns: 1fr 1fr"]{
        grid-template-columns: 1fr !important;
        gap: 12px !important;
    }

    .excel-table{
        display:block;
        overflow-x:auto;
        white-space: nowrap;
        border-radius: 14px;
    }

    #i_total_display{
        padding: 16px !important;
    }

    #i_total_display span{
        word-break: break-word;
    }

    .funding-item{
        background: rgba(255,255,255,0.35);
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.5);
    }

    .sec-input-wrapper{
        padding: 14px !important;
        border-radius: 16px !important;
    }

    .back-btn{
        width: 40px;
        height: 40px;
        border-radius: 12px;
    }

    #total_display{
        font-size: 18px;
    }

}
    </style>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    let attachedWorkOrders = []; 
    let currentInterimId = null;

    function showPage(id, element) {

document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

const targetPage = document.getElementById(id);
if(targetPage) targetPage.classList.add('active');

if(element) element.classList.add('active');

}
    function setupFormListeners() {
 
        // Contract Form
        document.getElementById('contractForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sections = {};
            document.querySelectorAll('.sec-input-wrapper').forEach(w => {
                sections[w.querySelector('.b_n').value] = {
                    desc: w.querySelector('.b_d').value,
                    val: parseFloat(w.querySelector('.b_v').value) || 0
                };
            });
            const payload = {
                unit_id: document.getElementById('c_unit_id').value,
                contract_code: document.getElementById('c_code').value,
                contract_title: document.getElementById('c_name').value,
                start_date: document.getElementById('c_start').value,
                end_date: document.getElementById('c_end').value,
                contractor: document.getElementById('c_contractor').value,
                district: document.getElementById('c_dist').value,
                area_code: document.getElementById('c_area').value,
                contract_sections_breakdown: sections,
                total_contract_amount: calculateContractSum()
            };
            const res = await fetch(`${SB_URL}/rest/v1/contract`, { method: 'POST', headers, body: JSON.stringify(payload) });
            if (res.ok) { 
    alert("Kontrak berjaya didaftar!"); 
    location.reload(); 
}
        });

        // Work Order Form
document.getElementById('workOrderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const contractId = document.getElementById('w_contract_id').value;
    const districtSelected = document.getElementById('w_dist').value; 
    const contractOpt = document.getElementById('w_contract_id').selectedOptions[0];

    try {
        // 1. AMBIL KOD KAWASAN: Pecahkan string "SGT,MR,BP,KLG,MRS"
        const areaMapping = contractOpt.dataset.area || ""; 
        const districtsMapping = contractOpt.dataset.dist || "";
        
        const areaCodes = areaMapping.split(',').map(s => s.trim().toUpperCase());
        const districts = districtsMapping.split(',').map(s => s.trim().toUpperCase());
        
        // Cari kedudukan daerah yang dipilih (Contoh: SEGAMAT adalah index 0)
        const index = districts.indexOf(districtSelected.trim().toUpperCase());
        
        // Ambil kod yang sepadan dengan index tersebut (Contoh: index 0 = SGT)
        let areaCode = (index !== -1 && areaCodes[index]) ? areaCodes[index] : "WO";

        // 2. KIRA SEQUENCE: Cari jumlah rekod sedia ada bagi daerah ini dalam kontrak ini
        const seqRes = await fetch(
`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&district=eq.${encodeURIComponent(districtSelected)}&select=sequence_no`,
{ headers });

const existingWorks = await seqRes.json();

let maxSeq = 0;

existingWorks.forEach(w=>{
    const num = parseInt((w.sequence_no || '').replace(/\D/g,'')) || 0;
    if(num > maxSeq) maxSeq = num;
});

const nextNum = (maxSeq + 1).toString().padStart(3,'0');
        
        // 3. BINA FORMAT: Contoh SGT + 001 = SGT001
        const customSequence = `${areaCode}${nextNum}`;

        // 4. PROSES KOS & PAYLOAD
const breakdown = {};
let totalAmount = 0;
let additionalTotal = 0;

document.querySelectorAll('.w_sec_amt').forEach(i => {

    const base = parseFloat(i.value) || 0;

    const extraInput = document.querySelector(
        `.w_sec_extra[data-sec="${i.dataset.sec}"]`
    );

    const extra = parseFloat(extraInput?.value) || 0;

    // section_category hanya simpan amt
    breakdown[i.dataset.sec] = {
        amt: base
    };

    totalAmount += base;
    additionalTotal += extra;

});

// SEMAK jika work order sudah wujud
const workIdValue = "C " + document.getElementById('w_id_num').value.trim();

const checkRes = await fetch(
`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&work_id=eq.${encodeURIComponent(workIdValue)}`,
{ headers });

const existing = await checkRes.json();

let sequenceToUse = customSequence;
let res;

if(existing.length > 0){
    sequenceToUse = existing[0].sequence_no;
}

const payload = {
    contract_id: contractId,
    work_id: workIdValue,
    sequence_no: sequenceToUse,
    qpb_date: document.getElementById('w_qpb_date').value,
    location: document.getElementById('w_location').value,
    district: districtSelected,
    description: document.getElementById('w_desc').value,
    section_category: breakdown,
    additional: additionalTotal,
    amount_spent: totalAmount + additionalTotal
};

if(existing.length > 0){

    // UPDATE
    res = await fetch(
    `${SB_URL}/rest/v1/work_orders?id=eq.${existing[0].id}`,
    {
        method: 'PATCH',
        headers: headers,
        body: JSON.stringify(payload)
    });

}else{

    // INSERT
    res = await fetch(
    `${SB_URL}/rest/v1/work_orders`,
    {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload)
    });

}

        if (res.ok) { 
            alert(`Berjaya didaftar! No. Rujukan: ${customSequence}`); 
            location.reload(); 
        } else {
            const err = await res.json();
            alert("Ralat: " + err.message);
        }
    } catch (error) {
        console.error(error);
        alert("Gagal memproses nombor turutan.");
    }

    function calculateContractSum() {

    function addB() {
        const container = document.getElementById('b_inputs');
        const nextLetter = String.fromCharCode(65 + container.querySelectorAll('.sec-input-wrapper').length);
        const name = `SECTION ${nextLetter}`;
        const d = document.createElement('div'); 
        d.className = "sec-input-wrapper"; d.style = "background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; margin-bottom:5px; position:relative;";

            <input type="text" class="b_d" placeholder="Keterangan" required><input type="number" class="b_v" placeholder="Jumlah RM" step="0.01" required oninput="calculateContractSum()">`;

'Hantar Interim';

    function addWorkOrdersToList() {
        const area = document.getElementById('i_paste_area');
        const rawIds = area.value.split(/\r?\n|,|\t/);
        const cleanIds = rawIds.map(s => s.trim()).filter(s => s !== "" && !attachedWorkOrders.includes(s));
        attachedWorkOrders = [...attachedWorkOrders, ...cleanIds];
        area.value = '';
        renderIDTags();
    }

    function renderIDTags() {
        const container = document.getElementById('i_id_list_tags');
        container.innerHTML = '';
        attachedWorkOrders.forEach(id => {
            const span = document.createElement('span');
            span.style = "background:#e5e5ea; padding:4px 10px; border-radius:15px; font-size:11px; display:flex; align-items:center; gap:5px;";
            span.innerHTML = `${id} <i class="fa fa-times" onclick="removeID('${id}')" style="cursor:pointer; color:red;"></i>`;
            container.appendChild(span);
        });
    }

    function removeID(id) {
        attachedWorkOrders = attachedWorkOrders.filter(item => item !== id);
        renderIDTags();
    }

    function calcInterimManualTotal() {

let total = 0;

document.querySelectorAll('.i_sec_claim_val').forEach(input => {
    total += parseFloat(input.value) || 0;
});

const salvage = parseFloat(document.getElementById('i_salvage').value) || 0;
const pg = parseFloat(document.getElementById('i_pg_sum').value) || 0;

const net = total - salvage - pg;

document.getElementById('i_total_display').innerHTML = `
<span style="font-size:12px; color:#666;">Jumlah Claim Kasar</span><br>
<span style="font-size:20px; color:var(--ios-orange); font-weight:800;">
RM ${total.toLocaleString(undefined,{minimumFractionDigits:2})}
</span>

<br><br>

<span style="font-size:12px; color:#666;">Nilai Bersih Selepas Tolakan</span><br>
<span style="font-size:20px; color:var(--ios-blue); font-weight:800;">
RM ${net.toLocaleString(undefined,{minimumFractionDigits:2})}
</span>
`;

return total;

}
async function submitInterim(){

const cId = document.getElementById('i_contract_id').value;

const iNo =
parseInt(document.getElementById('i_no').value);

const iDate =
document.getElementById('i_date_received').value;

if(!cId || !iNo || !iDate){

alert("Lengkapkan maklumat interim!");

return;

}

const salvage =
parseFloat(document.getElementById('i_salvage').value) || 0;

const pg =
parseFloat(document.getElementById('i_pg_sum').value) || 0;

let total = 0;

const breakdown = {};

document.querySelectorAll('.i_sec_claim_val').forEach(i=>{

const val = parseFloat(i.value) || 0;

if(val > 0){

breakdown[i.dataset.sec] = {
amt: val
};

total += val;

}

});

const net = total - salvage - pg;

const payload = {

contract_id: cId,

interim_no: iNo,

date_received: iDate,

salvage_value: salvage,

performance_guarantee_sum: pg,

claim_breakdown: breakdown,

claim_amount: total,

net_amount: net,

};

let res;

if(currentInterimId){

res = await fetch(
`${SB_URL}/rest/v1/interims?id=eq.${currentInterimId}`,
{
method:'PATCH',
headers,
body: JSON.stringify(payload)
});

}else{

res = await fetch(
`${SB_URL}/rest/v1/interims`,
{
method:'POST',
headers,
body: JSON.stringify(payload)
});

}

if(res.ok){

for(let id of attachedWorkOrders){

await fetch(
`${SB_URL}/rest/v1/work_orders?work_id=ilike.%${encodeURIComponent(id)}%`,
{
method:'PATCH',
headers,
body: JSON.stringify({
interim_no:iNo,
status:'Claimed'
})
});

}

alert(
currentInterimId
? "Interim berjaya dikemaskini!"
: "Interim berjaya direkodkan!"
);

location.reload();

}else{

const err = await res.text();

alert(err);

}

}

    async function submitVO() {
        try {
            const cId = document.getElementById('vo_contract_id').value;
            const voName = document.getElementById('vo_name').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('vo_amt').value);
            const targetSec = document.getElementById('vo_target_sec').value;

            if(!cId) return alert("Sila pilih kontrak!");
            if(!voName || isNaN(amt) || !targetSec) return alert("Sila isi Nama VO, Section dan Amaun!");

            // 1. Ambil data kontrak terkini
            const resGet = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
            const data = await resGet.json();
            
            if (!data || data.length === 0) throw new Error("Data kontrak tidak dijumpai.");
            
            const contract = data[0];
            let vBreak = contract.vo_breakdown || {};
            
            // 2. Tambah rekod VO baru ke dalam breakdown
            vBreak[voName] = { 
                amt: amt, 
                sec: targetSec,
                desc: document.getElementById('vo_desc').value 
            };
            
            // 3. Kemaskini (PATCH) data ke Supabase
            const resUpd = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { 
                method: 'PATCH', 
                headers, 
                body: JSON.stringify({ 
                    vo_breakdown: vBreak, 
                    total_vo_amount: (contract.total_vo_amount || 0) + amt 
                }) 
            });
            
            if(resUpd.ok) {
                alert("Variation Order (VO) Berjaya Direkodkan!");
                location.reload();
            } else {
                const err = await resUpd.json();
                alert("Gagal simpan: " + err.message);
            }
        } catch (e) {
            console.error("Ralat VO:", e);
            alert("Ralat sistem berlaku.");
        }
    }

function autoDetectWork(){

clearTimeout(detectTimer);

detectTimer = setTimeout(async ()=>{

const contractId = document.getElementById('w_contract_id').value;
const num = document.getElementById('w_id_num').value.trim();
const workId = "C " + num;

onContractSelect();

if(!contractId || num.length < 3) return;

try{

const res = await fetch(
`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&work_id=eq.${encodeURIComponent(workId)}&select=*`,
{ headers }
);

const data = await res.json();

if(data.length === 0){

console.log("Work Order baru");
return;

}

const w = data[0];

document.getElementById('w_qpb_date').value = w.qpb_date || '';
document.getElementById('w_location').value = w.location || '';
document.getElementById('w_desc').value = w.description || '';

setTimeout(()=>{
document.getElementById('w_dist').value = w.district || '';
},100);

if(w.section_category){

Object.keys(w.section_category).forEach(sec=>{

const amt = document.querySelector(`.w_sec_amt[data-sec="${sec}"]`);
const extra = document.querySelector(`.w_sec_extra[data-sec="${sec}"]`);

if(amt) amt.value = w.section_category[sec].amt || 0;
if(extra) extra.value = 0;

});

}

calcTotalWork();

console.log("Existing Work Order loaded");

}catch(e){

console.error("Auto detect error:", e);

}

},500);

}
