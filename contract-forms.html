
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Contract Forms</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--ios-blue:#007AFF;
--ios-green:#34C759;
--ios-orange:#FF9500;
--ios-red:#FF3B30;
--glass-bg:rgba(255,255,255,0.4);
--glass-border:rgba(255,255,255,0.6);
}

/* BASE */
*{box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif;}

body{
margin:0;
min-height:100vh;
background:linear-gradient(60deg,#0b3d91,#0077b6,#00b4d8);
overflow-x:hidden;
}

.main-content{
width:100%;
padding:20px;
display:flex;
justify-content:center;
}

/* CARD */
.glass-card{
background:var(--glass-bg);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
width:100%;
max-width:700px;
border:1px solid var(--glass-border);
}

/* FORM */
label{font-size:10px;font-weight:700;text-transform:uppercase;}
input,select,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.5);
}

.btn-primary{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--ios-blue);
color:#fff;
font-weight:600;
}

/* TABS */
.form-tabs{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}
.form-tabs button{
padding:8px 14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.2);
color:#fff;
}
.form-tabs button.active{
background:#fff;
color:#000;
}

/* DISTRICT (SIMPLIFIED) */
.district-group{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.15);
}

.district-btn{
padding:6px 10px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.2);
font-size:11px;
}

.district-btn.active{
background:var(--ios-blue);
color:#fff;
border:none;
}
</style>
</head>

    function showPage(id){

    document.querySelectorAll('.page')
    .forEach(p=>p.classList.remove('active'));

    document.querySelectorAll('.form-tabs button')
    .forEach(btn=>btn.classList.remove('active'));

function renderDistrictChecklist() {

    const utaraContainer = document.getElementById('district_utara');
    const selatanContainer = document.getElementById('district_selatan');

    utaraContainer.innerHTML = '';
    selatanContainer.innerHTML = '';

    function createBtn(d) {
        const active = selectedDistricts.has(d);

        const btn = document.createElement('button');
        btn.type = "button";
        btn.className = "district-btn" + (active ? " active" : "");
        btn.innerText = d;

        btn.onclick = () => {
    const wasActive = selectedDistricts.has(d);

    toggleDistrict(d, !wasActive);

    renderDistrictChecklist();

    // trigger animation AFTER render
    setTimeout(() => {
        const el = document.querySelectorAll('.district-btn');
        el.forEach(b => {
            if (b.innerText === d && !wasActive) {
                b.classList.add('pop');
                setTimeout(() => b.classList.remove('pop'), 250);
            }
        });
    }, 0);
};

        return btn;
    }

    // UTARA
    REGION_MAP.UTARA.forEach(d => {
        utaraContainer.appendChild(createBtn(d));
    });

    // SELATAN
    REGION_MAP.SELATAN.forEach(d => {
        selatanContainer.appendChild(createBtn(d));
    });

    syncDistrictInput();
}

function toggleDistrict(district, state) {
    if(state) {
        selectedDistricts.add(district);
    } else {
        selectedDistricts.delete(district);
    }
    syncDistrictInput();
}
function setRegion(region) {
    REGION_MAP[region].forEach(d => selectedDistricts.add(d));
    renderDistrictChecklist();
}

function clearDistricts() {
    selectedDistricts.clear();
    renderDistrictChecklist();
}

function syncDistrictInput() {
    const districts = [...selectedDistricts];

    document.getElementById('c_dist').value = districts.join(', ');

    // AUTO BUILD AREA CODE ikut order selected
    const codes = districts
        .map(d => AREA_CODE_MAP[d])
        .filter(Boolean);

    document.getElementById('c_area').value = codes.join(',');
}

function formatCurrencyInput(input) {
    // Ambil digit sahaja
    let digits = input.value.replace(/\D/g, '');
    if (!digits) digits = '0';

    // Tukar kepada nilai sebenar (bahagi 100)
    let val = parseInt(digits) / 100;

    // Paparan formatted
    input.value = val.toLocaleString('en-MY', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });

    // Simpan nilai sebenar dalam dataset untuk hantar ke DB
    input.dataset.rawValue = val.toFixed(2);
}

        // Work Order Form
document.getElementById('workOrderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const contractId = document.getElementById('w_contract_id').value;
    const districtSelected = document.getElementById('w_dist').value; 
    const contractOpt = document.getElementById('w_contract_id').selectedOptions[0];

    try {
        // 1. AMBIL KOD KAWASAN: Pecahkan string "SGT,MR,BP,KLG,MRS"
        const areaMapping = contractOpt.dataset.area || ""; 
        const districtsMapping = contractOpt.dataset.dist || "";
        
        const areaCodes = areaMapping.split(',').map(s => s.trim().toUpperCase());
        const districts = districtsMapping.split(',').map(s => s.trim().toUpperCase());
        
        // Cari kedudukan daerah yang dipilih (Contoh: SEGAMAT adalah index 0)
        const index = districts.indexOf(districtSelected.trim().toUpperCase());
        
        // Ambil kod yang sepadan dengan index tersebut (Contoh: index 0 = SGT)
        let areaCode = (index !== -1 && areaCodes[index]) ? areaCodes[index] : "WO";

        // 2. KIRA SEQUENCE: Cari jumlah rekod sedia ada bagi daerah ini dalam kontrak ini
        const seqRes = await fetch(
`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&district=eq.${encodeURIComponent(districtSelected)}&select=sequence_no`,
{ headers });

const existingWorks = await seqRes.json();

let maxSeq = 0;

existingWorks.forEach(w=>{
    const num = parseInt((w.sequence_no || '').replace(/\D/g,'')) || 0;
    if(num > maxSeq) maxSeq = num;
});

const nextNum = (maxSeq + 1).toString().padStart(3,'0');
        
        // 3. BINA FORMAT: Contoh SGT + 001 = SGT001
        const customSequence = `${areaCode}${nextNum}`;

        // 4. PROSES KOS & PAYLOAD
const breakdown = {};
let totalAmount = 0;
let additionalTotal = 0;

document.querySelectorAll('.w_sec_amt').forEach(i => {

    const base = parseFloat(i.dataset.rawValue || 0);

const extraInput = document.querySelector(
    `.w_sec_extra[data-sec="${i.dataset.sec}"]`
);

const extra = parseFloat(extraInput?.dataset.rawValue || 0);

    // section_category hanya simpan amt
    breakdown[i.dataset.sec] = {
    amt: base,
    extra: extra
};

    totalAmount += base;
    additionalTotal += extra;

});

const workIdValue = normalizeWorkId(
    document.getElementById('w_id_num').value
);

const checkRes = await fetch(
`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&work_id=eq.${encodeURIComponent(workIdValue)}`,
{ headers });

const existing = await checkRes.json();

let sequenceToUse = customSequence;
let res;

if(existing.length > 0){
    sequenceToUse = existing[0].sequence_no;
}

const payload = {
    contract_id: contractId,
    work_id: workIdValue,
    sequence_no: sequenceToUse,
    qpb_date: document.getElementById('w_qpb_date').value,
    location: document.getElementById('w_location').value,
    district: districtSelected,
    description: document.getElementById('w_desc').value,
    section_category: breakdown,
    additional: additionalTotal,
    amount_spent: totalAmount + additionalTotal
};

if(existing.length > 0){

    // UPDATE
    res = await fetch(
    `${SB_URL}/rest/v1/work_orders?id=eq.${existing[0].id}`,
    {
        method: 'PATCH',
        headers: headers,
        body: JSON.stringify(payload)
    });

}else{

    // INSERT
    res = await fetch(
    `${SB_URL}/rest/v1/work_orders`,
    {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload)
    });

}

        if (res.ok) { 
            alert(`Berjaya didaftar! No. Rujukan: ${sequenceToUse}`); 
            location.reload(); 
        } else {
            const err = await res.json();
            alert("Ralat: " + err.message);
        }
    } catch (error) {
        console.error(error);
        alert("Gagal memproses nombor turutan.");
    }
});
}

        document.getElementById('w_id_num').value = '';
        document.getElementById('w_qpb_date').value = '';
document.getElementById('w_location').value = '';
document.getElementById('w_desc').value = '';

    function calculateContractSum() {

    let total = 0;

    document.querySelectorAll('.b_v').forEach(input => {

        total += parseFloat(
            input.dataset.rawValue || 0
        );

    });

    document.getElementById('c_sum_display').innerText =
        `RM ${total.toLocaleString('en-MY',{
            minimumFractionDigits:2,
            maximumFractionDigits:2
        })}`;

    return total;
}

    function addB() {

    const container = document.getElementById('b_inputs');

    const nextLetter =
        String.fromCharCode(
            65 + container.querySelectorAll('.sec-input-wrapper').length
        );

    const name = `SECTION ${nextLetter}`;

    const d = document.createElement('div');

    d.className = "sec-input-wrapper";

    d.style =
        "background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; margin-bottom:5px; position:relative;";

    d.innerHTML = `
        <div onclick="
            this.parentElement.remove();
            reIndexSections();
            calculateContractSum();
        "
        style="
            position:absolute;
            right:10px;
            top:10px;
            color:red;
            cursor:pointer;
        ">✕</div>

        <strong class="sec-label">${name}</strong>

        <input type="text"
               class="b_n"
               value="${name}"
               hidden>

        <input type="text"
               class="b_d"
               placeholder="Description"
               required>

        <input type="text"
               class="b_v"
               data-raw-value="0"
               value="0.00"
               oninput="
                    formatCurrencyInput(this);
                    calculateContractSum();
               ">
    `;

    container.appendChild(d);
}
    function reIndexSections() {
        document.querySelectorAll('.sec-input-wrapper').forEach((w, i) => {
            const name = `SECTION ${String.fromCharCode(65 + i)}`;
            w.querySelector('.sec-label').innerText = name; w.querySelector('.b_n').value = name;
        });
    }

    function calcTotalWork() {

let total = 0;

document.querySelectorAll('.w_sec_amt').forEach(i=>{
    total += parseFloat(i.dataset.rawValue || 0);
});
document.querySelectorAll('.w_sec_extra').forEach(i=>{
    total += parseFloat(i.dataset.rawValue || 0);
});

document.getElementById('total_display').innerText =
`RM ${total.toLocaleString(undefined,{minimumFractionDigits:2})}`;
    }

    function normalizeWorkId(raw){

raw = (raw || '').trim().toUpperCase();

const match = raw.match(/^([CK])?\s*(\d+)$/);

if(!match) return '';

const prefix =
match[1] ||
document.getElementById('w_id_prefix')?.value ||
'C';

async function submitInterim(){

const cId = document.getElementById('i_contract_id').value;

const iNo =
parseInt(document.getElementById('i_no').value);

const iDate =
document.getElementById('i_date_received').value;

if(!cId || !iNo || !iDate){

alert("Lengkapkan maklumat interim!");

return;

}

let total = 0;
const breakdown = {};

document.querySelectorAll('.i_sec_claim_val').forEach(i=>{
    const val = parseFloat(i.dataset.rawValue || 0);

    if(val > 0){
        breakdown[i.dataset.sec] = { amt: val };
        total += val;
    }
});

const salvage = parseFloat(document.getElementById('i_salvage').value) || 0;
const pg = parseFloat(document.getElementById('i_pg_sum').value) || 0;
const taxAmount = parseFloat(document.getElementById('i_tax_amount').value) || 0;

const net = total - salvage - pg + taxAmount;

const payload = {

contract_id: cId,

interim_no: iNo,

date_received: iDate,

salvage_value: salvage,

performance_guarantee_sum: pg,

tax: taxAmount,

claim_breakdown: breakdown,

claim_amount: total,

net_amount: net,

};

let res;

if(currentInterimId){

res = await fetch(
`${SB_URL}/rest/v1/interims?id=eq.${currentInterimId}`,
{
method:'PATCH',
headers,
body: JSON.stringify(payload)
});

}else{

res = await fetch(
`${SB_URL}/rest/v1/interims`,
{
method:'POST',
headers,
body: JSON.stringify(payload)
});

}

if(res.ok){

for (let workId of attachedWorkOrders) {

    const findRes = await fetch(
        `${SB_URL}/rest/v1/work_orders?work_id=eq.${encodeURIComponent(workId)}&select=id`,
        { headers }
    );

    const rows = await findRes.json();

    if (rows.length > 0) {

        await fetch(
            `${SB_URL}/rest/v1/work_orders?id=eq.${rows[0].id}`,
            {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                    interim_no: iNo,
                    status: 'Claimed'
                })
            }
        );

    } else {

        console.warn(
            'Work Order tidak dijumpai:',
            workId
        );

    }

}

alert(
currentInterimId
? "Interim berjaya dikemaskini!"
: "Interim berjaya direkodkan!"
);

location.reload();

}else{

const err = await res.text();

alert(err);

}

}

    async function submitVO() {

            let amt = 0;

const breakdown = {};

document
.querySelectorAll('.vo_sec_amt')
.forEach(i=>{

const value =
parseFloat(
i.dataset.rawValue || 0
);

if(value > 0){

breakdown[i.dataset.sec] = {

};

amt += value;

}

});
            if(!cId) return alert("Sila pilih kontrak!");
            if(!voName || isNaN(amt)){
    return alert("Sila isi Nama VO dan Amaun!");
}

            // 1. Ambil data kontrak terkini
            const resGet = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
            const data = await resGet.json();
            
            if (!data || data.length === 0) throw new Error("Data kontrak tidak dijumpai.");
            
            const contract = data[0];
            let vBreak = contract.vo_breakdown || {};
            
            // 2. Tambah rekod VO baru ke dalam breakdown
            vBreak[voName] = {

amt: amt,

breakdown: breakdown,

desc:
document.getElementById('vo_desc').value

};
            
            // 3. Kemaskini (PATCH) data ke Supabase
            const resUpd = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { 
                method: 'PATCH', 
                headers, 
                body: JSON.stringify({ 
                    vo_breakdown: vBreak, 
                    total_vo_amount: (contract.total_vo_amount || 0) + amt 
                }) 
            });
            
            if(resUpd.ok) {
                alert("Variation Order (VO) Berjaya Direkodkan!");
                location.reload();
            } else {
                const err = await resUpd.json();
                alert("Gagal simpan: " + err.message);

async function updateWorkOrderSequenceNumbers(
    contractId,
    districtText,
    areaText
){

    const districts = districtText
        .split(',')
        .map(x => x.trim().toUpperCase());

    const areas = areaText
        .split(',')
        .map(x => x.trim().toUpperCase());

    const res = await fetch(
        `${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&select=*`,
        { headers }
    );

    const works = await res.json();

    for(const district of districts){

        const districtWorks = works
            .filter(w =>
                (w.district || '').trim().toUpperCase()
                === district
            )
            .sort((a,b)=>{

                const aNum =
                    parseInt(
                        (a.sequence_no || '')
                        .replace(/\D/g,'')
                    ) || 0;

                const bNum =
                    parseInt(
                        (b.sequence_no || '')
                        .replace(/\D/g,'')
                    ) || 0;

                return aNum - bNum;
            });

        const index = districts.indexOf(district);

        const areaCode =
            areas[index] || 'WO';

        for(let i=0;i<districtWorks.length;i++){

            const newSeq =
                areaCode +
                String(i + 1).padStart(3,'0');

            await fetch(
                `${SB_URL}/rest/v1/work_orders?id=eq.${districtWorks[i].id}`,
                {
                    method:'PATCH',
                    headers,
                    body: JSON.stringify({
                        sequence_no:newSeq
                    })
                }
            );

        }

    }

}

document.addEventListener('DOMContentLoaded', () => {

    const swipeArea = document.querySelector('.main-content');

    let touchStartX = 0;
    let touchStartY = 0;

    swipeArea.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
    }, { passive:true });

    swipeArea.addEventListener('touchend', e => {

        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if(Math.abs(dx) < 80) return;
        if(Math.abs(dx) < Math.abs(dy)) return;

        handleFormSwipe(dx);

    }, { passive:true });

});

function handleFormSwipe(dx) {

    if(window.innerWidth > 768) return;

    const tabs = [...document.querySelectorAll('.form-tabs button')];

    const activeIndex = tabs.findIndex(btn =>
        btn.classList.contains('active')
    );

    if(activeIndex === -1) return;

    // Swipe kiri → page seterusnya
    if(dx < 0 && activeIndex < tabs.length - 1){
        tabs[activeIndex + 1].click();
    }

    // Swipe kanan → page sebelumnya
    if(dx > 0 && activeIndex > 0){
        tabs[activeIndex - 1].click();
    }
}
