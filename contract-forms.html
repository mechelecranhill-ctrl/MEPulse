<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contract Forms</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        html {
    background: linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
    height: 100%;
}
body{
    height: 100dvh;
    overflow-y: hidden;
            margin:0;
            min-height:100vh;
            overflow-x:hidden;
                background:
                    radial-gradient(circle at top,
                                    rgba(255,255,255,.15),
                                    transparent 35%),
                    linear-gradient(
                        60deg,
                        #0b3d91 0%,
                        #0077b6 40%,
                        #00b4d8 100%
        );
            position:relative;
        }
        body::before{
    content:"";
    position:fixed;
    inset:-20%;
    z-index:-2;

    background:
        radial-gradient(
            circle at 20% 80%,
            rgba(255,255,255,.18),
            transparent 25%
        ),
        radial-gradient(
            circle at 80% 20%,
            rgba(255,255,255,.10),
            transparent 30%
        );

            filter:blur(40px);
            animation:fogMove 10s ease-in-out infinite alternate;
        }
        @keyframes fogMove{
            from{
                transform:translateX(-30px) translateY(0);
            }
            to{
                transform:translateX(30px) translateY(-20px);
            }
        }

        .main-content{
            width:100%;
            height: calc(100dvh - 60px - env(safe-area-inset-top));
            padding:20px 20px 20px;
            display:flex;
            justify-content:center;
            align-items:flex-start;
             overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); 
            width: 100%;
            max-width: 700px;
            transition: transform 0.2s;
        }

        .page { display: none; width: 100%; justify-content: center; } 
        .page.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-size: 10px; font-weight: 700; color: #4b4b4b; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255, 255, 255, 0.4); font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ios-blue); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .excel-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 11px; margin-top: 10px; }
        .excel-table th { background: #f1f1f1; padding: 8px; text-align: left; }
        .excel-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .w-id-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .w-id-card {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 14px;
            padding: 12px;
        }
        .w-id-card .w-id-card-label {
            font-size: 12px;
            font-weight: 800;
            color: #0b3d91;
            background: rgba(255,255,255,0.5);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
        }
        .w-id-card .funding-grid {
            margin-top: 8px;
        }

        .funding-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }
        .sec-desc { font-size: 9px; color: #555; display: block; margin-bottom: 4px; line-height: 1.2; font-weight: 500; text-transform: none; }

        .interim-section-block {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            grid-column: 1 / -1;
        }
        .interim-section-block .sec-main-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .5px;
            color: #2b2b2b;
            display: block;
            margin-bottom: 2px;
        }
        .interim-vo-sub {
            margin-top: 10px;
            margin-left: 14px;
            padding: 10px 10px 10px 12px;
            border-left: 3px solid var(--ios-orange);
            background: rgba(255,255,255,0.28);
            border-radius: 0 10px 10px 0;
        }
        .interim-vo-sub .vo-sub-label {
            font-size: 10px;
            font-weight: 700;
            color: #b35900;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }
                    
        .glass-header { 
            width: 100%; 
height: calc(60px + env(safe-area-inset-top)); 
    padding: env(safe-area-inset-top) 60px 0 60px; 
            background:
                radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
                linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); z-index: 1000; flex-shrink: 0;
            position: relative;
            box-sizing: border-box;
        }
        
.form-tabs-wrapper {
display: flex;
justify-content: center;
align-items: center;
width: 100%;
}

        .form-tabs{
    display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 8px;
padding: 0;
}

.form-tabs::before,
.form-tabs::after {
display: none;
}

.form-tabs::-webkit-scrollbar{
    display:none;
}

.form-tabs button{
    padding: 8px 16px;
border-radius: 15px;
 background: rgba(255,255,255,.2);
color: white;
border: none;
cursor: pointer;
font-weight: 600;
font-size: 12px;
white-space: nowrap;
transition: 0.3s;
}

.form-tabs button:hover{
    transform:translateY(-2px);
}

.form-tabs button.active{
    background: white;
color: #0b3d91;
}

.district-group{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px;
    border-radius: 16px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
}

.district-title{
    width: 100%;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: rgba(0,0,0,0.55);
    margin-bottom: 4px;
}

.district-btn{
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 11px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.25);
    color: #333;
    backdrop-filter: blur(6px);
}

.district-btn:hover{
    transform: translateY(-1px);
}

.district-btn.active{
    background: linear-gradient(135deg,#007AFF,#00B4D8);
    color: white;
    border: none;
    box-shadow: 0 4px 12px rgba(0,122,255,0.25);
}.district-wrapper{
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 6px;
}

.district-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.district-title{
    width: 100%;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: rgba(0,0,0,0.55);
    margin-bottom: 4px;
}

.district-btn{
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 11px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.25);
    color: #333;
    backdrop-filter: blur(6px);
}

.district-btn:hover{
    transform: translateY(-1px);
}

.district-btn.active{
    background: linear-gradient(135deg,#007AFF,#00B4D8);
    color: white;
    border: none;
    box-shadow: 0 4px 12px rgba(0,122,255,0.25);
}
@keyframes chipPop {
    0% {
        transform: scale(0.7);
        opacity: 0;
    }
    60% {
        transform: scale(1.15);
        opacity: 1;
    }
    100% {
        transform: scale(1);
    }
}

.district-btn.pop {
    animation: chipPop 0.25s ease-out;
}

.region-segment{
    display:flex;
    gap:6px;
    padding:6px;
    border-radius:14px;
    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.35);
    width:100%;
    max-width:420px;
}

.region-segment button{
    flex:1;
    border:none;
    padding:10px 12px;
    border-radius:10px;
    font-size:11px;
    font-weight:700;
    cursor:pointer;
    background:transparent;
    color:#333;
    transition:0.2s;
}

.region-segment button:hover{
    background:rgba(255,255,255,0.4);
    transform:translateY(-1px);
}

.region-segment button:active{
    transform:scale(0.97);
}

/* primary actions */
.region-segment button:nth-child(1){
    color:#007AFF;
}

.region-segment button:nth-child(2){
    color:#34C759;
}

.region-segment .clear{
    color:#8e8e93;
    font-weight:600;
}

/* ===== VO EXISTING PILLS ===== */
.vo-existing-section {
    margin-bottom: 16px;
}

.vo-existing-label {
    font-size: 10px;
    font-weight: 800;
    color: rgba(0,0,0,0.45);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
}

.vo-pills-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.vo-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,59,48,0.3);
    background: rgba(255,59,48,0.08);
    color: #cc1f10;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
}

.vo-pill:hover {
    background: rgba(255,59,48,0.18);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(255,59,48,0.2);
}

.vo-pill.active {
    background: linear-gradient(135deg, #FF3B30, #FF6B35);
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 14px rgba(255,59,48,0.35);
}

.vo-pill .vo-pill-amt {
    font-size: 9px;
    font-weight: 600;
    opacity: 0.75;
    background: rgba(0,0,0,0.1);
    padding: 2px 6px;
    border-radius: 999px;
}

.vo-pill.active .vo-pill-amt {
    background: rgba(255,255,255,0.25);
    opacity: 1;
}

@keyframes pillPop {
    0% { transform: scale(0.75); opacity: 0; }
    65% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

.vo-pill {
    animation: pillPop 0.2s ease-out;
}

/* Edit mode indicator */
.vo-edit-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,59,48,0.1);
    border: 1px solid rgba(255,59,48,0.25);
    margin-bottom: 14px;
}

.vo-edit-banner.visible {
    display: flex;
}

.vo-edit-banner-label {
    font-size: 11px;
    font-weight: 700;
    color: #cc1f10;
    flex: 1;
}

.vo-edit-banner-clear {
    background: none;
    border: 1px solid rgba(255,59,48,0.4);
    color: #cc1f10;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    width: auto;
    margin: 0;
}

.vo-edit-banner-clear:hover {
    background: rgba(255,59,48,0.12);
}

<body onload="initApp()">

    <app-sidebar></app-sidebar>

                <button class="active" onclick="showPage('registerWorkPage')">Work Orders</button>
                <button onclick="showPage('interimPage')">Interims</button>
                <button onclick="showPage('voPage')">Variation Order</button>

        </div>
    </div>

    <div class="main-content">

                    <label>Units</label><select id="w_unit_id" onchange="loadContractsByUnit('w')" required><option value="">Choose Unit</option></select>
                    <label>Contracts</label><select id="w_contract_id" onchange="onContractSelect()" required><option value="">Choose Unit First</option></select>
                   <label>Work Order Id(s)</label>
<div id="w_id_rows_container"></div>
<button type="button" onclick="addWorkIdRow()" style="background:none; color:var(--ios-blue); border:1px dashed var(--ios-blue); font-size:12px; padding:10px; width:100%; border-radius:10px; cursor:pointer; margin-top:5px;">+ Add Work ID</button>

                   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">

<div>
<label>Blueform Date</label>
<input type="date" id="w_qpb_date" required>
</div>

</div>

<label>District</label>
<select id="w_dist" required>

</select>

<label>Location & Cost Breakdown</label>
<div id="w_id_cards_container" class="w-id-cards-container"></div>

    async function loadContractsByUnit(prefix){

const unitId = document.getElementById(`${prefix}_unit_id`).value;
const contractSelect = document.getElementById(`${prefix}_contract_id`);

if(!unitId){
contractSelect.innerHTML = '<option value="">Choose Unit First</option>';
return;
}

contractSelect.innerHTML = '<option value="">Loading...</option>';

try{

const res = await fetch(
`${SB_URL}/rest/v1/contract?select=*&unit_id=eq.${unitId}`,
{ headers });

const data = await res.json();

// ===== SUSUN IKUT contract_start, kalau sama ikut nombor kontrak ascending =====
data.sort((a, b) => {

    const dateA = a.contract_start ? new Date(a.contract_start).getTime() : 0;
    const dateB = b.contract_start ? new Date(b.contract_start).getTime() : 0;

    if(dateA !== dateB) return dateA - dateB;

    return extractContractNumber(a.contract_code) - extractContractNumber(b.contract_code);
});

contractSelect.innerHTML = '<option value="">Choose Contract</option>';

data.forEach(c=>{

const opt = document.createElement('option');

opt.value = c.id;
opt.text = c.contract_code;

opt.dataset.b = JSON.stringify(c.contract_sections_breakdown);
opt.dataset.dist = (c.district || '').toUpperCase();
opt.dataset.area = c.area_code;
    opt.dataset.vo = JSON.stringify(c.vo_breakdown || {});

contractSelect.appendChild(opt);

});

}catch(e){
console.error(e);
}

}

// Helper: extract nombor kontrak dari format seperti "RSAJ/KP/T/57/2024" -> 57
function extractContractNumber(code){
    if(!code) return 0;
    const match = String(code).match(/(\d+)\s*\/\s*\d{4}\s*$/);
    return match ? parseInt(match[1], 10) : 0;
}

const match = raw.match(/^([CK])?\s*(\d+)\s*([A-Z]?)$/);

if(!match) return '';

const prefix =
match[1] ||
'C';

const suffix = match[3] || '';

return `${prefix} ${match[2]}${suffix}`;

}

function addWorkIdRow(prefix = 'C', num = ''){

    const container = document.getElementById('w_id_rows_container');

    workIdRowCounter++;
    const rowId = `w_id_row_${workIdRowCounter}`;

    const row = document.createElement('div');
    row.className = 'w-id-row';
    row.id = rowId;
    row.style = "display:flex; gap:8px; align-items:center; margin-bottom:8px;";

    row.innerHTML = `
        <select class="w_id_prefix" style="width:80px;flex-shrink:0;">
            <option value="C" ${prefix === 'C' ? 'selected' : ''}>C</option>
            <option value="K" ${prefix === 'K' ? 'selected' : ''}>K</option>
        </select>
        <input type="text"
               class="w_id_num"
               placeholder="123456"
               value="${num}"
               oninput="this.value=this.value.replace(/[^0-9]/g,'');renderWorkIdCards();autoDetectWork()">
        <div onclick="removeWorkIdRow('${rowId}')"
             style="color:red; cursor:pointer; flex-shrink:0; padding:0 6px;">✕</div>
    `;

    row.querySelector('.w_id_prefix').addEventListener('change', () => {
        renderWorkIdCards();
        autoDetectWork();
    });

    container.appendChild(row);
}

function removeWorkIdRow(rowId){
    const row = document.getElementById(rowId);
    if(row) row.remove();

    const container = document.getElementById('w_id_rows_container');
    if(container.children.length === 0){
        addWorkIdRow();
    }

    renderWorkIdCards();
    autoDetectWork();
}

function resetWorkIdRows(){
    document.getElementById('w_id_rows_container').innerHTML = '';
    workIdRowCounter = 0;
    originalLoadedWorkIds = [];
    currentWorkSequenceNo = null;
    workIdCardDataMap = {};
    lastWorkIdNum = '';
    addWorkIdRow();
    renderWorkIdCards();
}

function getCurrentWorkIdsFromRows(){

    const ids = [];

    document.querySelectorAll('#w_id_rows_container .w-id-row').forEach(row=>{

        const prefix = row.querySelector('.w_id_prefix').value;
        const num = row.querySelector('.w_id_num').value.trim();

        if(num.length > 0){
            const normalized = normalizeWorkIdWithPrefix(prefix, num);
            if(normalized && !ids.includes(normalized)){
                ids.push(normalized);
            }
        }

    });

    return ids;
}

function normalizeWorkIdWithPrefix(prefix, raw){

    raw = (raw || '').trim().toUpperCase();

    const match = raw.match(/^([CK])?\s*(\d+)\s*([A-Z]?)$/);

    if(!match) return '';

    const usedPrefix = match[1] || prefix || 'C';
    const suffix = match[3] || '';

    return `${usedPrefix} ${match[2]}${suffix}`;
}

function renderWorkIdCards(skipSave = false){

    const container = document.getElementById("w_id_cards_container");
    if(!container) return;

    if(!skipSave){
        // ==========================
        // Simpan data semasa ke dalam Map cache
        // ==========================
        document.querySelectorAll(".w-id-card").forEach(card=>{
            const workId = card.dataset.workId;
            if(!workId) return;

            if(!workIdCardDataMap[workId]){
                workIdCardDataMap[workId]={};
            }

            workIdCardDataMap[workId].location = card.querySelector(".w_card_location")?.value || "";
            // Simpan description unik per Work ID
            workIdCardDataMap[workId].description = card.querySelector(".w_card_desc")?.value || "";

            if(!workIdCardDataMap[workId].section_category){
                workIdCardDataMap[workId].section_category={};
            }

            card.querySelectorAll(".w_sec_amt").forEach(input=>{
                const sec=input.dataset.sec;
                if(!workIdCardDataMap[workId].section_category[sec]){
                    workIdCardDataMap[workId].section_category[sec]={};
                }
                workIdCardDataMap[workId].section_category[sec].amt=parseFloat(input.dataset.rawValue||0);
            });

            card.querySelectorAll(".w_sec_extra").forEach(input=>{
                const sec=input.dataset.sec;
                if(!workIdCardDataMap[workId].section_category[sec]){
                    workIdCardDataMap[workId].section_category[sec]={};
                }
                workIdCardDataMap[workId].section_category[sec].extra=parseFloat(input.dataset.rawValue||0);
            });
        });
    }

    const currentIds=getCurrentWorkIdsFromRows();
    container.innerHTML="";

    currentIds.forEach(workId=>{
        const saved= workIdCardDataMap[workId] || {};
        const location= saved.location || "";
        const description= saved.description || ""; // Ambil description yang disimpan
        const breakdown= saved.section_category || {};

        const card=document.createElement("div");
        card.className="w-id-card";
        card.dataset.workId=workId;

        let html=`
            <span class="w-id-card-label">${workId}</span>

            <label>Location</label>
            <input type="text" class="w_card_location" value="${escapeAttr(location)}" placeholder="Location">

            <label>Work Description</label>
            <textarea class="w_card_desc" rows="2" placeholder="Description bagi ${workId}">${escapeAttr(description)}</textarea>

            <label>Cost Breakdown</label>
            <div class="funding-grid">
        `;

        Object.keys(currentContractSections).sort().forEach(sec=>{
            const desc= currentContractSections[sec].desc || "";
            const data= breakdown[sec] || {};
            const amt= Number(data.amt || 0);
            const extra= Number(data.extra || 0);
            const provisional= desc.toUpperCase().includes("PROVISIONAL");

            html+=`
                <div class="funding-item">
                    <label>${sec}</label>
                    <span class="sec-desc">${desc}</span>
                    <input type="text" class="w_sec_amt" data-sec="${escapeAttr(sec)}" data-work-id="${escapeAttr(workId)}" data-raw-value="${amt}" value="${amt.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}" oninput="formatCurrencyInput(this); calcTotalWork();">
                    ${provisional?`
                        <input type="text" class="w_sec_extra" data-sec="${escapeAttr(sec)}" data-work-id="${escapeAttr(workId)}" data-raw-value="${extra}" value="${extra.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}" oninput="formatCurrencyInput(this); calcTotalWork();">
                    `:``}
                </div>
            `;
        });

        html+=`</div>`;
        card.innerHTML=html;
        container.appendChild(card);
    });

    calcTotalWork();
}

function escapeAttr(str){

}

function addWorkOrdersToList() {

    const area = document.getElementById('i_paste_area');

    const rawIds = area.value.split(/\r?\n|,|\t/);

    const cleanIds = rawIds
        .map(s => s.trim())
        .filter(s => s !== '')
        .map(id => normalizeWorkId(id))
        .filter(id => !attachedWorkOrders.includes(id));

    attachedWorkOrders = [
        ...attachedWorkOrders,
        ...cleanIds
    ];

    area.value = '';

    renderIDTags();
}

    function renderIDTags() {
        const container = document.getElementById('i_id_list_tags');
        container.innerHTML = '';
        attachedWorkOrders.forEach(id => {

    const penalty = parseFloat(document.getElementById('i_penalty').dataset.rawValue || 0);

async function submitInterim(){

const cId = document.getElementById('i_contract_id').value;

const iNo =
parseInt(document.getElementById('i_no').value);

const iDate =
document.getElementById('i_date_received').value;

if(!cId || !iNo || !iDate){

alert("Lengkapkan maklumat interim!");

return;

}

let total = 0;
const breakdown = {};

document.querySelectorAll('.i_sec_claim_val').forEach(i=>{
    const val = parseFloat(i.dataset.rawValue || 0);

    if(val > 0){
        const secKey = i.dataset.sec; 
        const parts = secKey.split('|VO:');

        if(parts.length === 2){
            const sectionName = parts[0];           
            const voName = parts[1];                

            if(!breakdown[sectionName]) breakdown[sectionName] = { amt: 0 };
            if(!breakdown[sectionName].vo) breakdown[sectionName].vo = {};
            breakdown[sectionName].vo[voName] = { amt: val };

        } else {
            if(!breakdown[secKey]) breakdown[secKey] = { amt: 0 };
            breakdown[secKey].amt = val;
        }

        total += val;
    }
});

const salvage = parseFloat(
    document.getElementById('i_salvage').dataset.rawValue || 0
);

const pg = parseFloat(
    document.getElementById('i_pg_sum').dataset.rawValue || 0
);

const taxAmount = parseFloat(
    document.getElementById('i_tax_amount').dataset.rawValue || 0
);

const penalty = parseFloat(
    document.getElementById('i_penalty').dataset.rawValue || 0
);

const net = total - salvage - pg + taxAmount - penalty;

const payload = {

contract_id: cId,

interim_no: iNo,

date_received: iDate,

salvage_value: salvage,

performance_guarantee_sum: pg,

tax: taxAmount,

penalty: penalty,

claim_breakdown: breakdown,

claim_amount: total,

net_amount: net,

};

let res;

if(currentInterimId){

res = await fetch(
`${SB_URL}/rest/v1/interims?id=eq.${currentInterimId}`,
{
method:'PATCH',
headers,
body: JSON.stringify(payload)
});

}else{

res = await fetch(
`${SB_URL}/rest/v1/interims`,
{
method:'POST',
headers,
body: JSON.stringify(payload)
});

}

if(res.ok){

for (let workId of attachedWorkOrders) {

    const findRes = await fetch(
        `${SB_URL}/rest/v1/work_orders?work_id=eq.${encodeURIComponent(workId)}&select=id`,
        { headers }
    );

    const rows = await findRes.json();

    if (rows.length > 0) {

        await fetch(
            `${SB_URL}/rest/v1/work_orders?id=eq.${rows[0].id}`,
            {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                    interim_no: iNo,
                    status: 'Claimed'
                })
            }
        );

    } else {

        console.warn(
            'Work Order tidak dijumpai:',
            workId
        );

    }

}

alert(
currentInterimId
? "Interim berjaya dikemaskini!"
: "Interim berjaya direkodkan!"
);

location.reload();

}else{

const err = await res.text();

alert(err);

}

}

    document.getElementById('vo_date').value = voData.date || '';

    async function submitVO() {
        try {
            const cId = document.getElementById('vo_contract_id').value;
            const voName = document.getElementById('vo_name').value.trim().toUpperCase();
            const voDate = document.getElementById('vo_date').value;
            let amt = 0;

            const breakdown = {};

            document.querySelectorAll('.vo_sec_amt').forEach(i => {
                const value = parseFloat(i.dataset.rawValue || 0);
                if (value > 0) {
                    breakdown[i.dataset.sec] = { amt: value };
                    amt += value;
                }
            });

            if (!cId) return alert("Sila pilih kontrak!");
            if (!voName || !voDate || isNaN(amt)) {
                return alert("Sila isi Nama VO, Tarikh VO dan Amaun!");
            }

            // Ambil data kontrak terkini
            const resGet = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
            const data = await resGet.json();

            if (!data || data.length === 0) throw new Error("Data kontrak tidak dijumpai.");

            const contract = data[0];
            let vBreak = contract.vo_breakdown || {};

            if (currentEditingVOName) {

                // ===== MODE EDIT =====
                // Kira semula total_vo_amount: tolak amaun lama, tambah amaun baru
                const oldAmt = (vBreak[currentEditingVOName]?.amt) || 0;

                // Jika nama berubah, buang key lama
                if (currentEditingVOName !== voName) {
                    delete vBreak[currentEditingVOName];
                }

                vBreak[voName] = {
                    amt: amt,
                    date: voDate,
                    breakdown: breakdown
                };

                const newTotalVO = (contract.total_vo_amount || 0) - oldAmt + amt;

                const resUpd = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({
                        vo_breakdown: vBreak,
                        total_vo_amount: newTotalVO
                    })
                });

                if (resUpd.ok) {
                    alert(`VO "${voName}" berjaya dikemaskini!`);
                    location.reload();
                } else {
                    const err = await resUpd.json();
                    alert("Gagal simpan: " + err.message);
                }

            } else {

                // ===== MODE TAMBAH BARU =====
                // Semak jika nama VO sudah wujud
                if (vBreak[voName]) {
                    const confirm = window.confirm(`VO "${voName}" sudah wujud. Ganti data sedia ada?`);

                vBreak[voName] = {

                };

                const resUpd = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, {

                    body: JSON.stringify({
                        vo_breakdown: vBreak,

                    })

            }

        } catch (e) {

            originalLoadedWorkIds = [];

                .map(id=>`work_id.eq.${encodeURIComponent(id)}`)

`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&or=(${filter})&select=*`,

`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&sequence_no=eq.${encodeURIComponent(sequenceNo)}&select=*`,

            originalLoadedWorkIds =
                group.map(x=>x.work_id);

            // Cari bahagian ini di dalam autoDetectWork() dan gantikan:
group.forEach(w=>{

            );

async function updateWorkOrderSequenceNumbers(
    contractId,
    districtText,
    areaText
){

    const districts =
        districtText.split(",").map(x=>x.trim().toUpperCase());

    const areas =
        areaText.split(",").map(x=>x.trim().toUpperCase());

    const res = await fetch(

`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}&select=*`,

    {headers});

    const works = await res.json();

    const bulk = [];

    districts.forEach((district,index)=>{

        const areaCode =
            areas[index] || "WO";

        // ambil semua sequence unik
        const sequences = [
            ...new Set(
                works
                .filter(w=>
                    (w.district||"")
                    .trim()
                    .toUpperCase()===district
                )
                .map(w=>w.sequence_no)
            )
        ];

        sequences.sort((a,b)=>{

            const na =
                parseInt(
                    (a||"").replace(/\D/g,"")
                )||0;

            const nb =
                parseInt(
                    (b||"").replace(/\D/g,"")
                )||0;

            return na-nb;

        });

        sequences.forEach((oldSeq,i)=>{

            const newSeq =
                areaCode +
                String(i+1).padStart(3,"0");

            works
            .filter(w=>w.sequence_no===oldSeq)
            .forEach(w=>{

                bulk.push({

                    id:w.id,

                    sequence_no:newSeq,

                    district:district

                });

            });

        });

    });

    if(!bulk.length) return;

    await fetch(
`${SB_URL}/rest/v1/work_orders`,
{
method:"POST",
headers:{
...headers,
Prefer:"resolution=merge-duplicates"
},
body:JSON.stringify(bulk)
});

}

document.addEventListener('DOMContentLoaded', () => {

    const swipeArea = document.querySelector('.main-content');

    let touchStartX = 0;
    let touchStartY = 0;

    swipeArea.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
    }, { passive:true });

    swipeArea.addEventListener('touchend', e => {

        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if(Math.abs(dx) < 80) return;
        if(Math.abs(dx) < Math.abs(dy)) return;

        handleFormSwipe(dx);

    }, { passive:true });

});

function handleFormSwipe(dx) {

    if(window.innerWidth > 768) return;

    const tabs = [...document.querySelectorAll('.form-tabs button')];

    const activeIndex = tabs.findIndex(btn =>
        btn.classList.contains('active')
    );

    if(activeIndex === -1) return;

    if(dx < 0 && activeIndex < tabs.length - 1){
        tabs[activeIndex + 1].click();
    }

    if(dx > 0 && activeIndex > 0){
        tabs[activeIndex - 1].click();
    }
}
