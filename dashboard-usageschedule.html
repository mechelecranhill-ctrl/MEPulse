    <style>

#unitHeader{

    font-weight: 700;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
}
        .sidebar {
        width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    max-width: var(--sidebar-width);
    flex-shrink: 0;

    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);

    flex-direction: column;
}

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--ios-blue); transition: 0.2s;
            margin-right: 15px;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 800;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .contract-item {
    background: white;
    padding: 8px 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(0,0,0,0.05);

    display: flex;
    flex-direction: column;
    justify-content: center;

    height: 65px;

    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.contract-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

.contract-item.active { 
    border-color: var(--ios-blue); 
    background: #eaf3ff; 
    color: #000;
}

.contract-item.active small { 
    color: #555; 
}

.glass-header{
    display:flex;
    justify-content:center;
    align-items:center;
    position: relative;
    margin-bottom:20px;
}

.unit-container{
    display:flex;
    max-width: 900px;
    width: 100%;
    justify-content: center;
    gap:8px;
    overflow-x:auto;

    padding: 0 60px;  
    scroll-behavior: smooth;
}

.unit-container::-webkit-scrollbar{
    display:none;
}
.unit-container{
    -ms-overflow-style:none;
    scrollbar-width:none;
}

.unit-pill{
    padding:7px 14px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    background:#f1f1f1;
    cursor:pointer;
    white-space:nowrap;
}

.unit-pill.active{
    background:var(--ios-blue);
    color:white;
}
.unit-container{
    -ms-overflow-style:none;
    scrollbar-width:none;
}

.main-panel {
    flex: 1; 
    width: 100%;
    max-width: none;
    margin: 0;
    padding: 25px 30px;
    height: 100vh;
    overflow-y: auto;

        }

        }

        .modal-box {

        .a4-container {

            min-height: 297mm; 
            margin: 0 auto;

        .a4-container::after {

            right: 40px;

            gap: 10px; 
        }

    .mobile-cards{

}

#mobileCardContainer{

}

    .mobile-card{

}
 @media print {

     html, body {
    overflow: hidden !important;
}

        size: A4;
        margin: 0;
    }

        margin: 0;
        padding: 0;

    }

    body * {
        visibility: hidden;

        left: 0 !important;

}

#interimTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    background:rgba(255,255,255,0.92);

    border-radius:20px;
    overflow:hidden;

    font-size:10px;
    min-width:1200px;

    border:1px solid rgba(0,0,0,0.06);

    box-shadow:
        0 4px 18px rgba(0,0,0,0.05),
        0 10px 30px rgba(0,0,0,0.04);

    backdrop-filter:blur(12px);
}

/* HEADER */

#interimTable thead th{

    position:sticky;
    top:0;
    z-index:20;

    background:
        linear-gradient(
            180deg,
            #ffffff 0%,
            #f3f7fc 100%
        );

    color:#475569;

    font-size:9px;
    font-weight:800;
    letter-spacing:0.7px;
    text-transform:uppercase;

    padding:9px 8px;

    border-bottom:1px solid #d9e2ec;
    border-right:1px solid #edf2f7;

    white-space:nowrap;
    text-align:center;
}

#interimTable thead th:last-child{
    border-right:none;
}

/* BODY */

#interimTable tbody td{

    padding:7px 8px;

    border-bottom:1px solid #f1f5f9;
    border-right:1px solid #f1f5f9;

    background:white;

    transition:0.15s ease;

    line-height:1.2;
}

/* remove last border */

#interimTable tbody td:last-child{
    border-right:none;
}

/* hover */

#interimTable tbody tr:hover td{
    background:#f8fbff;
}

/* item column */

#interimTable tbody td:nth-child(1){
    width:45px;
    text-align:center;
    font-weight:700;
    color:#64748b;
}

/* description */

#interimTable tbody td:nth-child(2){
    font-weight:600;
    color:#334155;
    min-width:220px;
}

/* numbers */

#interimTable tbody td:not(:nth-child(1)):not(:nth-child(2)){
    text-align:right;
    font-variant-numeric: tabular-nums;
}

/* zebra */

#interimTable tbody tr:nth-child(even) td{
    background:#fcfdff;
}

/* total row */

#interimTable tbody tr:last-child td{

    background:
        linear-gradient(
            180deg,
            #f8fbff 0%,
            #edf4ff 100%
        );

    font-weight:800;

    border-top:2px solid #c7d7ea;

    color:#0f172a;
}

/* negative */

#interimTable td[style*="color:red"]{
    background:#fff5f5 !important;
    color:#dc2626 !important;
    font-weight:800;
}

/* smooth rounded corner */

#interimTable thead tr th:first-child{
    border-top-left-radius:20px;
}

#interimTable thead tr th:last-child{
    border-top-right-radius:20px;
}

/* SCROLLBAR */

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar{
    height:8px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-track{
    background:#eef2f7;
    border-radius:20px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-thumb:hover{
    background:#94a3b8;
}

    return (...args)=>{
        clearTimeout(t);
        t = setTimeout(()=>fn(...args), delay);
    };
}

function sortWorkOrders(data, areaPriority){
    return data.sort((a,b)=>{
        const aArea = (a.area_code || '').toUpperCase().trim();
        const bArea = (b.area_code || '').toUpperCase().trim();
        const aRank = areaPriority[aArea] ?? 999;
        const bRank = areaPriority[bArea] ?? 999;
        if(aRank !== bRank) return aRank - bRank;
        
        const d1 = new Date(a.qpb_date || "1900-01-01");
        const d2 = new Date(b.qpb_date || "1900-01-01");
        if(d1.getTime() !== d2.getTime()) return d1 - d2;

        const t1 = new Date(a.created_at || "1900-01-01");
        const t2 = new Date(b.created_at || "1900-01-01");
        if(t1.getTime() !== t2.getTime()) return t1 - t2;

        return (a.sequence_no || '').localeCompare(b.sequence_no || '');
    });
}

function filterDistrict(district, el){
    document.querySelectorAll('.district-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    if(district === "ALL"){
        currentView = "DATE";
        const sorted = [...allWorks].sort((a,b)=>{
            const d1 = new Date(a.qpb_date || "1900-01-01");
            const d2 = new Date(b.qpb_date || "1900-01-01");
            if(d1.getTime() !== d2.getTime()) return d1 - d2;
            
            const t1 = new Date(a.created_at || "1900-01-01");
            const t2 = new Date(b.created_at || "1900-01-01");
            if(t1.getTime() !== t2.getTime()) return t1 - t2;

            return (a.sequence_no || '').localeCompare(b.sequence_no || '');
        });
        renderTable(sorted, false);
        return;
    }
    currentView = "AREA";
    const filtered = allWorks.filter(w => (w.district || '') === district);
    const sorted = sortWorkOrders(filtered, areaPriority || {});
    renderTable(sorted, true);
}

function getInitials(text){
    const ignore = ['AND','OF','THE','&','DAN'];
    return text.toUpperCase().replace(/[^A-Z\s]/g,'').split(/\s+/)
        .filter(word => word.length > 0 && !ignore.includes(word))
        .map(word => word[0]).join('.');
}

function buildSectionBreakdown(work){
    const s = work.section_category || {};
    let html = '';
    Object.keys(s).forEach(sec=>{
        const amt = Number(s[sec]?.amt || 0);
        if(amt <= 0) return;
        html += `<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;"><span>${sec}</span><span>RM ${amt.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
    });
    const add = Number(work.additional || 0);
    if(add > 0){
        html += `<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;"><span>PROVISIONAL SUM</span><span>RM ${add.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
    }
    return html;
}

function formatTarikhBM(dateStr){
    if(!dateStr) return '';
    const bulan = ['JANUARI','FEBRUARI','MAC','APRIL','MEI','JUN','JULAI','OGOS','SEPTEMBER','OKTOBER','NOVEMBER','DISEMBER'];
    const d = new Date(dateStr);
    return `${String(d.getDate()).padStart(2,'0')} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
}

function getActiveVO(voBreakdown, cutoffDate){
    const active = {};
    Object.entries(voBreakdown).forEach(([voName, vo]) => {
        const voDate = vo.vo_date ? new Date(vo.vo_date) : null;
        if(voDate && voDate <= cutoffDate){
            active[voName] = vo;
        }
    });
    return active;
}

function sortWOChronological(woArray, districtPriority) {
    return [...woArray].sort((a, b) => {
        // 1. qpb_date
        const d1 = new Date(a.qpb_date || "1900-01-01");
        const d2 = new Date(b.qpb_date || "1900-01-01");
        if (d1.getTime() !== d2.getTime()) return d1 - d2;

        // 2. created_at
        const t1 = new Date(a.created_at || "1900-01-01");
        const t2 = new Date(b.created_at || "1900-01-01");
        if (t1.getTime() !== t2.getTime()) return t1 - t2;

        // 3. district priority (ikut susunan dalam contract.area_code / districtPriority)
        const aDistrict = (a.district || '').toUpperCase().trim();
        const bDistrict = (b.district || '').toUpperCase().trim();
        const aRank = districtPriority[aDistrict] ?? 999;
        const bRank = districtPriority[bDistrict] ?? 999;
        if (aRank !== bRank) return aRank - bRank;

        // 4. sequence_no
        return (a.sequence_no || '').localeCompare(b.sequence_no || '');
    });
}

function buildInterimDateMap(allInterims){
    const map = new Map();
    (allInterims || []).forEach(int => {
        if (int && int.interim_no !== undefined && int.interim_no !== null) {
            map.set(String(int.interim_no), new Date(int.date_received || "1900-01-01"));
        }
    });
    return map;
}

function isWOPendingAtCutoff(wo, interimDateMap, cutoffDate){
    if (!wo.interim_no) return true; // tiada interim langsung -> pending
    const claimDate = interimDateMap.get(String(wo.interim_no));
    if (!claimDate) return true; // rekod interim tak jumpa -> anggap pending (selamat)
    return claimDate.getTime() > cutoffDate.getTime(); // claim belum wujud pada cutoff ini -> pending
}

async function buildBlueformData(id, sharedData = null) {

    const res = await fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}&select=*,contract(*,units(unit_name))`, { headers });
    const result = await res.json();
    const data = result[0];

    const c = data.contract;
    const b = c.contract_sections_breakdown || {};
    const s = data.section_category ?? {};

    let totalSection = 0;
    Object.values(s).forEach(sec => { totalSection += Number(sec?.amt || 0); });
    let provisionalExtra = Number(data.additional || 0);
    let totalWorkValue = totalSection + provisionalExtra;

    let allInterims, allWO, localDistrictPriority;
    if (sharedData) {
        allInterims = sharedData.allInterims;
        allWO = sharedData.allWO;
        localDistrictPriority = sharedData.localDistrictPriority;
    } else {
        const [interimRes, woRes, areaRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${c.id}&order=date_received.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${c.id}`, { headers }),
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${c.id}&select=area_code`, { headers })
        ]);
        allInterims = await interimRes.json();
        allWO = await woRes.json();
        const areaRows = await areaRes.json();

        localDistrictPriority = {};
        (areaRows[0]?.area_code || '').split(',')
            .map(a => a.trim().toUpperCase())
            .filter(a => a.length > 0)
            .forEach((a, i) => { localDistrictPriority[a] = i + 1; });
    }

    const sortedAllWO = sortWOChronological(allWO, localDistrictPriority);

    const cutoffDate = new Date(data.qpb_date);

    const interimDateMap = buildInterimDateMap(allInterims);

    let sectionUsed = {};
    let totalSalvage = 0, totalPG = 0, totalTax = 0;

    allInterims.forEach(int => {
        const intDate = new Date(int.date_received);
        if (intDate > cutoffDate) return;

        totalSalvage += Number(int.salvage_value || 0);
        totalPG += Number(int.performance_guarantee_sum || 0);
        totalTax += Number(int.tax || 0);

        const cat = int.claim_breakdown || {};
        Object.keys(cat).forEach(sec => {
            const val = Number(cat[sec]?.amt || cat[sec]?.amount || cat[sec]?.value || 0);
            if (!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += val;
        });
    });

    const currentWOIndex = sortedAllWO.findIndex(w => Number(w.id) === Number(data.id));

    sortedAllWO.forEach((wo, index) => {
        const woId = Number(wo.id);

        if (woId === Number(data.id)) return;         
        if (wo.status === 'CANCEL') return;             
        if (index >= currentWOIndex) return;            

        if (!isWOPendingAtCutoff(wo, interimDateMap, cutoffDate)) return;

        const cat = wo.section_category || {};
        Object.keys(cat).forEach(sec => {
            const amt = Number(cat[sec]?.amt || 0);
            if (!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += amt;
        });
        const add = Number(wo.additional || 0);
        if (add > 0) {
            if (!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
            sectionUsed["PROVISIONAL SUM"] += add;
        }
    });

    const currentSections = data.section_category || {};
    Object.keys(currentSections).forEach(sec => {
        const amt = Number(currentSections[sec]?.amt || 0);
        if (!sectionUsed[sec]) sectionUsed[sec] = 0;
        sectionUsed[sec] += amt;
    });
    const currentAdd = Number(data.additional || 0);
    if (currentAdd > 0) {
        if (!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
        sectionUsed["PROVISIONAL SUM"] += currentAdd;
    }

    const voBreakdown = c.vo_breakdown || {};
    const activeVO = getActiveVO(voBreakdown, cutoffDate);
    let totalActiveVO = 0;
    Object.values(activeVO).forEach(vo => { totalActiveVO += Number(vo.amt || 0); });

    let bakiKontrak = Number(c.contract_sum || 0) + totalActiveVO;

    allInterims.forEach(int => {
        const intDate = new Date(int.date_received);
        if (intDate > cutoffDate) return;
        let amt = 0;
        Object.values(int.claim_breakdown || {}).forEach(s => {
            amt += Number(s?.amt || s?.amount || s?.value || 0);
        });
        bakiKontrak -= amt;
        bakiKontrak += Number(int.salvage_value || 0);
        bakiKontrak += Number(int.performance_guarantee_sum || 0);
        bakiKontrak -= Number(int.tax || 0);
    });

    sortedAllWO.forEach((wo, index) => {
        const woId = Number(wo.id);
        if (wo.status === 'CANCEL') return;
        if (index > currentWOIndex) return;        

        if (woId !== Number(data.id)) {
            if (!isWOPendingAtCutoff(wo, interimDateMap, cutoffDate)) return; 
        }

        bakiKontrak -= Number(wo.amount_spent || 0);
    });

    return {
        data, c, b, s,
        totalWorkValue, provisionalExtra,
        sectionUsed,
        totalSalvage, totalPG, totalTax,
        bakiKontrak,
        voBreakdown, activeVO
    };
}

async function buildBlueformDataGroup(ids, sharedData = null) {

    const woResults = await Promise.all(
        ids.map(id =>
            fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}&select=*,contract(*,units(unit_name))`, { headers })
                .then(r => r.json()).then(r => r[0])
        )
    );

    const primaryWO = woResults[0];
    const c = primaryWO.contract;
    const b = c.contract_sections_breakdown || {};

    const combinedSections = {};
    let combinedProvisional = 0;
    woResults.forEach(wo => {
        const s = wo.section_category || {};
        Object.keys(s).forEach(sec => {
            const amt = Number(s[sec]?.amt || 0);
            if (!combinedSections[sec]) combinedSections[sec] = { amt: 0 };
            combinedSections[sec].amt += amt;
        });
        combinedProvisional += Number(wo.additional || 0);
    });

    let totalSection = 0;
    Object.values(combinedSections).forEach(sec => { totalSection += Number(sec?.amt || 0); });
    const totalWorkValue = totalSection + combinedProvisional;

    const combinedWorkId = woResults.map(w => w.work_id).join(', ');
    const uniqueLocations = [...new Set(woResults.map(w => (w.location || '').trim()).filter(l => l !== ''))];
    const combinedLocation = uniqueLocations.join(', ');
    const combinedDesc = woResults.map(w => w.description).join(' + ');

    let allInterims, allWO, localDistrictPriority;
    if (sharedData) {
        allInterims = sharedData.allInterims;
        allWO = sharedData.allWO;
        localDistrictPriority = sharedData.localDistrictPriority;
    } else {
        const [interimRes, woRes, areaRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${c.id}&order=date_received.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${c.id}`, { headers }),
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${c.id}&select=area_code`, { headers })
        ]);
        allInterims = await interimRes.json();
        allWO = await woRes.json();
        const areaRows = await areaRes.json();
        localDistrictPriority = {};
        (areaRows[0]?.area_code || '').split(',')
            .map(a => a.trim().toUpperCase())
            .filter(a => a.length > 0)
            .forEach((a, i) => { localDistrictPriority[a] = i + 1; });
    }

    const groupIds = new Set(ids.map(Number));

    const sortedAllWO = sortWOChronological(allWO, localDistrictPriority);

    const cutoffDate = new Date(Math.max(...woResults.map(wo => new Date(wo.qpb_date))));

    const interimDateMap = buildInterimDateMap(allInterims);

    let sectionUsed = {};
    let totalSalvage = 0, totalPG = 0, totalTax = 0;

    allInterims.forEach(int => {
        const intDate = new Date(int.date_received);
        if (intDate > cutoffDate) return;

        totalSalvage += Number(int.salvage_value || 0);
        totalPG += Number(int.performance_guarantee_sum || 0);
        totalTax += Number(int.tax || 0);

        const cat = int.claim_breakdown || {};
        Object.keys(cat).forEach(sec => {
            const val = Number(cat[sec]?.amt || cat[sec]?.amount || cat[sec]?.value || 0);
            if (!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += val;
        });
    });

    const firstGroupIndex = sortedAllWO.findIndex(w => groupIds.has(Number(w.id)));

    sortedAllWO.forEach((wo, index) => {
        const woId = Number(wo.id);

        if (groupIds.has(woId)) return;            
        if (wo.status === 'CANCEL') return;
        if (index >= firstGroupIndex) return;      

        if (!isWOPendingAtCutoff(wo, interimDateMap, cutoffDate)) return;

        const cat = wo.section_category || {};
        Object.keys(cat).forEach(sec => {
            const amt = Number(cat[sec]?.amt || 0);
            if (!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += amt;
        });
        const add = Number(wo.additional || 0);
        if (add > 0) {
            if (!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
            sectionUsed["PROVISIONAL SUM"] += add;
        }
    });

    woResults.forEach(wo => {
        const cat = wo.section_category || {};
        Object.keys(cat).forEach(sec => {
            const amt = Number(cat[sec]?.amt || 0);
            if (!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += amt;
        });
        const add = Number(wo.additional || 0);
        if (add > 0) {
            if (!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
            sectionUsed["PROVISIONAL SUM"] += add;
        }
    });

    const voBreakdown = c.vo_breakdown || {};
    const activeVO = getActiveVO(voBreakdown, cutoffDate);
    let totalActiveVO = 0;
    Object.values(activeVO).forEach(vo => { totalActiveVO += Number(vo.amt || 0); });

    let bakiKontrak = Number(c.contract_sum || 0) + totalActiveVO;

    allInterims.forEach(int => {
        const intDate = new Date(int.date_received);
        if (intDate > cutoffDate) return;
        let amt = 0;
        Object.values(int.claim_breakdown || {}).forEach(s => {
            amt += Number(s?.amt || s?.amount || s?.value || 0);
        });
        bakiKontrak -= amt;
        bakiKontrak += Number(int.salvage_value || 0);
        bakiKontrak += Number(int.performance_guarantee_sum || 0);
        bakiKontrak -= Number(int.tax || 0);
    });

    sortedAllWO.forEach((wo, index) => {
        const woId = Number(wo.id);
        if (wo.status === 'CANCEL') return;

        const isInGroup = groupIds.has(woId);
        const isBeforeGroup = index < firstGroupIndex;
        if (!isInGroup && !isBeforeGroup) return;

        if (!isInGroup) {
            if (!isWOPendingAtCutoff(wo, interimDateMap, cutoffDate)) return;
        }

        bakiKontrak -= Number(wo.amount_spent || 0);
    });

    const combinedData = {
        ...primaryWO,
        work_id: combinedWorkId,
        location: combinedLocation,
        description: combinedDesc,
        section_category: combinedSections,
        additional: combinedProvisional,
        amount_spent: totalWorkValue,
        contract: c
    };

    return {
        data: combinedData, c, b,
        s: combinedSections,
        totalWorkValue,
        provisionalExtra: combinedProvisional,
        sectionUsed,
        totalSalvage, totalPG, totalTax,
        bakiKontrak,
        voBreakdown, activeVO
    };
}

async function bulkDownloadBlueform() {
    const checked = [...document.querySelectorAll('.bf-checkbox:checked')];
    if (checked.length === 0) { alert("Sila pilih Blueform."); return; }

    const container = document.getElementById('bulkPagesContainer');
    container.innerHTML = '';
    document.getElementById('bulkPreviewCount').innerText = `Memuatkan ${checked.length} blueform...`;
    document.getElementById('bulkPreviewPage').style.display = 'block';

    const contractId = currentContractId;
    try {
        const [interimRes, woRes, areaRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${contractId}&order=date_received.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}`, { headers }),
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}&select=area_code`, { headers })
        ]);
        const allInterims = await interimRes.json();
        const allWO = await woRes.json();
        const areaRows = await areaRes.json();

        const localDistrictPriority = {};
        (areaRows[0]?.area_code || '').split(',')
            .map(a => a.trim().toUpperCase())
            .filter(a => a.length > 0)
            .forEach((a, i) => { localDistrictPriority[a] = i + 1; });

        const sharedData = { allInterims, allWO, localDistrictPriority };

        const payloads = await processInBatches(checked, 5, cb => {
            const idsStr = cb.value;
            const ids = idsStr.split(',').map(id => id.trim());
            return ids.length === 1
                ? buildBlueformData(ids[0], sharedData)
                : buildBlueformDataGroup(ids, sharedData);
        });

        container.innerHTML = payloads.map(p => buildBlueformHTML(p)).join('');
        document.getElementById('bulkPreviewCount').innerText = `${checked.length} Blueform — Sedia untuk Cetak`;
    } catch (e) {

        alert("Ralat memuatkan bulk blueform.");

    }
}

function buildInterimMatrix(contract, interims, workorders, voBreakdown = {}) {
    const sections = contract.contract_sections_breakdown || {};
    const interimCount = interims.length;
    const sectionNames = Object.keys(sections);

    const pendingWO = workorders.filter(w => w.status !== 'Claimed');
    const ongoingBase = {};
    const ongoingVO = {};

    sectionNames.forEach(sec => {
        ongoingBase[sec] = 0;
        ongoingVO[sec] = 0;
        pendingWO.forEach(w => {
            const cat = w.section_category || {};
            if(w.status !== 'Variation Order' && w.status !== 'VO'){
                ongoingBase[sec] += Number(cat[sec]?.amt || 0);
                if(sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]){
                    ongoingBase[sec] += Number(w.additional || 0);
                }
            } else {
                ongoingVO[sec] += Number(cat[sec]?.amt || 0);
            }
        });
    });

    let head = `<tr>
    <th>ITEM</th>
    <th>DESCRIPTION</th>
    <th>AS PER CONTRACT</th>`;
    for(let i = 1; i <= interimCount; i++) head += `<th>INTERIM ${i}</th>`;
    head += `<th>TOTAL CLAIM</th><th>CONTRACT BALANCE</th><th>ON GOING WORKS</th><th>ON GOING CONTRACT BALANCE</th></tr>`;
    document.getElementById("interimHead").innerHTML = head;

    let body = '';
    let grandTotalContract = 0;
    let grandTotalInterims = new Array(interimCount).fill(0);
    let grandTotalClaim = 0;
    let grandTotalContractBalance = 0;
    let grandTotalOngoing = 0;
    let grandTotalOngoingBalance = 0;

    sectionNames.forEach((sec, index) => {
        const letter = String.fromCharCode(65 + index);
        const secDesc = sections[sec]?.desc || sec;
        const originalContractAmt = Number(sections[sec]?.amt || 0);

        let rowBase = `<tr><td>${letter}</td><td>${secDesc}</td><td style="text-align:right;">${formatRM(originalContractAmt)}</td>`;
        let totalClaimBase = 0;
        let interimValsBase = [];

        interims.forEach(int => {
            const cat = int.claim_breakdown || {};
            let val = cat[sec] ? Number(cat[sec].amt || 0) : 0;
            totalClaimBase += val;
            interimValsBase.push(val);
            rowBase += `<td style="text-align:right;">${val ? formatRM(val) : '-'}</td>`;
        });

        const balanceBase = originalContractAmt - totalClaimBase;
        const ongoingB = ongoingBase[sec];
        const afterWOBase = balanceBase - ongoingB;

        rowBase += `
        <td style="text-align:right;">${formatRM(totalClaimBase)}</td>
        <td style="text-align:right;">${formatRM(balanceBase)}</td>
        <td style="text-align:right;">${formatRM(ongoingB)}</td>
        <td style="text-align:right;font-weight:bold;color:${afterWOBase < 0 ? 'red' : 'black'};">${formatRM(afterWOBase)}</td>
        </tr>`;
        body += rowBase;

        grandTotalContract += originalContractAmt;
        grandTotalContractBalance += balanceBase;
        grandTotalOngoing += ongoingB;
        grandTotalOngoingBalance += afterWOBase;
        interimValsBase.forEach((v, i) => { grandTotalInterims[i] += v; });

        Object.entries(voBreakdown).forEach(([voName, voData]) => {
            if(voData && voData.breakdown && voData.breakdown[sec]){
                const voContractAmt = Number(voData.breakdown[sec].amt || 0);
                let totalClaimVO = 0;
                let interimValsVO = [];
                interims.forEach(int => {
                    const cat = int.claim_breakdown || {};
                    let val = 0;
                    if(cat[sec] && cat[sec].vo && cat[sec].vo[voName]){
                        val = Number(cat[sec].vo[voName].amt || 0);
                    } else if(cat[sec] && cat[sec].vo){
                        Object.entries(cat[sec].vo).forEach(([key, item]) => {
                            if(key === voName) val += Number(item.amt || 0);
                        });
                    }
                    totalClaimVO += val;
                    interimValsVO.push(val);
                });

                if(voContractAmt > 0 || totalClaimVO > 0){
                    let rowVO = `<tr style="color:#c0392b;background:#fffcfc;">
                    <td></td><td>↳ ${voName}</td>
                    <td style="text-align:right;">${formatRM(voContractAmt)}</td>`;
                    interimValsVO.forEach(val => {
                        rowVO += `<td style="text-align:right;color:#c0392b;">${val ? formatRM(val) : '-'}</td>`;
                    });
                    const balanceVO = voContractAmt - totalClaimVO;
                    const ongoingV = 0;
                    const afterWOVO = balanceVO - ongoingV;
                    rowVO += `
                    <td style="text-align:right;font-weight:600;">${formatRM(totalClaimVO)}</td>
                    <td style="text-align:right;">${formatRM(balanceVO)}</td>
                    <td style="text-align:right;">${formatRM(ongoingV)}</td>
                    <td style="text-align:right;font-weight:bold;color:${afterWOVO < 0 ? 'red' : '#c0392b'};">${formatRM(afterWOVO)}</td>
                    </tr>`;
                    body += rowVO;

                    grandTotalContract += voContractAmt;
                    grandTotalContractBalance += balanceVO;
                    grandTotalOngoing += ongoingV;
                    grandTotalOngoingBalance += afterWOVO;
                    interimValsBase.forEach((v, i) => { grandTotalInterims[i] += interimValsVO[i]; });
                }
            }
        });
    });

    let salvageTotal = 0;
    let salvageRow = `<tr><td></td><td>SALVAGE VALUE</td><td style="text-align:right;">-</td>`;
    interims.forEach((int, i) => {
        const val = Number(int.salvage_value || 0);
        salvageTotal += val;
        grandTotalInterims[i] += val;
        salvageRow += `<td style="text-align:right;">${val ? formatRM(val) : '-'}</td>`;
    });
    salvageRow += `<td style="text-align:right;">${formatRM(salvageTotal)}</td><td colspan="3"></td></tr>`;
    body += salvageRow;

    let pgTotal = 0;
    let pgRow = `<tr><td></td><td>PERFORMANCE GUARANTEE SUM</td><td style="text-align:right;">-</td>`;
    interims.forEach((int, i) => {
        const val = Number(int.performance_guarantee_sum || 0);
        pgTotal += val;
        grandTotalInterims[i] += val;
        pgRow += `<td style="text-align:right;">${val ? formatRM(val) : '-'}</td>`;
    });
    pgRow += `<td style="text-align:right;">${formatRM(pgTotal)}</td><td colspan="3"></td></tr>`;
    body += pgRow;

    let taxTotal = 0;
    let taxRow = `<tr><td></td><td>TAX</td><td style="text-align:right;">-</td>`;
    interims.forEach((int, i) => {
        const val = Number(int.tax || 0);
        taxTotal += val;
        grandTotalInterims[i] -= val;
        taxRow += `<td style="text-align:right;">${val ? formatRM(val) : '-'}</td>`;
    });
    taxRow += `<td style="text-align:right;">${formatRM(taxTotal)}</td><td colspan="3"></td></tr>`;
    body += taxRow;

    grandTotalOngoingBalance += salvageTotal + pgTotal - taxTotal;
    grandTotalClaim = interims.reduce((acc, int) => acc + Number(int.net_amount || 0), 0);

    let totalRow = `<tr style="font-weight:bold;background:#eef4fc;border-top:2px solid #b0c4de;">
    <td colspan="2">TOTAL</td>
    <td style="text-align:right;">${formatRM(grandTotalContract)}</td>`;
    interims.forEach((int, i) => {
        totalRow += `<td style="text-align:right;">${formatRM(Number(int.net_amount || 0))}</td>`;
    });
    totalRow += `
    <td style="text-align:right;">${formatRM(grandTotalClaim)}</td>
    <td style="text-align:right;">${formatRM(grandTotalContractBalance + salvageTotal + pgTotal - taxTotal)}</td>
    <td style="text-align:right;">${formatRM(grandTotalOngoing)}</td>
    <td style="text-align:right;font-weight:bold;">${formatRM(grandTotalOngoingBalance)}</td>
    </tr>`;
    body += totalRow;

    document.getElementById("interimBody").innerHTML = body;
}

function openSummary(){
    const id = currentContractId;
    if(!id){ alert("Tiada kontrak dipilih."); return; }
    window.location.href = `contract_summary.html?id=${id}`;
}

async function updateStatus(id, status){
    try{
        await fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}`,{
            method:'PATCH', headers,
            body: JSON.stringify({ status: status })
        });
        const row = allWorks.find(w => Number(w.id) === Number(id));
        if(row) row.status = status;
        renderTable(currentTableData, currentView !== "DATE");
    }catch(e){ console.error(e); alert("Gagal update status"); }
}

async function updateStatusGroup(idsStr, status){
    const ids = idsStr.split(',').map(id => id.trim());
    try{
        await Promise.all(ids.map(id =>
            fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}`,{
                method:'PATCH', headers,
                body: JSON.stringify({ status: status })
            })
        ));
        ids.forEach(id => {
            const row = allWorks.find(w => Number(w.id) === Number(id));
            if(row) row.status = status;
        });
        renderTable(currentTableData, currentView !== "DATE");
    }catch(e){ console.error(e); alert("Gagal update status group"); }
}

function toggleAllBF(el){
    document.querySelectorAll('.bf-checkbox').forEach(cb => { cb.checked = el.checked; });
}

async function processInBatches(items, batchSize, fn){
    const results = [];
    for(let i = 0; i < items.length; i += batchSize){
        const batch = items.slice(i, i + batchSize);
        const batchResults = await Promise.all(batch.map(fn));
        results.push(...batchResults);
    }
    return results;
}

function closeBulkPreview(){
    document.getElementById('bulkPreviewPage').style.display = 'none';
    document.getElementById('bulkPagesContainer').innerHTML = '';
}
