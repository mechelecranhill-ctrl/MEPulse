<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="theme-color" content="#a1c4fd">
    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icon.png?v=1">
    <link rel="icon" type="image/png" href="icon.png?v=1">

    <title>M&E Connect v1.0</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #a1c4fd;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #1d1d1f;
            --text-secondary: rgba(0,0,0,0.6);
            --ios-blue: #007AFF;
            --input-bg: rgba(255, 255, 255, 0.4);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family:'Lato',sans-serif;
            -webkit-user-select: none;
        }

        input, select, textarea { -webkit-user-select: text; }

        html, body {
            height: 100dvh;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-color);
        }

        body{
    margin:0;
    overflow:hidden;
    font-family:'Lato',sans-serif;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(255,255,255,.18),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(255,255,255,.10),
        transparent 30%);

    filter:blur(40px);

    animation:fogMove 10s ease-in-out infinite alternate;

    z-index:0;
}

@keyframes fogMove{

    from{
        transform:translateX(-30px) translateY(0);
    }

    to{
        transform:translateX(30px) translateY(-20px);
    }

}
        .main-title{
    margin:0;
    font-size:26px;
    color:#fff;
    font-weight:300;
    letter-spacing:2px;
    text-shadow:0 0 12px rgba(255,255,255,.35);
}

        .container { 
    width: 100%; 
    max-width: 400px; 
    height: 100dvh; 
    display: flex; 
    flex-direction: column;
    position: relative;
    padding-top: env(safe-area-inset-top); 
    padding-bottom: env(safe-area-inset-bottom);
    z-index:2;
}

        .page { 
            display: none; 
            animation: slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            height: 100%; 
            overflow-y: auto;
            padding: 20px 5px;
            -webkit-overflow-scrolling: touch;
        }

        .page.active { display: flex; flex-direction: column; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .glass-card, .menu-item {
            background: var(--glass-white);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1.5px solid var(--glass-border);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 12px;
            width: 100%;
        }

        .logo-box {
            width: 80px; height: 80px;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px;
            border: 1.5px solid var(--glass-border);
        }

        .menu-item {
            display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: transform 0.2s;
        }
        .menu-item:active { transform: scale(0.96); }

        .menu-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 18px;
            flex-shrink: 0;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; width: 100%; }
        .back-btn { color: var(--ios-blue); font-size: 20px; cursor: pointer; padding: 5px 15px 5px 0; font-weight: 600; }

        label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin: 10px 0 5px; display: block; }
        select, input {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1.2px solid var(--glass-border); border-radius: 14px;
            outline: none; color: var(--text-primary); font-size: 16px; 
            -webkit-appearance: none;
        }

        button {
            width: 100%; padding: 16px; background: var(--ios-blue);
            color: white; border: none; border-radius: 18px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 15px; flex-shrink: 0;
        }
.wave-wrapper{
    position:fixed;
    left:0;
    right:0;

    bottom:0px;

    width:100%;

    z-index:1;

    pointer-events:none;

    overflow:hidden;
}

.waves{
    position:relative;
    width:100%;
    height:38vh;

    margin-bottom:-7px;

    min-height:100px;
    max-height:150px;
}

.parallax > use{
    animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes move-forever{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}

@media(max-width:768px){

    .waves{
        height:15vh;
        min-height:100px;
        max-height:150px;
    }

}
    </style>
</head>
<body>

<div class="container">
    <div id="homePage" class="page active">
        <div class="logo-box"><img src="logo.png?v=1" style="width: 90%;" alt="Logo"></div>
        <div style="text-align:center; margin-bottom:20px;">
            <h1 class="main-title">M&E Connect</h1>
            <p style="color:var(--text-secondary); font-size:13px;">M&E | Mechanical & Electrical Department</p>
        </div>

        <div class="menu-item" onclick="window.location.href='dashboard.html'">
            <div class="menu-icon" style="background: #FF9500;"><i class="fa-solid fa-chart-line"></i></div>
            <div>
                <h3 style="margin:0; font-size:16px;">Records</h3>
                <p style="margin:0; font-size:11px; color:var(--text-secondary);">View live attendance list</p>
            </div>
        </div>

        <div class="menu-item" onclick="showPage('attendancePage')">
            <div class="menu-icon" style="background: #007AFF;"><i class="fa-solid fa-calendar-check"></i></div>
            <div>
                <h3 style="margin:0; font-size:16px;">Attendance</h3>
                <p style="margin:0; font-size:11px; color:var(--text-secondary);">Update attendance list</p>
            </div>
        </div>

        <div class="menu-item" onclick="window.location.href='login.html'">
            <div class="menu-icon" style="background: #34C759;"><i class="fa-solid fa-file-contract"></i></div>
            <div>
                <h3 style="margin:0; font-size:16px;">Contracts</h3>
                <p style="margin:0; font-size:11px; color:var(--text-secondary);">Preview projects & contracts</p>
            </div>
        </div>

        <div class="menu-item" onclick="window.location.href='userdirectory.html'">
            <div class="menu-icon" style="background: #5856D6;"><i class="fa-solid fa-address-book"></i></div>
            <div>
                <h3 style="margin:0; font-size:16px;">User Directory</h3>
                <p style="margin:0; font-size:11px; color:var(--text-secondary);">Connect with us</p>
            </div>
        </div>
    </div>

    <div id="attendancePage" class="page">
        <div class="glass-card">
            <div class="header">
                <div class="back-btn" onclick="showPage('homePage')"><i class="fa-solid fa-chevron-left"></i> RETURN</div>
            </div>
            <form id="attendanceForm">
                <label for="jawatan">Position</label>
                <select id="jawatan" required onchange="filterNames()"><option value="">Retrieving</option></select>
                <label for="nama">Name</label>
                <select id="nama" required disabled><option value="">Choose Name</option></select>
                <label for="sebab">Reason</label>
                <select id="sebab" required>
                    <option value="Kerja Lapangan (Onsite)">Kerja Lapangan (Onsite)</option>
                    <option value="Factory Acceptance Test (FAT)">Factory Acceptance Test (FAT)</option>
                    <option value="Mesyuarat">Mesyuarat</option>
                    <option value="Kursus">Kursus</option>
                    <option value="Cuti Rehat/Sakit">Cuti Rehat/Sakit</option>
                    <option value="Cuti Separuh Hari/Halfday">Cuti Separuh Hari/Halfday</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label for="t1">Start</label><input type="date" id="t1" required></div>
                    <div style="flex:1"><label for="t2">End</label><input type="date" id="t2" required></div>
                </div>
                <button type="submit" id="subBtn">Submit</button>
            </form>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

let staffData = [];

const hierarki = {
    'KETUA JABATAN': 1, 'KETUA SEKSYEN': 2, 'EKSEKUTIF KANAN': 3, 'EKSEKUTIF': 4,
    'JURUTEKNIK': 5, 'PENYELIA PENTADBIRAN': 6, 'PEMBANTU PENTADBIRAN': 7, 'KERANI': 8
};

function showPage(pageId) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

async function loadStaff() {
    try {
        const res = await fetch(SB_URL + '/rest/v1/staff?select=*', {
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
        });
        staffData = await res.json();
        const jSel = document.getElementById('jawatan');
        jSel.innerHTML = '<option value="">Choose Position</option>';
        const uniqueJawatan = [...new Set(
    staffData.map(s => s.position.toUpperCase().trim())
)];
        uniqueJawatan.sort((a, b) => (hierarki[a] || 99) - (hierarki[b] || 99));
        uniqueJawatan.forEach(j => {
            const opt = document.createElement('option');
            opt.value = j; opt.innerText = j;
            jSel.appendChild(opt);
        });
    } catch (err) { console.error(err); }
}

function filterNames() {
    const selJ = document.getElementById('jawatan').value;
    const nSel = document.getElementById('nama');
    nSel.innerHTML = '<option value="">Choose Name</option>';
    if (selJ) {
        nSel.disabled = false;
        staffData
            .filter(s => s.position.toUpperCase().trim() === selJ)
            .sort((a, b) => a.name.localeCompare(b.name))
            .forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.name;
opt.innerText = s.name.toUpperCase();
                nSel.appendChild(opt);
            });
    } else { nSel.disabled = true; }
}

document.getElementById('attendanceForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('subBtn');
    const nama = document.getElementById('nama').value;
    const jawatan = document.getElementById('jawatan').value;
    const sebab = document.getElementById('sebab').value;
    const t1 = document.getElementById('t1').value;
    const t2 = document.getElementById('t2').value;

    btn.disabled = true;
    btn.innerText = "Mengemaskini...";

    try {
        const checkRes = await fetch(
`${SB_URL}/rest/v1/attendance?name=eq.${nama}&start_date=eq.${t1}`,
{
    headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY
    }
});
        const existing = await checkRes.json();

        if (existing.length > 0) {
            const sahkan = confirm(`REKOD UNTUK ${nama.toUpperCase()} PADA ${t1} SUDAH ADA. GANTI?`);
            if (!sahkan) { btn.disabled = false; btn.innerText = "Hantar Rekod"; return; }
            await fetch(
`${SB_URL}/rest/v1/attendance?name=eq.${nama}&start_date=eq.${t1}`,
{
    method:'DELETE',
    headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY
    }
});
        }

        const res = await fetch(SB_URL + '/rest/v1/attendance', {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({
    name: nama,
    position: jawatan,
    reason: sebab,
    start_date: t1,
    end_date: t2
})
        });

        if (res.ok) {
            alert("✅ REKOD DIKEMASKINI!");
            document.getElementById('attendanceForm').reset();
            document.getElementById('nama').disabled = true;
            showPage('homePage');
        }
    } catch (err) { alert("RALAT: " + err.message); }
    finally { btn.disabled = false; btn.innerText = "Hantar Rekod"; }
};

window.onload = loadStaff;
</script>
<!-- WAVES -->
<div class="wave-wrapper">

<svg class="waves"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 24 150 28"
     preserveAspectRatio="none"
     shape-rendering="auto">

    <defs>

        <path id="gentle-wave"
              d="M-160 44c30 0 58-18 88-18s58 18 88 18
                 58-18 88-18 58 18 88 18v44h-352z" />

    </defs>

    <g class="parallax">

        <use xlink:href="#gentle-wave"
             x="48"
             y="0"
             fill="rgba(255,255,255,0.7)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="3"
             fill="rgba(255,255,255,0.5)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="5"
             fill="rgba(255,255,255,0.3)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="7"
             fill="rgba(255,255,255,0.9)" />

    </g>

</svg>

</div>
</body>
</html>
