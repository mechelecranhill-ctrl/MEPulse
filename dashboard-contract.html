<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E-Connect | Contract Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30;
            --dark-bg: #1c1c1e; --card-bg: #ffffff; --glass: rgba(255,255,255,0.8);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #f2f2f7; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- SEARCH BOX STYLE --- */
        .search-container {
            padding: 5px 10px 10px 0;
            flex-shrink: 0;
        }
        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #d1d1d6;
            background: white;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }
        .search-box:focus {
            border-color: var(--ios-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        /* --- LOGIK MOBILE SLIDE-IN & USAGE BUTTON --- */
        .mobile-usage-btn { display: none; } 

        @media (max-width: 768px) {
            #panel-vendor, .next-container { display: none !important; }

            .mobile-usage-btn {
                display: flex;
                background: var(--ios-blue);
                color: white;
                text-decoration: none;
                padding: 6px 12px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 800;
                align-items: center;
                gap: 5px;
                box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
            }

            .contract-sidebar {
                width: 100% !important;
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .analysis-container {
                position: fixed;
                top: 60px;
                left: 0;
                width: 100%;
                height: calc(100% - 60px);
                background: #f2f2f7;
                z-index: 1500;
                transform: translateX(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                padding: 10px !important;
            }

            body.analysis-active .analysis-container { transform: translateX(0); }
            body.analysis-active .contract-sidebar { transform: translateX(-20%); opacity: 0.5; }

            #analysis-panel { border-radius: 20px 20px 0 0 !important; height: 100%; }
            .health-grid { grid-template-columns: 1fr !important; overflow-y: auto !important; }
            .chart-box { min-height: 250px; flex-shrink: 0; }
        }

        .glass-header { 
            width: 100%; height: 60px; 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); z-index: 1000; flex-shrink: 0;
            position: relative;
        }

        .nav-btn {
            position: absolute;
            background: #e5e5ea;
            border: none;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ios-blue);
            transition: 0.2s;
            padding: 0 10px;
        }
        .nav-btn:active { transform: scale(0.9); background: #d1d1d6; }
        .back-btn { left: 20px; width: 35px; }

        .next-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        .next-label { font-size: 11px; font-weight: 800; color: #48484a; letter-spacing: 0.8px; text-align: right; }
        .next-btn-circle {
            background: var(--ios-blue);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
            transition: 0.2s;
        }

        .unit-container { display: flex; gap: 8px; overflow-x: auto; padding: 0 70px; scrollbar-width: none; }
        .unit-pill { 
            padding: 8px 16px; border-radius: 15px; background: #e5e5ea; 
            border: none; cursor: pointer; font-weight: 600; font-size: 12px; white-space: nowrap; transition: 0.3s;
        }
        .unit-pill.active { background: var(--ios-blue); color: white; }

        .fab { 
            position: fixed; top: 12px; right: 20px; width: 35px; height: 35px; 
            background: var(--ios-blue); color: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 1100; transition: transform 0.2s;
        }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 15px; }
        .contract-sidebar { width: 220px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
        #contractList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        .c-card { background: var(--card-bg); border-radius: 12px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); transition: 0.2s; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .c-card.active { border-color: var(--ios-blue); background: #f0f7ff; }
        .c-card h4 { margin: 0; font-size: 11px; color: #1c1c1e; overflow: hidden; text-overflow: ellipsis; }
        .c-card .sub-text { font-size: 9px; color: #888; margin-top: 2px; }

        .analysis-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #analysis-panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; overflow: hidden; flex-direction: column; }

        .health-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; flex: 1; overflow: hidden; margin-top: 5px; }
        .chart-box { padding: 10px; background: #f9f9fb; border-radius: 15px; flex: 1; position: relative; min-height: 0; display: flex; flex-direction: column;}

        .section-row { background: #fff; border: 1px solid var(--ios-blue); border-radius: 12px; padding: 10px; margin-bottom: 8px; }
        .prog-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .prog-bar-fill { height: 100%; border-radius: 4px; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); width: 0 !important; }
        .avg-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .avg-item { font-size: 9px; font-weight: 600; color: #666; }
        .manage-btn { background: #f2f2f7; border: none; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: var(--ios-blue); cursor: pointer; }
        #selectedSectionContainer { flex: 1; overflow-y: auto; padding-right: 5px; }
        .sel-chip { display: inline-block; padding: 4px 10px; border-radius: 12px; background: #e5e5ea; margin: 3px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .sel-chip.active { background: var(--ios-blue); color: white; }
    </style>
</head>
<body>

    <div class="fab" onclick="window.location.href='kontrak.html'"><i class="fa fa-plus"></i></div>

    <div class="glass-header">
        <button class="nav-btn back-btn" onclick="window.location.href='index.html'">
            <i class="fa fa-chevron-left"></i>
        </button>
        <div class="unit-container" id="unitNav"></div>
    </div>

    <div class="next-container">
        <span class="next-label">USAGE<br>SCHEDULE</span>
        <button class="next-btn-circle" onclick="window.location.href='dashboard-interimclaim.html'">
            <i class="fa fa-chevron-right"></i>
        </button>
    </div>

    <div class="main-wrapper">
        <div class="contract-sidebar">
            <div class="search-container">
                <input type="text" id="contractSearch" class="search-box" placeholder="Cari Kod/Kontrak..." onkeyup="filterContracts()">
            </div>
            <div id="contractList"></div>
        </div>

        <div class="analysis-container">
            <div id="analysis-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f2f2f7;">
                    <div>
                        <h1 id="panel-title" style="margin:0; font-size: 24px; letter-spacing: -0.5px; color: var(--ios-blue);">Analisis</h1>
                        <p id="panel-vendor" style="margin:2px 0 0 0; color: #8e8e93; font-size: 13px; font-weight: 500;"></p>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <a href="dashboard-interimclaim.html" class="mobile-usage-btn">
                            USAGE <i class="fa fa-chevron-right" style="font-size: 8px;"></i>
                        </a>

                        <button onclick="document.body.classList.remove('analysis-active')" 
                                style="background:#f2f2f7; border:none; width: 38px; height: 38px; border-radius:12px; cursor:pointer; display: flex; align-items: center; justify-content: center;">
                            <i class="fa fa-times" style="color: #8e8e93;"></i>
                        </button>
                    </div>
                </div>

                <div class="health-grid">
                    <div class="chart-box">
                        <div style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 10px;">PURATA BULANAN: SEBENAR VS SASARAN (RM)</div>
                        <canvas id="healthChart"></canvas>
                    </div>
                    <div style="display: flex; flex-direction: column; overflow: hidden;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-shrink: 0; margin-bottom: 8px;">
                            <h3 style="margin:0; font-size: 16px;">Section Dipilih</h3>
                            <button class="manage-btn" onclick="toggleSelector()"><i class="fa fa-cog"></i> Urus</button>
                        </div>
                        <div id="sectionSelector" style="display:none; background: #f9f9fb; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 1px dashed #ccc;">
                            <div id="fullSectionList"></div>
                        </div>
                        <div id="selectedSectionContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let myChart = null;
    let currentContract = null;
    let currentWO = [];
    let selectedSections = [];

    Chart.register(ChartDataLabels);

    window.onload = () => fetchUnits();

    function filterContracts() {
        const query = document.getElementById('contractSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.c-card');
        
        cards.forEach(card => {
            const code = card.querySelector('h4').innerText.toLowerCase();
            const name = card.querySelector('.sub-text').innerText.toLowerCase();
            if (code.includes(query) || name.includes(query)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }

    async function fetchUnits() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/units?select=*`, { headers });
            const units = await res.json();
            const nav = document.getElementById('unitNav');
            nav.innerHTML = units.map(u => `<button class="unit-pill" id="unit-${u.id}" onclick="fetchContracts(${u.id}, this)">${u.unit_name}</button>`).join('');

            const instUnit = units.find(u => u.unit_name.toUpperCase() === 'INSTRUMENTASI');
            if(instUnit) { document.getElementById(`unit-${instUnit.id}`).click(); } 
            else if(units.length > 0) { document.querySelector('.unit-pill').click(); }
        } catch (e) { console.error("Error units:", e); }
    }

    async function fetchContracts(unitId, btn) {
        document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('contractSearch').value = '';
        
        try {
            const res = await fetch(`${SB_URL}/rest/v1/contract?unit_id=eq.${unitId}&order=contract_start.asc`, { headers });
            const data = await res.json();
            const list = document.getElementById('contractList');

            list.innerHTML = data.map(c => `
                <div class="c-card" id="card-${c.id}" onclick='selectCard(${c.id}); openAnalysis(${JSON.stringify(c)})'>
                    <h4>${c.contract_code}</h4>
                    <div class="sub-text">${c.contract_name}</div>
                </div>
            `).join('');

            if(data.length > 0 && window.innerWidth > 768) {
                selectCard(data[0].id);
                openAnalysis(data[0]);
            }
        } catch (e) { console.error("Error contracts:", e); }
    }

    function selectCard(id) {
        document.querySelectorAll('.c-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${id}`);
        if(activeCard) activeCard.classList.add('active');
    }

    async function openAnalysis(contract) {
        document.body.classList.add('analysis-active');
        document.getElementById('analysis-panel').style.display = 'flex';
        document.getElementById('panel-title').innerText = contract.contract_code;
        document.getElementById('panel-vendor').innerText = contract.contract_name;

        try {
            const resC = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contract.id}&select=*`, { headers });
            currentContract = (await resC.json())[0];
            const resW = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${currentContract.id}`, { headers });
            currentWO = await resW.json();
            selectedSections = (currentContract.selected_sections && currentContract.selected_sections.length > 0) 
                ? currentContract.selected_sections 
                : Object.keys(currentContract.contract_sections_breakdown || {});
            renderUI();
        } catch (error) { console.error(error); }
    }

    function renderUI() {
        if(!currentContract) return;
        const sections = currentContract.contract_sections_breakdown || {};
        const start = new Date(currentContract.contract_start);
        const end = new Date(currentContract.contract_end);
        const today = new Date();

        // LOGIK PENGIRAAN BULAN
        const totalMonths = Math.max(1, (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()));
        let monthsElapsed = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth()) + 1;
        monthsElapsed = Math.min(totalMonths, Math.max(1, monthsElapsed));

        document.getElementById('fullSectionList').innerHTML = Object.keys(sections).sort().map(s => `
            <span class="sel-chip ${selectedSections.includes(s) ? 'active' : ''}" onclick="toggleSection('${s}')">${s}</span>
        `).join('');

        const mainContainer = document.getElementById('selectedSectionContainer');
        mainContainer.innerHTML = '';

        selectedSections.sort().forEach(s => {
            if(!sections[s]) return;
            let used = 0;
            currentWO.forEach(wo => { if(wo.section_category?.[s]) used += wo.section_category[s].amt || 0; });

            const budget = sections[s].amt || 0; 
            const plannedTotalToDate = (budget / totalMonths) * monthsElapsed;
            const variance = used - plannedTotalToDate;
            const variancePercent = (variance / plannedTotalToDate) * 100 || 0;
            const color = used > plannedTotalToDate ? 'var(--ios-red)' : 'var(--ios-green)';
            const progressPercent = (used / budget) * 100 || 0;

            mainContainer.innerHTML += `
                <div class="section-row">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div style="font-weight:bold; font-size:13px; color:var(--ios-blue);">${s}: ${sections[s].desc || s}</div>
                        <i class="fa fa-times-circle" style="color:#ccc; cursor:pointer;" onclick="toggleSection('${s}')"></i>
                    </div>
                    <div class="avg-stats">
                        <div class="avg-item">BUDGET: RM ${budget.toLocaleString()}</div>
                        <div class="avg-item" style="color: #8e8e93;">PLANNED: RM ${plannedTotalToDate.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                    </div>
                    <div class="avg-stats">
                        <div class="avg-item">ACTUAL: RM ${used.toLocaleString()}</div>
                        <div class="avg-item" style="color: ${color};">VARIANCE: ${variancePercent > 0 ? '+' : ''}${variancePercent.toFixed(1)}%</div>
                    </div>
                    <div class="prog-bar-bg">
                        <div class="prog-bar-fill" data-width="${Math.min(100, progressPercent)}%" style="background:${color}"></div>
                    </div>
                </div>
            `;
        });

        updateChart();
        setTimeout(() => {
            document.querySelectorAll('.prog-bar-fill').forEach(bar => {
                bar.style.setProperty('width', bar.getAttribute('data-width'), 'important');
            });
        }, 100);
    }

    function updateChart() {
        if (!currentContract) return;
        const sections = currentContract.contract_sections_breakdown || {};
        const start = new Date(currentContract.contract_start);
        const end = new Date(currentContract.contract_end);
        const today = new Date();
        
        const totalMonths = Math.max(1, (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()));
        let monthsElapsed = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth()) + 1;
        monthsElapsed = Math.min(totalMonths, Math.max(1, monthsElapsed));

        let labels = [], targetAvgData = [], actualAvgData = [];
        selectedSections.sort().forEach(s => {
            labels.push(s); 
            targetAvgData.push((sections[s]?.amt / totalMonths).toFixed(2));
            let used = 0;
            currentWO.forEach(wo => { if(wo.section_category?.[s]) used += wo.section_category[s].amt || 0; });
            actualAvgData.push((used / monthsElapsed).toFixed(2));
        });

        if (myChart) {
            myChart.data.labels = labels;
            myChart.data.datasets[0].data = targetAvgData;
            myChart.data.datasets[1].data = actualAvgData;
            myChart.update(); 
        } else {
            const ctx = document.getElementById('healthChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Planned', data: targetAvgData, backgroundColor: 'rgba(200, 200, 205, 0.5)', borderRadius: 5 },
                        { label: 'Actual', data: actualAvgData, backgroundColor: '#007AFF', borderRadius: 5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'top', labels: { font: { size: 10, weight: 'bold' } } },
                        datalabels: { anchor: 'end', align: 'top', font: { size: 9, weight: 'bold' }, formatter: (v) => v > 0 ? `RM${Math.round(v).toLocaleString()}` : '' }
                    },
                    scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10, weight: 'bold' }, maxRotation: 45, minRotation: 45 } } }
                }
            });
        }
    }

    function toggleSelector() {
        const el = document.getElementById('sectionSelector');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function toggleSection(s) {
        if(selectedSections.includes(s)) selectedSections = selectedSections.filter(x => x !== s);
        else selectedSections.push(s);
        renderUI();
        await fetch(`${SB_URL}/rest/v1/contract?id=eq.${currentContract.id}`, {
            method: 'PATCH',
            headers: headers,
            body: JSON.stringify({ selected_sections: selectedSections })
        });
    }
</script>
</body>
</html>
