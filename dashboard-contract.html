<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E-Connect | Executive Presentation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30;
            --dark-bg: #000000; --card-bg: #ffffff; --glass: rgba(255,255,255,0.9);
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; margin: 0; color: white; overflow-x: hidden; }

        /* Slide Transition Effect */
        .page { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; padding-top: 80px; box-sizing: border-box; }
        .page-hidden { transform: translateY(100%); }

        /* Navigation Style Slide */
        .glass-header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .unit-pill { 
            padding: 8px 20px; border-radius: 20px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; margin: 0 5px; transition: 0.3s;
        }
        .unit-pill.active { background: var(--ios-blue); border-color: var(--ios-blue); transform: scale(1.1); }

        /* Dashboard Grid */
        .container { max-width: 1400px; margin: auto; padding: 40px; }
        .contract-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }

        /* Executive Card */
        .c-card { 
            background: #1c1c1e; border-radius: 24px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer;
        }
        .c-card:hover { background: #2c2c2e; transform: scale(1.02); border-color: var(--ios-blue); }
        .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* Presentation Overlay (Slide) */
        #presentation-slide { 
            position: fixed; inset: 0; background: #000; z-index: 2000; display: none; 
            padding: 40px; overflow-y: auto; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .slide-content { max-width: 1400px; margin: auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        /* Stats Box */
        .stat-card { background: #1c1c1e; padding: 25px; border-radius: 24px; border-left: 5px solid var(--ios-blue); }
        .stat-value { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .stat-label { color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }

        /* Health Indicator */
        .health-hero { text-align: center; padding: 40px; border-radius: 30px; margin-bottom: 40px; background: linear-gradient(145deg, #1c1c1e, #000); }
        .health-status-text { font-size: 48px; font-weight: 900; letter-spacing: -1px; }

        .prog-row { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; margin-top: 10px; }
        .bar-fill { height: 100%; border-radius: 6px; transition: 1.5s ease-out; width: 0; }

        .close-btn { position: absolute; top: 30px; right: 40px; background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glass-header">
        <div id="unitNav"></div>
    </div>

    <div class="container">
        <div style="margin-bottom: 40px;">
            <h1 style="font-size: 42px; margin: 0;">Prestasi Kontrak Keseluruhan</h1>
            <p style="color: #888;">Laporan Kesihatan Kontrak M&E (Live Data)</p>
        </div>
        <div id="contractList" class="contract-grid"></div>
    </div>

    <div id="presentation-slide">
        <button class="close-btn" onclick="closeSlide()">KEMBALI KE DASHBOARD</button>
        
        <div class="slide-content">
            <div id="healthHero" class="health-hero">
                <span id="healthLabel" class="stat-label">STATUS KESIHATAN KONTRAK</span>
                <div id="healthStatusText" class="health-status-text">ANALYZING...</div>
                <p id="slideVendor" style="color: #888;"></p>
            </div>

            <div class="grid-2">
                <div>
                    <h2 style="color: var(--ios-blue); border-left: 4px solid var(--ios-blue); padding-left: 15px;">RINGKASAN KEWANGAN</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                        <div class="stat-card">
                            <div class="stat-label">JUMLAH BAJET</div>
                            <div id="statTotalBudget" class="stat-value">RM 0</div>
                        </div>
                        <div class="stat-card" style="border-left-color: var(--ios-green);">
                            <div class="stat-label">PENGGUNAAN SEMASA</div>
                            <div id="statTotalSpent" class="stat-value">RM 0</div>
                        </div>
                    </div>
                    <div class="chart-box" style="margin-top: 30px; background: #1c1c1e; padding: 30px; border-radius: 24px;">
                        <canvas id="healthChart"></canvas>
                    </div>
                </div>

                <div>
                    <h2 style="color: var(--ios-blue); border-left: 4px solid var(--ios-blue); padding-left: 15px;">PECAHAN MENGIKUT SEKSYEN</h2>
                    <div id="sectionContainer" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

    let myChart = null;

    window.onload = async () => {
        const res = await fetch(`${SB_URL}/rest/v1/units?select=*`, { headers });
        const units = await res.json();
        document.getElementById('unitNav').innerHTML = units.map(u => `<button class="unit-pill" onclick="fetchContracts(${u.id}, this)">${u.unit_name}</button>`).join('');
        if(units.length > 0) document.querySelector('.unit-pill').click();
    };

    async function fetchContracts(unitId, btn) {
        document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');

        const res = await fetch(`${SB_URL}/rest/v1/contract?unit_id=eq.${unitId}`, { headers });
        const data = await res.json();
        
        document.getElementById('contractList').innerHTML = data.map(c => `
            <div class="c-card" onclick='openSlide(${JSON.stringify(c)})'>
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div class="stat-label">${c.contract_code}</div>
                        <h3 style="margin: 5px 0 15px 0;">${c.contract_name}</h3>
                    </div>
                    <i class="fa fa-chart-line" style="color: var(--ios-blue);"></i>
                </div>
                <div style="font-size: 12px; color: #888;">VENDOR: ${c.contractor}</div>
            </div>
        `).join('');
    }

    async function openSlide(contract) {
        const slide = document.getElementById('presentation-slide');
        slide.style.display = 'block';
        document.body.style.overflow = 'hidden';

        document.getElementById('slideVendor').innerText = contract.contractor;

        // FETCH SPENT
        const resW = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contract.id}&select=amount_spent,section_category`, { headers });
        const workOrders = await resW.json();

        const sections = contract.contract_sections_breakdown || {};
        const container = document.getElementById('sectionContainer');
        container.innerHTML = '';

        let labels = [], budgetData = [], spentData = [];
        let grandTotalBudget = 0;
        let grandTotalSpent = 0;

        Object.keys(sections).sort().forEach(s => {
            const budget = sections[s].amt || 0;
            const desc = sections[s].desc || "KONTRAK ASAL";
            let spent = 0;
            workOrders.forEach(wo => {
                if(wo.section_category && wo.section_category[s]) spent += wo.section_category[s].amt || 0;
            });

            grandTotalBudget += budget;
            grandTotalSpent += spent;

            const percent = budget > 0 ? (spent/budget)*100 : 0;
            const color = percent > 85 ? varName('--ios-red') : (percent > 60 ? varName('--ios-orange') : varName('--ios-blue'));

            labels.push(s);
            budgetData.push(budget);
            spentData.push(spent);

            container.innerHTML += `
                <div class="prog-row">
                    <div style="display:flex; justify-content:space-between; font-size: 14px;">
                        <span><strong>${s}</strong> - <small style="color:#888">${desc}</small></span>
                        <span>${percent.toFixed(1)}%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${percent}%; background:${color}"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size: 10px; margin-top:5px; color:#666;">
                        <span>Bajet: RM ${budget.toLocaleString()}</span>
                        <span>Baki: RM ${(budget-spent).toLocaleString()}</span>
                    </div>
                </div>
            `;
        });

        // Set Hero Stats
        document.getElementById('statTotalBudget').innerText = `RM ${grandTotalBudget.toLocaleString()}`;
        document.getElementById('statTotalSpent').innerText = `RM ${grandTotalSpent.toLocaleString()}`;
        
        const totalHealth = (grandTotalSpent / grandTotalBudget) * 100;
        const hero = document.getElementById('healthHero');
        const hText = document.getElementById('healthStatusText');

        if(totalHealth > 85) {
            hText.innerText = "STATUS: KRITIKAL";
            hText.style.color = varName('--ios-red');
        } else if(totalHealth > 60) {
            hText.innerText = "STATUS: BERISIKO";
            hText.style.color = varName('--ios-orange');
        } else {
            hText.innerText = "STATUS: SIHAT";
            hText.style.color = varName('--ios-green');
        }

        updateChart(labels, budgetData, spentData);
    }

    function varName(v) { return getComputedStyle(document.documentElement).getPropertyValue(v); }

    function updateChart(labels, budget, spent) {
        if (myChart) myChart.destroy();
        const ctx = document.getElementById('healthChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Siling Bajet', data: budget, backgroundColor: 'rgba(255,255,255,0.1)', borderRadius: 5 },
                    { label: 'Penggunaan', data: spent, backgroundColor: varName('--ios-blue'), borderRadius: 5 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: { 
                    y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                    x: { ticks: { color: '#888' } }
                }
            }
        });
    }

    function closeSlide() {
        document.getElementById('presentation-slide').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
