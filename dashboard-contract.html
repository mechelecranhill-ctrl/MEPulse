<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E-Connect | Global Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30;
            --dark-bg: #1c1c1e; --card-bg: #ffffff; --glass: rgba(255,255,255,0.8);
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #f2f2f7; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .glass-header { 
            width: 100%; height: 60px; 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); z-index: 1000; flex-shrink: 0;
            position: relative;
        }

        .back-btn {
            position: absolute; left: 20px; background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            color: var(--ios-blue); transition: 0.2s;
        }

        .unit-container { display: flex; gap: 8px; overflow-x: auto; padding: 0 40px 0 70px; scrollbar-width: none; }
        .unit-pill { 
            padding: 8px 16px; border-radius: 15px; background: #e5e5ea; 
            border: none; cursor: pointer; font-weight: 600; font-size: 12px; white-space: nowrap; transition: 0.3s;
        }
        .unit-pill.active { background: var(--ios-blue); color: white; }

        .fab { position: fixed; top: 12px; right: 20px; width: 35px; height: 35px; background: var(--ios-blue); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1100; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 15px; }
        .contract-sidebar { width: 220px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-shrink: 0; padding-right: 5px; }
        .c-card { background: var(--card-bg); border-radius: 12px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .c-card.active { border-color: var(--ios-blue); background: #f0f7ff; }
        .c-card h4 { margin: 0; font-size: 11px; color: #1c1c1e; }
        .c-card .sub-text { font-size: 9px; color: #888; margin-top: 2px; }
        
        .analysis-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #analysis-panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; overflow: hidden; flex-direction: column; }
        
        .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; overflow: hidden; margin-top: 5px; }
        .chart-box { padding: 15px; background: #f9f9fb; border-radius: 15px; display: flex; flex-direction: column; min-height: 0; position: relative; }
        
        .section-row { background: #fff; border: 1px solid var(--ios-blue); border-radius: 12px; padding: 10px; margin-bottom: 8px; }
        
        .bar-stack { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
        .prog-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; position: relative; }
        .prog-bar-fill { height: 100%; border-radius: 4px; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); width: 0 !important; }
        
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1px; }
        .label-txt { font-size: 8px; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
        .val-txt { font-size: 9px; font-weight: bold; }

        .avg-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
        .avg-item { font-size: 9px; font-weight: 600; color: #666; }
        #selectedSectionContainer { flex: 1; overflow-y: auto; padding-right: 5px; }
        .manage-btn { background: #f2f2f7; border: none; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: var(--ios-blue); cursor: pointer; }
        .sel-chip { display: inline-block; padding: 4px 10px; border-radius: 12px; background: #e5e5ea; margin: 3px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .sel-chip.active { background: var(--ios-blue); color: white; }
    </style>
</head>
<body>

    <div class="fab" onclick="window.location.href='kontrak.html'"><i class="fa fa-plus"></i></div>

    <div class="glass-header">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fa fa-chevron-left"></i></button>
        <div class="unit-container" id="unitNav"></div>
    </div>

    <div class="main-wrapper">
        <div id="contractList" class="contract-sidebar"></div>

        <div class="analysis-container">
            <div id="analysis-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f2f2f7;">
                    <div>
                        <h1 id="panel-title" style="margin:0; font-size: 24px; letter-spacing: -0.5px; color: var(--ios-blue);">Analisis</h1>
                        <p id="panel-vendor" style="margin:2px 0 0 0; color: #8e8e93; font-size: 13px; font-weight: 500;"></p>
                    </div>
                    <button onclick="document.getElementById('analysis-panel').style.display='none'" style="background:#f2f2f7; border:none; width: 35px; height: 35px; border-radius:10px; cursor:pointer;">
                        <i class="fa fa-times" style="color: #8e8e93;"></i>
                    </button>
                </div>

                <div class="health-grid">
                    <div class="chart-box">
                        <div style="font-size: 10px; font-weight: bold; color: #666; margin-bottom: 10px;">PURATA BULANAN (RM)</div>
                        <div style="flex:1; min-height:0; width:100%;">
                            <canvas id="healthChart"></canvas>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; overflow: hidden;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; flex-shrink: 0;">
                            <h3 style="margin:0; font-size: 16px;">Section Breakdown</h3>
                            <button class="manage-btn" onclick="toggleSelector()"><i class="fa fa-cog"></i> Urus</button>
                        </div>
                        <div id="sectionSelector" style="display:none; background: #f9f9fb; padding: 10px; border-radius: 15px; margin-bottom: 10px; flex-shrink:0;">
                            <div id="fullSectionList"></div>
                        </div>
                        <div id="selectedSectionContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let myChart = null, currentContract = null, currentWO = [], selectedSections = [];

    Chart.register(ChartDataLabels);
    window.onload = () => fetchUnits();

    async function fetchUnits() {
        const res = await fetch(`${SB_URL}/rest/v1/units?select=*`, { headers });
        const units = await res.json();
        document.getElementById('unitNav').innerHTML = units.map(u => `<button class="unit-pill" id="unit-${u.id}" onclick="fetchContracts(${u.id}, this)">${u.unit_name}</button>`).join('');
        const inst = units.find(u => u.unit_name.toUpperCase() === 'INSTRUMENTASI') || units[0];
        if(inst) document.getElementById(`unit-${inst.id}`).click();
    }

    async function fetchContracts(unitId, btn) {
        document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const res = await fetch(`${SB_URL}/rest/v1/contract?unit_id=eq.${unitId}&order=contract_start.asc`, { headers });
        const data = await res.json();
        document.getElementById('contractList').innerHTML = data.map(c => `<div class="c-card" id="card-${c.id}" onclick='selectCard(${c.id}); openAnalysis(${JSON.stringify(c)})'><h4>${c.contract_code}</h4><div class="sub-text">${c.contract_name}</div></div>`).join('');
        if(data.length > 0) { selectCard(data[0].id); openAnalysis(data[0]); }
    }

    function selectCard(id) {
        document.querySelectorAll('.c-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${id}`)?.classList.add('active');
    }

    async function openAnalysis(contract) {
        document.getElementById('analysis-panel').style.display = 'flex';
        const resC = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contract.id}&select=*`, { headers });
        currentContract = (await resC.json())[0];
        document.getElementById('panel-title').innerText = currentContract.contract_code;
        document.getElementById('panel-vendor').innerText = currentContract.contract_name;
        const resW = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${currentContract.id}`, { headers });
        currentWO = await resW.json();
        selectedSections = currentContract.selected_sections?.length ? currentContract.selected_sections : Object.keys(currentContract.contract_sections_breakdown || {});
        renderUI();
    }

    function renderUI() {
        if(!currentContract) return;
        const sections = currentContract.contract_sections_breakdown || {};
        const start = new Date(currentContract.contract_start);
        const end = new Date(currentContract.contract_end);
        const today = new Date();
        const plannedPercent = Math.min(100, Math.max(0, ((today - start) / (end - start)) * 100));

        const mainContainer = document.getElementById('selectedSectionContainer');
        mainContainer.innerHTML = '';

        selectedSections.sort().forEach(s => {
            if(!sections[s]) return;
            let used = 0;
            currentWO.forEach(wo => { if(wo.section_category?.[s]) used += wo.section_category[s].amt || 0; });

            const budget = sections[s].amt || 0;
            const actualPercent = (used/budget)*100 || 0;
            const plannedAmt = budget * (plannedPercent / 100);
            const diff = actualPercent - plannedPercent;
            let statusColor = 'var(--ios-green)';
            if(diff > 10) statusColor = 'var(--ios-red)'; 
            else if(diff > 0) statusColor = 'var(--ios-orange)';

            // PAPAR NAMA PENUH KAT SINI
            mainContainer.innerHTML += `
                <div class="section-row">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:bold; font-size:12px; color:var(--ios-blue);">${s}</div>
                        <div style="font-size:10px; font-weight:800; color:${statusColor}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}% variance</div>
                    </div>
                    <div class="avg-stats">
                        <div class="avg-item">BAJET: RM ${budget.toLocaleString()}</div>
                    </div>
                    <div class="bar-stack">
                        <div class="label-row">
                            <span class="label-txt">PLANNED: RM ${plannedAmt.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                            <span class="val-txt" style="color:#888;">${plannedPercent.toFixed(1)}%</span>
                        </div>
                        <div class="prog-bar-bg"><div class="prog-bar-fill" data-width="${plannedPercent}%" style="background:#d1d1d6;"></div></div>
                        <div class="label-row" style="margin-top:2px;">
                            <span class="label-txt" style="color:${statusColor}">ACTUAL: RM ${used.toLocaleString()}</span>
                            <span class="val-txt" style="color:${statusColor}">${actualPercent.toFixed(1)}%</span>
                        </div>
                        <div class="prog-bar-bg"><div class="prog-bar-fill" data-width="${actualPercent}%" style="background:${statusColor}"></div></div>
                    </div>
                </div>
            `;
        });

        setTimeout(() => {
            document.querySelectorAll('.prog-bar-fill').forEach(bar => {
                bar.style.setProperty('width', bar.getAttribute('data-width'), 'important');
            });
        }, 100);
        updateChart();
    }

    function updateChart() {
        const sections = currentContract.contract_sections_breakdown || {};
        const start = new Date(currentContract.contract_start), end = new Date(currentContract.contract_end), today = new Date();
        const totalMonths = Math.max(1, (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth()));
        const monthsElapsed = Math.max(1, (today.getFullYear()-start.getFullYear())*12 + (today.getMonth()-start.getMonth()));

        let labels = [], shortLabels = [], targetD = [], actualD = [];
        selectedSections.sort().forEach(s => {
            labels.push(s);
            // AMBIL "SECTION A" SAHAJA DARIPADA "SECTION A - LABOUR"
            shortLabels.push(s.split(' - ')[0]); 
            
            const b = sections[s].amt || 0;
            targetD.push((b/totalMonths).toFixed(0));
            let u = 0;
            currentWO.forEach(wo => { if(wo.section_category?.[s]) u += wo.section_category[s].amt || 0; });
            actualD.push((u/monthsElapsed).toFixed(0));
        });

        const ctx = document.getElementById('healthChart').getContext('2d');
        if (myChart) {
            myChart.data.labels = shortLabels; 
            myChart.data.datasets[0].data = targetD; 
            myChart.data.datasets[1].data = actualD; 
            myChart.update();
        } else {
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: shortLabels, datasets: [
                    { label: 'Target', data: targetD, backgroundColor: '#e5e5ea', borderRadius: {topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0}, borderSkipped: false },
                    { label: 'Sebenar', data: actualD, backgroundColor: '#007AFF', borderRadius: {topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0}, borderSkipped: false }
                ]},
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    layout: { padding: { top: 30, bottom: 5 } },
                    plugins: { 
                        legend: { display: false },
                        datalabels: { 
                            display: true, 
                            anchor: 'end', 
                            align: 'top', 
                            offset: 2,
                            font: { size: 9, weight: 'bold' },
                            formatter: (val) => val > 0 ? Number(val).toLocaleString() : ''
                        } 
                    },
                    scales: {
                        y: { 
                            display: true, 
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { font: { size: 8 } }
                        },
                        x: { 
                            display: true, 
                            grid: { display: false }, 
                            ticks: { font: { size: 9, weight: '600' } } 
                        }
                    }
                }
            });
        }
    }

    function toggleSelector() {
        const el = document.getElementById('sectionSelector');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
        const sections = currentContract.contract_sections_breakdown || {};
        document.getElementById('fullSectionList').innerHTML = Object.keys(sections).sort().map(s => `<span class="sel-chip ${selectedSections.includes(s)?'active':''}" onclick="toggleSection('${s}')">${s}</span>`).join('');
    }

    async function toggleSection(s) {
        if(selectedSections.includes(s)) selectedSections = selectedSections.filter(x => x !== s);
        else selectedSections.push(s);
        renderUI();
        await fetch(`${SB_URL}/rest/v1/contract?id=eq.${currentContract.id}`, { method: 'PATCH', headers, body: JSON.stringify({ selected_sections: selectedSections }) });
    }
</script>
</body>
</html>
