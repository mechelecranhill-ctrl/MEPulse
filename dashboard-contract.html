<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E-Connect | Pro Global Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30;
            --dark-bg: #1c1c1e; --card-bg: #ffffff; --glass: rgba(255,255,255,0.8);
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f2f2f7; margin: 0; padding-top: 80px; overflow-x: hidden; }
        
        /* Header & Navigation */
        .glass-header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); z-index: 1000;
        }
        .unit-container { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px; max-width: 800px; scrollbar-width: none; }
        .unit-pill { 
            padding: 10px 22px; border-radius: 20px; background: #e5e5ea; 
            border: none; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; transition: 0.3s;
        }
        .unit-pill.active { background: var(--ios-blue); color: white; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,122,255,0.3); }

        /* Floating + Button */
        .fab { 
            position: fixed; top: 15px; right: 25px; width: 45px; height: 45px; 
            background: var(--ios-blue); color: white; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 1100; box-shadow: 0 4px 12px rgba(0,122,255,0.4);
            transition: 0.3s;
        }
        .fab:active { transform: scale(0.9); }

        /* Main Layout */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .contract-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        /* Contract Card */
        .c-card { 
            background: var(--card-bg); border-radius: 24px; padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.03); position: relative;
        }
        .c-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: var(--ios-blue); }
        .status-dot { width: 10px; height: 10px; background: var(--ios-green); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--ios-green); }

        /* Analysis Panel */
        #analysis-panel { 
            display: none; background: white; border-radius: 30px; padding: 35px; 
            margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform: translateY(0); } }

        .health-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 900px) { .health-grid { grid-template-columns: 1fr; } }

        .chart-box { padding: 20px; background: #f9f9fb; border-radius: 25px; height: 350px; position: relative; }
        
        /* Section Rows */
        .section-row { 
            background: #fff; border: 1px solid #f0f0f0; border-radius: 18px; 
            padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .prog-bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .prog-bar-fill { height: 100%; border-radius: 5px; transition: 1.5s cubic-bezier(0.1, 0, 0.1, 1); width: 0; }
        
        .desc-text { font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; display: block; }
        
        /* Sub-Module Overlay */
        #subModuleOverlay { 
            display: none; position: fixed; inset: 0; background: #f2f2f7; z-index: 2000; 
            padding: 10px; overflow-y: auto;
        }
        .close-sub { position: fixed; top: 15px; left: 15px; z-index: 2100; background: var(--ios-red); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="fab" onclick="toggleSubModule(true)"><i class="fa fa-plus"></i></div>

    <div class="glass-header">
        <div class="unit-container" id="unitNav">
            <p style="font-size: 12px; color: #888;">Memuatkan Unit...</p>
        </div>
    </div>

    <div class="container">
        <div id="contractList" class="contract-grid"></div>

        <div id="analysis-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <h1 id="panel-title" style="margin:0; font-size: 28px; color: var(--ios-blue);">Analisis Kontrak</h1>
                    <p id="panel-vendor" style="margin:5px 0 0 0; color: #888; font-size: 14px;"></p>
                </div>
                <button onclick="document.getElementById('analysis-panel').style.display='none'" style="background:#f2f2f7; border:none; padding:12px 25px; border-radius:15px; font-weight: 600; cursor:pointer;">Tutup</button>
            </div>

            <div class="health-grid">
                <div class="chart-box">
                    <canvas id="healthChart"></canvas>
                </div>

                <div>
                    <h3 style="margin-top:0; font-size: 18px; display: flex; align-items: center; gap: 10px;">
                        <i class="fa fa-chart-line" style="color: var(--ios-blue);"></i> Pecahan Bajet & Section
                    </h3>
                    <div id="sectionContainer" style="max-height: 500px; overflow-y: auto; padding-right: 10px; scrollbar-width: thin;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="subModuleOverlay">
        <button class="close-sub" onclick="toggleSubModule(false)">TUTUP X</button>
        <div id="subContentArea">
            <iframe src="about:blank" id="formFrame" style="width: 100%; height: 90vh; border: none; border-radius: 20px; background: white; margin-top: 50px;"></iframe>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let myChart = null;
    let selectedContract = null;

    window.onload = async () => {
        await fetchUnits();
    };

    async function fetchUnits() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/units?select=*`, { headers });
            const units = await res.json();
            const nav = document.getElementById('unitNav');
            nav.innerHTML = units.map(u => `<button class="unit-pill" onclick="fetchContracts(${u.id}, this)">${u.unit_name}</button>`).join('');
            
            // Auto click first unit
            if(units.length > 0) document.querySelector('.unit-pill').click();
        } catch (e) { console.error("Error units:", e); }
    }

    async function fetchContracts(unitId, btn) {
        document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');

        const res = await fetch(`${SB_URL}/rest/v1/contract?unit_id=eq.${unitId}`, { headers });
        const data = await res.json();
        
        document.getElementById('contractList').innerHTML = data.map(c => `
            <div class="c-card" onclick='openAnalysis(${JSON.stringify(c)})'>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span style="font-size:12px; font-weight:800; color:var(--ios-blue); letter-spacing: 1px;">${c.contract_code}</span>
                    <span class="status-dot"></span>
                </div>
                <h4 style="margin:0; font-size:16px; color:#1c1c1e; line-height: 1.4;">${c.contract_name}</h4>
                <div style="margin-top:20px; padding-top:15px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size:11px; color:#888;"><i class="fa fa-id-badge"></i> ${c.contract_vendor}</span>
                    <i class="fa fa-chevron-right" style="font-size: 10px; color: #ccc;"></i>
                </div>
            </div>
        `).join('');
        document.getElementById('analysis-panel').style.display = 'none';
    }

    async function openAnalysis(contract) {
        selectedContract = contract;
        document.getElementById('analysis-panel').style.display = 'block';
        document.getElementById('panel-title').innerText = contract.contract_code;
        document.getElementById('panel-vendor').innerText = `Kontraktor: ${contract.contract_vendor}`;

        // FETCH REAL DATA FROM WORK ORDERS
        const resW = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contract.id}&select=amount_spent,section_category`, { headers });
        const workOrders = await resW.json();

        // Calculate Period
        const start = new Date(contract.start_date || new Date());
        const end = new Date(contract.end_date || new Date());
        const months = Math.max(1, (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()));

        const sections = contract.contract_sections_breakdown || {};
        const container = document.getElementById('sectionContainer');
        container.innerHTML = '';

        let labels = [], budgetData = [], spentData = [];

        Object.keys(sections).sort().forEach(s => {
            const totalBudget = sections[s].amt || 0;
            const desc = sections[s].desc || "KONTRAK ASAL";
            
            // AGGREGATE SPENT FROM WORK ORDERS
            let usedAmount = 0;
            workOrders.forEach(wo => {
                if(wo.section_category && wo.section_category[s]) {
                    usedAmount += wo.section_category[s].amt || 0;
                }
            });

            const monthlyPlanned = totalBudget / months;
            const usedPercent = Math.min(100, (usedAmount / totalBudget) * 100);
            
            // Health Color Logic
            const hColor = usedPercent > 85 ? 'var(--ios-red)' : (usedPercent > 60 ? 'var(--ios-orange)' : 'var(--ios-blue)');

            labels.push(s);
            budgetData.push(totalBudget);
            spentData.push(usedAmount);

            container.innerHTML += `
                <div class="section-row">
                    <div style="width: 100%;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:bold; font-size:14px;">${s}</span>
                            <span style="color:var(--ios-green); font-size:11px; font-weight:800;">PLANNED: RM ${monthlyPlanned.toLocaleString(undefined,{maximumFractionDigits:0})}/bln</span>
                        </div>
                        <span class="desc-text">${desc}</span>
                        
                        <div class="prog-bar-bg">
                            <div class="prog-bar-fill" style="width:${usedPercent}%; background:${hColor}"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:8px; font-weight: 600;">
                            <span style="color: #444;">PENGGUNAAN: ${usedPercent.toFixed(1)}%</span>
                            <span style="color: var(--ios-blue);">BAKI: RM ${(totalBudget - usedAmount).toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        updateChart(labels, budgetData, spentData);
        window.scrollTo({ top: document.getElementById('analysis-panel').offsetTop - 20, behavior: 'smooth' });
    }

    function updateChart(labels, budget, spent) {
        if (myChart) myChart.destroy();
        const ctx = document.getElementById('healthChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Budget (RM)', data: budget, backgroundColor: '#e5e5ea', borderRadius: 8, barThickness: 25 },
                    { label: 'Spent (RM)', data: spent, backgroundColor: '#007AFF', borderRadius: 8, barThickness: 25 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10, weight: 'bold' } } }
                },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#f0f0f0' }, border: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // Toggle Sub-Module (Iframe)
    function toggleSubModule(show) {
        const overlay = document.getElementById('subModuleOverlay');
        overlay.style.display = show ? 'block' : 'none';
        if(show) {
            // Gantian ini dengan URL fail kod asal anda jika ia fail berasingan
            // Atau letakkan kod asal dalam format data URI
            document.getElementById('formFrame').src = 'pendaftaran.html'; 
        } else {
            document.getElementById('formFrame').src = 'about:blank';
            fetchUnits(); // Refresh dashboard data when form closes
        }
    }
</script>
</body>
</html>
