<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0" defer></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30;
            --dark-bg: #1c1c1e; --card-bg: #ffffff; --glass: rgba(255,255,255,0.8);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;   
            /* PENGOPTIMUMAN GPU: Tukar gradient kompleks kepada background-color jika peranti perlahan, 
               atau paksa sub-layering menggunakan will-change */
            background: linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .search-container {
            padding: 5px 10px 10px 0;
            flex-shrink: 0;
        }
        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #d1d1d6;
            background: white;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s; /* PENGOPTIMUMAN GPU: Hadkan transisi hanya pada border-color, bukan 'all' */
        }
        .search-box:focus {
            border-color: var(--ios-blue);
        }
        .mobile-usage-btn { display: none; } 

        .glass-header { 
            width: 100%; height: 60px; 
            background: linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); z-index: 1000; flex-shrink: 0;
            position: relative;
            padding: 0 60px;
            box-sizing: border-box;
        }

        .unit-container-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .unit-container {
            display: flex;
            flex-wrap: wrap;         
            justify-content: center; 
            gap: 8px;
            padding: 0;
        }

        .unit-pill { 
            padding: 8px 16px;
            border-radius: 15px;     
            background: rgba(255,255,255,.2);
            color: white;
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12px; 
            white-space: nowrap; 
            transition: background-color 0.2s, color 0.2s; /* PENGOPTIMUMAN GPU */
            will-change: background-color; /* Sediakan GPU lebih awal */
        }
        .unit-pill.active { 
            background: white;
            color: #0b3d91; 
        }

        @media (max-width: 768px) {
            #panel-vendor, 
            .next-container { 
                display: none !important; 
            }

            .mobile-usage-btn {
                display: flex;
                background: var(--ios-blue);
                color: white;
                text-decoration: none;
                padding: 6px 12px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 800;
                align-items: center;
                gap: 5px;
            }

            .contract-sidebar {
                width: 100% !important;
                /* PENGOPTIMUMAN GPU: Gunakan 'transform' sahaja untuk elak lag re-layout */
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                will-change: transform;
            }

            .analysis-container {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                width: auto;
                height: auto;
                box-sizing: border-box;
                padding: 10px;
                background: #f2f2f7;
                z-index: 1500;
                transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                will-change: transform;
                overflow-x: hidden;
            }

            body.analysis-active .analysis-container { 
                transform: translateX(0);
            }
            body.analysis-active .contract-sidebar {
                transform: translateX(-100%);
            }

            #analysis-panel {
                border-radius: 20px 20px 0 0 !important;
                height: 100%; 
                min-width: 0;
            }
            .health-grid {
                grid-template-columns: 1fr !important;
                overflow-y: auto !important; 
                min-width: 0;
            }
            .chart-box {
                min-height: 250px;
                flex-shrink: 0; 
                min-width: 0;
            }

            .glass-header {
                padding: 0 10px; 
            }

            .unit-container-wrapper {
                flex: 1;
                overflow: hidden;
                margin: 0 50px;  
            }

            .unit-container {
                flex-wrap: nowrap;           
                justify-content: flex-start;
                overflow-x: auto;
                scroll-behavior: smooth;
                scroll-snap-type: x mandatory;
                scrollbar-width: none;
                padding: 0 16px;
            }

            .unit-container::-webkit-scrollbar { display: none; }

            .unit-container::before,
            .unit-container::after {
                display: block;
                content: "";
                flex: 0 0 50%;
            }

            .unit-pill {
                scroll-snap-align: center;
            }
        }

        .nav-btn {
            position: absolute;
            background: #e5e5ea;
            border: none;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ios-blue);
            padding: 0 10px;
        }

        .next-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        .next-label { font-size: 11px; font-weight: 800; color: #48484a; letter-spacing: 0.8px; text-align: right; }
        .next-btn-circle {
            background: var(--ios-blue);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
        }

        .fab { 
            position: fixed; top: 12px; right: 20px; width: 35px; height: 35px; 
            background: var(--ios-blue); color: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 1100;
        }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 15px; }
        .contract-sidebar { width: 220px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
        #contractList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        .c-card { background: var(--card-bg); border-radius: 12px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .c-card.active { border-color: var(--ios-blue); background: #f0f7ff; }
        .c-card h4 { margin: 0; font-size: 11px; color: #1c1c1e; overflow: hidden; text-overflow: ellipsis; }
        .c-card .sub-text { font-size: 9px; color: #888; margin-top: 2px; }

        .analysis-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #analysis-panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; overflow: hidden; flex-direction: column; }

        .health-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; flex: 1; overflow: hidden; margin-top: 5px; }
        /* PENGOPTIMUMAN GPU: 'transform: translateZ(0)' memaksa lapisan dimuat naik ke perkakasan GPU */
        .chart-box { padding: 10px; background: #f9f9fb; border-radius: 15px; flex: 1; position: relative; min-height: 0; display: flex; flex-direction: column; transform: translateZ(0); }

        .section-row { background: #fff; border: 1px solid var(--ios-blue); border-radius: 12px; padding: 10px; margin-bottom: 8px; }
        .prog-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        /* PENGOPTIMUMAN GPU: Kurangkan transition time dan paksa perkakasan render width melalui will-change */
        .prog-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease-out !important; width: 0 !important; will-change: width;}
        .avg-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .avg-item { font-size: 9px; font-weight: 600; color: #666; }
        .manage-btn { background: #f2f2f7; border: none; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: var(--ios-blue); cursor: pointer; }
        #selectedSectionContainer { flex: 1; overflow-y: auto; padding-right: 5px; }
        .sel-chip { display: inline-block; padding: 4px 10px; border-radius: 12px; background: #e5e5ea; margin: 3px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .sel-chip.active { background: var(--ios-blue); color: white; }
        
    </style>

    <link rel="stylesheet" href="style.css">

    <script src="session.js" defer></script>
    <script src="sidebar.js" defer></script>
</head>
<body>

    <app-sidebar></app-sidebar>
    <div class="fab" onclick="window.location.href='contract-forms.html'">
        <i class="fa fa-plus"></i>
    </div>

<div class="glass-header">
    <div class="unit-container-wrapper">
        <div class="unit-container" id="unitNav"></div>
    </div>
</div>

    <div class="next-container">
        <span class="next-label">USAGE<br>SCHEDULE</span>
        <button class="next-btn-circle" onclick="goToUsage()">
            <i class="fa fa-chevron-right"></i>
        </button>
    </div>

    <div class="main-wrapper">
        <div class="contract-sidebar">
            <div class="search-container">
                <input type="text" id="contractSearch" class="search-box" placeholder="Search Code/Contract" onkeyup="debouncedFilterContracts()">
            </div>
            <div id="contractList"></div>
        </div>

        <div class="analysis-container">
            <div id="analysis-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f2f2f7;">
                    <div>
                        <h1 id="panel-title" style="margin:0; font-size: 24px; letter-spacing: -0.5px; color: var(--ios-blue);">Analysis</h1>
                        <p id="panel-vendor" style="margin:2px 0 0 0; color: #8e8e93; font-size: 13px; font-weight: 500;"></p>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <a href="#" class="mobile-usage-btn" onclick="goToUsage()">
                            USAGE <i class="fa fa-chevron-right" style="font-size: 8px;"></i>
                        </a>
                    </div>
                </div>

                <div class="health-grid">
                    <div class="chart-box">
                        <div style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 10px;">MONTHLY AVERAGE: ACTUAL VS PLANNED (RM)</div>
                        <canvas id="healthChart"></canvas>
                    </div>
                    <div style="display: flex; flex-direction: column; overflow: hidden;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-shrink: 0; margin-bottom: 8px;">
                            <h3 style="margin:0; font-size: 16px;">Sections</h3>
                            <button id="manageBtn" class="manage-btn" onclick="toggleSelector()"><i class="fa fa-cog"></i> Setting</button>
                        </div>
                        <div id="sectionSelector" style="display:none; background: #f9f9fb; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 1px dashed #ccc;">
                            <div id="fullSectionList"></div>
                        </div>
                        <div id="selectedSectionContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
<script>
    const role = localStorage.getItem("role");
    const isAdmin = role === "admin" || role === "@dm1n";
    
    var SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let myChart = null;
    let currentContract = null;
    let currentWO = [];
    let selectedSections = [];
    let searchTimeout = null;
    // PENGOPTIMUMAN FETCH: Simpan cache senarai kontrak tempatan mengikut unit_id untuk elak hit API Supabase berulang kali
    const cacheContracts = {}; 

    window.onload = () => {
        // Tunggu Chart.js dimuat turun sepenuhnya secara 'defer' sebelum daftar plugin
        if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }
        fetchUnits();
        if(!isAdmin){
            const btn = document.getElementById("manageBtn");
            if(btn) btn.style.display = "none";
        }
    };

    function debouncedFilterContracts() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(filterContracts, 150);
    }

    function filterContracts() {
        const query = document.getElementById('contractSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.c-card');
        
        // PENGOPTIMUMAN RENDER: Sembunyikan elemen secara kelompok (Batch DOM manipulation)
        requestAnimationFrame(() => {
            cards.forEach(card => {
                const code = card.querySelector('h4').innerText.toLowerCase();
                const name = card.querySelector('.sub-text').innerText.toLowerCase();
                card.style.display = (code.includes(query) || name.includes(query)) ? 'block' : 'none';
            });
        });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const selectedSectionName = urlParams.get('section');

    async function fetchUnits() {
        try {
            const [secRes, unitsRes] = await Promise.all([
                fetch(`${SB_URL}/rest/v1/me_sections?select=id`, { headers }),
                fetch(`${SB_URL}/rest/v1/units?select=id,unit_name,section_id`, { headers })
            ]);
            const sections = await secRes.json();
            const units = await unitsRes.json();

            let selectedSection = null;
            if (selectedSectionName) {
                selectedSection = sections.find(s => s.id == selectedSectionName);
            }

            const filteredUnits = selectedSection
                ? units.filter(u => u.section_id === selectedSection.id)
                : units;

            const nav = document.getElementById('unitNav');
            nav.innerHTML = filteredUnits.map(u => `
                <button class="unit-pill" id="unit-${u.id}" onclick="fetchContracts(${u.id}, this)">
                    ${u.unit_name}
                </button>
            `).join('');

            if (filteredUnits.length > 0) {
                document.getElementById(`unit-${filteredUnits[0].id}`).click();
            }
        } catch (e) {
            console.error("Error units:", e);
        }
    }

    async function fetchContracts(unitId, btn) {
        document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        centerActiveUnit(btn);

        document.getElementById('contractSearch').value = '';
        document.body.classList.remove('analysis-active');
        document.getElementById('analysis-panel').style.display = 'none';

        currentContract = null;
        currentWO = [];
        document.getElementById('panel-title').innerText = 'Analisis';
        document.getElementById('panel-vendor').innerText = '';

        // PENGOPTIMUMAN FETCH: Semak cache tempatan dahulu sebelum panggil Supabase REST API
        if (cacheContracts[unitId]) {
            renderContractList(cacheContracts[unitId]);
            return;
        }

        try {
            const res = await fetch(
                `${SB_URL}/rest/v1/contract?unit_id=eq.${unitId}&select=id,contract_code,contract_name,contract_start,contract_end,selected_sections,contract_sections_breakdown`,
                { headers }
            );
            let data = await res.json();

            data.sort((a, b) => {
                const dateDiff = new Date(a.contract_start) - new Date(b.contract_start);
                if (dateDiff !== 0) return dateDiff;
                return a.contract_code.localeCompare(b.contract_code, undefined, { numeric: true, sensitivity: "base" });
            });

            // Simpan data ke dalam cache
            cacheContracts[unitId] = data;
            renderContractList(data);
        } catch (e) {
            console.error("Error contracts:", e);
        }
    }

    function renderContractList(data) {
        const list = document.getElementById('contractList');
        list.innerHTML = data.map(c => `
            <div class="c-card" id="card-${c.id}">
                <h4>${c.contract_code}</h4>
                <div class="sub-text">${c.contract_name}</div>
            </div>
        `).join('');

        data.forEach(c => {
            const cardEl = document.getElementById(`card-${c.id}`);
            if (cardEl) {
                cardEl.addEventListener('click', () => {
                    selectCard(c.id);
                    openAnalysis(c);
                });
            }
        });

        if (data.length > 0 && window.innerWidth > 768) {
            selectCard(data[0].id);
            openAnalysis(data[0]);
        }
    }

    function selectCard(id) {
        const currentActive = document.querySelector('.c-card.active');
        if(currentActive) currentActive.classList.remove('active');
        const activeCard = document.getElementById(`card-${id}`);
        if(activeCard) activeCard.classList.add('active');
    }

    async function openAnalysis(contract) {
        document.body.classList.add('analysis-active');
        document.getElementById('analysis-panel').style.display = 'flex';
        document.getElementById('panel-title').innerText = contract.contract_code;
        document.getElementById('panel-vendor').innerText = contract.contract_name;

        currentContract = contract;

        try {
            const [resW, resI] = await Promise.all([
                fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${currentContract.id}&select=interim_no,section_category`, { headers }),
                fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${currentContract.id}&order=date_received.asc&select=claim_breakdown`, { headers })
            ]);

            currentWO = await resW.json();
            const currentInterims = await resI.json();

            selectedSections = (currentContract.selected_sections && currentContract.selected_sections.length > 0) 
                ? currentContract.selected_sections 
                : Object.keys(currentContract.contract_sections_breakdown || {});
            
            renderUI(currentInterims);
        } catch (error) { 
            console.error(error); 
        }
    }

    async function renderUI(currentInterims = []) {
        if(!currentContract) return;

        try {
            const sections = currentContract.contract_sections_breakdown || {};
            const start = new Date(currentContract.contract_start);
            const end = new Date(currentContract.contract_end);
            const today = new Date();

            const totalMonths = Math.max(1, (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()));
            let monthsElapsed = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth()) + 1;
            monthsElapsed = Math.min(totalMonths, Math.max(1, monthsElapsed));

            document.getElementById('fullSectionList').innerHTML = Object.keys(sections).sort().map(s => `
                <span class="sel-chip ${selectedSections.includes(s) ? 'active' : ''}" onclick="toggleSection('${s}')">${s}</span>
            `).join('');

            const mainContainer = document.getElementById('selectedSectionContainer');
            let htmlBuilder = '';

            const interimMap = {};
            const woMap = {};

            currentInterims.forEach(int => {
                if (int.claim_breakdown) {
                    Object.keys(int.claim_breakdown).forEach(s => {
                        interimMap[s] = (interimMap[s] || 0) + (int.claim_breakdown[s].amt || 0);
                    });
                }
            });

            currentWO.forEach(wo => {
                if (!wo.interim_no && wo.section_category) {
                    Object.keys(wo.section_category).forEach(s => {
                        woMap[s] = (woMap[s] || 0) + (wo.section_category[s].amt || 0);
                    });
                }
            });

            let labels = [], targetAvgData = [], actualAvgData = [];

            selectedSections.sort().forEach(s => {
                if(!sections[s]) return;
                
                const totalInterimClaim = interimMap[s] || 0;
                const totalPendingWO = woMap[s] || 0;

                const used = totalInterimClaim + totalPendingWO;
                const budget = sections[s].amt || 0; 
                const plannedTotalToDate = (budget / totalMonths) * monthsElapsed;
                const variance = used - plannedTotalToDate;
                const variancePercent = plannedTotalToDate ? (variance / plannedTotalToDate) * 100 : 0;
                const color = used > plannedTotalToDate ? 'var(--ios-red)' : 'var(--ios-green)';
                const progressPercent = budget ? (used / budget) * 100 : 0;

                labels.push(s);
                targetAvgData.push((budget / totalMonths).toFixed(2));
                actualAvgData.push((used / monthsElapsed).toFixed(2));

                htmlBuilder += `
    <div class="section-row">
        <div style="display:flex; justify-content:space-between; align-items:start;">
            <div style="font-weight:bold; font-size:13px; color:var(--ios-blue);">
                ${s}: ${sections[s].desc || s}
            </div>
                            ${isAdmin ? `<i class="fa fa-times-circle" style="color:#ccc; cursor:pointer;" onclick="toggleSection('${s}')"></i>` : ``}
                        </div>
                        <div class="avg-stats">
                            <div class="avg-item">BUDGET: RM ${budget.toLocaleString()}</div>
                            <div class="avg-item" style="color: #8e8e93;">PLANNED: RM ${plannedTotalToDate.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                        </div>
                        <div class="avg-stats">
                            <div class="avg-item">ACTUAL: RM ${used.toLocaleString()}</div>
                            <div class="avg-item" style="color: ${color};">VARIANCE: ${variancePercent > 0 ? '+' : ''}${variancePercent.toFixed(1)}%</div>
                        </div>
                        <div class="prog-bar-bg">
                            <div class="prog-bar-fill" data-width="${Math.min(100, progressPercent)}%" style="background:${color}"></div>
                        </div>
                    </div>
                `;
            });

            mainContainer.innerHTML = htmlBuilder;
            updateChartDirect(labels, targetAvgData, actualAvgData);

            // PENGOPTIMUMAN GPU: Gunakan requestAnimationFrame berbanding setTimeout biasa untuk memicu animasi progress bar
            requestAnimationFrame(() => {
                document.querySelectorAll('.prog-bar-fill').forEach(bar => {
                    bar.style.setProperty('width', bar.getAttribute('data-width'), 'important');
                });
            });

        } catch (error) { console.error("Error processing UI:", error); }
    }

    function updateChartDirect(labels, targetAvgData, actualAvgData) {
        if (myChart) {
            myChart.data.labels = labels;
            myChart.data.datasets[0].data = targetAvgData;
            myChart.data.datasets[1].data = actualAvgData;
            myChart.update('none'); // Mod 'none' melangkau overhead animasi re-render carta
        } else {
            const ctx = document.getElementById('healthChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Planned', data: targetAvgData, backgroundColor: 'rgba(200, 200, 205, 0.5)', borderRadius: 5 },
                        { label: 'Actual', data: actualAvgData, backgroundColor: '#007AFF', borderRadius: 5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 150 }, // PENGOPTIMUMAN GPU: Ringkaskan masa rendering awal carta
                    plugins: { 
                        legend: { position: 'top', labels: { font: { size: 10, weight: 'bold' } } },
                        datalabels: { anchor: 'end', align: 'top', font: { size: 9, weight: 'bold' }, formatter: (v) => v > 0 ? `RM${Math.round(v).toLocaleString()}` : '' }
                    },
                    scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10, weight: 'bold' }, maxRotation: 45, minRotation: 45 } } }
                }
            });
        }
    }

    function updateChart(currentInterims = []) {
        renderUI(currentInterims);
    }

    async function toggleSection(s) {
        if(!isAdmin){ alert("Access denied"); return; }
        if(selectedSections.includes(s)) selectedSections = selectedSections.filter(x => x !== s);
        else selectedSections.push(s);
        
        renderUI([]);
        
        await fetch(`${SB_URL}/rest/v1/contract?id=eq.${currentContract.id}`, {
            method: 'PATCH',
            headers: headers,
            body: JSON.stringify({ selected_sections: selectedSections })
        });
    }

    function toggleSelector() {
        if(!isAdmin){ alert("Access denied"); return; }
        const el = document.getElementById('sectionSelector');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function goToUsage(){
        if(!currentContract){ alert("Please choose a contract"); return; }
        window.location.href = `dashboard-usageschedule.html?id=${currentContract.id}`;
    }

    function centerActiveUnit(btn) {
        if(window.innerWidth <= 768) {
            btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        }
    }

    let touchStartX = 0;
    let touchEndX = 0;
    const contractSidebar = document.querySelector('.contract-sidebar');

    contractSidebar.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    contractSidebar.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleUnitSwipe();
    }, { passive: true });

    function handleUnitSwipe() {
        if(window.innerWidth > 768) return;
        const diff = touchStartX - touchEndX;
        if(Math.abs(diff) < 60) return;

        const units = [...document.querySelectorAll('.unit-pill')];
        const activeIndex = units.findIndex(btn => btn.classList.contains('active'));
        if(activeIndex === -1) return;

        if(diff > 0 && activeIndex < units.length - 1) {
            units[activeIndex + 1].click();
        }
        if(diff < 0 && activeIndex > 0) {
            units[activeIndex - 1].click();
        }
    }
</script>
</body>
</html>
