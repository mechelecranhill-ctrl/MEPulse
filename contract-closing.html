<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Closing System</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:-apple-system,system-ui,sans-serif;
background:linear-gradient(60deg,#0b3d91,#0077b6,#00b4d8);
padding:20px;
min-height:100vh;
}

.glass{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
border-radius:18px;
padding:20px;
max-width:1000px;
margin:auto;
}

h2{color:white}

select,input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:5px;
}

label{
font-size:11px;
font-weight:700;
color:#fff;
margin-top:10px;
display:block;
}

.tabs{
display:flex;
gap:10px;
margin:15px 0;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
background:rgba(255,255,255,0.2);
color:white;
}

.tab.active{background:#007AFF}

.card{
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:12px;
margin-top:10px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.primary{background:#007AFF;color:white}
.green{background:#34C759;color:white}
.red{background:#FF3B30;color:white}

.checklist label{
display:flex;
gap:10px;
align-items:center;
font-size:12px;
color:white;
margin:6px 0;
}
</style>
</head>

<body>

<div class="glass">

<h2><i class="fa fa-file-contract"></i> Closing Contract</h2>

<!-- UNIT -->
<label>Unit</label>
<select id="unit" onchange="loadContracts()"></select>

<!-- CONTRACT -->
<label>Contract</label>
<select id="contract" onchange="loadData()"></select>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="showTab('cpc')">CPC</button>
<button class="tab" onclick="showTab('cmgd')">CMGD</button>
<button class="tab" onclick="showTab('sfa')">SFA</button>
</div>

<!-- ================= CPC ================= -->
<div id="cpcTab">

<div class="card">
<b style="color:white">Contract End (CPC)</b>
<div id="contractEnd" style="color:#fff;font-size:14px"></div>
</div>

<div class="card checklist">
<b style="color:white">CPC Checklist</b>

<label><input type="checkbox" id="c1"> Site inspection completed</label>
<label><input type="checkbox" id="c2"> Work certified completed</label>
<label><input type="checkbox" id="c3"> As-built drawing</label>
<label><input type="checkbox" id="c4"> Testing & commissioning</label>
<label><input type="checkbox" id="c5"> Safety clearance</label>
<label><input type="checkbox" id="c6"> Consultant approval</label>
</div>

<button class="btn primary" onclick="saveCPC()">Submit CPC</button>
</div>

<!-- ================= CMGD ================= -->
<div id="cmgdTab" style="display:none">

<div class="card">
<b style="color:white">CMGD Eligibility</b>
<div id="cmgdStatus"></div>
</div>

<label>CMGD Date</label>
<input type="date" id="cmgd">

<label>Defect Status</label>
<select id="defect">
<option>Completed</option>
<option>Pending</option>
</select>

<label>Remarks</label>
<textarea id="cmgdRemark"></textarea>

<button class="btn primary" onclick="saveCMGD()">Submit CMGD</button>
</div>

<!-- ================= SFA ================= -->
<div id="sfaTab" style="display:none">

<div class="card">
<b style="color:white">SFA Eligibility</b>
<div id="sfaStatus"></div>
</div>

<label>SFA Date</label>
<input type="date" id="sfa">

<label>Final Account</label>
<input type="number" id="final">

<label>Retention Release</label>
<input type="number" id="retention">

<label>PG Release</label>
<input type="number" id="pg">

<label>Remarks</label>
<textarea id="sfaRemark"></textarea>

<button class="btn green" onclick="saveSFA()">CLOSE CONTRACT</button>
</div>

</div>

<script>
const SB="https://ywmsvowroxzhrjwrhsru.supabase.co";
const KEY="YOUR_ANON_KEY";

const headers={
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
};

let contract=null;
let closing=null;

function showTab(t){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("cpcTab").style.display=t=="cpc"?"block":"none";
document.getElementById("cmgdTab").style.display=t=="cmgd"?"block":"none";
document.getElementById("sfaTab").style.display=t=="sfa"?"block":"none";
}

async function loadContracts(){
const unit=document.getElementById("unit").value;
const res=await fetch(`${SB}/rest/v1/contract?unit_id=eq.${unit}`,{headers});
const data=await res.json();

let sel=document.getElementById("contract");
sel.innerHTML="<option value=''>Select</option>";

data.forEach(c=>{
let opt=document.createElement("option");
opt.value=c.id;
opt.text=c.contract_code;
sel.appendChild(opt);
});
}

async function loadData(){
const id=document.getElementById("contract").value;
if(!id)return;

// contract
const c=await fetch(`${SB}/rest/v1/contract?id=eq.${id}`,{headers});
contract=(await c.json())[0];

document.getElementById("contractEnd").innerText=contract.contract_end;

// closing
const r=await fetch(`${SB}/rest/v1/contract_closing?contract_id=eq.${id}`,{headers});
const d=await r.json();

closing=d[0]||null;

// CMGD status
let cmgdDate=new Date(contract.contract_end);
cmgdDate.setMonth(cmgdDate.getMonth()+6);

document.getElementById("cmgdStatus").innerText=
"Available after: "+cmgdDate.toDateString();

// SFA status
let sfaDate=new Date(contract.contract_end);
sfaDate.setMonth(sfaDate.getMonth()+12);

document.getElementById("sfaStatus").innerText=
"Available after: "+sfaDate.toDateString();
}

async function saveCPC(){

let checklist=[];
document.querySelectorAll(".checklist input").forEach((c,i)=>{
checklist.push(c.checked);
});

await fetch(`${SB}/rest/v1/contract_closing`,{
method:"POST",
headers,
body:JSON.stringify({
contract_id:contract.id,
cpc_date:contract.contract_end,
cpc_checklist:checklist,
cpc_status:"COMPLETED"
})
});

alert("CPC saved");
}

async function saveCMGD(){

await fetch(`${SB}/rest/v1/contract_closing`,{
method:"PATCH",
headers,
body:JSON.stringify({
cmgd_date:document.getElementById("cmgd").value,
defect_status:document.getElementById("defect").value,
cmgd_remarks:document.getElementById("cmgdRemark").value
})
});

alert("CMGD saved");
}

async function saveSFA(){

await fetch(`${SB}/rest/v1/contract_closing`,{
method:"PATCH",
headers,
body:JSON.stringify({
sfa_date:document.getElementById("sfa").value,
final_account:document.getElementById("final").value,
retention_release:document.getElementById("retention").value,
pg_release:document.getElementById("pg").value,
sfa_remarks:document.getElementById("sfaRemark").value,
status:"CLOSED"
})
});

alert("Contract Closed");
}

async function loadUnits(){
const r=await fetch(`${SB}/rest/v1/units`,{headers});
const d=await r.json();

let u=document.getElementById("unit");
d.forEach(x=>{
u.innerHTML+=`<option value="${x.id}">${x.unit_name}</option>`;
});
}

loadUnits();
</script>

</body>
</html>
