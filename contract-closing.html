<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Closing System</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:-apple-system,system-ui,sans-serif;
background:linear-gradient(60deg,#0b3d91,#0077b6,#00b4d8);
min-height:100vh;
}

.glass{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
border-radius:18px;
padding:20px;
max-width:1000px;
margin:20px auto;
}

h2{color:white}

select,input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:5px;
}

label{
font-size:11px;
font-weight:700;
color:#fff;
margin-top:10px;
display:block;
}

/* HEADER */
.glass-header {
width: 100%; height: 60px;
background: radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
display:flex;
align-items:center;
justify-content:center;
}

.form-tabs {
display:flex;
gap:8px;
}

.form-tabs button {
padding:8px 16px;
border-radius:15px;
background:rgba(255,255,255,.2);
color:white;
border:none;
font-size:12px;
cursor:pointer;
}

.form-tabs button.active{
background:white;
color:#0b3d91;
}

.card{
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:12px;
margin-top:10px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.primary{background:#007AFF;color:white}
.green{background:#34C759;color:white}

.checklist label{
display:flex;
gap:10px;
align-items:center;
font-size:12px;
color:white;
margin:6px 0;
}
    </style>

    <link rel="stylesheet" href="style.css">

    <script src="auth.js"></script>
    <script src="session.js"></script>
    <script src="sidebar.js" defer>

    </script>
</head>

<body>

    <app-sidebar></app-sidebar>

<div class="glass-header">
<div class="form-tabs">
<button class="active" onclick="showTab(event,'cpc')">CPC</button>
<button onclick="showTab(event,'cmgd')">CMGD</button>
<button onclick="showTab(event,'sfa')">SFA</button>
</div>
</div>

<div class="glass">

<h2><i class="fa fa-file-contract"></i> Closing Contract</h2>

<label>Unit</label>
<select id="unit" onchange="loadContracts()"></select>

<label>Contract</label>
<select id="contract" onchange="loadData()"></select>

<!-- CPC -->
<div id="cpcTab">

<div class="card">
<b style="color:white">Contract Status</b>
<div id="contractEnd" style="color:#fff"></div>
</div>

<div class="card checklist">
<b style="color:white">CPC Checklist</b>

<label><input type="checkbox" id="c1"> Tracking Form</label>
<label><input type="checkbox" id="c2"> CPC Form</label>
<label><input type="checkbox" id="c3"> LPK</label>

</div>

<button id="btnCPC" class="btn primary" onclick="saveCPC()">Submit CPC</button>
</div>

<!-- CMGD -->
<div id="cmgdTab" style="display:none">

<div class="card">
<b style="color:white">CMGD Status</b>
<div id="cmgdStatus"></div>
</div>

<label>CMGD Date</label>
<input type="date" id="cmgd">

<label>Defect Status</label>
<select id="defect">
<option>Completed</option>
<option>Pending</option>
</select>

<label>Remarks</label>
<textarea id="cmgdRemark"></textarea>

<button id="btnCMGD" class="btn primary" onclick="saveCMGD()">Submit CMGD</button>
</div>

<!-- SFA -->
<div id="sfaTab" style="display:none">

<div class="card">
<b style="color:white">SFA Status</b>
<div id="sfaStatus"></div>
</div>

<label>SFA Date</label>
<input type="date" id="sfa">

<label>Final Account</label>
<input type="number" id="final">

<label>Retention</label>
<input type="number" id="retention">

<label>PG Release</label>
<input type="number" id="pg">

<label>Remarks</label>
<textarea id="sfaRemark"></textarea>

<button id="btnSFA" class="btn green" onclick="saveSFA()">CLOSE CONTRACT</button>
</div>

</div>

<script>
const SB_URL="https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers={
apikey:SB_KEY,
Authorization:"Bearer "+SB_KEY,
"Content-Type":"application/json"
};

let contract=null;

/* TAB */
function showTab(event,t){

document.querySelectorAll(".form-tabs button")
.forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

document.getElementById("cpcTab").style.display =
t==="cpc"?"block":"none";

document.getElementById("cmgdTab").style.display =
t==="cmgd"?"block":"none";

document.getElementById("sfaTab").style.display =
t==="sfa"?"block":"none";
}

/* LOAD CONTRACT */
async function loadContracts(){
const unit=document.getElementById("unit").value;

const res=await fetch(`${SB_URL}/rest/v1/contract?unit_id=eq.${unit}`,{headers});
const data=await res.json();

let sel=document.getElementById("contract");
sel.innerHTML="<option value=''>Select</option>";

data.forEach(c=>{
let opt=document.createElement("option");
opt.value=c.id;
opt.text=c.contract_code;
sel.appendChild(opt);
});
}

/* LOAD DATA + ELIGIBILITY */
async function loadData(){

const id=document.getElementById("contract").value;
if(!id)return;

const res=await fetch(`${SB_URL}/rest/v1/contract?id=eq.${id}`,{headers});
contract=(await res.json())[0];

const today=new Date();
const contractEnd=new Date(contract.contract_end);

let cmgdDate=new Date(contract.contract_end);
cmgdDate.setMonth(cmgdDate.getMonth()+6);

let sfaDate=new Date(contract.contract_end);
sfaDate.setMonth(sfaDate.getMonth()+12);

/* CPC */
document.getElementById("contractEnd").innerHTML =
contractEnd<=today
? "✅ Eligible for CPC"
: "⏳ Contract ends: "+contract.contract_end;

/* CMGD */
document.getElementById("cmgdStatus").innerHTML =
cmgdDate<=today
? "✅ Eligible for CMGD"
: "⏳ Available after: "+cmgdDate.toLocaleDateString("en-GB");

/* SFA */
document.getElementById("sfaStatus").innerHTML =
sfaDate<=today
? "✅ Eligible for SFA"
: "⏳ Available after: "+sfaDate.toLocaleDateString("en-GB");

/* BUTTON CONTROL */
document.getElementById("btnCPC").style.display =
contractEnd<=today?"block":"none";

document.getElementById("btnCMGD").style.display =
cmgdDate<=today?"block":"none";

document.getElementById("btnSFA").style.display =
sfaDate<=today?"block":"none";
}

/* SAVE CPC */
async function saveCPC(){

if(!c1.checked || !c2.checked || !c3.checked){
alert("Sila lengkapkan CPC checklist");
return;
}

await fetch(`${SB_URL}/rest/v1/contract_closing`,{
method:"POST",
headers,
body:JSON.stringify({
contract_id:contract.id,
cpc_status:"COMPLETED"
})
});

alert("CPC saved");
}

/* SAVE CMGD */
async function saveCMGD(){
await fetch(`${SB_URL}/rest/v1/contract_closing`,{
method:"PATCH",
headers,
body:JSON.stringify({
cmgd_date:cmgd.value,
defect_status:defect.value,
cmgd_remarks:cmgdRemark.value
})
});

alert("CMGD saved");
}

/* SAVE SFA */
async function saveSFA(){
await fetch(`${SB_URL}/rest/v1/contract_closing`,{
method:"PATCH",
headers,
body:JSON.stringify({
sfa_date:sfa.value,
final_account:final.value,
retention_release:retention.value,
pg_release:pg.value,
sfa_remarks:sfaRemark.value,
status:"CLOSED"
})
});

alert("Contract Closed");
}

/* INIT */
async function loadUnits(){
const res=await fetch(`${SB_URL}/rest/v1/units`,{headers});
const data=await res.json();

let u=document.getElementById("unit");
u.innerHTML="";

data.forEach(x=>{
u.innerHTML+=`<option value="${x.id}">${x.unit_name}</option>`;
});

if(data.length){
u.value=data[0].id;
loadContracts();
}
}

loadUnits();
</script>

</body>
</html>
