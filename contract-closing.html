<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Closing</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:-apple-system,system-ui,sans-serif;
    background:linear-gradient(60deg,#0b3d91,#0077b6,#00b4d8);
    min-height:100vh;
    padding:20px;
}

.glass{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:18px;
    max-width:900px;
    margin:auto;
    border:1px solid rgba(255,255,255,0.25);
}

label{
    font-size:11px;
    font-weight:700;
    color:#444;
    margin-top:10px;
    display:block;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.35);
    outline:none;
    margin-top:5px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{
    background:rgba(255,255,255,0.25);
    padding:12px;
    border-radius:14px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

.primary{background:#007AFF;color:white;}
.green{background:#34C759;color:white;}

.timeline div{
    padding:6px 0;
    font-size:12px;
}

.badge{
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="glass">

<h2><i class="fa fa-circle-check"></i> Contract Closing</h2>

<!-- CONTRACT SELECT -->
<label>Unit</label>
<select id="unit" onchange="loadContracts()"></select>

<label>Contract</label>
<select id="contract" onchange="loadClosing()"></select>

<!-- SUMMARY -->
<div class="grid" style="margin-top:15px;">

<div class="card">
<div>Contract Value</div>
<strong id="cv">RM 0.00</strong>
</div>

<div class="card">
<div>Total VO</div>
<strong id="vo">RM 0.00</strong>
</div>

<div class="card">
<div>Total Interim</div>
<strong id="ti">RM 0.00</strong>
</div>

<div class="card">
<div>Balance</div>
<strong id="bal">RM 0.00</strong>
</div>

</div>

<!-- CPC / CMGD -->
<div class="grid" style="margin-top:15px;">

<div>
<label>CPC Date</label>
<input type="date" id="cpc" onchange="calcDLP()">
</div>

<div>
<label>CMGD Date</label>
<input type="date" id="cmgd" onchange="calcDLP()">
</div>

</div>

<div class="card" style="margin-top:10px;">
<b>DLP Days:</b> <span id="dlp">0</span>
</div>

<!-- FINAL -->
<label>Final Account</label>
<input type="number" id="final">

<label>Retention Released</label>
<input type="number" id="retention">

<label>PG Released</label>
<input type="number" id="pg">

<label>Remarks</label>
<textarea id="remarks"></textarea>

<!-- TIMELINE -->
<div class="card timeline" style="margin-top:15px;">
<div>✔ Contract Registered</div>
<div>✔ Work Orders</div>
<div>✔ Interim</div>
<div>✔ VO</div>
<div id="t_cpc">○ CPC</div>
<div id="t_cmgd">○ CMGD</div>
<div id="t_close">○ CLOSED</div>
</div>

<!-- ACTION -->
<button class="btn green" onclick="saveClosing()">Save Closing</button>

</div>

<script>
const SB = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const KEY = "YOUR_ANON_KEY";

const headers = {
"apikey": KEY,
"Authorization": "Bearer "+KEY,
"Content-Type":"application/json"
};

let currentId = null;
let contractData = null;

async function loadUnits(){
const res = await fetch(SB+"/rest/v1/units?select=*",{headers});
const data = await res.json();

document.getElementById('unit').innerHTML =
'<option value="">Choose</option>';

data.forEach(u=>{
document.getElementById('unit').innerHTML +=
`<option value="${u.id}">${u.unit_name}</option>`;
});
}

async function loadContracts(){
const unit = document.getElementById('unit').value;

const res = await fetch(
SB+"/rest/v1/contract?unit_id=eq."+unit+"&select=*",
{headers}
);

const data = await res.json();

const sel = document.getElementById('contract');
sel.innerHTML = '<option value="">Choose</option>';

data.forEach(c=>{
const opt = document.createElement('option');
opt.value = c.id;
opt.text = c.contract_code;
opt.dataset.data = JSON.stringify(c);
sel.appendChild(opt);
});
}

async function loadClosing(){

const id = document.getElementById('contract').value;

if(!id) return;

const cRes = await fetch(
SB+"/rest/v1/contract?id=eq."+id,
{headers}
);

const cData = await cRes.json();
contractData = cData[0];

// CONTRACT VALUE
document.getElementById('cv').innerText =
"RM "+(contractData.contract_sum||0).toLocaleString();

// VO
document.getElementById('vo').innerText =
"RM "+(contractData.total_vo_amount||0).toLocaleString();

// INTERIM SUM (simple fallback)
document.getElementById('ti').innerText =
"RM 0.00";

document.getElementById('bal').innerText =
"RM "+(
(contractData.contract_sum||0)
+(contractData.total_vo_amount||0)
).toLocaleString();

// CHECK EXISTING CLOSING
const res = await fetch(
SB+"/rest/v1/contract_closing?contract_id=eq."+id,
{headers}
);

const data = await res.json();

if(data.length>0){
const d = data[0];
currentId = d.id;

document.getElementById('cpc').value = d.cpc_date||"";
document.getElementById('cmgd').value = d.cmgd_date||"";
document.getElementById('final').value = d.final_account||0;
document.getElementById('retention').value = d.retention_released||0;
document.getElementById('pg').value = d.pg_released||0;
document.getElementById('remarks').value = d.remarks||"";

calcDLP();
}
}

function calcDLP(){
const cpc = new Date(document.getElementById('cpc').value);
const cmgd = new Date(document.getElementById('cmgd').value);

if(!cpc || !cmgd || isNaN(cpc) || isNaN(cmgd)) return;

const diff = Math.ceil((cmgd-cpc)/(1000*60*60*24));

document.getElementById('dlp').innerText = diff;

// timeline
document.getElementById('t_cpc').innerText = "✔ CPC";
document.getElementById('t_cmgd').innerText = "✔ CMGD";
document.getElementById('t_close').innerText = "○ CLOSED";
}

async function saveClosing(){

const payload = {
contract_id: document.getElementById('contract').value,
cpc_date: document.getElementById('cpc').value,
cmgd_date: document.getElementById('cmgd').value,
dlp_days: parseInt(document.getElementById('dlp').innerText||0),
contract_value: contractData?.contract_sum||0,
total_vo: contractData?.total_vo_amount||0,
revised_contract_value:
(contractData?.contract_sum||0)+(contractData?.total_vo_amount||0),
final_account: parseFloat(document.getElementById('final').value||0),
retention_released: parseFloat(document.getElementById('retention').value||0),
pg_released: parseFloat(document.getElementById('pg').value||0),
remarks: document.getElementById('remarks').value,
status: "CPC"
};

let url = SB+"/rest/v1/contract_closing";
let method = "POST";

if(currentId){
url += "?id=eq."+currentId;
method = "PATCH";
}

const res = await fetch(url,{
method,
headers,
body: JSON.stringify(payload)
});

if(res.ok){
alert("Closing saved!");
location.reload();
}else{
alert("Error saving closing");
}
}

loadUnits();
</script>

</body>
</html>
