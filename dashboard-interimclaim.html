<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M&E-Connect | Direktori Desktop</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 300px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            background-attachment: fixed; 
            margin: 0; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--ios-blue); transition: 0.2s;
            margin-right: 15px;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 800;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .contract-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .contract-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .contract-item.active { border-color: var(--ios-blue); background: var(--ios-blue); color: white; }
        .contract-item.active small { color: rgba(255,255,255,0.8); }

        .main-panel {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.05);
        }

        .desktop-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
        }
        .desktop-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            border-bottom: 2px solid #eee;
        }
        .desktop-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            vertical-align: middle;
        }
        .desktop-table tr:hover { background: #fcfcfc; }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .btn-action { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; color: white; }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <button class="back-btn" onclick="window.location.href='dashboard-contract.html'">
                <i class="fa fa-chevron-left"></i>
            </button>
            <div style="font-weight: 800; font-size: 18px; margin-left:10px;">DIREKTORI</div>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-title">Senarai Kontrak Aktif</div>
            <div id="contractListContainer">
                <p style="font-size: 12px; color: #888;">Memuatkan data...</p>
            </div>
        </div>
    </div>

    <div class="main-panel no-print">
        <div class="dashboard-header">
            <div>
                <h1 id="viewTitle" style="margin:0; font-size: 24px;">Selamat Datang</h1>
                <p id="viewSubtitle" style="margin:5px 0 0 0; color: #666;">Sila pilih kontrak untuk maklumat terperinci.</p>
            </div>
        </div>

        <div class="glass-card" id="tableWrapper" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;"><i class="fa-solid fa-list-check" style="margin-right: 10px; color: var(--ios-blue);"></i> Senarai Work Order & Tuntutan</h3>
                <input type="text" id="tableSearch" placeholder="Cari ID Kerja atau Lokasi..." style="padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 250px;">
            </div>
            
            <table class="desktop-table">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>ID Kerja / Seksyen</th>
                        <th>Keterangan & Lokasi</th>
                        <th>Interim No</th>
                        <th>Amaun Kerja (RM)</th>
                        <th>Amaun Claim (RM)</th>
                        <th>Tindakan</th>
                    </tr>
                </thead>
                <tbody id="workOrderTbody"></tbody>
            </table>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let allWorks = [];

    window.onload = loadContracts;

    async function loadContracts() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/contract?select=*,units(unit_name)&order=district.asc`, { headers });
            const data = await res.json();
            const container = document.getElementById('contractListContainer');
            container.innerHTML = data.map(c => `
                <div class="contract-item" id="c_card_${c.id}" onclick="selectContract(${c.id}, '${c.contract_code}', '${c.contract_name.replace(/'/g, "\\'")}')">
                    <div style="font-size: 9px; background: var(--ios-orange); color: white; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px;">
                        ${c.units?.unit_name || 'UNIT'}
                    </div>
                    <div style="font-weight: bold; font-size: 14px;">${c.contract_code}</div>
                    <small style="color: #666;"><i class="fa-solid fa-location-dot"></i> ${c.district}</small>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function selectContract(id, code, name) {
        document.querySelectorAll('.contract-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`c_card_${id}`).classList.add('active');
        document.getElementById('viewTitle').innerText = code;
        document.getElementById('viewSubtitle').innerText = name;
        document.getElementById('tableWrapper').style.display = 'block';
        const tbody = document.getElementById('workOrderTbody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px;">Memuatkan rekod...</td></tr>';

        const res = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${id}&order=section.asc,sequence_no.asc`, { headers });
        allWorks = await res.json();
        renderTable(allWorks);
    }

    function renderTable(data) {
        const tbody = document.getElementById('workOrderTbody');
        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px;">Tiada rekod ditemui.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(w => {
            const isClaimed = w.status === 'Claimed';
            const claimAmt = isClaimed ? (w.amount_spent || 0) : 0;
            return `
            <tr>
                <td><span class="tag" style="background:${isClaimed ? 'var(--ios-green)' : 'var(--ios-blue)'}">${w.status || 'PENDING'}</span></td>
                <td>
                    <div style="font-weight:bold;">${w.work_id}</div>
                    <div style="font-size:11px; color:var(--ios-blue); font-weight:700;">SEKSYEN ${w.section || '-'}</div>
                </td>
                <td>
                    <div style="font-weight:500;">${w.description}</div>
                    <div style="font-size:11px; color:var(--ios-orange);"><i class="fa-solid fa-map-pin"></i> ${w.location || 'N/A'}</div>
                </td>
                <td><div style="font-weight:bold; color: #444;">${w.interim_no ? 'INT-' + w.interim_no : '-'}</div></td>
                <td style="color:#666;">RM ${(w.amount_spent || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                <td style="font-weight:bold; color:${isClaimed ? 'var(--ios-green)' : '#ccc'};">RM ${claimAmt.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                <td>
                    <button class="btn-action" style="background: var(--ios-orange); padding: 5px 12px; font-size: 11px;" onclick="openBlueform(${w.id})">
                        <i class="fa-solid fa-print"></i> Blueform
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    // Fungsi telah diubah untuk redirect ke halaman generate_blueform.html
    async function openBlueform(id) {
        const workOrder = allWorks.find(w => w.id === id);
        if (workOrder) {
            // Menggunakan sequence_no sebagai parameter ID di URL
            window.location.href = `generate_blueform.html?id=${workOrder.sequence_no}`;
        } else {
            alert("Ralat: Data Work Order tidak ditemui.");
        }
    }

    document.getElementById('tableSearch').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const filtered = allWorks.filter(w => 
            w.work_id.toLowerCase().includes(term) || 
            w.description.toLowerCase().includes(term) ||
            w.location.toLowerCase().includes(term) ||
            (w.section && w.section.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });
</script>
</body>
</html>
