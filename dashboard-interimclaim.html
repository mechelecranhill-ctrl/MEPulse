        .contract-item {
    background: white;
    padding: 8px 10px;
    border-radius: 12px;

    cursor: pointer;

    border: 1px solid rgba(0,0,0,0.05);

    flex-direction: column;
    justify-content: center;

.contract-item:hover {

.glass-header{

}

.unit-container{

}

.unit-container::-webkit-scrollbar{

/* =========================================
   CONTRACT FINANCIAL TABLE (MODERN COMPACT)
========================================= */

#interimTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    background:rgba(255,255,255,0.92);

    border-radius:20px;
    overflow:hidden;

    font-size:10px;
    min-width:1200px;

    border:1px solid rgba(0,0,0,0.06);

    box-shadow:
        0 4px 18px rgba(0,0,0,0.05),
        0 10px 30px rgba(0,0,0,0.04);

    backdrop-filter:blur(12px);
}

/* HEADER */

#interimTable thead th{

    position:sticky;
    top:0;
    z-index:20;

    background:
        linear-gradient(
            180deg,
            #ffffff 0%,
            #f3f7fc 100%
        );

    color:#475569;

    font-size:9px;
    font-weight:800;
    letter-spacing:0.7px;
    text-transform:uppercase;

    padding:9px 8px;

    border-bottom:1px solid #d9e2ec;
    border-right:1px solid #edf2f7;

    white-space:nowrap;
    text-align:center;
}

#interimTable thead th:last-child{
    border-right:none;
}

/* BODY */

#interimTable tbody td{

    padding:7px 8px;

    border-bottom:1px solid #f1f5f9;
    border-right:1px solid #f1f5f9;

    background:white;

    transition:0.15s ease;

    line-height:1.2;
}

/* remove last border */

#interimTable tbody td:last-child{
    border-right:none;
}

/* hover */

#interimTable tbody tr:hover td{
    background:#f8fbff;
}

/* item column */

#interimTable tbody td:nth-child(1){
    width:45px;
    text-align:center;
    font-weight:700;
    color:#64748b;
}

/* description */

#interimTable tbody td:nth-child(2){
    font-weight:600;
    color:#334155;
    min-width:220px;
}

/* numbers */

#interimTable tbody td:not(:nth-child(1)):not(:nth-child(2)){
    text-align:right;
    font-variant-numeric: tabular-nums;
}

/* zebra */

#interimTable tbody tr:nth-child(even) td{
    background:#fcfdff;
}

/* total row */

#interimTable tbody tr:last-child td{

    background:
        linear-gradient(
            180deg,
            #f8fbff 0%,
            #edf4ff 100%
        );

    font-weight:800;

    border-top:2px solid #c7d7ea;

    color:#0f172a;
}

/* negative */

#interimTable td[style*="color:red"]{
    background:#fff5f5 !important;
    color:#dc2626 !important;
    font-weight:800;
}

/* smooth rounded corner */

#interimTable thead tr th:first-child{
    border-top-left-radius:20px;
}

#interimTable thead tr th:last-child{
    border-top-right-radius:20px;
}

/* SCROLLBAR */

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar{
    height:8px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-track{
    background:#eef2f7;
    border-radius:20px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

#contractDashboard div[style*="overflow:auto"]::-webkit-scrollbar-thumb:hover{
    background:#94a3b8;
}

    function getInitials(text){

const ignore = ['AND','OF','THE','&','DAN'];

return text
    .toUpperCase()
    .replace(/[^A-Z\s]/g,'')
    .split(/\s+/)
    .filter(word => word.length > 0 && !ignore.includes(word))
    .map(word => word[0])
    .join('.');

}

function formatTarikhBM(dateStr){

'JULAI','OGOS','SEPTEMBER','OKTOBER','NOVEMBER','DISEMBER'
];

const d = new Date(dateStr);
const hari = String(d.getDate()).padStart(2,'0');

const tahun = d.getFullYear();

}

    // ============================
    // BLUEFORM: EXTRACT DATA (boleh dipakai single & bulk)
    // ============================
    async function buildBlueformData(id) {

        const res = await fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}&select=*,contract(*,units(unit_name))`, { headers });
        const result = await res.json();
        const data = result[0];

        const c = data.contract;
        const b = c.contract_sections_breakdown || {};
        const s = data.section_category ?? {};

        let totalSection = 0;
        Object.values(s).forEach(sec => { totalSection += Number(sec?.amt || 0); });
        let provisionalExtra = Number(data.additional || 0);
        let totalWorkValue = totalSection + provisionalExtra;

        // fetch interim & semua WO serentak
        const [interimRes, woRes, areaRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${c.id}&order=date_received.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${c.id}`, { headers }),
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${c.id}&select=area_code`, { headers })
        ]);

        const allInterims = await interimRes.json();
        let allWO = await woRes.json();
        const areaRows = await areaRes.json();

        const localAreaPriority = {};
        (areaRows[0]?.area_code || '')
            .split(',')
            .map(a => a.trim().toUpperCase())
            .filter(a => a.length > 0)
            .forEach((a, i) => { localAreaPriority[a] = i + 1; });

        let cutoffDate = new Date(data.qpb_date);
        if(data.status === "Claimed"){
            for(const int of allInterims){
                const cat = int.claim_breakdown || {};
                const found = Object.values(cat).some(sec => Number(sec?.work_order_id) === Number(data.id));
                if(found){ cutoffDate = new Date(int.date_received); break; }
            }
        }

        allWO.sort((a,b)=>{
            const d1 = new Date(a.qpb_date);
            const d2 = new Date(b.qpb_date);
            if(d1 < d2) return -1;
            if(d1 > d2) return 1;
            const aRank = localAreaPriority[(a.area_code || '').toUpperCase()] ?? 999;
            const bRank = localAreaPriority[(b.area_code || '').toUpperCase()] ?? 999;
            if(aRank < bRank) return -1;
            if(aRank > bRank) return 1;
            const aSeq = parseInt((a.sequence_no || '').match(/\d+/)?.[0] || 0);
            const bSeq = parseInt((b.sequence_no || '').match(/\d+/)?.[0] || 0);
            return aSeq - bSeq;
        });

        let sectionUsed = {};
        let totalSalvage = 0;
        let totalPG = 0;
        let timeline = [];

        allInterims.forEach(int => {
            const intDate = new Date(int.date_received);
            if(intDate > cutoffDate) return;
            const salvage = Number(int.salvage_value || 0);
            const pg = Number(int.performance_guarantee_sum || 0);
            totalSalvage += salvage;
            totalPG += pg;
            const cat = int.claim_breakdown || {};
            let amt = 0;
            Object.values(cat).forEach(s=>{ amt += Number(s?.amt || s?.amount || s?.value || 0); });
            timeline.push({ type:'INTERIM', date:int.date_received, amount:amt, salvage:salvage, pg:pg });
            Object.keys(cat).forEach(sec => {
                const val = Number(cat[sec]?.amt || cat[sec]?.amount || cat[sec]?.value || 0);
                if(!sectionUsed[sec]) sectionUsed[sec] = 0;
                sectionUsed[sec] += val;
            });
        });

        allWO.filter(w => {
            if(w.status === "Claimed") return false;
            if(Number(w.id) === Number(data.id)) return false;
            if(!w.qpb_date) return false;
            const woDate = new Date(w.qpb_date);
            if(woDate < cutoffDate) return true;
            if(woDate > cutoffDate) return false;
            const wArea = (w.area_code || '').toUpperCase();
            const curArea = (data.area_code || '').toUpperCase();
            const wRank = localAreaPriority[wArea] || 99;
            const curRank = localAreaPriority[curArea] || 99;
            if(wRank < curRank) return true;
            if(wRank > curRank) return false;
            const wSeq = parseInt((w.sequence_no || '').match(/\d+/)?.[0] || 0);
            const curSeq = parseInt((data.sequence_no || '').match(/\d+/)?.[0] || 0);
            return wSeq <= curSeq;
        }).forEach(wo => {
            timeline.push({
                type:'WORKORDER',
                date:wo.qpb_date,
                seq:parseInt((wo.sequence_no || '').match(/\d+/)?.[0] || 0),
                amount:Number(wo.amount_spent || 0),
                salvage:0
            });
            const cat = wo.section_category || {};
            Object.keys(cat).forEach(sec => {
                const amt = Number(cat[sec]?.amt || 0);
                if(!sectionUsed[sec]) sectionUsed[sec] = 0;
                sectionUsed[sec] += amt;
            });
            const add = Number(wo.additional || 0);
            if(add > 0){
                if(!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
                sectionUsed["PROVISIONAL SUM"] += add;
            }
        });

        const currentSections = data.section_category || {};
        Object.keys(currentSections).forEach(sec => {
            const amt = Number(currentSections[sec]?.amt || 0);
            if(!sectionUsed[sec]) sectionUsed[sec] = 0;
            sectionUsed[sec] += amt;
        });
        const currentAdd = Number(data.additional || 0);
        if(currentAdd > 0){
            if(!sectionUsed["PROVISIONAL SUM"]) sectionUsed["PROVISIONAL SUM"] = 0;
            sectionUsed["PROVISIONAL SUM"] += currentAdd;
        }

        timeline.push({
            type:'WORKORDER',
            date:data.qpb_date,
            seq:parseInt((data.sequence_no || '').match(/\d+/)?.[0] || 0),
            amount: totalWorkValue,
            salvage:0
        });

        timeline.sort((a,b)=>{
            const d1 = new Date(a.date);
            const d2 = new Date(b.date);
            if(d1 < d2) return -1;
            if(d1 > d2) return 1;
            if(a.type !== b.type){ return a.type === 'INTERIM' ? -1 : 1; }
            if(a.type === 'WORKORDER'){ return (a.seq || 0) - (b.seq || 0); }
            return 0;
        });

        let bakiKontrak = Number(c.contract_sum || 0);
        timeline.forEach(t => {
            if(t.type === 'INTERIM'){
                bakiKontrak -= t.amount;
                bakiKontrak += (t.salvage || 0);
                bakiKontrak += (t.pg || 0);
            } else if(t.type === 'WORKORDER'){
                bakiKontrak -= t.amount;
            }
        });

        return { data, c, b, s, totalWorkValue, provisionalExtra, sectionUsed, totalSalvage, totalPG, bakiKontrak };
    }

    function buildBlueformHTML(payload) {
        const { data, c, b, s, totalWorkValue, provisionalExtra, sectionUsed, totalSalvage, totalPG, bakiKontrak } = payload;

        const seq = data.sequence_no || '';
        const refPrefix = c.reference || 'RSAJ/M&E/IP/11-';
        let formattedRef = seq.replace(/([A-Z]{2,4}\d+)$/i, ' - $1');
        const unitName = (c.units?.unit_name || '').toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        const tpl = JSON.parse(localStorage.getItem(`bf_sections_${c.id}`) || '{}');

        let dynamicHtml = '';
        let currentRow = 6;

        Object.keys(b).sort().forEach((key, idx) => {
            const label = b[key]?.desc || tpl[key]?.label || key;
            const active = tpl[key]?.active ?? true;
            if (!active) return;
            const sumValue = b[key]?.amt || 0;
            let workValue = Number(s[key]?.amt || 0);
            dynamicHtml += `
        <div class="grp-dyn-${idx}">
            <hr style="border:0.5px solid #000;margin:8px 0;">
            <div class="bf-row">
    <div class="bf-label"><span class="bf-no">${currentRow++}</span><span>${label.toUpperCase().includes('SUM') ? label : label + ' Sum'}</span></div><div class="bf-colon">:</div><div class="bf-value">RM ${Number(sumValue).toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
            <div class="bf-row">
    <div class="bf-label">
        <span class="bf-no">${currentRow++}</span>
        <span>Anggaran Kerja (${getInitials(label)})</span></div><div class="bf-colon">:</div><div class="bf-value">RM ${workValue.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
        </div>
    `;
        });

        function formatLocation(loc){
            if(!loc) return '';
            let txt = loc.toUpperCase().trim();
            txt = txt.replace(/\bKAMPUNG\b/g,'KG');
            if(txt.includes('BPH') || txt.includes('RESERVOIR')){ return txt; }
            if(!txt.startsWith('LRA')){ txt = 'LRA ' + txt; }
            return txt;
        }

        const locationText = formatLocation(data.location);

        const bakiSectionRows = Object.keys(b).map(sec => {
            let label = (b[sec].desc || '').toUpperCase();
            if(label.includes('GENERAL') || label.includes('PRELIMINARIES')){ label = 'G&P'; }
            else if(label.includes('PREVENTIVE')){ label = 'PREVENTIVE MAINTENANCE'; }
            else if(label.includes('PROACTIVE')){ label = 'PROACTIVE MAINTENANCE'; }
            label = label.replace(/CHARGES/g,'').trim();
            const contractAmt = Number(b[sec]?.amt || 0);
            const usedAmt = Number(sectionUsed[sec] || 0);
            const baki = contractAmt - usedAmt;
            return `
<div class="bf-row" style="font-size:9px;">
<div class="bf-label" style="width:220px;">
<span style="margin-left:25px;">${label}</span>
</div>
<div class="bf-colon">:</div>
<div class="bf-value">
RM ${baki.toLocaleString(undefined,{minimumFractionDigits:2})}
</div>
</div>`;
        }).join('');

        const contentHtml = `
                <div class="bf-row"><div class="bf-label"><span class="bf-no">1</span><span>   No. Rujukan</span></div><div class="bf-colon">:</div><div class="bf-value">${refPrefix}${formattedRef}</div></div>
                <div class="bf-row"><div class="bf-label"><span class="bf-no">2</span><span>   No. Work Order</span></div><div class="bf-colon">:</div><div class="bf-value">${data.work_id}</div></div>
                <div class="bf-row"><div class="bf-label"><span class="bf-no">3</span><span>   No. Kontrak</span></div><div class="bf-colon">:</div><div class="bf-value">${c.contract_code}</div></div>
                <div class="bf-row"><div class="bf-label"><span class="bf-no">4</span><span>   Nama Kontraktor</span></div><div class="bf-colon">:</div><div class="bf-value">${c.contractor}</div></div>
                <div class="bf-row"><div class="bf-label"><span class="bf-no">5</span><span>   Tempoh Kontrak</span></div><div class="bf-colon">:</div><div class="bf-value">${formatTarikhBM(c.contract_start)} ~ ${formatTarikhBM(c.contract_end)}</div></div>
                
                ${dynamicHtml}

<div class="bf-row">
    <div class="bf-label">
        <span class="bf-no">${currentRow++}</span>
        <span>Anggaran Kerja (<i>Tambahan</i>)</span>
    </div>
    <div class="bf-colon">:</div>
    <div class="bf-value">
        RM ${provisionalExtra.toLocaleString(undefined,{minimumFractionDigits:2})}
    </div>
</div>
                <hr style="border: 0.5px solid #000; margin: 8px 0;">
                <div class="bf-row"><div class="bf-label"><span class="bf-no">${currentRow++}</span><span>Jumlah Harga Kontrak</span></div><div class="bf-colon">:</div><div class="bf-value">RM ${Number(c.contract_sum || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
                
                <div style="margin-top: 8px;">
                    <div class="bf-row"><div class="bf-label"><span class="bf-no">${currentRow++}</span><span>BAKI</span></div><div class="bf-colon">:</div><div class="bf-value"></div></div>
                    <div class="bf-baki-table">
                    ${bakiSectionRows}

<div class="bf-row" style="font-size:9px;">
<div class="bf-label" style="width:220px;">
<span style="margin-left:25px;">SALVAGE VALUE</span>
</div>
<div class="bf-colon">:</div>
<div class="bf-value">
RM ${totalSalvage.toLocaleString(undefined,{minimumFractionDigits:2})}
</div>
</div>

<div class="bf-row" style="font-size:9px;">
<div class="bf-label" style="width:220px;">
<span style="margin-left:25px;">PERFORMANCE GUARANTEE</span>
</div>
<div class="bf-colon">:</div>
<div class="bf-value">
RM ${totalPG.toLocaleString(undefined,{minimumFractionDigits:2})}
</div>
</div>

</div></div>
                <div class="bf-row" style="margin-top:8px;"><div class="bf-label"><span class="bf-no">${currentRow++}</span><span>Baki Harga Kontrak</span></div><div class="bf-colon">:</div><div class="bf-value" style="font-weight:bold;">RM ${bakiKontrak.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
                <hr style="border: 0.5px solid #000; margin: 8px 0;">
                <div class="bf-row"><div class="bf-label"><span class="bf-no">${currentRow++}</span><span>Tajuk Kerja</span></div><div class="bf-colon">:</div><div class="bf-value">${data.description.toUpperCase()} DI ${locationText} (RM ${totalWorkValue.toLocaleString(undefined,{minimumFractionDigits:2})})</div></div>
            `;

        return `
        <div class="a4-container" style="
            width: 210mm;
            height: 297mm;
            margin: 0;
            background: white;
            padding: 1.5cm 2cm 1.6cm 2cm;
            position: relative;
            font-size: 11px;
            color: black;
            line-height: 1.3;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
            page-break-after: always;
            page-break-inside: avoid;
            flex-shrink: 0;
        ">
            <img src="RSAJ.png" class="bf-logo" alt="RSAJ Logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/3/3d/Ranhill_SAJ_logo.svg/1200px-Ranhill_SAJ_logo.svg.png'">
            <div id="bf_title" style="text-align:center;font-weight:bold;margin-top:0.7cm;margin-bottom:12px;padding:0 50px;font-size:10px;">
                PERMOHONAN KERJA-KERJA S.O.R / TAMBAHAN DALAM KONTRAK PENYELENGGARAAN
            </div>
            <div id="bf_content" style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;">
                ${contentHtml}
            </div>
            <div class="bf-signature-grid">
                <div>
                    <strong>Dimohon Oleh:</strong>
                    <div style="height:70px;"></div>
                    <div class="bf-sign-line"></div>
                    <small>${unitName ? `Eksekutif ${unitName}` : 'Eksekutif'}</small>
                </div>
                <div>
                    <strong>Disemak Oleh:</strong>
                    <div style="height:70px;"></div>
                    <div class="bf-sign-line"></div>
                    <small>Ketua Seksyen Selenggara</small>
                </div>
                <div>
                    <strong>Disahkan Oleh:</strong>
                    <div style="height:70px;"></div>
                    <div class="bf-sign-line"></div>
                    <small>Ketua Mekanikal & Elektrikal</small>
                </div>
                <div>
                    <strong>Disokong Oleh:</strong>
                    <div style="height:70px;"></div>
                    <div class="bf-sign-line"></div>
                    <small>Ketua Bahagian Operasi & Penyelenggaraan</small>
                </div>
            </div>
            <div class="bf-footer-note">
                * Sebutharga dan Work Order telah disemak sepenuhnya oleh Pihak Daerah
            </div>
        </div>`;
    }

    async function openBlueform(id) {

    function toggleBfGroup(className, isVisible) {
        const elements = document.getElementsByClassName(className);
        for (let el of elements) isVisible ? el.classList.remove('hide-group') : el.classList.add('hide-group');
    }

function formatRM(v){
return Number(v).toLocaleString(undefined,{
minimumFractionDigits:2,
maximumFractionDigits:2
});
}
    function buildInterimMatrix(contract, interims, workorders){

const sections = contract.contract_sections_breakdown || {};
const interimCount = interims.length;
const sectionNames = Object.keys(sections);

/* HEADER */

let head = `<tr>
<th>ITEM</th>
<th>DESCRIPTION</th>
<th>AS PER CONTRACT</th>`;

for(let i=1;i<=interimCount;i++){
head += `<th>INTERIM ${i}</th>`;
}

head += `
<th>TOTAL CLAIM</th>
<th>CONTRACT BALANCE</th>
<th>ON GOING WORKS</th>
<th>ON GOING CONTRACT BALANCE</th>
</tr>`;

document.getElementById("interimHead").innerHTML = head;

let body='';

sectionNames.forEach((sec,index)=>{

const letter=String.fromCharCode(65+index);
const contractAmt=Number(sections[sec]?.amt||0);

let row=`
<tr>
<td>${letter}</td>
<td>${sections[sec]?.desc || sec}</td>
<td style="text-align:right;">${formatRM(contractAmt)}</td>
`;

let totalClaim=0;

/* interim columns */

interims.forEach(int=>{

const cat=int.claim_breakdown || {};

let val = Number(cat[sec]?.amt || 0);

totalClaim+=val;

row+=`<td style="text-align:right;">${val?formatRM(val):'-'}</td>`;

});

/* contract balance */

const contractBalance=contractAmt-totalClaim;

/* pending work order */

let ongoing=0;

workorders
.filter(w=>w.status!=='Claimed')
.forEach(w=>{

const cat=w.section_category||{};
ongoing += Number(cat[sec]?.amt || 0);

/* tambahan hanya jika tiada dalam section_category */
if(sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]){
ongoing += Number(w.additional || 0);
}

});

/* after WO */

const afterWO=contractBalance-ongoing;

row+=`
<td style="text-align:right;">${formatRM(totalClaim)}</td>
<td style="text-align:right;">${formatRM(contractBalance)}</td>
<td style="text-align:right;">${formatRM(ongoing)}</td>
<td style="text-align:right;font-weight:bold;color:${afterWO<0?'red':'black'};">
${formatRM(afterWO)}
</td>
`;

row+=`</tr>`;

body+=row;

});

        /* SALVAGE VALUE ROW */

let salvageRow = `
<tr>
<td></td>
<td>SALVAGE VALUE</td>
<td style="text-align:right;">-</td>
`;

let salvageTotal = 0;

interims.forEach(int=>{

const val = Number(int.salvage_value || 0);
salvageTotal += val;

salvageRow += `<td style="text-align:right;">${val?formatRM(val):'-'}</td>`;

});

salvageRow += `
<td style="text-align:right;">${formatRM(salvageTotal)}</td>
<td colspan="3"></td>
</tr>
`;

body += salvageRow;


/* ==============================
PERFORMANCE GUARANTEE ROW
============================== */

let pgRow = `
<tr>
<td></td>
<td>PERFORMANCE GUARANTEE SUM</td>
<td style="text-align:right;">-</td>
`;

let pgTotal = 0;

interims.forEach(int=>{

const val = Number(int.performance_guarantee_sum || 0);
pgTotal += val;

pgRow += `<td style="text-align:right;">${val?formatRM(val):'-'}</td>`;

});

pgRow += `
<td style="text-align:right;">${formatRM(pgTotal)}</td>
<td colspan="3"></td>
</tr>
`;

body += pgRow;

                /* TOTAL ONGOING CONTRACT BALANCE */

let totalOngoingBalance = 0;

sectionNames.forEach(sec=>{

const contractAmt = Number(sections[sec]?.amt || 0);

let claimed = 0;

interims.forEach(int=>{
claimed += Number(int.claim_breakdown?.[sec]?.amt || 0);
});

let ongoing = 0;

workorders
.filter(w=>w.status!=='Claimed')
.forEach(w=>{

const cat = w.section_category || {};
ongoing += Number(cat[sec]?.amt || 0);

if(sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]){
ongoing += Number(w.additional || 0);
}

});

totalOngoingBalance += contractAmt - claimed - ongoing;

});

/* tambah salvage + pg */

totalOngoingBalance += salvageTotal;
totalOngoingBalance += pgTotal;

/* TOTAL ROW */

let totalRow=`<tr style="font-weight:bold;background:#f5f5f5;">
<td colspan="2">TOTAL</td>`;

let totalContract=0;

sectionNames.forEach(sec=>{
totalContract+=Number(sections[sec]?.amt||0);
});

let totalClaim = 0;

interims.forEach(int=>{
totalClaim += Number(int.net_amount || 0);
});

totalRow+=`<td style="text-align:right;">${formatRM(totalContract)}</td>`;

let interimTotals=new Array(interimCount).fill(0);

interims.forEach((int,i)=>{

interimTotals[i] = Number(int.net_amount || 0);

});

interimTotals.forEach(v=>{
totalRow+=`<td style="text-align:right;">${formatRM(v)}</td>`;
});

/* TOTAL CLAIM */
totalRow += `<td style="text-align:right;">${formatRM(totalClaim)}</td>`;

/* CONTRACT BALANCE kosong */
totalRow += `<td></td>`;

/* ONGOING WORK kosong */
totalRow += `<td></td>`;

/* ONGOING CONTRACT BALANCE */
totalRow += `
<td style="text-align:right;font-weight:bold;">
${formatRM(totalOngoingBalance)}
</td>
</tr>`;

body += totalRow;

document.getElementById("interimBody").innerHTML=body;

}

function printBlueform() {

    const bf = document.getElementById('blueformPage');

    if (!bf.classList.contains('active')) {
        alert("Blueform belum dibuka.");
        return;
    }

    bf.style.display = 'block';
    bf.offsetHeight;

    setTimeout(() => {
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                window.print();
            });
        });
    }, 200);
}

    async function updateStatus(id, status){

    try{

        await fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}`,{
            method:'PATCH',
            headers,
            body: JSON.stringify({
                status: status
            })
        });

        /* update local data */
        const row = allWorks.find(w => Number(w.id) === Number(id));

        if(row){
            row.status = status;
        }

        renderTable(currentTableData, currentView !== "DATE");
        renderMobileCards(currentTableData);

    }catch(e){

        console.error(e);
        alert("Gagal update status");

    }

}
    function toggleAllBF(el){

    document.querySelectorAll('.bf-checkbox').forEach(cb=>{
        cb.checked = el.checked;
    });

}

    // ============================
    // BULK BLUEFORM — Promise.all, render sekali gus
    // ============================
    async function bulkDownloadBlueform(){

    const checked = [...document.querySelectorAll('.bf-checkbox:checked')];

    if(checked.length === 0){
        alert("Sila pilih Blueform.");
        return;
    }

    const container = document.getElementById('bulkPagesContainer');
    container.innerHTML = '';

    document.getElementById('bulkPreviewCount').innerText =
        `Memuatkan ${checked.length} blueform...`;

    document.getElementById('bulkPreviewPage').style.display = 'block';

    // Fetch semua serentak
    const payloads = await Promise.all(
        checked.map(cb => buildBlueformData(cb.value))
    );

    // Render semua sekali gus
    container.innerHTML = payloads.map(p => buildBlueformHTML(p)).join('');

    document.getElementById('bulkPreviewCount').innerText =
        `${checked.length} Blueform — Sedia untuk Cetak`;
}

function closeBulkPreview(){
    document.getElementById('bulkPreviewPage').style.display = 'none';
    document.getElementById('bulkPagesContainer').innerHTML = '';
}
