<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M&E-Connect | Direktori</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); background-attachment: fixed; margin: 0; padding: 15px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); cursor: pointer; transition: transform 0.2s; }
        .glass-card:active { transform: scale(0.98); }
        .page { display: none; } .page.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link { color: var(--ios-blue); font-weight: 600; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .work-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .unit-tag { font-size: 9px; background: var(--ios-orange); color: white; padding: 2px 8px; border-radius: 8px; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .status-tag { font-size: 9px; padding: 2px 6px; border-radius: 5px; color: white; font-weight: bold; }
        
        #blueformPage { background: white; padding: 0; position: fixed; inset:0; z-index: 1000; overflow-y: auto; }
        .a4-container { width: 18cm; min-height: 25cm; margin: auto; background: white; padding: 1cm; position: relative; color: black; font-size: 10px; line-height: 1.3; border: 1px solid #eee; }
        .logo-saj { position: absolute; right: 1cm; top: 1cm; width: 60px; }
        .bf-title { text-align: center; font-weight: bold; text-decoration: underline; font-size: 11px; margin: 30px 0 20px 0; }
        .bf-row { display: flex; margin-bottom: 4px; align-items: flex-start; }
        .bf-num { width: 20px; font-weight: bold; }
        .bf-label { width: 160px; text-transform: uppercase; font-weight: bold; }
        .bf-colon { width: 10px; }
        .bf-value { flex: 1; border-bottom: 0.5px solid #000; min-height: 14px; }
        .bf-line { border-top: 1.5px solid black; margin: 10px 0; }
        .bf-sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; text-align: center; }
        .bf-sig-line { border-top: 1px dotted black; width: 140px; margin: 0 auto 3px auto; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .a4-container { border: none; } }
    </style>
</head>
<body>

<div class="app-container no-print">
    <div id="kontrakPage" class="page active">
        <h2 style="text-align:center;">Direktori Kontrak</h2>
        <div id="listContainer"></div>
    </div>

    <div id="detailsPage" class="page">
        <span class="nav-link" onclick="showPage('kontrakPage')">← Kembali ke Senarai</span>
        <div id="detailsHeader" class="glass-card" style="background: var(--ios-blue); color: white; margin-bottom: 20px;"></div>
        <div id="workListContainer"></div>
    </div>
</div>

<div id="blueformPage" class="page">
    <div class="no-print" style="padding: 20px; text-align: center;">
        <button onclick="showPage('detailsPage')" style="width: auto; background: #666; border:none; color:white; padding:10px 20px; border-radius:10px;">Tutup</button>
        <button onclick="window.print()" style="width: auto; background: var(--ios-green); border:none; color:white; padding:10px 20px; border-radius:10px;">Cetak PDF</button>
    </div>
    <div class="a4-container" id="bf_area">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3d/Ranhill_SAJ_logo.svg/1200px-Ranhill_SAJ_logo.svg.png" class="logo-saj">
        <div class="bf-title">PERMOHONAN KERJA-KERJA S.O.R / TAMBAHAN DALAM KONTRAK PENYELENGGARAAN</div>
        <div id="bf_content"></div>
        <div class="bf-sig-grid">
            <div><div class="bf-sig-line"></div><strong>Eksekutif Instrumentasi</strong></div>
            <div><div class="bf-sig-line"></div><strong>Ketua Seksyen Selenggara</strong></div>
            <div style="margin-top:30px;"><div class="bf-sig-line"></div><strong>Ketua Mekanikal & Elektrikal</strong></div>
            <div style="margin-top:30px;"><div class="bf-sig-line"></div><strong>Ketua Bahagian Operasi</strong></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    window.onload = loadData;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function loadData() {
        const res = await fetch(`${SB_URL}/rest/v1/contract?select=*,units(unit_name)`, { headers });
        const data = await res.json();
        document.getElementById('listContainer').innerHTML = data.map(c => `
            <div class="glass-card" onclick="openDetails(${c.id}, '${c.contract_code}', '${c.contract_name.replace(/'/g, "\\'")}')">
                <span class="unit-tag">${c.units?.unit_name || 'N/A'}</span><br>
                <strong style="font-size:16px;">${c.contract_code}</strong><br>
                <small><i class="fa-solid fa-location-dot" style="color:var(--ios-red)"></i> ${c.district}</small>
            </div>`).join('');
    }

    async function openDetails(id, code, name) {
        showPage('detailsPage');
        document.getElementById('detailsHeader').innerHTML = `<strong>${code}</strong><div style="font-size:12px; margin-top:5px; opacity:0.9;">${name}</div>`;
        const container = document.getElementById('workListContainer');
        container.innerHTML = '<p style="text-align:center;">Memuatkan ID Kerja...</p>';
        const res = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${id}&order=sequence_no.asc`, { headers });
        const works = await res.json();
        if(works.length === 0) { container.innerHTML = '<div class="glass-card" style="text-align:center;">Tiada rekod ID Kerja.</div>'; return; }
        container.innerHTML = works.map(w => `
            <div class="work-card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <span class="status-tag" style="background:${w.status === 'Claimed' ? 'var(--ios-green)' : 'var(--ios-blue)'}">${w.status || 'Pending'}</span>
                        ${w.interim_no ? `<small style="margin-left:5px; color:#888;">#Int-${w.interim_no}</small>` : ''}
                        <div style="font-weight:bold; font-size:15px; margin-top:5px;">${w.work_id}</div>
                        <div style="font-size:11px; color:#666;">${w.sequence_no}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:bold; color:var(--ios-blue);">RM ${(w.amount_spent || 0).toLocaleString()}</div>
                        <div style="font-size:10px; color:#999; margin-bottom:5px;">${w.qpb_date}</div>
                        <button onclick="generateBlueform(${w.id})" style="padding: 5px 10px; font-size: 10px; width: auto; background: var(--ios-orange); border:none; color:white; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-print"></i> Cetak</button>
                    </div>
                </div>
                <div style="margin-top:10px; padding-top:10px; border-top:1px solid #eee; font-size:12px; color:#444;">
                    <i class="fa-solid fa-location-arrow" style="color:var(--ios-orange)"></i> <strong>${w.district}</strong> - ${w.location || 'N/A'}<br>
                    <div style="margin-top:5px; font-style:italic;">${w.description || ''}</div>
                </div>
            </div>`).join('');
    }

    async function generateBlueform(id) {
        const res = await fetch(`${SB_URL}/rest/v1/work_orders?id=eq.${id}&select=*,contract(*)`, { headers });
        const data = (await res.json())[0];
        if(!data) return;

        const c = data.contract;
        const b = c.contract_sections_breakdown || {};
        const s = data.section_category || {};

        let content = `
            <div class="bf-row"><div class="bf-num">1</div><div class="bf-label">No. Rujukan</div><div class="bf-colon">:</div><div class="bf-value">${c.contract_code} - ${data.sequence_no}</div></div>
            <div class="bf-row"><div class="bf-num">2</div><div class="bf-label">No. Work Order</div><div class="bf-colon">:</div><div class="bf-value">${data.work_id}</div></div>
            <div class="bf-row"><div class="bf-num">3</div><div class="bf-label">No. Kontrak</div><div class="bf-colon">:</div><div class="bf-value">${c.contract_code}</div></div>
            <div class="bf-row"><div class="bf-num">4</div><div class="bf-label">Nama Kontraktor</div><div class="bf-colon">:</div><div class="bf-value">${c.contractor}</div></div>
            <div class="bf-row"><div class="bf-num">5</div><div class="bf-label">Tempoh Kontrak</div><div class="bf-colon">:</div><div class="bf-value">${c.contract_start} ~ ${c.contract_end}</div></div>
            <div class="bf-line"></div>
        `;

        content += `
            <div class="bf-row"><div class="bf-num">6</div><div class="bf-label">LABOUR CHARGES SUM</div><div class="bf-colon">:</div><div class="bf-value">RM ${(b["SECTION E"]?.amt || 0).toLocaleString()}</div></div>
            <div class="bf-row"><div class="bf-num">7</div><div class="bf-label">ANGGARAN KERJA (L.C)</div><div class="bf-colon">:</div><div class="bf-value">RM ${(s["SECTION E"]?.amt || 0).toLocaleString()}</div></div>
            <div class="bf-line"></div>
            <div class="bf-row"><div class="bf-num">13</div><div class="bf-label">JUMLAH HARGA KONTRAK</div><div class="bf-colon">:</div><div class="bf-value">RM ${(c.contract_sum || 0).toLocaleString()}</div></div>
            <div class="bf-row">
                <div class="bf-num">14</div><div class="bf-label">BAKI :</div><div class="bf-colon"></div>
                <div style="flex:1;">
                    ${Object.keys(b).map(sec => `<div style="display:flex; justify-content:space-between;"><span>${sec}</span><span>RM ${b[sec].amt.toLocaleString()}</span></div>`).join('')}
                </div>
            </div>
            <div class="bf-line"></div>
            <div class="bf-row"><div class="bf-num">16</div><div class="bf-label">TAJUK KERJA</div><div class="bf-colon">:</div><div class="bf-value" style="color:red; font-weight:bold;">${data.description.toUpperCase()} (RM ${data.amount_spent.toLocaleString()})</div></div>
        `;

        document.getElementById('bf_content').innerHTML = content;
        showPage('blueformPage');
    }
</script>
</body>
</html>
