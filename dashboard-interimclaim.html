<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M&E-Connect | Direktori Desktop</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 300px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            background-attachment: fixed; margin: 0; height: 100vh; display: flex; overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 100;
        }

        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; }

        .back-btn {
            background: #e5e5ea; border: none; width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ios-blue);
        }

        .sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; }

        .contract-item {
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .contract-item.active { border-color: var(--ios-blue); background: var(--ios-blue); color: white; }

        .main-panel { flex-grow: 1; padding: 30px; overflow-y: auto; }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px;
            padding: 25px; border: 1px solid var(--glass-border);
        }

        .desktop-table {
            width: 100%; border-collapse: collapse; background: white; border-radius: 15px;
            overflow: hidden; margin-top: 20px;
        }
        .desktop-table th {
            background: #f8f9fa; padding: 12px 15px; text-align: left;
            font-size: 10px; text-transform: uppercase; color: #666; border-bottom: 2px solid #eee;
        }
        .desktop-table td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }

        .tag-sec {
            background: #f0f0f5; color: #555; padding: 3px 8px; border-radius: 5px;
            font-size: 10px; font-weight: 700; border: 1px solid #ddd;
        }

        #blueformPage {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); z-index: 2000; overflow-y: auto; padding: 40px 0;
        }
        #blueformPage.active { display: block; }
        .a4-container { width: 21cm; min-height: 29.7cm; margin: auto; background: white; padding: 1.5cm; font-size: 12px; }
        .btn-action { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <button class="back-btn" onclick="window.location.href='dashboard-contract.html'"><i class="fa fa-chevron-left"></i></button>
            <div style="font-weight: 800; font-size: 18px; margin-left:15px;">DIREKTORI</div>
        </div>
        <div class="sidebar-content">
            <div id="contractListContainer"></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="dashboard-header">
            <h1 id="viewTitle" style="margin:0; font-size: 24px;">Selamat Datang</h1>
            <p id="viewSubtitle" style="color: #666;">Pilih kontrak untuk melihat pecahan seksyen.</p>
        </div>

        <div class="glass-card" id="tableWrapper" style="display: none; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;"><i class="fa-solid fa-layer-group" style="color: var(--ios-blue);"></i> Senarai Kerja Mengikut Seksyen</h3>
                <input type="text" id="tableSearch" placeholder="Cari ID atau Lokasi..." style="padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 250px;">
            </div>
            
            <table class="desktop-table">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>ID Kerja / Seksyen</th>
                        <th>Keterangan & Lokasi</th>
                        <th>Interim</th>
                        <th>Amaun Seksyen (RM)</th>
                        <th>Tindakan</th>
                    </tr>
                </thead>
                <tbody id="workOrderTbody"></tbody>
            </table>
        </div>
    </div>

    <div id="blueformPage">
        <div style="position: fixed; top: 20px; right: 40px; display: flex; gap: 10px;">
            <button class="btn-action" style="background: #666;" onclick="closeBlueform()">Tutup</button>
            <button class="btn-action" style="background: var(--ios-green);" onclick="window.print()">Cetak</button>
        </div>
        <div class="a4-container" id="bf_area">
            <div id="bf_content"></div>
        </div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    let allWorks = [];

    window.onload = loadContracts;

    async function loadContracts() {
        const res = await fetch(`${SB_URL}/rest/v1/contract?select=*,units(unit_name)&order=district.asc`, { headers });
        const data = await res.json();
        document.getElementById('contractListContainer').innerHTML = data.map(c => `
            <div class="contract-item" id="c_card_${c.id}" onclick="selectContract(${c.id}, '${c.contract_code}', '${c.contract_name}')">
                <div style="font-weight: bold;">${c.contract_code}</div>
                <small>${c.district}</small>
            </div>
        `).join('');
    }

    async function selectContract(id, code, name) {
        document.querySelectorAll('.contract-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`c_card_${id}`).classList.add('active');
        document.getElementById('viewTitle').innerText = code;
        document.getElementById('tableWrapper').style.display = 'block';

        const res = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${id}&order=section.asc,sequence_no.asc`, { headers });
        allWorks = await res.json();
        renderTable(allWorks);
    }

    function renderTable(data) {
        const tbody = document.getElementById('workOrderTbody');
        tbody.innerHTML = data.map(w => `
            <tr>
                <td>
                    <span style="font-size:10px; font-weight:bold; color:${w.status === 'Claimed' ? 'var(--ios-green)' : 'var(--ios-blue)'}">
                        ● ${w.status || 'PENDING'}
                    </span>
                </td>
                <td>
                    <div style="font-weight:bold;">${w.work_id}</div>
                    <span class="tag-sec">SEC ${w.section || '-'}</span>
                </td>
                <td>
                    <div style="font-weight:500;">${w.description}</div>
                    <div style="font-size:11px; color:#999;"><i class="fa-solid fa-location-dot"></i> ${w.location || 'N/A'}</div>
                </td>
                <td><div style="font-weight:bold;">${w.interim_no ? 'INT-' + w.interim_no : '-'}</div></td>
                <td style="font-weight:bold; color:var(--ios-blue);">
                    RM ${(w.amount_spent || 0).toLocaleString(undefined, {minimumFractionDigits:2})}
                </td>
                <td>
                    <button class="btn-action" style="background: var(--ios-orange); font-size:11px;" onclick="openBlueform(${w.id})">Blueform</button>
                </td>
            </tr>
        `).join('');
    }

    // Blueform & Search functions remain similar to previous version...
    function closeBlueform() { document.getElementById('blueformPage').classList.remove('active'); }
    async function openBlueform(id) { 
        /* Logic to show section breakdown on Blueform */
        document.getElementById('blueformPage').classList.add('active');
    }
</script>
</body>
</html>
