<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&E-Connect | Direktori Kontrak</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--blue:#007AFF;
--green:#34C759;
--orange:#FF9500;
--red:#FF3B30;
}

/* RESET */
*{box-sizing:border-box;font-family:-apple-system,system-ui;}
body{
margin:0;
background:linear-gradient(135deg,#a1c4fd,#c2e9fb);
height:100vh;
display:flex;
overflow:hidden;
}

/* MAIN */
.main-panel{
flex:1;
padding:25px;
overflow:auto;
}

/* CARD */
.glass-card{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
}

/* HEADER */
.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:10px 18px;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
font-weight:600;
}
.btn.blue{background:var(--blue);}
.btn.green{background:var(--green);}
.btn.orange{background:var(--orange);}
.btn.gray{background:#555;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:12px;
overflow:hidden;
}
th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:13px;
}
th{
background:#f5f5f5;
text-align:left;
font-size:11px;
text-transform:uppercase;
}

/* TAG */
.tag{
padding:4px 10px;
border-radius:20px;
font-size:10px;
font-weight:bold;
}
.tag.claimed{background:#34C75920;color:#34C759;}
.tag.pending{background:#007AFF20;color:#007AFF;}

/* MOBILE CARD */
.mobile-cards{display:none;}
.mobile-card{
background:#fff;
border-radius:15px;
padding:15px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BLUEFORM */
#blueformPage{
position:fixed;
inset:0;
display:none;
background:rgba(0,0,0,0.8);
z-index:999;
}
#blueformPage.active{display:block;}

.a4{
width:210mm;
min-height:297mm;
background:#fff;
margin:auto;
padding:2cm;
}

/* PRINT */
@media print{
body *{visibility:hidden;}
#a4print, #a4print *{visibility:visible;}
#a4print{
position:absolute;
top:0;
left:0;
}
}

/* MOBILE */
@media(max-width:768px){
table{display:none;}
.mobile-cards{display:block;}
body{flex-direction:column;}
}
</style>
</head>

<body>

<div class="main-panel">

<div class="dashboard-header">
<div>
<h2 id="viewTitle"></h2>
<p id="viewSubtitle"></p>
</div>

<button class="btn gray" onclick="alert('Template')">
<i class="fa fa-sliders"></i> Template
</button>
</div>

<div class="glass-card">

<input id="search" placeholder="Cari..." style="padding:10px;border-radius:10px;border:1px solid #ddd;width:250px;">

<table>
<thead>
<tr>
<th>Status</th>
<th>ID</th>
<th>Lokasi</th>
<th>Amaun</th>
<th>Tarikh</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="mobile" class="mobile-cards"></div>

</div>

</div>

<!-- BLUEFORM -->
<div id="blueformPage">
<div id="a4print" class="a4">

<h3 style="text-align:center;">BLUEFORM</h3>
<div id="bf_content"></div>

</div>
</div>

<script>

/* SAMPLE DATA */
let data=[
{id:1,work_id:"WO-01",status:"Pending",location:"Kuala Terengganu",amount:1200,date:"2025-01-01"},
{id:2,work_id:"WO-02",status:"Claimed",location:"Besut",amount:5000,date:"2025-02-10"}
];

/* RENDER TABLE */
function render(){

let html='';
let mobile='';

data.forEach(d=>{

html+=`
<tr>
<td><span class="tag ${d.status==='Claimed'?'claimed':'pending'}">${d.status}</span></td>
<td>${d.work_id}</td>
<td>${d.location}</td>
<td>RM ${d.amount}</td>
<td>${d.date}</td>
<td><button class="btn orange" onclick="openBF(${d.id})">BF</button></td>
</tr>
`;

mobile+=`
<div class="mobile-card">
<b>${d.work_id}</b><br>
${d.location}<br>
RM ${d.amount}<br>
<button class="btn orange" onclick="openBF(${d.id})">Blueform</button>
</div>
`;

});

document.getElementById('tbody').innerHTML=html;
document.getElementById('mobile').innerHTML=mobile;

}

/* BLUEFORM */
function openBF(id){
const item=data.find(d=>d.id===id);
document.getElementById('bf_content').innerHTML=`
<p><b>ID:</b> ${item.work_id}</p>
<p><b>Lokasi:</b> ${item.location}</p>
<p><b>Amaun:</b> RM ${item.amount}</p>
`;
document.getElementById('blueformPage').classList.add('active');
}

/* INIT */
render();

</script>

</body>
</html>
