<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#e0eafc,#cfdef3);

    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    height:60px;
    display:flex;
    align-items:center;
    padding:0 20px;

    color:#111;
    font-weight:800;
    font-size:18px;
}

/* BOARD WRAPPER */
.board{
    flex:1;
    display:flex;
    gap:14px;

    overflow-x:auto;
    overflow-y:hidden;

    padding:15px;

    align-items:flex-start;

    scroll-snap-type:x mandatory;

    box-sizing:border-box;
}

/* COLUMN */
.column{
    min-width:300px;
    max-width:300px;

    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(18px);

    border-radius:18px;
    padding:12px;

    display:flex;
    flex-direction:column;
    gap:10px;

    scroll-snap-align:start;

    border:1px solid rgba(255,255,255,0.3);

    box-shadow:0 10px 30px rgba(0,0,0,0.1);

    box-sizing:border-box;
}

/* TITLE */
.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

/* CARD */
.card{
    background:white;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(0,0,0,0.05);
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
    transition:0.2s;

        color:#111;
}

.card:hover{
    transform:translateY(-3px);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#007AFF,#00c6ff);
    cursor:pointer;
}
</style>
</head>

<body onload="loadBoard()">

<div class="header">
    M&E CONNECT • TRELL0 SYSTEM
</div>

<div id="board" class="board"></div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>

</body>
</html>
