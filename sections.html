<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&E-Connect Trello</title>

<style>
body{
    font-family:system-ui;
    margin:0;
    padding:15px;
    background:linear-gradient(135deg,#a1c4fd,#c2e9fb);
}

.board{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:10px 0;
    align-items:flex-start;
}

.column{
    min-width:280px;
    max-width:280px;
    background:rgba(255,255,255,0.6);
    border-radius:16px;
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex-shrink:0;
}

.card{
    background:#fff;
    padding:10px;
    margin-bottom:8px;
    border-radius:12px;
    border:1px solid #eee;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    background:#007AFF;
    color:#fff;
    font-weight:700;
    box-sizing:border-box;
}
</style>
</head>

<body onload="loadBoard()">

<h2>M&E Trello System</h2>
<div id="board" class="board"></div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

/* SAFE CHECK (IMPORTANT) */
if(!Array.isArray(units)){
    console.error("Units error:", units);
    units = [];
}

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    ${u.unit_name}
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return;

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>

</body>
</html>
