html, body {

width: 100%;
margin: 0;
padding: 0;
overflow: hidden;
background: var(--bg-color);

body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    background:
        radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
        linear-gradient(60deg, var(--gradient-1, #0b3d91) 0%, var(--gradient-2, #0077b6) 40%, var(--gradient-3, #00b4d8) 100%);
    background-attachment: fixed;
    transition: --gradient-1 0.8s ease-in-out, --gradient-2 0.8s ease-in-out, --gradient-3 0.8s ease-in-out;
}

body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.18), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.10), transparent 30%);

@keyframes fogMove{
from{ transform:translateX(-30px) translateY(0); }
to{ transform:translateX(30px) translateY(-20px); }

/* ── FORMAT DATE ── */
function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString("ms-MY", { day: "2-digit", month: "short", year: "numeric" });
}

/* ── KIRA BALANCE TINGGAL — ikut formula usage schedule ── */
function getRemainingBalance(c) {
    const sections = c.contract_sections_breakdown || {};
    const voBreakdown = c.vo_breakdown || {};
    const cache = contractClaimCache[c.id] || { interimUsed: {}, woUsed: {} };

    let totalBudget = 0;
    let totalUsed = 0;

    Object.entries(sections).forEach(([key, val]) => {
        const contractAmt = (typeof val === 'object' ? val.amt : val) || 0;

        // Tambah VO untuk section ini
        let voForSec = 0;
        Object.values(voBreakdown).forEach(vo => {
            voForSec += Number(vo.breakdown?.[key]?.amt || 0);
        });

        totalBudget += contractAmt + voForSec;
        totalUsed += (cache.interimUsed[key] || 0) + (cache.woUsed[key] || 0);
    });

    return totalBudget - totalUsed;
}

    return { base: "#0b3d91", color1: "#0b3d91", color2: "#0077b6", color3: "#00b4d8" };
}

/* ── LOAD DATA ── */
async function loadSections(){
    try {
        const [secRes, interimRes, woRes] = await Promise.all([
            // Explicit include vo_breakdown supaya getRemainingBalance boleh kira VO
            fetch(`${SB_URL}/rest/v1/me_sections?select=*,units(*,contract(id,contract_code,contract_name,contract_start,contract_end,contract_sum,contract_sections_breakdown,vo_breakdown))`, { headers }),
            fetch(`${SB_URL}/rest/v1/interims?select=contract_id,claim_breakdown`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?select=contract_id,interim_no,section_category`, { headers })
        ]);

        const sections = await secRes.json();
        const allInterims = await interimRes.json();
        const allWOs = await woRes.json();

        contractClaimCache = {};

        allInterims.forEach(im => {
            if (!im.contract_id || !im.claim_breakdown) return;
            if (!contractClaimCache[im.contract_id]) contractClaimCache[im.contract_id] = { interimUsed: {}, woUsed: {} };
            Object.entries(im.claim_breakdown).forEach(([s, val]) => {
                const amt = (typeof val === 'object' ? val.amt : val) || 0;
                contractClaimCache[im.contract_id].interimUsed[s] = (contractClaimCache[im.contract_id].interimUsed[s] || 0) + amt;
            });
        });

        // Hanya WO pending (tiada interim_no) dikira sebagai ongoing used
        allWOs.forEach(wo => {
            if (!wo.contract_id || !wo.section_category || wo.interim_no) return;
            if (!contractClaimCache[wo.contract_id]) contractClaimCache[wo.contract_id] = { interimUsed: {}, woUsed: {} };
            Object.entries(wo.section_category).forEach(([s, val]) => {
                const amt = (typeof val === 'object' ? val.amt : val) || 0;
                contractClaimCache[wo.contract_id].woUsed[s] = (contractClaimCache[wo.contract_id].woUsed[s] || 0) + amt;
            });
        });

        items = sections.map(sec => ({
            id: sec.id,
            title: sec.section_name,
            units: sec.units || []
        }));

        stepAngle = 360 / items.length;
        createWheel();

    } catch(err) {
        console.error("Failed to fetch data:", err);
    }
}

/* ── SEMAK FINANCIAL DEFICIT RISK ── */
function isFinancialDeficitRisk(c) {
    if (!c.contract_start || !c.contract_end) return false;
    const hariIni = new Date();
    const start = new Date(c.contract_start);
    const end = new Date(c.contract_end);

    // Skip kontrak yang dah tamat
    if (end < hariIni) return false;

    const totalMonths = Math.max(1,
        (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth())
    );
    let monthsElapsed = (hariIni.getFullYear() - start.getFullYear()) * 12 +
        (hariIni.getMonth() - start.getMonth()) + 1;
    monthsElapsed = Math.min(totalMonths, Math.max(1, monthsElapsed));

    const timeRatio = monthsElapsed / totalMonths;
    const sections = c.contract_sections_breakdown || {};
    const voBreakdown = c.vo_breakdown || {};
    const cache = contractClaimCache[c.id] || { interimUsed: {}, woUsed: {} };

    let totalBudget = 0;
    let totalUsed = 0;

    for (const [key, val] of Object.entries(sections)) {
        const contractAmt = (typeof val === 'object' ? val.amt : val) || 0;

        // Tambah VO untuk section ini
        let voForSec = 0;
        Object.values(voBreakdown).forEach(vo => {
            voForSec += Number(vo.breakdown?.[key]?.amt || 0);
        });

        const budget = contractAmt + voForSec;
        if (budget <= 0) continue;

        const used = (cache.interimUsed[key] || 0) + (cache.woUsed[key] || 0);
        const plannedToDate = (budget / totalMonths) * monthsElapsed;

        // Kondisi 1: Mana-mana section actual > planned to date
        if (used > plannedToDate) return true;

        totalBudget += budget;
        totalUsed += used;
    }

    // Kondisi 2: Masa < 50% tapi bajet dah guna > 70%
    if (timeRatio < 0.5 && totalBudget > 0 && (totalUsed / totalBudget) > 0.7) return true;

    return false;
}

/* ── CREATE WHEEL ── */
function createWheel(){
    wheel.innerHTML = "";
    items.forEach(item => {
        const el = document.createElement("div");
        el.className = "item";
        const src = getHelmSrc(item.title);
        if(src) el.innerHTML = `<img src="${src}" class="section-helm">`;
        else el.innerText = item.title;
        wheel.appendChild(el);
    });

    itemEls = document.querySelectorAll(".item");

    itemEls.forEach((el, i) => {
        el.addEventListener("click", (e) => {
            closeDetail();
            if(!isMobile) {
                let diff = i - index;
                if (diff > items.length / 2) diff -= items.length;
                if (diff < -items.length / 2) diff += items.length;
                baseAngle -= diff * stepAngle;
                index = i;
                update(); render();
                return;
            }
            index = i;
            update(); render();
            dismissFloating();

            const img = el.querySelector(".section-helm");
            document.body.classList.add("hide-wheel");
            if(img){
                const r = img.getBoundingClientRect();
                const fl = document.createElement("img");
                fl.src = img.src;
                fl.className = "floating-helm";
                fl.style.transition = "none";
                fl.style.top = r.top + "px";
                fl.style.left = r.left + "px";
                fl.style.width = r.width + "px";
                fl.style.height = r.height + "px";
                document.body.appendChild(fl);
                currentFloating = fl;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        fl.style.transition = "";
                        const cardH = card.offsetHeight || 220;
                        const cardTop = window.innerHeight - cardH - 20;
                        fl.style.left = (window.innerWidth / 2 - r.width / 2) + "px";
                        fl.style.top = (cardTop - r.height - 12) + "px";
                    });
                });
            }
            setTimeout(() => card.classList.add("show-mobile"), 120);
        });
    });

    positionItems();
    update();
    render();
}

function dismissFloating(){
    if(currentFloating){ currentFloating.remove(); currentFloating = null; }
}

function positionItems(){
    itemEls.forEach((el, i) => {
        const theta = (i / items.length) * Math.PI * 2;
        const x = Math.cos(theta) * radius;
        const y = Math.sin(theta) * radius;
        el.style.left = `calc(50% + ${x}px - 60px)`;
        el.style.top = `calc(50% + ${y}px - 60px)`;
    });
}

/* ── UPDATE DATA CARD ── */
function update(){
    if(itemEls.length === 0) return;

    closeDetail();

    itemEls.forEach(e => e.classList.remove("active"));
    itemEls[index].classList.add("active");

    const item = items[index];
    activeSection = { id: item.id, name: item.title };

    const colors = getSectionColor(item.title);
    document.body.style.setProperty('--bg-color', colors.base);
    document.body.style.setProperty('--gradient-1', colors.color1);
    document.body.style.setProperty('--gradient-2', colors.color2);
    document.body.style.setProperty('--gradient-3', colors.color3);

    title.innerText = item.title;
    cardTitle.innerText = item.title;

    currentLists = { ongoing: [], renewal: [], cpc: [], risk: [] };

    const hariIni = new Date();
    const enamBulanLagi = new Date();
    enamBulanLagi.setMonth(hariIni.getMonth() + 6);

    item.units.forEach(u => {
        (u.contract || []).forEach(c => {
            if (!c.contract_end) return;
            const tarikhTamat = new Date(c.contract_end);

            if (isFinancialDeficitRisk(c)) currentLists.risk.push(c);

            if (tarikhTamat < hariIni) {
                currentLists.cpc.push(c);
            } else if (tarikhTamat <= enamBulanLagi) {
                currentLists.renewal.push(c);
            } else {
                currentLists.ongoing.push(c);
            }
        });
    });

    cardDesc.innerHTML = `
        <div class="status-row" onclick="openDetail('ongoing')">
            <span>Ongoing Contracts</span>
            <span class="status-badge" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);">
                ${currentLists.ongoing.length}
            </span>
        </div>
        <div class="status-row" onclick="openDetail('renewal')">
            <span>Contracts Renewals (Within 6M)</span>
            <span class="status-badge" style="background:rgba(234,179,8,0.15);color:#fde047;border:1px solid rgba(234,179,8,0.3);">
                ${currentLists.renewal.length}
            </span>
        </div>
        <div class="status-row" onclick="openDetail('cpc')">
            <span>Available for Closing</span>
            <span class="status-badge" style="background:rgba(147,51,234,0.15);color:#c084fc;border:1px solid rgba(147,51,234,0.3);">
                ${currentLists.cpc.length}
            </span>
        </div>
        <div class="status-row" onclick="openDetail('risk')">
            <span>Financial Deficit Risk</span>
            <span class="status-badge" style="background:rgba(255,59,48,0.15);color:#ff6b6b;border:1px solid rgba(255,59,48,0.3);">
                ${currentLists.risk.length}
            </span>
        </div>
    `;

    openBtn.innerText = "Open Dashboard";

    if(!isMobile){
        card.classList.remove("show");
        void card.offsetWidth;
        card.classList.add("show");
    }
}

/* ── RENDER ── */
function render(){
    if(itemEls.length === 0) return;
    wheel.style.transform = `translateY(-50%) rotate(${baseAngle}deg)`;
    itemEls.forEach(el => { el.style.transform = `rotate(${-baseAngle}deg) scale(0.9)`; });
    itemEls[index].style.transform = `rotate(${-baseAngle}deg) scale(1.25)`;
}

function next(){ index=(index+1)%items.length; baseAngle-=stepAngle; closeDetail(); update(); render(); }
function prev(){ index=(index-1+items.length)%items.length; baseAngle+=stepAngle; closeDetail(); update(); render(); }

let buffer = 0;
window.addEventListener("wheel", e => {
    if(lock) return;
    lock = true;
    buffer += e.deltaY;
    if(buffer > 80){ next(); buffer=0; }
    if(buffer < -80){ prev(); buffer=0; }
    setTimeout(() => lock=false, 120);
}, { passive:true });

let startX = 0;
const isCardOpen = () => card.classList.contains("show-mobile");

window.addEventListener("touchstart", e => {
    if(isCardOpen()) return;
    startX = e.touches[0].clientX;
}, { passive:true });

window.addEventListener("touchend", e => {
    if(isCardOpen()) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) < 40) return;
    if(diff > 0) next(); else prev();
}, { passive:true });

document.addEventListener("click", e => {
    if(!isMobile) return;
    if(!card.contains(e.target) && !e.target.closest(".item") && e.target.id !== "openBtn"){
        card.classList.remove("show-mobile");
        document.body.classList.remove("hide-wheel");
        dismissFloating();
        closeDetail();
    }
});

window.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeDetail();
    if(e.key === "ArrowLeft" || e.key === "ArrowUp") prev();
    if(e.key === "ArrowRight" || e.key === "ArrowDown") next();
});
</script>
