<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&E-Connect | Senarai Seksyen</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:-apple-system,system-ui,sans-serif;
    background:linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%);
    margin:0;
    padding:20px;
}

.glass-card{
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    max-width:700px;
    margin:auto;
    border:1px solid rgba(255,255,255,0.5);
}

.section-item{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

.section-name{
    font-size:16px;
    font-weight:700;
}

.section-id{
    font-size:12px;
    color:#666;
    margin-top:4px;
}

.btn{
    background:#007AFF;
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:10px;
    margin-bottom:10px;
}
    .section-item{
    background:rgba(255,255,255,0.9);
    padding:15px;
    border-radius:16px;
    margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.6);
    transition:0.2s;
}

.section-item:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.section-name{
    font-size:15px;
    font-weight:800;
    color:#222;
}

.section-id{
    font-size:11px;
    color:#777;
    margin-top:4px;
}

.empty-state{
    text-align:center;
    padding:30px;
    color:#888;
    font-size:13px;
}

</style>
</head>
<body onload="loadSections()">

<div class="glass-card">

    <div style="text-align:center; margin-bottom:20px;">

        <div style="font-size:22px; font-weight:800; color:#333;">
            M&E-CONNECT
        </div>

        <div style="font-size:12px; color:#666;">
            Pengurusan Seksyen Sistem Kontrak
        </div>

    </div>

    <!-- INPUT CARD -->
    <div style="
        background:rgba(255,255,255,0.6);
        padding:15px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,0.5);
        margin-bottom:15px;
    ">

        <label style="font-size:11px; font-weight:700; color:#555;">
            NAMA SEKSYEN BARU
        </label>

        <input type="text"
               id="section_name"
               placeholder="Contoh: SEKSYEN SELENGGARA">

        <button class="btn"
                onclick="addSection()"
                style="width:100%; margin-top:10px; background:#007AFF;">
            + Tambah Seksyen
        </button>

    </div>

    <!-- LIST TITLE -->
    <div style="
        font-size:13px;
        font-weight:700;
        color:#444;
        margin-bottom:10px;
    ">
        SENARAI SEKSYEN
    </div>

    <!-- LIST -->
    <div id="sections_container"></div>

</div>

<script>

const SB_URL =
'https://ywmsvowroxzhrjwrhsru.supabase.co';

const SB_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = {
'apikey': SB_KEY,
'Authorization': `Bearer ${SB_KEY}`,
'Content-Type':'application/json'
};

async function loadSections(){

try{

const res = await fetch(
`${SB_URL}/rest/v1/me_sections?select=*&order=section_name.asc`,
{ headers });

const data = await res.json();

const container =
document.getElementById('sections_container');

container.innerHTML = '';

if(data.length === 0){

container.innerHTML = `
<div class="empty-state">
Tiada seksyen lagi. Sila tambah seksyen baru.
</div>
`;

return;

}

data.forEach(sec=>{

container.innerHTML += `
<div class="section-item">

<div class="section-name">
${sec.section_name}
</div>

<div class="section-id">
ID: ${sec.id}
</div>

</div>
`;

});

}catch(e){
console.error(e);
}

}

async function addSection(){

const name =
document.getElementById('section_name')
.value
.trim()
.toUpperCase();

if(!name){
alert("Isi nama seksyen");
return;
}

const res = await fetch(
`${SB_URL}/rest/v1/me_sections`,
{
method:'POST',
headers,
body: JSON.stringify({
section_name:name
})
});

if(res.ok){

document.getElementById('section_name').value='';

loadSections();

alert("Seksyen berjaya ditambah");

}else{

alert("Gagal tambah seksyen");

}

}

</script>

</body>
</html>
