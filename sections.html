<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mechanical & Electrical Department</title>

<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow-x: hidden;
    font-family: 'Lato', sans-serif;
    background: #fff;
}

/* HEADER EFFECT */
.header {
    position: relative;
    text-align: center;
    background: radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
                linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
    color: white;
    overflow: hidden;
}

.header::before {
    content: "";
    position: absolute;
    inset: -20%;
    background: radial-gradient(circle at 20% 80%, rgba(255,255,255,.18), transparent 25%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,.10), transparent 30%);
    filter: blur(40px);
    animation: fogMove 10s ease-in-out infinite alternate;
}

@keyframes fogMove {
    from { transform: translateX(-30px) translateY(0); }
    to { transform: translateX(30px) translateY(-20px); }
}

.flex {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.inner-header {
    position: relative;
    z-index: 20; 
    height: 65vh;
    width: 100%;
    margin: 0;
    padding: 0;
    flex-direction: column;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
    font-size: 48px;
    margin-top: 20px;
    opacity: 0;
    filter: drop-shadow(0 0 12px rgba(255,255,255,.35));
}

h1.start {
    animation: fadeUp 1s ease forwards;
    animation-delay: 2s;
}

.content {
    position: relative;
    height: 20vh;
    text-align: center;
    background: white;
}

p {
    letter-spacing: 1px;
    font-size: 14px;
    color: #333;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* =========================
   DASHBOARD
========================= */
.dashboard {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transform: translateY(40px);
    transition: opacity .8s ease, transform .8s ease, visibility .8s;
    z-index: 999;
    background: transparent;
    overflow: hidden;
}

.dashboard::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,255,255,.10), transparent 35%),
                linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
    z-index: -2;
}

.dashboard::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    width: 100%; height: 220px;
    background: linear-gradient(to top, rgba(255,255,255,.18), transparent);
    pointer-events: none;
    z-index: -1;
}

.dashboard.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.board {
    flex: 1;
    display: flex;
    gap: 18px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 25px;
    box-sizing: border-box;
    position: relative;
    z-index: 2;
    align-items: flex-start;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
}

.board::-webkit-scrollbar { display: none; }
.board { scrollbar-width: none; }

.column {
    flex: 0 0 300px;
    background: rgba(255, 255, 255, 0.35); /* Lebih cerah untuk efek glassmorphism */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
    animation: cardIn .45s ease both;
    scroll-snap-align: center;
    max-height: 85vh; /* Mengelakkan lajur terkeluar dari skrin */
    overflow-y: auto;  /* Membolehkan skrol dalam lajur jika kad terlalu banyak */
}

.section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 15px;
}

.section-icon {
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.15));
}

.section-head h3 {
    margin: 0;
    color: #0b3d91;
    font-size: 18px;
}

.card {
    background: rgba(255,255,255,.75);
    border-radius: 18px;
    padding: 14px;
    margin-top: 10px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.5);
    transition: .25s;
    color: #222;
}

.card:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,.9);
}

input {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 14px;
    box-sizing: border-box;
    outline: none;
    background: rgba(255,255,255,0.8);
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: .25s;
}

button:hover { transform: scale(1.02); }

@keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-actions { margin-bottom: 15px; }

.dashboard-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #0b3d91, #00b4d8);
    color: white;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: .25s;
}

.dashboard-btn:hover { transform: translateY(-2px); }

.dashboard-top {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 15px;
    position: relative;
    background: transparent;
}

.dashboard-top h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    color: white;
    padding: 0 60px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
}

/* MOBILE RESPONSIVE */
@media(max-width: 768px) {
    .content { height: 30vh; }
    h1 { font-size: 24px; }
    .board { padding: 15px; gap: 14px; }
    .column { flex: 0 0 calc(100vw - 50px); max-height: 80vh; }
}

</style>
</head>

<body>
<app-sidebar></app-sidebar>
<div id="dashboard" class="dashboard">
    <div class="dashboard-top">
        <h3>Mechanical &amp; Electrical Department</h3>
    </div>
    <div id="board" class="board"></div>
</div>

<script>
const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    "apikey": SB_KEY,
    "Authorization": `Bearer ${SB_KEY}`,
    "Content-Type": "application/json"
};

let boardLoaded = false;

const sectionIcons = {
    "SEKSYEN SELENGGARA": "mainhelm.png",
    "SEKSYEN PENGURUSAN ASET & KEWANGAN": "assethelm.png",
    "SEKSYEN PEMATUHAN PERATURAN": "safehelm.png",
    "SEKSYEN PROJEK & PERKHIDMATAN TEKNIKAL": "projecthelm.png"
};

/* AUTOMATIC TRIGGER ON LOAD */
window.addEventListener('DOMContentLoaded', () => {
    openDashboard();
});

/* OPEN DASHBOARD */
async function openDashboard(){
    const dashboard = document.getElementById("dashboard");
    dashboard.classList.add("show");

    if(!boardLoaded){
        await loadBoard();
        boardLoaded = true;
    }
}

/* LOAD BOARD */
async function loadBoard(){
    try {
        const [secRes, unitRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/me_sections?select=*`, { headers }),
            fetch(`${SB_URL}/rest/v1/units?select=*&order=id.asc`, { headers })
        ]);

        if (!secRes.ok || !unitRes.ok) {
            throw new Error("Gagal mengambil data dari Supabase");
        }

        const sections = await secRes.json();
        const allUnits = await unitRes.json();

        const board = document.getElementById("board");
        let html = "";

        for(const sec of sections){
            const units = allUnits.filter(u => u.section_id === sec.id);
            const icon = sectionIcons[sec.section_name?.toUpperCase().trim()] || "default.svg";

            html += `
            <div class="column">
                <div class="section-head">
                    <img src="${icon}" class="section-icon" alt="icon">
                    <h3>${sec.section_name}</h3>
                </div>
                <div class="section-actions">
                    <button class="dashboard-btn" onclick="goContract('${sec.section_name}')">
                        <i class="fa fa-arrow-up-right-from-square"></i> Open Dashboard
                    </button>
                </div>
                
                <div class="units-container">
                    ${units.map(u => `
                        <div class="card">
                            <b>${u.unit_name}</b>
                        </div>
                    `).join('')}
                </div>

                <input id="unit_${sec.id}" placeholder="Tambah unit...">
                <button onclick="addUnit(${sec.id})">+ Add Unit</button>
            </div>
            `;
        }

        board.innerHTML = html;

    } catch(err){
        console.error("Ralat paparan data:", err);
    }
}

/* ADD UNIT */
async function addUnit(sectionId){
    const input = document.getElementById(`unit_${sectionId}`);
    const name = input.value.trim();

    if(!name){
        alert("Isi nama unit terlebih dahulu");
        return;
    }

    try {
        const response = await fetch(`${SB_URL}/rest/v1/units`, {
            method: 'POST',
            headers,
            body: JSON.stringify({
                unit_name: name,
                section_id: sectionId
            })
        });

        if(response.ok) {
            input.value = "";
            await loadBoard(); // Muat semula data selepas berjaya tambah
        } else {
            alert("Gagal menambah unit. Sila semak kebenaran RLS Supabase.");
        }
    } catch (err) {
        console.error("Ralat ketika menambah data:", err);
    }
}

function goContract(sectionName){
    const encoded = encodeURIComponent(sectionName);
    window.location.href = `dashboard-contract.html?section=${encoded}`;
}

</script>
</body>
</html>
