<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&E-Connect | Senarai Seksyen</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:-apple-system,system-ui,sans-serif;
    background:linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%);
    margin:0;
    padding:20px;
}

.glass-card{
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    max-width:1200px;
    width: 100%;
    margin:auto;
    border:1px solid rgba(255,255,255,0.5);
}

.section-item{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

.section-name{
    font-size:16px;
    font-weight:700;
}

.section-id{
    font-size:12px;
    color:#666;
    margin-top:4px;
}

.btn{
    background:#007AFF;
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:10px;
    margin-bottom:10px;
}
    .section-item{
    background:rgba(255,255,255,0.9);
    padding:15px;
    border-radius:16px;
    margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.6);
    transition:0.2s;
}

.section-item:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.section-name{
    font-size:15px;
    font-weight:800;
    color:#222;
}

.section-id{
    font-size:11px;
    color:#777;
    margin-top:4px;
}

.empty-state{
    text-align:center;
    padding:30px;
    color:#888;
    font-size:13px;
}
  
    .board {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding: 10px 0;
        scroll-behavior: smooth;
}

.board-column {
    min-width: 280px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(20px);
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 10px 0;
    width: 100%;
    align-items: flex-start;
    border-radius: 18px;
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.6);
    flex-shrink: 0;
}

.board-title {
    font-size: 15px;
    font-weight: 800;
    color: #222;
}

.board-id {
    font-size: 11px;
    color: #777;
    margin-bottom: 10px;
}

.unit-item {
    background: white;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #eee;
}

.add-unit input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
}

.add-unit button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #34C759;
    color: white;
    font-weight: 700;
    cursor: pointer;
}

    @media (max-width: 768px){

    body{
        padding: 10px;
    }

    .glass-card{
        padding: 12px;
        border-radius: 16px;
    }

    /* board jadi snap scroll macam app */
    .board{
        gap: 10px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 15px;
    }

    .board-column{
        min-width: 78vw;   /* ini key: compact phone view */
        scroll-snap-align: start;
        padding: 12px;
        border-radius: 16px;
    }

    .board-title{
        font-size: 14px;
    }

    .unit-item{
        font-size: 12px;
        padding: 8px;
    }

    .add-unit input{
        padding: 9px;
        font-size: 13px;
    }

    .add-unit button{
        padding: 9px;
        font-size: 13px;
    }

    input{
        font-size: 14px;
    }
}
    
</style>
</head>
<body onload="loadSections()">

<div class="glass-card">

    <div style="text-align:center; margin-bottom:20px;">

        <div style="font-size:22px; font-weight:800; color:#333;">
            M&E-CONNECT
        </div>

        <div style="font-size:12px; color:#666;">
            Pengurusan Seksyen Sistem Kontrak
        </div>

    </div>

    <!-- INPUT CARD -->
    <div style="
        background:rgba(255,255,255,0.6);
        padding:15px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,0.5);
        margin-bottom:15px;
    ">

        <label style="font-size:11px; font-weight:700; color:#555;">
            NAMA SEKSYEN BARU
        </label>

        <input type="text"
               id="section_name"
               placeholder="Contoh: SEKSYEN SELENGGARA">

        <button class="btn"
                onclick="addSection()"
                style="width:100%; margin-top:10px; background:#007AFF;">
            + Tambah Seksyen
        </button>

    </div>

    <!-- LIST TITLE -->
    <div style="
        font-size:13px;
        font-weight:700;
        color:#444;
        margin-bottom:10px;
    ">
        SENARAI SEKSYEN
    </div>

    <!-- LIST -->
    <div id="board" class="board"></div>

</div>

<script>

const SB_URL =
'https://ywmsvowroxzhrjwrhsru.supabase.co';

const SB_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = {
'apikey': SB_KEY,
'Authorization': `Bearer ${SB_KEY}`,
'Content-Type':'application/json'
};

async function loadSections(){

try{

const res = await fetch(
`${SB_URL}/rest/v1/me_sections?select=*&order=section_name.asc`,
{ headers });

const sections = await res.json();

const board = document.getElementById('board');
board.innerHTML = '';

for(const sec of sections){

// ambil units
const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}`,
{ headers });

const units = await ures.json();

board.innerHTML += `
<div class="board-column">

    <div class="board-title">
        ${sec.section_name}
    </div>

    <div class="board-id">
        ID: ${sec.id}
    </div>

    <div>
        ${units.map(u => `
            <div class="unit-item">
                ${u.unit_name}
            </div>
        `).join('')}
    </div>

    <div class="add-unit">

        <input type="text"
               id="unit_${sec.id}"
               placeholder="Tambah unit...">

        <button onclick="addUnit(${sec.id})">
            + Add Unit
        </button>

    </div>

</div>
`;

}

}catch(e){
console.error(e);
}

}
    async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim().toUpperCase();

if(!name){
alert("Isi nama unit");
return;
}

const res = await fetch(
`${SB_URL}/rest/v1/units`,
{
method:'POST',
headers,
body: JSON.stringify({
unit_name: name,
section_id: sectionId
})
});

if(res.ok){
input.value = '';
loadSections();
}else{
alert("Gagal tambah unit");
}

}

</script>

</body>
</html>
