<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#e0eafc,#cfdef3);
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 20px;
    color:#111;
    font-weight:800;
    font-size:18px;
    flex-shrink:0;
}

/* BOARD FIXED PROPER HEIGHT */
.board{
    flex:1;
    display:flex;
    gap:14px;

    overflow-x:auto;
    overflow-y:hidden;

    padding:15px;

    align-items:stretch;

    scroll-snap-type:x mandatory;

    box-sizing:border-box;

    scroll-behavior:smooth;

    min-height:0;

    width:100%; 
    flex-wrap:nowrap; 
}

.column{
    flex:0 0 300px;
    width:300px;

    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(18px);
    border-radius:18px;
    padding:12px;

    display:flex;
    flex-direction:column;
    gap:10px;

    scroll-snap-align:start;

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);

    animation: slideUp 0.4s ease;

    max-height: calc(100vh - 100px);
    overflow-y:auto;
}

/* COLUMN ANIMATION */
@keyframes slideUp{
    from{transform:translateY(20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* TITLE */
.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

/* CARD */
.card{
    background:white;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(0,0,0,0.05);
    box-shadow:0 6px 15px rgba(0,0,0,0.08);

    color:#111;

    transition:all 0.25s ease;

    animation: fadeIn 0.3s ease;
}

/* CARD ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#007AFF,#00c6ff);
    cursor:pointer;

    transition:all 0.2s ease;
    position:relative;
    overflow:hidden;
}

/* BUTTON HOVER */
button:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}

/* BUTTON RIPPLE EFFECT */
button:after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    transition:transform 0.5s ease;
}

button:active:after{
    transform:translate(-50%,-50%) scale(2);
    opacity:0;
}
.board::after{
    content:"";
    flex:0 0 20px;
}

.board::-webkit-scrollbar{
    height:6px;
}
.board::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,0.2);
    border-radius:10px;
}

    .gear-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

/* base gear style */
.gear{
    position:absolute;
    width:220px;
    height:220px;
    fill:rgba(0,0,0,0.06);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
    transform-origin:center;
}

/* interlock positioning */
.g1{
    top:15%;
    left:10%;
    animation: spinCW 12s linear infinite;
}

.g2{
    top:20%;
    left:24%; /* close enough to interlock teeth feel */
    width:280px;
    height:280px;
    animation: spinCCW 12s linear infinite;
    opacity:0.7;
}

/* clockwise */
@keyframes spinCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* counter clockwise */
@keyframes spinCCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

/* hover = machine speeds up */
body:hover .g1{
    animation-duration:4s;
}

body:hover .g2{
    animation-duration:4s;
    opacity:0.9;
}

#splash{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#e0eafc,#cfdef3);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    cursor:pointer;
}

.splash-text{
    position:relative;
    text-align:center;
}

/* kedua-dua text overlap */
.short, .full{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-weight:900;
    color:#111;
    transition:all 0.8s ease;
    white-space:nowrap;
}

/* START STATE */
.short{
    font-size:90px;
    opacity:1;
}

.full{
    font-size:28px;
    opacity:0;
    letter-spacing:2px;
}

/* MORPH STATE */
#splash.zoom-out .short{
    opacity:0;
    transform:translate(-50%,-50%) scale(2);
    filter:blur(10px);
}

#splash.zoom-out .full{
    opacity:1;
    font-size:22px;
    letter-spacing:6px;
    transform:translate(-50%,-50%) scale(1.2);
}
    
</style>
</head>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){
    const splash = document.getElementById("splash");

    splash.classList.add("zoom-out");

    setTimeout(() => {
        splash.style.transition = "opacity 0.5s ease";
        splash.style.opacity = "0";
    }, 900);

    setTimeout(() => {
        splash.style.display = "none";
    }, 1400);
}

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>
