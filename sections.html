<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mechanical & Electrical Department</title>

<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    overflow-x:hidden;
    font-family:'Lato',sans-serif;
    background:#fff;
}

/* HEADER */

.header{
    position:relative;
    text-align:center;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    color:white;

    overflow:hidden;
}

/* WATER GLOW */

.header::before{
    content:"";
    position:absolute;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(255,255,255,.18),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(255,255,255,.10),
        transparent 30%);

    filter:blur(40px);

    animation:fogMove 10s ease-in-out infinite alternate;
}

@keyframes fogMove{

    from{
        transform:translateX(-30px) translateY(0);
    }

    to{
        transform:translateX(30px) translateY(-20px);
    }

}

/* FLEX */

.flex{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* CONTENT ATAS */

.inner-header{
    position:relative;
    z-index:5;
    height:65vh;
    width:100%;
    margin:0;
    padding:0;

    flex-direction:column;
}

/* LETAK LOGIN DI BAWAH LOGO */
.login-box{
    position:absolute;
    top: calc(50% + 90px); /* bawah logo */
    left:50%;
    transform:translateX(-50%) translateY(20px);

    width:320px;
    max-width:90%;

    display:flex;
    flex-direction:column;
    gap:10px;

    opacity:0;
    pointer-events:none;
}

.login-box.show{
    animation: fadeLogin .8s ease forwards;
    pointer-events:auto;
}
.fish{
    position:absolute;

    width:140px;
    height:auto;

    right:-220px;
    top:42%;

    transform:translateY(-50%);

    z-index:30;

    opacity:0;

    filter:
    drop-shadow(0 8px 20px rgba(0,0,0,.25));
}

/* ACTIVE */

.fish.start{
    animation:
    fishSwim 3s ease forwards;
}

@keyframes fishSwim{

    0%{
        right:-220px;
        opacity:0;

        transform:
        translateY(-50%);
    }

    10%{
        opacity:1;
    }

    45%{
        right:50%;

        transform:
        translate(50%,-50%);
    }

    60%{
        right:50%;
        opacity:1;

        transform:
        translate(50%,-50%)
        scale(1.05);
    }

    100%{
        right:120%;
        opacity:0;

        transform:
        translateY(-50%);
    }

}


/* TITLE */

h1{
    font-weight:300;
    letter-spacing:2px;
    font-size:48px;
    margin-top:20px;

    opacity:0;

    filter:
    drop-shadow(0 0 12px rgba(255,255,255,.35));
}

h1.start{
    animation:
    fadeUp 1s ease forwards;

    animation-delay:2s;
}

/* WATER SCENE */

.water-scene{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    pointer-events:none;
    overflow:hidden;
}


/* LOGO */

.logo-wrap{
    position:relative;
    z-index:10;

    padding:30px;
    border-radius:30px;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.2);

    box-shadow:
    0 10px 40px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.3);
}

.logo{
    width:140px;
    height:auto;

    opacity:0;

    clip-path:circle(0% at 50% 50%);

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.35))
    drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

.logo.start{
    animation:
    waterReveal 1.4s cubic-bezier(.2,.8,.2,1) forwards,
    floatLogo 7s ease-in-out infinite 4s;

    animation-delay:2s,4s;
}
@keyframes waterReveal{

    0%{
        opacity:0;
        clip-path:circle(0% at 50% 50%);
        filter:blur(10px);
        transform:scale(.8);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
        clip-path:circle(150% at 50% 50%);
        filter:blur(0px);
        transform:scale(1);
    }
}

@keyframes floatLogo{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* WAVES */

.waves{
    position:relative;
    width:100%;
    height:15vh;
    margin-bottom:-7px;

    min-height:100px;
    max-height:150px;
}

.parallax > use{
    animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes move-forever{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}

/* CONTENT */

.content{
    position:relative;
    height:20vh;
    text-align:center;
    background:white;
}

p{
    letter-spacing:1px;
    font-size:14px;
    color:#333;
}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:768px){

    .waves{
        height:40px;
        min-height:40px;
    }

    .content{
        height:30vh;
    }

    h1{
        font-size:24px;
    }

    .logo{
        width:110px;
    }
.board{
    padding:20px 14px;
    gap:14px;
}

.column{
    flex:0 0 calc(100vw - 40px);
}

}

/* =========================
   DASHBOARD
========================= */

.dashboard{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;

    opacity:0;
    visibility:hidden;

    transform:translateY(40px);

    transition:
    opacity .8s ease,
    transform .8s ease,
    visibility .8s;

    z-index:999;

    background:transparent;

    overflow:hidden;
}
.dashboard::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.10),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    z-index:-2;
}
.dashboard::after{
    content:"";

    position:absolute;
    left:0;
    right:0;
    bottom:0;

    width:100%;
    height:220px;

    background:
    linear-gradient(
        to top,
        rgba(255,255,255,.18),
        transparent
    );

    pointer-events:none;

    z-index:-1;
}

.dashboard.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

/* BOARD */

.board{
    flex:1;

    display:flex;
    gap:18px;

    overflow-x:auto;
    overflow-y:hidden;

    padding:25px;

    box-sizing:border-box;

    position:relative;
    z-index:2;

    align-items:flex-start;

    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch;
}

/* HIDE SCROLLBAR */

.board::-webkit-scrollbar{
    display:none;
}

.board{
    scrollbar-width:none;
}

/* COLUMN */

.column{
    flex:0 0 300px;

    background:
    rgba(255,255,255,.55);

    backdrop-filter:blur(20px);

    border-radius:28px;

    padding:18px;

    border:
    1px solid rgba(255,255,255,.5);

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);

    animation:
    cardIn .45s ease both;

    scroll-snap-align:center;
}

.column h3{
    margin-top:0;
    color:#0b3d91;
}
.section-head{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:15px;
}

.section-icon{
    width:48px;
    height:48px;
    object-fit:contain;

    filter:
    drop-shadow(0 4px 10px rgba(0,0,0,.15));
}

.section-head h3{
    margin:0;
    color:#0b3d91;
    font-size:20px;
}

/* CARD */

.card{
    background:
    rgba(255,255,255,.65);

    border-radius:18px;

    padding:14px;

    margin-top:10px;

    backdrop-filter:blur(12px);

    border:
    1px solid rgba(255,255,255,.5);

    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
}

/* INPUT */

input{
    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:14px;

    box-sizing:border-box;

    outline:none;
}

/* BUTTON */

button{
    width:100%;

    margin-top:10px;

    padding:12px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #0077b6,
        #00b4d8
    );

    color:white;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

button:hover{
    transform:scale(1.02);
}

@keyframes cardIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
.logo-click{
    cursor:pointer;
    position:relative;
    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGO RIPPLE */

.logo-ripple{
    position:absolute;

    width:140px;
    height:140px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,.45);

    opacity:0;

    pointer-events:none;
}

.logo-ripple.start.ripple-a{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:3.2s;
}

.logo-ripple.start.ripple-b{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:4.2s;
}

@keyframes logoRipple{

    0%{
        transform:scale(.8);
        opacity:0;
    }

    15%{
        opacity:.6;
    }

    100%{
        transform:scale(2.2);
        opacity:0;
    }

}
.section-actions{
    margin-bottom:15px;
}

.dashboard-btn{
    width:100%;
    padding:12px;

    border:none;
    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #0b3d91,
        #00b4d8
    );

    color:white;

    font-weight:700;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    cursor:pointer;

    transition:.25s;
}

.dashboard-btn:hover{
    transform:translateY(-2px);
}
.dashboard-top{
    height:60px;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0 15px;

    position:sticky;
    top:0;
    z-index:100;

    box-sizing:border-box;

    position:relative;

    background:transparent;

    box-shadow:none;
}

/* IOS BACK BUTTON */

.back-btn{
    position:absolute;
    left:15px;

    width:36px;
    height:36px;

    border-radius:10px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    color:white;

    border:1px solid rgba(255,255,255,.2);

    transition:.2s;
}

.back-btn:hover{
    transform:scale(1.05);
}

.dashboard-top h3{
    margin:0;

    font-size:18px;
    font-weight:700;

    color:white;

    padding:0 60px;

    text-align:center;
    width:100%;

    box-sizing:border-box;
}

</head>

<body>

<!-- HEADER -->
<div class="header">

    <!-- CONTENT -->
    <div class="inner-header flex">
<img src="fish.svg" class="fish">

        <!-- LOGO -->
        <div class="logo-click" onclick="openDashboard()">

    <div class="logo-ripple ripple-a"></div>
    <div class="logo-ripple ripple-b"></div>

    <img
        src="logo.svg"
        class="logo">

</div>

        <h1>M&E Connect</h1>

<div id="loginBox" class="login-box">

    <input
        id="username"
        type="text"
        placeholder="Username">

    <input
        id="password"
        type="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

</div>

    </div>

    <!-- WAVES -->
    <div>

        <svg class="waves"
             xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink"
             viewBox="0 24 150 28"
             preserveAspectRatio="none"
             shape-rendering="auto">

            <defs>

                <path id="gentle-wave"
                      d="M-160 44c30 0 58-18 88-18s58 18 88 18
                         58-18 88-18 58 18 88 18v44h-352z" />

            </defs>

            <g class="parallax">

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="0"
                     fill="rgba(255,255,255,0.7)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="3"
                     fill="rgba(255,255,255,0.5)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="5"
                     fill="rgba(255,255,255,0.3)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="7"
                     fill="#ffffff" />

            </g>

        </svg>

    </div>

</div>

<!-- CONTENT -->
<div class="content flex">

    <p>M&E | Mechanical & Electrical Department</p>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

    <div class="dashboard-top">

    <div class="back-btn"
         onclick="window.location.href='index.html'">

        <i class="fa fa-chevron-left"></i>

    </div>

    <h3>
        Mechanical &amp; Electrical Department
    </h3>

</div>

    <div id="board" class="board"></div>

</div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";

const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

let boardLoaded = false;

const sectionIcons = {
    "SEKSYEN SELENGGARA": "mainhelm.png",
    "SEKSYEN PENGURUSAN ASET & KEWANGAN": "assethelm.png",
    "SEKSYEN PEMATUHAN PERATURAN": "safehelm.png",
    "SEKSYEN PROJEK & PERKHIDMATAN TEKNIKAL": "projecthelm.png"
};

/* OPEN DASHBOARD */

async function openDashboard(){

    const dashboard =
    document.getElementById("dashboard");

    dashboard.classList.add("show");

    if(!boardLoaded){

        await loadBoard();

        boardLoaded = true;
    }

}

/* LOAD BOARD */

async function loadBoard(){

    try{

        const [secRes, unitRes] = await Promise.all([

            fetch(
                `${SB_URL}/rest/v1/me_sections?select=*`,
                { headers }
            ),

            fetch(
                `${SB_URL}/rest/v1/units?select=*&order=id.asc`,
                { headers }
            )

        ]);

        const sections = await secRes.json();
        const allUnits = await unitRes.json();

        const board =
        document.getElementById("board");

        let html = "";

        for(const sec of sections){

            const units = allUnits.filter(
                u => u.section_id === sec.id
            );

            const icon =
            sectionIcons[
                sec.section_name?.toUpperCase()
            ] || "default.svg";

            html += `

            <div class="column">

                <div class="section-head">

                    <img
                        src="${icon}"
                        class="section-icon">

                    <h3>${sec.section_name}</h3>

                </div>

                <div class="section-actions">

                    <button
                        class="dashboard-btn"
                        onclick="goContract('${sec.section_name}')">

                        <i class="fa fa-arrow-up-right-from-square"></i>
                        Open Dashboard

                    </button>

                </div>

                ${units.map(u => `

                    <div class="card">
                        <b>${u.unit_name}</b>
                    </div>

                `).join('')}

                <input
                    id="unit_${sec.id}"
                    placeholder="Tambah unit...">

                <button onclick="addUnit(${sec.id})">

                    + Add Unit

                </button>

            </div>

            `;
        }

        board.innerHTML = html;

    } catch(err){

        console.error(err);

    }

}

/* ADD UNIT */

async function addUnit(sectionId){

    const input =
    document.getElementById(`unit_${sectionId}`);

    const name =
    input.value.trim();

    if(!name){

        alert("Isi unit dulu");

        return;
    }

    await fetch(

        `${SB_URL}/rest/v1/units`,

        {
            method:'POST',

            headers,

            body: JSON.stringify({

                unit_name:name,
                section_id:sectionId

            })
        }

    );

    input.value = "";

    loadBoard();

}
function goContract(sectionName){

    const encoded =
    encodeURIComponent(sectionName);

    window.location.href =
    `dashboard-contract.html?section=${encoded}`;

}
function goBack(){

    window.location.href = "index.html";

}
function login(){

    const user =
    document.getElementById("username")
    .value.trim();

    const pass =
    document.getElementById("password")
    .value.trim();

    if(
        user === "admin" &&
        pass === "1234"
    ){
localStorage.setItem(
    "me_loggedin",
    "true"
);
        openDashboard();

    }else{

        alert("Login gagal");

    }

}
/* WAIT FISH LOAD */

window.addEventListener("load", () => {
if(localStorage.getItem("me_loggedin")){

    openDashboard();
    return;

}
    const fish =
    document.querySelector(".fish");

    const logo =
    document.querySelector(".logo");

    const title =
    document.querySelector("h1");

    const ripples =
    document.querySelectorAll(".logo-ripple");

    function startAnimation(){

        fish.classList.add("start");

        logo.classList.add("start");

        title.classList.add("start");

        ripples.forEach(r => {
            r.classList.add("start");
        });
setTimeout(()=>{

    document
    .getElementById("loginBox")
    .classList.add("show");

},3200);

    }

    if(fish.complete){

        startAnimation();

    } else {

        fish.onload = startAnimation;

    }

});
</script>
</body>
