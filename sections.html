<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    padding:0;

    font-family:'SF Pro Display', -apple-system, BlinkMacSystemFont, Arial, sans-serif;

    height:100vh;
    width:100vw;

    overflow:hidden;

    color:#1d1d1f;

    position:relative;
    display:flex;
    flex-direction:column;
    background:#071826;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(8px);
    background:
    linear-gradient(
        135deg,
        rgba(180,120,255,0.25),
        rgba(255,180,220,0.18),
        rgba(120,180,255,0.2)
    );
    z-index:-1;
pointer-events:none;
}

/* =========================
   SVG BACKGROUND
========================= */

.svg-background{
    position:fixed;
    inset:0;

    z-index:-5;

    overflow:hidden;
}

.svg-background img{
    width:100%;
    height:100%;
    object-fit:cover;

    opacity:.82;
    mix-blend-mode:screen;

    animation:
    bgFloat 18s ease-in-out infinite alternate,
    bgZoom 30s ease-in-out infinite;

    filter:
    saturate(1.1)
    brightness(.9);
}

/* dark glass overlay */
.bg-overlay{
    position:fixed;
    inset:0;

    z-index:-4;

    backdrop-filter:blur(8px);

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.02)
    );
}

/* moving light */
.bg-overlay::before{
    content:"";
    position:absolute;
    inset:-30%;

    background:
    radial-gradient(circle,
    rgba(120,220,255,.18),
    transparent 30%);

    animation:
    lightMove 12s ease-in-out infinite alternate;

    filter:blur(40px);
}

/* water sparkle */
.bg-overlay::after{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,.7) 1px, transparent 1px);

    background-size:140px 140px;

    opacity:.18;

    animation:
    sparkleMove 25s linear infinite;
}
@keyframes bgFloat{

    0%{
        transform:translateY(0px);
    }

    100%{
        transform:translateY(-12px);
    }
}

@keyframes bgZoom{

    0%{
        transform:scale(1);
    }

    100%{
        transform:scale(1.04);
    }
}

@keyframes lightMove{

    from{
        transform:
        translateX(-120px)
        translateY(0px);
    }

    to{
        transform:
        translateX(120px)
        translateY(-40px);
    }
}

@keyframes sparkleMoveBG{

    from{
        background-position:0 0;
    }

    to{
        background-position:0 400px;
    }
}
/* =========================
   ANIMATED WATER BACKGROUND
========================= */

.water-bg{
    position:fixed;
    inset:0;
    z-index:-3;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
        rgba(80,140,255,.25),
        transparent 40%),

    linear-gradient(
        180deg,
        #03111f 0%,
        #08203d 35%,
        #0a3561 70%,
        #0f4c81 100%
    );
}

/* glowing water fog */
.water-bg::before{
    content:"";
    position:absolute;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(0,180,255,.25),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(120,100,255,.18),
        transparent 30%),

    radial-gradient(circle at 50% 100%,
        rgba(0,220,255,.20),
        transparent 40%);

    filter:blur(60px);

    animation:fogMove 14s ease-in-out infinite alternate;
}

/* flowing light waves */
.water-bg::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        -12deg,
        transparent 0px,
        transparent 18px,
        rgba(255,255,255,.035) 20px,
        transparent 24px
    );

    opacity:.45;

    mix-blend-mode:screen;

    animation:
    waterFlow 12s linear infinite;
}
@keyframes waterFlow{
    from{
        transform:translateX(0) translateY(0);
    }

    to{
        transform:translateX(-180px) translateY(40px);
    }
}

@keyframes fogMove{
    0%{
        transform:translateX(-20px) translateY(0);
    }

    100%{
        transform:translateX(30px) translateY(-20px);
    }
}

/* wave layer */
.wave{
    position:absolute;
    left:-50%;
    width:200%;
    height:320px;

    border-radius:45%;

    filter:
    blur(12px)
    drop-shadow(0 0 25px rgba(80,180,255,.25));

    mix-blend-mode:screen;
}

/* wave 1 */
.wave1{
    bottom:-40px;

    background:
    radial-gradient(
        ellipse at center,
        rgba(120,190,255,.25),
        rgba(255,255,255,.05)
    );

    animation:
    waveMove 18s linear infinite,
    waveFloat 7s ease-in-out infinite;
}

/* wave 2 */
.wave2{
    bottom:-70px;
    opacity:.5;

    background:
    radial-gradient(
        ellipse at center,
        rgba(0,170,255,.22),
        rgba(255,255,255,.03)
    );

    animation:
    waveMoveReverse 24s linear infinite,
    waveFloat 9s ease-in-out infinite;
}

/* wave 3 */
.wave3{
    bottom:-110px;
    opacity:.35;

    background:
    radial-gradient(
        ellipse at center,
        rgba(140,220,255,.18),
        transparent
    );

    animation:
    waveMove 30s linear infinite,
    waveFloat 12s ease-in-out infinite;
}

/* horizontal movement */
@keyframes waveMove{
    from{
        transform:translateX(0) rotate(0deg);
    }

    to{
        transform:translateX(-25%) rotate(360deg);
    }
}

@keyframes waveMoveReverse{
    from{
        transform:translateX(-25%) rotate(0deg);
    }

    to{
        transform:translateX(0%) rotate(-360deg);
    }
}

/* up down motion */
@keyframes waveFloat{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-18px);
    }
}
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:800;
    font-size:24px;
    letter-spacing:1px;
    text-shadow:0 0 10px rgba(255,255,255,0.4);
    flex-shrink:0;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.12);
}

.board{
    flex:1;
    display:flex;
    gap:14px;
    overflow-x:auto;
    overflow-y:hidden;
    padding:15px;
    align-items:stretch;
    scroll-snap-type:x mandatory;
    box-sizing:border-box;
    scroll-behavior:smooth;
    min-height:0;
    width:100%;
    flex-wrap:nowrap;
}

.column{
    flex:0 0 300px;
    width:300px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    scroll-snap-align:start;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.4s ease;
    max-height: calc(100vh - 110px);
    overflow-y:auto;
}

@keyframes slideUp{
    from{transform:translateY(20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

.card{
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(12px);
    padding:14px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    transition:all 0.25s ease;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border-radius:16px;
    border:none;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#7b4dff,#9f6bff);
    box-shadow:0 8px 20px rgba(123,77,255,0.4);
    cursor:pointer;
    transition:all 0.25s ease;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}

button:after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    transition:transform 0.5s ease;
}

button:active:after{
    transform:translate(-50%,-50%) scale(2);
    opacity:0;
}
.board::after{
    content:"";
    flex:0 0 20px;
}

.board::-webkit-scrollbar{ height:6px; }
.board::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,0.2);
    border-radius:10px;
}
.table-container{
    flex-grow:1;

    background:
    rgba(255,255,255,.14);

    backdrop-filter:blur(24px);

    border:1px solid rgba(255,255,255,.18);

    border-radius:24px;

    overflow-y:auto;

    box-shadow:
    0 10px 40px rgba(0,0,0,.25),
    inset 0 1px 0 rgba(255,255,255,.2);
}
thead{
    position:sticky;
    top:0;

    background:
    rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    z-index:10;
}
tr:hover{
    background:
    rgba(255,255,255,.08);
}
.desktop-wrapper{
    display:flex;
    flex-direction:column;

    height:100vh;

    padding:30px;

    position:relative;
    z-index:5;
}
.gear-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

.gear{
    position:absolute;
    width:220px;
    height:220px;
    fill:rgba(0,0,0,0.06);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
    transform-origin:center;
}

.g1{
    top:15%;
    left:10%;
    animation: spinCW 12s linear infinite;
}

.g2{
    top:20%;
    left:24%;
    width:280px;
    height:280px;
    animation: spinCCW 12s linear infinite;
    opacity:0.7;
}

@keyframes spinCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes spinCCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

body:hover .g1{ animation-duration:4s; }
body:hover .g2{ animation-duration:4s; opacity:0.9; }

/* =====================
   SPLASH
===================== */
#splash{
    position:fixed;
    inset:0;
    z-index:99999;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;

    overflow:hidden;
    cursor:pointer;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.95),
        rgba(220,240,255,.92) 30%,
        rgba(180,220,255,.85) 60%,
        rgba(130,190,255,.78) 100%);
}

/* subtle noise texture */
#splash::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 50% 20%,
        rgba(255,255,255,.85),
        transparent 35%),

    radial-gradient(circle at 20% 80%,
        rgba(120,220,255,.35),
        transparent 30%),

    radial-gradient(circle at 80% 75%,
        rgba(255,255,255,.25),
        transparent 28%);

    filter:blur(40px);

    animation:
    splashGlow 8s ease-in-out infinite alternate;
}

#splash::after{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,.7) 1px, transparent 1px);

    background-size:
    120px 120px,
    180px 180px;

    background-position:
    0 0,
    40px 60px;

    opacity:.45;

    animation:
    sparkleMove 18s linear infinite;
}
@keyframes splashGlow{
    from{
        transform:translateY(0px) scale(1);
    }

    to{
        transform:translateY(-10px) scale(1.05);
    }
}

@keyframes sparkleMove{
    from{
        background-position:
        0 0,
        40px 60px;
    }

    to{
        background-position:
        0 200px,
        40px 260px;
    }
}

/* =====================
   SVG LOGO
===================== */

.logo-wrap{
    position:relative;
    z-index:5;

    padding:35px;
    border-radius:35px;

    background:
    rgba(255,255,255,.18);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
    0 10px 40px rgba(0,120,255,.18),
    inset 0 1px 0 rgba(255,255,255,.5);
}

.mer-logo{
    width:360px;
    height:auto;
transform-origin:center;
    filter:
        drop-shadow(0 10px 25px rgba(0,0,0,0.15));

    opacity:0;

    animation:
        logoIntro 1s cubic-bezier(.2,.8,.2,1) forwards,
        floatLogo 4s ease-in-out infinite 1.2s;
}

@keyframes logoIntro{
    0%{
        opacity:0;
        transform:
            scale(.7)
            translateY(30px)
            rotate(-6deg);
    }

    60%{
        opacity:1;
        transform:
            scale(1.05)
            translateY(-4px)
            rotate(1deg);
    }

    100%{
        opacity:1;
        transform:
            scale(1)
            translateY(0)
            rotate(0deg);
    }
}

@keyframes floatLogo{

    0%{
        transform:
        translateY(0px)
        rotate(0deg)
        translateX(0px);
    }

    20%{
        transform:
        translateY(-5px)
        rotate(-1deg)
        translateX(-3px);
    }

    40%{
        transform:
        translateY(-10px)
        rotate(.8deg)
        translateX(2px);
    }

    60%{
        transform:
        translateY(-6px)
        rotate(-.7deg)
        translateX(4px);
    }

    80%{
        transform:
        translateY(-11px)
        rotate(.5deg)
        translateX(-2px);
    }

    100%{
        transform:
        translateY(0px)
        rotate(0deg)
        translateX(0px);
    }
}

/* BLUE */
.blue-part{
    opacity:0;
    animation:
        fromLeft .7s ease .1s forwards;
}

/* BLACK */
.black-part{
    opacity:0;
    transform-origin:center;
    animation:
        popIn .7s ease .45s forwards;
}

/* ORANGE */
.orange-part{
    opacity:0;
    animation:
        fromRight .7s ease .75s forwards;
}

/* GREY */
.grey-part{
    opacity:0;
    animation:
        dropDown .5s ease 1s forwards;
}

/* =====================
   TAGLINE
===================== */
.splash-title{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #555;
    text-transform: uppercase;
    opacity:0;
    animation: fadeUp 0.6s ease 1.1s forwards;
}

.splash-hint{
    font-size:11px;
    color:#aaa;
    letter-spacing:2px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.4s forwards;
}

/* =====================
   KEYFRAMES
===================== */
@keyframes fromLeft{
    from{ opacity:0; transform:translateX(-40px); }
    to{ opacity:1; transform:translateX(0); }
}

@keyframes fromRight{
    from{ opacity:0; transform:translateX(40px); }
    to{ opacity:1; transform:translateX(0); }
}

@keyframes popIn{
    from{ opacity:0; transform:scale(0.8) translateY(10px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
}

@keyframes dropDown{
    from{ opacity:0; transform:translateY(-30px); }
    to{ opacity:1; transform:translateY(0); }
}

@keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

#splash.fade-out{
    opacity:0;
    transition:opacity 0.7s ease;
    pointer-events:none;
}
/* =========================
   WATER REVEAL EFFECT
========================= */

.water-scene{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    overflow:hidden;
}

/* AIR MENITIK */
.water-drop{
    position:absolute;
    top:-180px;

    width:90px;
    height:90px;

    background:
    radial-gradient(circle at 35% 30%,
    rgba(255,255,255,.95),
    rgba(140,210,255,.95) 30%,
    rgba(0,140,255,1) 75%);

    border-radius:
    50% 50% 55% 55% /
    60% 60% 40% 40%;

    transform:
    rotate(45deg)
    scale(.25);

    filter:
    drop-shadow(0 0 30px rgba(80,180,255,.75));

    animation:
    dropFall 1.3s cubic-bezier(.2,.8,.2,1) forwards;

    z-index:5;
    overflow:hidden;
}
.water-drop::before{
    content:"";

    position:absolute;

    width:22px;
    height:22px;

    border-radius:50%;

    background:rgba(255,255,255,.8);

    top:18px;
    left:18px;

    filter:blur(2px);
}
.water-drop::after{
    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.45),
        transparent 45%
    );

    border-radius:inherit;
}
@keyframes dropFall{

    0%{
        top:-180px;
        opacity:0;

        transform:
        rotate(45deg)
        scale(.25);
    }

    10%{
        opacity:1;
    }

    70%{
        top:47%;

        transform:
        rotate(45deg)
        scale(1);
    }

    82%{
        top:50%;

        transform:
        rotate(45deg)
        scale(.7,.35);
    }

    100%{
        top:52%;
        opacity:0;

        transform:
        rotate(45deg)
        scale(0);
    }
}

/* RIPPLE */
.ripple{
    position:absolute;

    width:30px;
    height:30px;

    border:4px solid rgba(120,190,255,0.75);
    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%) scale(0);

    opacity:0;

    z-index:3;
}

.ripple1{
    animation:rippleExpand 1.4s ease-out 1s forwards;
}

.ripple2{
    animation:rippleExpand 1.5s ease-out 1.15s forwards;
}

.ripple3{
    animation:rippleExpand 1.7s ease-out 1.3s forwards;
}

@keyframes rippleExpand{

    0%{
        opacity:.9;
        transform:translate(-50%,-50%) scale(.2);
    }

    100%{
        opacity:0;
        transform:translate(-50%,-50%) scale(14);
    }
}

/* SPLASH WATER PARTICLES */
.splash-water{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:transparent;

    box-shadow:
        -90px -10px 0 3px rgba(120,190,255,0),
        -70px -30px 0 3px rgba(120,190,255,0),
        -40px -45px 0 4px rgba(120,190,255,0),
        40px -45px 0 4px rgba(120,190,255,0),
        70px -30px 0 3px rgba(120,190,255,0),
        90px -10px 0 3px rgba(120,190,255,0);

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:waterSplash 1s ease-out 1s forwards;

    z-index:4;
}

@keyframes waterSplash{

    0%{
        opacity:0;
    }

    20%{
        opacity:1;

        box-shadow:
            -90px -10px 0 3px rgba(120,190,255,.9),
            -70px -30px 0 3px rgba(120,190,255,.9),
            -40px -45px 0 4px rgba(120,190,255,.9),
            40px -45px 0 4px rgba(120,190,255,.9),
            70px -30px 0 3px rgba(120,190,255,.9),
            90px -10px 0 3px rgba(120,190,255,.9);
    }

    100%{
        opacity:0;

        box-shadow:
            -180px -80px 0 0 rgba(120,190,255,0),
            -120px -120px 0 0 rgba(120,190,255,0),
            -60px -160px 0 0 rgba(120,190,255,0),
            60px -160px 0 0 rgba(120,190,255,0),
            120px -120px 0 0 rgba(120,190,255,0),
            180px -80px 0 0 rgba(120,190,255,0);
    }
}

/* LOGO REVEAL */
.logo-wrap{
    position:relative;
    z-index:10;
}

.mer-logo{

    opacity:0;

    clip-path:circle(0% at 50% 50%);

    animation:
    waterReveal 1.8s cubic-bezier(.2,.8,.2,1) forwards,
    floatLogo 7s ease-in-out infinite 2s;

    animation-delay:1s, 2s;
filter:
drop-shadow(0 0 20px rgba(120,190,255,.35))
drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

@keyframes waterReveal{

    0%{
        opacity:0;
        clip-path:circle(0% at 50% 50%);
        filter:blur(10px);
        transform:scale(.8);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
        clip-path:circle(150% at 50% 50%);
        filter:blur(0px);
        transform:scale(1);
    }
}
#splash::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(120,190,255,0.18),
    transparent 55%);

    animation:pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%,100%{ opacity:.4; }
    50%{ opacity:1; }
}

/* MOBILE */
@media(max-width:500px){
    .mer-logo{ transform:scale(0.7); transform-origin:center; }
}

</style>
</head>
<body onload="loadBoard()">

<div class="svg-background">
    <img src="bckgnd.svg" alt="background">
</div>

<div class="bg-overlay"></div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){
    const splash = document.getElementById("splash");
    splash.classList.add("fade-out");
    setTimeout(()=>{ splash.style.display="none"; }, 800);
}

async function loadBoard(){
    const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
    const sections = await secRes.json();
    const board = document.getElementById("board");
    board.innerHTML = "";

    for(const sec of sections){
        const ures = await fetch(
            `${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
            {headers}
        );
        let units = await ures.json();
        if(!Array.isArray(units)) units = [];

        board.innerHTML += `
        <div class="column">
            <h3>${sec.section_name}</h3>
            ${units.map(u => `
            <div class="card">
                <b>${u.unit_name}</b>
            </div>
            `).join('')}
            <input id="unit_${sec.id}" placeholder="Tambah unit...">
            <button onclick="addUnit(${sec.id})">+ Add Unit</button>
        </div>
        `;
    }
}

async function addUnit(sectionId){
    const input = document.getElementById(`unit_${sectionId}`);
    const name = input.value.trim();
    if(!name) return alert("Isi unit dulu");

    await fetch(`${SB_URL}/rest/v1/units`, {
        method:'POST',
        headers,
        body: JSON.stringify({ unit_name:name, section_id:sectionId })
    });

    input.value="";
    loadBoard();
}
setTimeout(()=>{

    const waterScene =
    document.querySelector(".water-scene");

    if(waterScene){

        waterScene.style.transition =
        "opacity .8s ease";

        waterScene.style.opacity = "0";

        setTimeout(()=>{
            waterScene.remove();
        },800);
    }

},2600);
</script>
