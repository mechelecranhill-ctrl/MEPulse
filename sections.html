<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    min-height:100vh;
    overflow:hidden;

    background:
    linear-gradient(rgba(20,20,40,0.35),rgba(20,20,40,0.35)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    flex-direction:column;
}
body::before{
    content:"";
    position:fixed;
    inset:0;

    backdrop-filter:blur(8px);

    background:
    linear-gradient(
        135deg,
        rgba(180,120,255,0.25),
        rgba(255,180,220,0.18),
        rgba(120,180,255,0.2)
    );

    z-index:-1;
}
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-weight:800;
    font-size:24px;
    letter-spacing:1px;

    text-shadow:
    0 0 10px rgba(255,255,255,0.4);

    flex-shrink:0;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,0.05);

    border-bottom:
    1px solid rgba(255,255,255,0.12);
}

/* BOARD FIXED PROPER HEIGHT */
.board{
    flex:1;
    display:flex;
    gap:14px;

    overflow-x:auto;
    overflow-y:hidden;

    padding:15px;

    align-items:stretch;

    scroll-snap-type:x mandatory;

    box-sizing:border-box;

    scroll-behavior:smooth;

    min-height:0;

    width:100%; 
    flex-wrap:nowrap; 
}

.column{
    flex:0 0 300px;
    width:300px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border-radius:24px;

    padding:14px;

    display:flex;
    flex-direction:column;
    gap:10px;

    scroll-snap-align:start;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.2);

    animation: slideUp 0.4s ease;

    max-height: calc(100vh - 110px);

    overflow-y:auto;
}

/* COLUMN ANIMATION */
@keyframes slideUp{
    from{transform:translateY(20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* TITLE */
.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.14);

    backdrop-filter:blur(12px);

    padding:14px;

    border-radius:18px;

    border:1px solid rgba(255,255,255,0.1);

    color:white;

    box-shadow:
    0 5px 20px rgba(0,0,0,0.15);

    transition:all 0.25s ease;

    animation: fadeIn 0.3s ease;
}

/* CARD ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

/* BUTTON */
button{

    width:100%;
    padding:12px;

    border-radius:16px;

    border:none;

    font-weight:700;

    color:white;

    background:
    linear-gradient(
        135deg,
        #7b4dff,
        #9f6bff
    );

    box-shadow:
    0 8px 20px rgba(123,77,255,0.4);

    cursor:pointer;

    transition:all 0.25s ease;

    position:relative;

    overflow:hidden;
}

/* BUTTON HOVER */
button:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}

/* BUTTON RIPPLE EFFECT */
button:after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    transition:transform 0.5s ease;
}

button:active:after{
    transform:translate(-50%,-50%) scale(2);
    opacity:0;
}
.board::after{
    content:"";
    flex:0 0 20px;
}

.board::-webkit-scrollbar{
    height:6px;
}
.board::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,0.2);
    border-radius:10px;
}

    .gear-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

/* base gear style */
.gear{
    position:absolute;
    width:220px;
    height:220px;
    fill:rgba(0,0,0,0.06);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
    transform-origin:center;
}

/* interlock positioning */
.g1{
    top:15%;
    left:10%;
    animation: spinCW 12s linear infinite;
}

.g2{
    top:20%;
    left:24%; /* close enough to interlock teeth feel */
    width:280px;
    height:280px;
    animation: spinCCW 12s linear infinite;
    opacity:0.7;
}

/* clockwise */
@keyframes spinCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* counter clockwise */
@keyframes spinCCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

/* hover = machine speeds up */
body:hover .g1{
    animation-duration:4s;
}

body:hover .g2{
    animation-duration:4s;
    opacity:0.9;
}
/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    z-index:99999;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
    cursor:pointer;

    background:#efefef;
}

.logo-wrap{
    position:relative;
    width:820px;
    height:320px;

    transform:scale(.9);
    animation:intro .9s ease forwards;
}

/* COMMON */
.logo-part{
    position:absolute;
    opacity:0;
    animation-fill-mode:forwards;
}

/* =========================
   BLUE LEFT
========================= */

/* top long slash */
.blue-top{
    width:150px;
    height:250px;

    background:#40a9ea;

    clip-path:polygon(
        0 0,
        100% 100%,
        72% 100%,
        0 28%
    );

    left:10px;
    top:28px;

    animation:leftIn .8s ease forwards;
}

/* bottom triangle */
.blue-bottom{
    width:135px;
    height:110px;

    background:#40a9ea;

    clip-path:polygon(
        0 0,
        100% 100%,
        0 100%
    );

    left:10px;
    bottom:18px;

    animation:leftIn .8s ease forwards;
    animation-delay:.15s;
}

/* =========================
   BLACK CENTER
========================= */

.black-main{
    position:absolute;

    width:430px;
    height:250px;

    left:200px;
    top:30px;

    opacity:0;

    animation:centerPop 1s ease forwards;
    animation-delay:.35s;
}

/* top E bar */
.black-main::before{
    content:"";

    position:absolute;

    width:320px;
    height:52px;

    background:#000;

    right:0;
    top:0;
}

/* middle E bar */
.black-main::after{
    content:"";

    position:absolute;

    width:210px;
    height:52px;

    background:#000;

    right:0;
    top:104px;
}

/* diagonal slash */
.black-diagonal{
    position:absolute;

    width:115px;
    height:250px;

    background:#000;

    left:0;
    top:0;

    clip-path:polygon(
        0 0,
        100% 100%,
        100% 100%,
        0 18%
    );
}

/* bottom E */
.black-bottom{
    position:absolute;

    width:320px;
    height:52px;

    background:#000;

    right:0;
    bottom:0;
}

/* WHITE CUT */
.white-cut{
    position:absolute;

    width:58px;
    height:260px;

    background:#efefef;

    left:145px;
    top:-5px;

    transform:rotate(-42deg);
}

/* =========================
   ORANGE
========================= */

.orange-shape{
    width:220px;
    height:165px;

    background:#f15b22;

    right:10px;
    top:120px;

    clip-path:polygon(
        0 0,
        58% 0,
        100% 42%,
        100% 100%,
        60% 58%,
        0 58%
    );

    animation:rightIn .8s ease forwards;
    animation-delay:.7s;
}

/* GREY BOX */
.grey-box{
    width:110px;
    height:110px;

    background:#a2a194;

    right:10px;
    top:10px;

    animation:drop .7s ease forwards;
    animation-delay:.9s;
}

/* =========================
   ANIMATION
========================= */

@keyframes leftIn{
    from{
        opacity:0;
        transform:
        translateX(-120px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes rightIn{
    from{
        opacity:0;
        transform:
        translateX(120px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes centerPop{
    from{
        opacity:0;
        transform:
        scale(.8)
        translateY(30px);
    }
    to{
        opacity:1;
        transform:
        scale(1)
        translateY(0);
    }
}

@keyframes drop{
    from{
        opacity:0;
        transform:
        translateY(-80px);
    }
    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes intro{
    from{
        transform:scale(.7);
    }
    to{
        transform:scale(.9);
    }
}

/* EXIT */
#splash.fade-out{
    opacity:0;
    transition:opacity .8s ease;
}

/* MOBILE */
@media(max-width:768px){

    .logo-wrap{
        transform:scale(.5);
    }

}
    
</style>
</head>

<body onload="loadBoard()">

<div id="splash" onclick="enterApp()">

    <div class="logo-wrap">

        <div class="logo-part grey-box"></div>

</div>

<div class="header">
    Mechanical & Electrical Department
</div>

<div id="board" class="board"></div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){

    const splash = document.getElementById("splash");

    splash.classList.add("fade-out");

    setTimeout(()=>{
        splash.style.display="none";
    },800);

}
async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>
