<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    min-height:100vh;
    overflow:hidden;

    background:
    linear-gradient(
        rgba(120,80,180,0.25),
        rgba(255,180,220,0.15)
    ),

    url('https://images.unsplash.com/photo-1508261305436-4f4d5f543a77?q=80&w=1920&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    flex-direction:column;
}
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:

    radial-gradient(
        circle at top right,
        rgba(255,220,240,0.35),
        transparent 35%
    ),

    radial-gradient(
        circle at bottom left,
        rgba(180,200,255,0.25),
        transparent 35%
    );

    backdrop-filter:blur(2px);

    pointer-events:none;
}
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-weight:800;
    font-size:24px;
    letter-spacing:1px;

    text-shadow:
    0 0 10px rgba(255,255,255,0.4);

    flex-shrink:0;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,0.05);

    border-bottom:
    1px solid rgba(255,255,255,0.12);
}

/* BOARD FIXED PROPER HEIGHT */
.board{
    flex:1;
    display:flex;
    gap:14px;

    overflow-x:auto;
    overflow-y:hidden;

    padding:15px;

    align-items:stretch;

    scroll-snap-type:x mandatory;

    box-sizing:border-box;

    scroll-behavior:smooth;

    min-height:0;

    width:100%; 
    flex-wrap:nowrap; 
}

.column{

    flex:0 0 300px;
    width:300px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:14px;

    display:flex;
    flex-direction:column;
    gap:10px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 10px 40px rgba(0,0,0,0.18);

    overflow-y:auto;

    max-height:calc(100vh - 100px);
}

/* COLUMN ANIMATION */
@keyframes slideUp{
    from{transform:translateY(20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* TITLE */
.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.14);

    backdrop-filter:blur(12px);

    padding:14px;

    border-radius:18px;

    border:1px solid rgba(255,255,255,0.1);

    color:white;

    box-shadow:
    0 5px 20px rgba(0,0,0,0.15);

    transition:all 0.25s ease;

    animation: fadeIn 0.3s ease;
}

/* CARD ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

/* BUTTON */
button{

    width:100%;
    padding:12px;

    border-radius:16px;

    border:none;

    font-weight:700;

    color:white;

    background:
    linear-gradient(
        135deg,
        #7b4dff,
        #9f6bff
    );

    box-shadow:
    0 8px 20px rgba(123,77,255,0.4);

    cursor:pointer;

    transition:all 0.25s ease;

    position:relative;

    overflow:hidden;
}

/* BUTTON HOVER */
button:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}

/* BUTTON RIPPLE EFFECT */
button:after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    transition:transform 0.5s ease;
}

button:active:after{
    transform:translate(-50%,-50%) scale(2);
    opacity:0;
}
.board::after{
    content:"";
    flex:0 0 20px;
}

.board::-webkit-scrollbar{
    height:6px;
}
.board::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,0.2);
    border-radius:10px;
}

    .gear-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

/* base gear style */
.gear{
    position:absolute;
    width:220px;
    height:220px;
    fill:rgba(0,0,0,0.06);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
    transform-origin:center;
}

/* interlock positioning */
.g1{
    top:15%;
    left:10%;
    animation: spinCW 12s linear infinite;
}

.g2{
    top:20%;
    left:24%; /* close enough to interlock teeth feel */
    width:280px;
    height:280px;
    animation: spinCCW 12s linear infinite;
    opacity:0.7;
}

/* clockwise */
@keyframes spinCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* counter clockwise */
@keyframes spinCCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

/* hover = machine speeds up */
body:hover .g1{
    animation-duration:4s;
}

body:hover .g2{
    animation-duration:4s;
    opacity:0.9;
}

#splash{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(120,80,180,0.2),
        rgba(255,180,220,0.12)
    ),

    url('https://images.unsplash.com/photo-1508261305436-4f4d5f543a77?q=80&w=1920&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:9999;
    cursor:pointer;
}
#splash::before{
    content:"";
    position:absolute;
    inset:0;

    backdrop-filter:blur(10px);

    background:
    radial-gradient(circle at top right,
    rgba(255,200,255,0.35),
    transparent 40%),

    radial-gradient(circle at bottom left,
    rgba(150,180,255,0.3),
    transparent 40%);

}
.splash-text{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0px;
    font-weight:900;
    color:#111;
    user-select:none;
    white-space:nowrap;
}

.splash-text span{

    display:inline-block;

    font-size:110px;

    font-weight:900;

    color:white;

    text-shadow:
        0 0 25px rgba(255,255,255,0.35),
        0 0 60px rgba(255,255,255,0.2);

    opacity:0;

    transform:translateY(40px) scale(0.5);

    transition:
        transform 0.9s cubic-bezier(.2,.8,.2,1),
        opacity 0.9s ease,
        letter-spacing 0.9s ease;

}

/* initial visible */
.splash-text .m,
.splash-text .e,
.splash-text .amp{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* bila animate */
#splash.animate .hidden-letter{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* M stretch jadi Mechanical */
#splash.animate .m{
    letter-spacing:8px;
}

/* E stretch jadi Electrical */
#splash.animate .e{
    letter-spacing:6px;
}

/* kecilkan full sentence */
#splash.animate .splash-text span{
    font-size:28px;
}

/* spacing */
.space{
    width:14px;
}

/* fade keluar */
#splash.fade-out{
    opacity:0;
    transition:opacity 0.7s ease;
}
    
</style>
</head>

<body onload="loadBoard()">

        <span class="hidden-letter">Department</span>

</div>

<div class="header">

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){

    const splash = document.getElementById("splash");

    splash.classList.add("animate");

    /* fade keluar */
    setTimeout(()=>{
        splash.classList.add("fade-out");
    },2200);

    /* remove splash */
    setTimeout(()=>{
        splash.style.display="none";
    },3000);

}

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>
