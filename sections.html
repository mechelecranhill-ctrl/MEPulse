<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard M&E</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

/* HEADER SIMPLE */
.header{
    height:200px;
    background:linear-gradient(60deg,#0b3d91,#0077b6,#00b4d8);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
}

/* CONTENT */
.content{
    padding:20px;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    background:#0077b6;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    M&E DASHBOARD
</div>

<div class="content">

    <h3>Welcome</h3>

    <button onclick="logout()">Logout</button>

</div>

<script>

// CHECK LOGIN
if(!localStorage.getItem("me_loggedin")){
    window.location.href = "index.html";
}

function logout(){
    localStorage.removeItem("me_loggedin");
    window.location.href = "index.html";
}

</script>

</body>
</html>
