<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>
    :root {
        --primary-neon: #00f2ff; /* Cyan Engineering */
        --secondary-neon: #ff8c00; /* Safety Orange */
        --bg-dark: #0a0e14;
        --glass: rgba(15, 22, 33, 0.7);
        --border-light: rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg-dark);
        color: #e0e6ed;
        height: 100vh;
        overflow: hidden;
        /* Blueprint Grid Effect */
        background-image: 
            linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
    }

    /* Professional Header */
    .header {
        height: 60px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(15px);
        border-bottom: 2px solid var(--primary-neon);
        display: flex;
        align-items: center;
        padding: 0 30px;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 700;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }

    /* Industrial Columns */
    .column {
        flex: 0 0 320px;
        background: var(--glass);
        border-top: 4px solid var(--primary-neon);
        border-radius: 4px; /* Shorter radius for industrial look */
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .column h3 {
        color: var(--primary-neon);
        font-size: 14px;
        text-transform: uppercase;
        margin-bottom: 10px;
        border-left: 3px solid var(--primary-neon);
        padding-left: 10px;
    }

    /* Technical Cards */
    .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-light);
        padding: 15px;
        border-radius: 4px;
        position: relative;
        transition: 0.3s;
    }

    .card::before {
        content: 'ID-001'; /* Decorative tech text */
        position: absolute;
        top: 5px;
        right: 10px;
        font-size: 8px;
        color: var(--primary-neon);
        opacity: 0.5;
    }

    .card:hover {
        border-color: var(--primary-neon);
        background: rgba(0, 242, 255, 0.05);
        transform: translateX(5px);
    }

    /* Input & Button Engineering Style */
    input {
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--border-light);
        color: white;
        padding: 10px;
        border-radius: 4px;
    }

    button {
        background: transparent;
        border: 1px solid var(--primary-neon);
        color: var(--primary-neon);
        text-transform: uppercase;
        font-size: 12px;
        font-weight: bold;
        transition: 0.3s;
        clip-path: polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%); /* Beveled corner */
    }

    button:hover {
        background: var(--primary-neon);
        color: black;
        box-shadow: 0 0 15px var(--primary-neon);
    }

    /* Gear Colors */
    .gear { fill: var(--primary-neon); opacity: 0.05; }
</style>
</head>

<body onload="loadBoard()">

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){

    const splash = document.getElementById("splash");

    splash.classList.add("animate");

    /* fade keluar */
    setTimeout(()=>{
        splash.classList.add("fade-out");
    },2200);

    /* remove splash */
    setTimeout(()=>{
        splash.style.display="none";
    },3000);

}

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>
