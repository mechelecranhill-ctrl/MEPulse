<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    min-height:100vh;
    overflow:hidden;

    background:
    linear-gradient(rgba(20,20,40,0.35),rgba(20,20,40,0.35)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    flex-direction:column;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(8px);
    background:
    linear-gradient(
        135deg,
        rgba(180,120,255,0.25),
        rgba(255,180,220,0.18),
        rgba(120,180,255,0.2)
    );
    z-index:-1;
}
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:800;
    font-size:24px;
    letter-spacing:1px;
    text-shadow:0 0 10px rgba(255,255,255,0.4);
    flex-shrink:0;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.12);
}

.board{
    flex:1;
    display:flex;
    gap:14px;
    overflow-x:auto;
    overflow-y:hidden;
    padding:15px;
    align-items:stretch;
    scroll-snap-type:x mandatory;
    box-sizing:border-box;
    scroll-behavior:smooth;
    min-height:0;
    width:100%;
    flex-wrap:nowrap;
}

.column{
    flex:0 0 300px;
    width:300px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    scroll-snap-align:start;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.4s ease;
    max-height: calc(100vh - 110px);
    overflow-y:auto;
}

@keyframes slideUp{
    from{transform:translateY(20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

.column h3{
    margin:0;
    font-size:15px;
    color:#111;
}

.card{
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(12px);
    padding:14px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    transition:all 0.25s ease;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border-radius:16px;
    border:none;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#7b4dff,#9f6bff);
    box-shadow:0 8px 20px rgba(123,77,255,0.4);
    cursor:pointer;
    transition:all 0.25s ease;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}

button:after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    transition:transform 0.5s ease;
}

button:active:after{
    transform:translate(-50%,-50%) scale(2);
    opacity:0;
}
.board::after{
    content:"";
    flex:0 0 20px;
}

.board::-webkit-scrollbar{ height:6px; }
.board::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,0.2);
    border-radius:10px;
}

.gear-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

.gear{
    position:absolute;
    width:220px;
    height:220px;
    fill:rgba(0,0,0,0.06);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
    transform-origin:center;
}

.g1{
    top:15%;
    left:10%;
    animation: spinCW 12s linear infinite;
}

.g2{
    top:20%;
    left:24%;
    width:280px;
    height:280px;
    animation: spinCCW 12s linear infinite;
    opacity:0.7;
}

@keyframes spinCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes spinCCW{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

body:hover .g1{ animation-duration:4s; }
body:hover .g2{ animation-duration:4s; opacity:0.9; }

/* =====================
   SPLASH
===================== */
#splash{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:32px;
    cursor:pointer;
    background:#f0f0f0;
    overflow:hidden;
}

/* subtle noise texture */
#splash::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    opacity:0.5;
}

/* =====================
   SVG LOGO
===================== */

.logo-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
}

.mer-logo{
    width:360px;
    height:auto;

    filter:
        drop-shadow(0 10px 25px rgba(0,0,0,0.15));

    opacity:0;

    animation:
        logoIntro 1s cubic-bezier(.2,.8,.2,1) forwards,
        floatLogo 4s ease-in-out infinite 1.2s;
}

@keyframes logoIntro{
    0%{
        opacity:0;
        transform:
            scale(.7)
            translateY(30px)
            rotate(-6deg);
    }

    60%{
        opacity:1;
        transform:
            scale(1.05)
            translateY(-4px)
            rotate(1deg);
    }

    100%{
        opacity:1;
        transform:
            scale(1)
            translateY(0)
            rotate(0deg);
    }
}

@keyframes floatLogo{

    0%{
        transform:
        translateY(0px)
        rotate(0deg)
        translateX(0px);
    }

    20%{
        transform:
        translateY(-5px)
        rotate(-1deg)
        translateX(-3px);
    }

    40%{
        transform:
        translateY(-10px)
        rotate(.8deg)
        translateX(2px);
    }

    60%{
        transform:
        translateY(-6px)
        rotate(-.7deg)
        translateX(4px);
    }

    80%{
        transform:
        translateY(-11px)
        rotate(.5deg)
        translateX(-2px);
    }

    100%{
        transform:
        translateY(0px)
        rotate(0deg)
        translateX(0px);
    }
}

/* BLUE */
.blue-part{
    opacity:0;
    animation:
        fromLeft .7s ease .1s forwards;
}

/* BLACK */
.black-part{
    opacity:0;
    transform-origin:center;
    animation:
        popIn .7s ease .45s forwards;
}

/* ORANGE */
.orange-part{
    opacity:0;
    animation:
        fromRight .7s ease .75s forwards;
}

/* GREY */
.grey-part{
    opacity:0;
    animation:
        dropDown .5s ease 1s forwards;
}

@keyframes floatLogo{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* =====================
   TAGLINE
===================== */
.splash-title{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #555;
    text-transform: uppercase;
    opacity:0;
    animation: fadeUp 0.6s ease 1.1s forwards;
}

.splash-hint{
    font-size:11px;
    color:#aaa;
    letter-spacing:2px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.4s forwards;
}

/* =====================
   KEYFRAMES
===================== */
@keyframes fromLeft{
    from{ opacity:0; transform:translateX(-40px); }
    to{ opacity:1; transform:translateX(0); }
}

@keyframes fromRight{
    from{ opacity:0; transform:translateX(40px); }
    to{ opacity:1; transform:translateX(0); }
}

@keyframes popIn{
    from{ opacity:0; transform:scale(0.8) translateY(10px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
}

@keyframes dropDown{
    from{ opacity:0; transform:translateY(-30px); }
    to{ opacity:1; transform:translateY(0); }
}

@keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

#splash.fade-out{
    opacity:0;
    transition:opacity 0.7s ease;
    pointer-events:none;
}
/* =========================
   WATER REVEAL EFFECT
========================= */

.water-scene{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    overflow:hidden;
}

/* AIR MENITIK */
.water-drop{
    position:absolute;

    top:-160px;

    width:70px;
    height:70px;

    background:
    radial-gradient(circle at 30% 25%,
    rgba(255,255,255,.95),
    rgba(120,190,255,.95) 35%,
    rgba(0,120,255,1));

    border-radius:
    50% 50% 50% 50% /
    60% 60% 40% 40%;

    transform:
    rotate(45deg);

    filter:
    drop-shadow(0 0 25px rgba(80,180,255,.8));

    animation:
    dropFall 1.3s cubic-bezier(.2,.8,.2,1) forwards;

    z-index:5;
}

@keyframes dropFall{

    0%{
        top:-180px;
        opacity:0;

        transform:
        rotate(45deg)
        scale(.25);
    }

    10%{
        opacity:1;
    }

    70%{
        top:47%;

        transform:
        rotate(45deg)
        scale(1);
    }

    82%{
        top:50%;

        transform:
        rotate(45deg)
        scale(.7,.35);
    }

    100%{
        top:52%;

        opacity:0;

        transform:
        rotate(45deg)
        scale(0);
    }
}

/* RIPPLE */
.ripple{
    position:absolute;

    width:30px;
    height:30px;

    border:4px solid rgba(120,190,255,0.75);
    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%) scale(0);

    opacity:0;

    z-index:3;
}

.ripple1{
    animation:rippleExpand 1.4s ease-out 1s forwards;
}

.ripple2{
    animation:rippleExpand 1.5s ease-out 1.15s forwards;
}

.ripple3{
    animation:rippleExpand 1.7s ease-out 1.3s forwards;
}

@keyframes rippleExpand{

    0%{
        opacity:.9;
        transform:translate(-50%,-50%) scale(.2);
    }

    100%{
        opacity:0;
        transform:translate(-50%,-50%) scale(14);
    }
}

/* SPLASH WATER PARTICLES */
.splash-water{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:transparent;

    box-shadow:
        -90px -10px 0 3px rgba(120,190,255,0),
        -70px -30px 0 3px rgba(120,190,255,0),
        -40px -45px 0 4px rgba(120,190,255,0),
        40px -45px 0 4px rgba(120,190,255,0),
        70px -30px 0 3px rgba(120,190,255,0),
        90px -10px 0 3px rgba(120,190,255,0);

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:waterSplash 1s ease-out 1s forwards;

    z-index:4;
}

@keyframes waterSplash{

    0%{
        opacity:0;
    }

    20%{
        opacity:1;

        box-shadow:
            -90px -10px 0 3px rgba(120,190,255,.9),
            -70px -30px 0 3px rgba(120,190,255,.9),
            -40px -45px 0 4px rgba(120,190,255,.9),
            40px -45px 0 4px rgba(120,190,255,.9),
            70px -30px 0 3px rgba(120,190,255,.9),
            90px -10px 0 3px rgba(120,190,255,.9);
    }

    100%{
        opacity:0;

        box-shadow:
            -180px -80px 0 0 rgba(120,190,255,0),
            -120px -120px 0 0 rgba(120,190,255,0),
            -60px -160px 0 0 rgba(120,190,255,0),
            60px -160px 0 0 rgba(120,190,255,0),
            120px -120px 0 0 rgba(120,190,255,0),
            180px -80px 0 0 rgba(120,190,255,0);
    }
}

/* LOGO REVEAL */
.logo-wrap{
    position:relative;
    z-index:10;
}

.mer-logo{

    opacity:0;

    clip-path:circle(0% at 50% 50%);

    animation:
    waterReveal 1.8s cubic-bezier(.2,.8,.2,1) forwards,
    floatLogo 7s ease-in-out infinite 2s;

    animation-delay:1s, 2s;
filter:
drop-shadow(0 0 20px rgba(120,190,255,.35))
drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

@keyframes waterReveal{

    0%{
        opacity:0;
        clip-path:circle(0% at 50% 50%);
        filter:blur(10px);
        transform:scale(.8);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
        clip-path:circle(150% at 50% 50%);
        filter:blur(0px);
        transform:scale(1);
    }
}
#splash::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(120,190,255,0.18),
    transparent 55%);

    animation:pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%,100%{ opacity:.4; }
    50%{ opacity:1; }
}
/* MOBILE */
@media(max-width:500px){
    .mer-logo{ transform:scale(0.7); transform-origin:center; }
}

</style>
</head>

<body onload="loadBoard()">

<!-- SPLASH -->
<div id="splash" onclick="enterApp()">

    <div class="water-scene">

        <div class="water-drop"></div>

        <div class="ripple ripple1"></div>
        <div class="ripple ripple2"></div>
        <div class="ripple ripple3"></div>

        <div class="splash-water"></div>

    </div>

    <div class="logo-wrap">

    <object
        id="logoSvg"
        type="image/svg+xml"
        data="logo.svg"
        class="mer-logo">
    </object>

</div>

    <div class="splash-title">Mechanical &amp; Electrical Department</div>
    <div class="splash-hint">Klik untuk masuk</div>

</div>

<div class="header">
    Mechanical &amp; Electrical Department
</div>

<div id="board" class="board"></div>

<div class="gear-bg">
    <svg class="gear g1" viewBox="0 0 100 100">
        <path d="M94.6 56.3l-6.2-3.6c.2-2.2.2-4.4 0-6.6l6.2-3.6c1.6-.9 2.2-2.9 1.4-4.5l-5-8.7c-.9-1.6-2.9-2.2-4.5-1.4l-6.2 3.6c-3.4-2.8-7.2-5-11.3-6.5V8c0-1.8-1.5-3.3-3.3-3.3H42.4c-1.8 0-3.3 1.5-3.3 3.3v7.2c-4.1 1.5-7.9 3.7-11.3 6.5l-6.2-3.6c-1.6-.9-3.6-.3-4.5 1.4l-5 8.7c-.9 1.6-.3 3.6 1.4 4.5l6.2 3.6c-.2 2.2-.2 4.4 0 6.6l-6.2 3.6c-1.6.9-2.2 2.9-1.4 4.5l5 8.7c.9 1.6 2.9 2.2 4.5 1.4l6.2-3.6c3.4 2.8 7.2 5 11.3 6.5V92c0 1.8 1.5 3.3 3.3 3.3h10c1.8 0 3.3-1.5 3.3-3.3v-7.2c4.1-1.5 7.9-3.7 11.3-6.5l6.2 3.6c1.6.9 3.6.3 4.5-1.4l5-8.7c.8-1.6.2-3.6-1.4-4.5z"/>
        <circle cx="50" cy="50" r="12"/>
    </svg>

    <svg class="gear g2" viewBox="0 0 100 100">
        <path d="M94.6 56.3l-6.2-3.6c.2-2.2.2-4.4 0-6.6l6.2-3.6c1.6-.9 2.2-2.9 1.4-4.5l-5-8.7c-.9-1.6-2.9-2.2-4.5-1.4l-6.2 3.6c-3.4-2.8-7.2-5-11.3-6.5V8c0-1.8-1.5-3.3-3.3-3.3H42.4c-1.8 0-3.3 1.5-3.3 3.3v7.2c-4.1 1.5-7.9 3.7-11.3 6.5l-6.2-3.6c-1.6-.9-3.6-.3-4.5 1.4l-5 8.7c-.9 1.6-.3 3.6 1.4 4.5l6.2 3.6c-.2 2.2-.2 4.4 0 6.6l-6.2 3.6c-1.6.9-2.2 2.9-1.4 4.5l5 8.7c.9 1.6 2.9 2.2 4.5 1.4l6.2-3.6c3.4 2.8 7.2 5 11.3 6.5V92c0 1.8 1.5 3.3 3.3 3.3h10c1.8 0 3.3-1.5 3.3-3.3v-7.2c4.1-1.5 7.9-3.7 11.3-6.5l6.2 3.6c1.6.9 3.6.3 4.5-1.4l5-8.7c.8-1.6.2-3.6-1.4-4.5z"/>
        <circle cx="50" cy="50" r="12"/>
    </svg>
</div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

function enterApp(){
    const splash = document.getElementById("splash");
    splash.classList.add("fade-out");
    setTimeout(()=>{ splash.style.display="none"; }, 800);
}

async function loadBoard(){
    const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
    const sections = await secRes.json();
    const board = document.getElementById("board");
    board.innerHTML = "";

    for(const sec of sections){
        const ures = await fetch(
            `${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
            {headers}
        );
        let units = await ures.json();
        if(!Array.isArray(units)) units = [];

        board.innerHTML += `
        <div class="column">
            <h3>${sec.section_name}</h3>
            ${units.map(u => `
            <div class="card">
                <b>${u.unit_name}</b>
            </div>
            `).join('')}
            <input id="unit_${sec.id}" placeholder="Tambah unit...">
            <button onclick="addUnit(${sec.id})">+ Add Unit</button>
        </div>
        `;
    }
}

async function addUnit(sectionId){
    const input = document.getElementById(`unit_${sectionId}`);
    const name = input.value.trim();
    if(!name) return alert("Isi unit dulu");

    await fetch(`${SB_URL}/rest/v1/units`, {
        method:'POST',
        headers,
        body: JSON.stringify({ unit_name:name, section_id:sectionId })
    });

    input.value="";
    loadBoard();
}
setTimeout(()=>{

    const waterScene =
    document.querySelector(".water-scene");

    if(waterScene){

        waterScene.style.transition =
        "opacity .8s ease";

        waterScene.style.opacity = "0";

        setTimeout(()=>{
            waterScene.remove();
        },800);
    }

},2600);
</script>

</body>
