<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical & Electrical Department</title>

<style>

/* BACKGROUND BLUEPRINT GRID */
body{
    margin:0;
    font-family:system-ui;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;

    background:
        linear-gradient(135deg,#e0eafc,#cfdef3),
        repeating-linear-gradient(
            0deg,
            rgba(0,0,0,0.03) 0px,
            rgba(0,0,0,0.03) 1px,
            transparent 1px,
            transparent 20px
        ),
        repeating-linear-gradient(
            90deg,
            rgba(0,0,0,0.03) 0px,
            rgba(0,0,0,0.03) 1px,
            transparent 1px,
            transparent 20px
        );
}

/* HEADER ENGINEERING BAR */
.header{
    height:60px;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-weight:800;
    font-size:18px;
    color:#111;

    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,0,0,0.05);
}

/* BOARD */
.board{
    flex:1;
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:15px;
    align-items:flex-start;
}

/* COLUMN (ENGINEERING PANEL STYLE) */
.column{
    min-width:300px;
    max-width:300px;

    background:rgba(255,255,255,0.35);
    backdrop-filter: blur(18px);
    border-radius:18px;
    padding:12px;

    display:flex;
    flex-direction:column;
    gap:10px;

    border:1px solid rgba(0,0,0,0.08);
    box-shadow:
        0 10px 30px rgba(0,0,0,0.1),
        inset 0 0 0 1px rgba(255,255,255,0.3);
}

/* SECTION TITLE (INDUSTRIAL LOOK) */
.column h3{
    margin:0;
    font-size:14px;
    font-weight:800;
    color:#111;
    display:flex;
    align-items:center;
    gap:6px;
}

/* CARD (WORK ORDER STYLE) */
.card{
    background:white;
    padding:12px;
    border-radius:12px;
    border-left:4px solid #007AFF;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);

    transition:all 0.25s ease;
    position:relative;
}

/* CARD HOVER */
.card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* ENGINEERING STATUS TAG */
.status{
    font-size:10px;
    font-weight:700;
    padding:3px 8px;
    border-radius:20px;
    display:inline-block;
    margin-top:6px;
}

.status.todo{
    background:#ffe5e5;
    color:#d60000;
}

.status.doing{
    background:#fff3cd;
    color:#b8860b;
}

.status.done{
    background:#d4edda;
    color:#1e7e34;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.1);
    outline:none;
}

/* BUTTON (INDUSTRIAL BLUE PRINT) */
button{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    font-weight:700;
    color:white;
    cursor:pointer;

    background:linear-gradient(135deg,#007AFF,#00c6ff);
    box-shadow:0 6px 15px rgba(0,122,255,0.3);
}

/* SMALL ANIMATION GLOW (LIKE ELECTRICAL FLOW) */
.column::before{
    content:"";
    position:absolute;
    width:2px;
    height:100%;
    background:linear-gradient(to bottom,transparent,#00c6ff,transparent);
    left:0;
    top:0;
    opacity:0.2;
    animation: flow 3s linear infinite;
}

@keyframes flow{
    0%{transform:translateY(-100%);}
    100%{transform:translateY(100%);}
}

</style>
</head>

<body onload="loadBoard()">

<div class="header">
    ⚙️ Mechanical & Electrical Department
</div>

<div id="board" class="board"></div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`,
    "Content-Type":"application/json"
};

async function loadBoard(){

const secRes = await fetch(`${SB_URL}/rest/v1/me_sections?select=*`, {headers});
const sections = await secRes.json();

const board = document.getElementById("board");
board.innerHTML = "";

for(const sec of sections){

const ures = await fetch(
`${SB_URL}/rest/v1/units?select=*&section_id=eq.${sec.id}&order=id.asc`,
{headers}
);

let units = await ures.json();

if(!Array.isArray(units)) units = [];

board.innerHTML += `
<div class="column">

<h3>${sec.section_name}</h3>

${units.map(u => `
<div class="card">
    <b>${u.unit_name}</b>
</div>
`).join('')}

<input id="unit_${sec.id}" placeholder="Tambah unit...">
<button onclick="addUnit(${sec.id})">+ Add Unit</button>

</div>
`;
}

}

async function addUnit(sectionId){

const input = document.getElementById(`unit_${sectionId}`);
const name = input.value.trim();

if(!name) return alert("Isi unit dulu");

await fetch(`${SB_URL}/rest/v1/units`, {
method:'POST',
headers,
body: JSON.stringify({
unit_name:name,
section_id:sectionId
})
});

input.value="";
loadBoard();

}

</script>

</body>
</html>
