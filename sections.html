<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Sections</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

:root {
--bg-color: #a1c4fd;
--glass-white: rgba(255, 255, 255, 0.45);
--glass-border: rgba(255, 255, 255, 0.6);
--text-primary: #1d1d1f;
--text-secondary: rgba(0,0,0,0.6);
--ios-blue: #007AFF;
--input-bg: rgba(255, 255, 255, 0.4);
}

* {
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
font-family: Inter, system-ui;
}

html, body {
height: 100dvh;
width: 100%;
margin: 0;
padding: 0;
overflow: hidden;
background: var(--bg-color);
}

body{
display:flex;
justify-content:center;
align-items:flex-start;
position:relative;
background:
radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:-20%;
background:
radial-gradient(circle at 20% 80%, rgba(255,255,255,.18), transparent 25%),
radial-gradient(circle at 80% 20%, rgba(255,255,255,.10), transparent 30%);
filter:blur(40px);
animation:fogMove 10s ease-in-out infinite alternate;
z-index:0;
}

@keyframes fogMove{
from{ transform:translateX(-30px) translateY(0); }
to{ transform:translateX(30px) translateY(-20px); }
}

.stage{
position:relative;
z-index:2;
width:100%;
height:100vh;
display:flex;
align-items:center;
}

.wheel{
position:absolute;
width:650px;
height:650px;
left:-325px;
top:50%;
transform:translateY(-50%) rotate(0deg);
transition:transform 0.7s cubic-bezier(.22,1,.36,1);
transform-origin:center center;
}

.item{
position:absolute;
width:120px;
height:120px;
border-radius:18px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-weight:600;
backdrop-filter:blur(14px);
transition:0.3s;
opacity:0.5;
transform:scale(0.9);
}

.item.active{
background:rgba(56,189,248,0.25);
border-color:rgba(56,189,248,0.6);
box-shadow:0 0 25px rgba(56,189,248,0.25);
opacity:1;
transform:scale(1.25);
}

.panel{
position:absolute;
z-index:2;
right:80px;
color:white;
}

.info-card{
position:absolute;
right:80px;
top:50%;
transform:translateY(-50%);
width:340px;
padding:24px;
border-radius:24px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
color:white;
opacity:0;
}

.info-card.show{
animation:fadeInRight .45s ease forwards;
}

@keyframes fadeInRight{
from{ opacity:0; transform:translateY(-50%) translateX(50px); }
to{ opacity:1; transform:translateY(-50%) translateX(0); }
}

.unit-card{
padding:10px 14px;
margin-bottom:8px;
border-radius:12px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
color:white;
}

.section-helm{
width:160px;
height:160px;
object-fit:contain;
}

.floating-helm{
position:fixed;
z-index:1001;
pointer-events:none;
transition:
top 0.5s cubic-bezier(.22,1,.36,1),
left 0.5s cubic-bezier(.22,1,.36,1),
width 0.5s cubic-bezier(.22,1,.36,1),
height 0.5s cubic-bezier(.22,1,.36,1);
}
</style>
</head>

<body>

<div class="stage">
<div class="wheel" id="wheel"></div>
</div>

<div class="panel">
<h1 id="title">M&E</h1>
<p>Department Sections</p>
</div>

<div class="info-card" id="infoCard">
<h2 id="cardTitle"></h2>
<div id="cardDesc"></div>
<button id="openBtn">Open Dashboard</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", async () => {
if (typeof checkSession === "function") await checkSession();
loadSections();
});

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = {
apikey: SB_KEY,
Authorization: `Bearer ${SB_KEY}`
};

const wheel = document.getElementById("wheel");
const title = document.getElementById("title");
const card = document.getElementById("infoCard");
const cardTitle = document.getElementById("cardTitle");
const cardDesc = document.getElementById("cardDesc");

const isMobile = window.innerWidth <= 768;
const radius = isMobile ? 180 : 240;

let index = 0;
let baseAngle = 0;
let stepAngle = 0;
let items = [];
let itemEls = [];
let currentFloating = null;

/* HELM */
function getHelmSrc(name){
const n = name.toUpperCase();
if(n.includes("SELENGGARA")) return "MaintHelm.png";
if(n.includes("PEMATUHAN")) return "CompHelm.png";
if(n.includes("ASET")) return "AssetFinHelm.png";
if(n.includes("PROJEK")) return "ProjectsHelm.png";
return null;
}

/* LOAD */
async function loadSections(){
const [secRes, unitRes] = await Promise.all([
fetch(`${SB_URL}/rest/v1/me_sections?select=*`, { headers }),
fetch(`${SB_URL}/rest/v1/units?select=*`, { headers })
]);

const sections = await secRes.json();
const units = await unitRes.json();

items = sections.map(sec => ({
id: sec.id,
title: sec.section_name,
units: units.filter(u => u.section_id === sec.id)
}));

stepAngle = 360 / items.length;
createWheel();
}

/* WHEEL */
function createWheel(){
wheel.innerHTML = "";

items.forEach(item => {
const el = document.createElement("div");
el.className = "item";

const src = getHelmSrc(item.title);
el.innerHTML = src ? `<img src="${src}" class="section-helm">` : item.title;

wheel.appendChild(el);
});

itemEls = document.querySelectorAll(".item");

itemEls.forEach((el, i) => {
el.addEventListener("click", () => {

if(!isMobile) return;

index = i;
update();
render();

const img = el.querySelector("img");
if(!img) return;

const r = img.getBoundingClientRect();

const fl = document.createElement("img");
fl.src = img.src;
fl.className = "floating-helm";

fl.style.top = r.top + "px";
fl.style.left = r.left + "px";
fl.style.width = r.width + "px";
fl.style.height = r.height + "px";

document.body.appendChild(fl);
currentFloating = fl;

requestAnimationFrame(() => {
fl.style.left = (window.innerWidth/2 - r.width/2) + "px";
fl.style.top = "200px";
});

setTimeout(() => {
card.classList.add("show");
}, 120);

document.getElementById("openBtn").onclick = () => {
window.location.href = `dashboard-contract.html?section=${encodeURIComponent(items[index].title)}`;
};

});
});

positionItems();
update();
render();
}

/* POSITION */
function positionItems(){
itemEls.forEach((el, i) => {
const theta = (i / items.length) * Math.PI * 2;
const x = Math.cos(theta) * radius;
const y = Math.sin(theta) * radius;

el.style.left = `calc(50% + ${x}px - 60px)`;
el.style.top = `calc(50% + ${y}px - 60px)`;
});
}

/* UPDATE */
function update(){
itemEls.forEach(e => e.classList.remove("active"));
itemEls[index].classList.add("active");

const item = items[index];

title.innerText = item.title;
cardTitle.innerText = item.title;

cardDesc.innerHTML =
`<div style="margin-bottom:10px">${item.units.length} Unit</div>` +
item.units.map(u => `<div class="unit-card">${u.unit_name}</div>`).join("");
}

/* RENDER */
function render(){
wheel.style.transform = `translateY(-50%) rotate(${baseAngle}deg)`;

itemEls.forEach(el => {
el.style.transform = `rotate(${-baseAngle}deg) scale(0.9)`;
});

itemEls[index].style.transform =
`rotate(${-baseAngle}deg) scale(1.25)`;
}

/* NAV */
function next(){
index = (index + 1) % items.length;
baseAngle -= stepAngle;
update(); render();
}

function prev(){
index = (index - 1 + items.length) % items.length;
baseAngle += stepAngle;
update(); render();
}
</script>

</body>
</html>
