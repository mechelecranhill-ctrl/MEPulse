<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Sections</title>

<link rel="preload" href="MaintHelm.png" as="image">
<link rel="preload" href="CompHelm.png" as="image">
<link rel="preload" href="AssetFinHelm.png" as="image">
<link rel="preload" href="ProjectsHelm.png" as="image">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

:root {
--bg-color: #a1c4fd;
--glass-white: rgba(255, 255, 255, 0.45);
--glass-border: rgba(255, 255, 255, 0.6);
--text-primary: #1d1d1f;
--text-secondary: rgba(0,0,0,0.6);
--ios-blue: #007AFF;
--input-bg: rgba(255, 255, 255, 0.4);
}

/* ── DAFTAR PROPERTY UNTUK ANIMASI GRADIENT ── */
@property --gradient-1 {
  syntax: '<color>';
  initial-value: #0b3d91;
  inherits: false;
}
@property --gradient-2 {
  syntax: '<color>';
  initial-value: #0077b6;
  inherits: false;
}
@property --gradient-3 {
  syntax: '<color>';
  initial-value: #00b4d8;
  inherits: false;
}

• {
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
font-family: Inter, system-ui;
}

html, body {
height: 100dvh;
width: 100%;
margin: 0;
padding: 0;
overflow: hidden;
background: var(--bg-color);
}

body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    background:
        radial-gradient(circle at top, rgba(255,255,255,.15), transparent 35%),
        linear-gradient(60deg, var(--gradient-1, #0b3d91) 0%, var(--gradient-2, #0077b6) 40%, var(--gradient-3, #00b4d8) 100%);
    background-attachment: fixed;
    transition: --gradient-1 0.8s ease-in-out, --gradient-2 0.8s ease-in-out, --gradient-3 0.8s ease-in-out;
}

body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.18), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.10), transparent 30%);
    filter: blur(40px);
    animation: fogMove 10s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes fogMove{
from{ transform:translateX(-30px) translateY(0); }
to{ transform:translateX(30px) translateY(-20px); }
}

.stage {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    pointer-events: none;
}

.wheel {
    position: absolute;
    width: 650px;
    height: 650px;
    left: -325px;
    top: 50%;
    transform: translateY(-50%) rotate(0deg);
    transition: transform 0.7s cubic-bezier(.22,1,.36,1);
    transform-origin: center center;
    pointer-events: auto;
}

.item{
position:absolute;
width:120px;
height:120px;
border-radius:18px;
background:transparent;
border:none;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-weight:600;
backdrop-filter:none;
transition:0.3s;
opacity:0.4;
transform:scale(0.9);
pointer-events: none; 
cursor: default;
}

.item.active{
background:transparent;
border:none;
box-shadow:none;
opacity:1;
transform:scale(1.25);
pointer-events: auto;
cursor: pointer;
}

.panel{
position:absolute;
z-index:2;
right:80px;
color:white;
}
.panel h1{ font-size:46px; }
.panel p{ opacity:0.6; }

.info-card {
    position: absolute;
    z-index: 10;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 340px;
    padding: 24px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    color: white;
    opacity: 0;
    animation: none;
    pointer-events: auto;
}

@keyframes fadeInRight{
from{ opacity:0; transform:translateY(-50%) translateX(50px); }
to{ opacity:1; transform:translateY(-50%) translateX(0); }
}
.info-card.show{
animation:fadeInRight .45s ease forwards;
}

.info-card h2{ margin-bottom:10px; font-size:22px; }
.info-card p{ opacity:.7; line-height:1.6; }

.status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-radius: 14px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    font-size: 14px;
    font-weight: 500;
    gap: 12px;
}

.status-row span:first-child {
    flex: 1;
    word-break: break-word;
}

.status-badge {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
}

.section-helm{
width:160px;
height:160px;
object-fit:contain;
pointer-events:none;
transition: transform 0.3s, filter 0.3s;
}

.item.active .section-helm{
transform:scale(1.15);
filter:
drop-shadow(0 0 10px rgba(255,255,255,.6))
drop-shadow(0 0 20px rgba(56,189,248,.4));
}

/* ── OPEN BUTTON ── */
#openBtn{
display:block;
width:100%;
margin-top:12px;
padding:12px 0;
border-radius:14px;
border:none;
background:rgba(56,189,248,0.3);
border:1px solid rgba(56,189,248,0.5);
color:white;
font-size:15px;
font-weight:600;
letter-spacing:0.3px;
cursor:pointer;
backdrop-filter:blur(10px);
transition:background 0.2s, transform 0.15s;
flex-shrink: 0;
}
#openBtn:active{
background:rgba(56,189,248,0.5);
transform:scale(0.97);
}

/* ── FLOATING HELM ── */
.floating-helm{
position:fixed;
object-fit:contain;
z-index:1001;
pointer-events:none;
transition:
top 0.5s cubic-bezier(.22,1,.36,1),
left 0.5s cubic-bezier(.22,1,.36,1),
width 0.5s cubic-bezier(.22,1,.36,1),
height 0.5s cubic-bezier(.22,1,.36,1);
filter:
drop-shadow(0 0 10px rgba(56,189,248,.8))
drop-shadow(0 0 20px rgba(56,189,248,.5));
}

.nav-controls{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    z-index: 9999;
}

.nav-controls button{
    width: 52px;
    height: 52px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 18px;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.2s;
}

.nav-controls button:active{
    transform: scale(0.92);
}

/* ── MOBILE ── */
@media (max-width:768px){
.panel{ display:none; }

.info-card{
position:fixed;
left:20px;
right:20px;
top:auto;
bottom:20px;
height: auto;
max-height: 50vh;
display: flex;
flex-direction: column;
padding: 20px;
border-radius: 24px;
z-index:10000;
opacity:0;
visibility:hidden;
transform:translateY(40px);
transition:opacity .35s ease, transform .35s ease, visibility .35s;
}

#cardDesc {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 4px;
}

.info-card.show-mobile{
opacity:1;
visibility:visible;
transform:translateY(0);
}

body.hide-wheel .wheel{
opacity:0;
transform:translateY(-50%) scale(0.6);
pointer-events:none;
transition:0.4s ease;
}

body.hide-wheel .item{
opacity:0;
transition:0.3s ease;
}

body.hide-wheel .item.active{
opacity:0 !important;
}
}

@media (min-width:769px){
    .panel{
        display:none;
    }

    .info-card{
        position: fixed !important;
        top: 70px !important;
        right: 20px !important;
        width: calc(50vw - 20px) !important;
        height: calc(100vh - 110px) !important;
        padding: 40px !important;
        border-radius: 30px !important;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.08);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        opacity: 0;
        visibility: visible !important;
    }

    .info-card h2{
        font-size:34px;
        margin-bottom:20px;
        line-height:1.2;
        flex-shrink: 0;
    }

    #cardDesc{
        flex:1;
        overflow-y:auto;
        padding-right:8px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .status-row {
        padding: 16px 20px;
        margin-bottom: 12px;
        font-size: 16px;
    }

    .status-badge {
        font-size: 15px;
        padding: 6px 14px;
    }

    #cardDesc::-webkit-scrollbar{
        width:6px;
    }

    #cardDesc::-webkit-scrollbar-thumb{
        background:rgba(255,255,255,.2);
        border-radius:20px;
    }

    #openBtn{
        margin-top:20px;
        flex-shrink:0;
    }

    @keyframes fadeInRightDesktop{
        from{ opacity:0; transform:translateX(60px); }
        to{ opacity:1; transform:translateX(0); }
    }

    .info-card.show{
        animation:fadeInRightDesktop .45s ease forwards !important;
    }
}
</style>

<link rel="stylesheet" href="style.css">
<script src="auth.js"></script>
<script src="session.js"></script>
<script src="sidebar.js" defer></script>
</head>

<body>

<app-sidebar></app-sidebar>

<div class="stage">
<div class="wheel" id="wheel"></div>
</div>

<div class="panel">
<h1 id="title">M&E</h1>
<p>Department Sections</p>
</div>

<div class="nav-controls">
    <button id="prevBtn"><i class="fa fa-chevron-left"></i></button>
    <button id="nextBtn"><i class="fa fa-chevron-right"></i></button>
</div>
<div class="info-card" id="infoCard">
<h2 id="cardTitle"></h2>
<div id="cardDesc"></div>
<button id="openBtn">Open Dashboard</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", async () => {
    if(typeof checkSession === "function") await checkSession();
    loadSections();
});

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`
};

const wheel = document.getElementById("wheel");
const title = document.getElementById("title");
const card = document.getElementById("infoCard");
const cardTitle = document.getElementById("cardTitle");
const cardDesc = document.getElementById("cardDesc");
const openBtn = document.getElementById("openBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const isMobile = window.innerWidth <= 768;
const radius = isMobile ? 180 : 240;

let index = 0;
let baseAngle = 0;
let stepAngle = 0;
let lock = false;
let items = [];
let itemEls = [];
let currentFloating = null;
let activeSection = "";

prevBtn.addEventListener("click", () => { prev(); });
nextBtn.addEventListener("click", () => { next(); });

/* ── HELM SRC ── */
function getHelmSrc(name){
    const n = name.toUpperCase();
    if(n.includes("SELENGGARA")) return "MaintHelm.png";
    if(n.includes("PEMATUHAN")) return "CompHelm.png";
    if(n.includes("ASET")) return "AssetFinHelm.png";
    if(n.includes("PROJEK")) return "ProjectsHelm.png";
    return null;
}

/* ── BACKGROUND COLOR MATCHING ── */
function getSectionColor(name) {
    const n = name.toUpperCase();
    if (n.includes("SELENGGARA")) {
        return { base: "#121212", color1: "#121212", color2: "#1c1c1e", color3: "#2c2c2e" };
    }
    if (n.includes("PEMATUHAN")) {
        return { base: "#064e3b", color1: "#064e3b", color2: "#0f5132", color3: "#115e59" };
    }
    if (n.includes("ASET")) {
        return { base: "#7c2d12", color1: "#6c2a0d", color2: "#9a3412", color3: "#b45309" };
    }
    if (n.includes("PROJEK")) {
        return { base: "#0b3d91", color1: "#0b3d91", color2: "#0077b6", color3: "#00b4d8" };
    }
    return { base: "#0b3d91", color1: "#0b3d91", color2: "#0077b6", color3: "#00b4d8" };
}

/* ── BUTTON REDIRECT ── */
openBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if(!activeSection) {
        alert("Please select a section first.");
        return;
    }
    const targetUrl = `dashboard-contract.html?section=${activeSection.id}`;
    window.location.href = targetUrl;
});

/* ── LOAD DATA ── */
async function loadSections(){
    try{
        const response = await fetch(`${SB_URL}/rest/v1/me_sections?select=*,units(*,contract(*))`, { headers });
        const sections = await response.json();

        items = sections.map(sec => ({
            id: sec.id,
            title: sec.section_name,
            units: sec.units || []
        }));

        stepAngle = 360 / items.length;
        createWheel();
    }catch(err){
        console.error("Failed to fetch section & contract data:", err);
    }
}

/* ── CREATE WHEEL ── */
function createWheel(){
    wheel.innerHTML = "";

    items.forEach(item => {
        const el = document.createElement("div");
        el.className = "item";
        const src = getHelmSrc(item.title);
        if(src){
            el.innerHTML = `<img src="${src}" class="section-helm">`;
        } else {
            el.innerText = item.title;
        }
        wheel.appendChild(el);
    });

    itemEls = document.querySelectorAll(".item");

    itemEls.forEach((el, i) => {
        el.addEventListener("click", (e) => {
            if(!isMobile) {
                let diff = i - index;
                if (diff > items.length / 2) diff -= items.length;
                if (diff < -items.length / 2) diff += items.length;
                baseAngle -= diff * stepAngle;
                index = i;
                update();
                render();
                return;
            }

            index = i;
            update();
            render();
            dismissFloating();

            const img = el.querySelector(".section-helm");
            document.body.classList.add("hide-wheel");

            if(img){
                const r = img.getBoundingClientRect();
                const fl = document.createElement("img");
                fl.src = img.src;
                fl.className = "floating-helm";
                fl.style.transition = "none";
                fl.style.top = r.top + "px";
                fl.style.left = r.left + "px";
                fl.style.width = r.width + "px";
                fl.style.height = r.height + "px";

                document.body.appendChild(fl);
                currentFloating = fl;

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        fl.style.transition = "";
                        const cardH = card.offsetHeight || 220;
                        const cardTop = window.innerHeight - cardH - 20;
                        fl.style.left = (window.innerWidth / 2 - r.width / 2) + "px";
                        fl.style.top = (cardTop - r.height - 12) + "px";
                    });
                });
            }
            setTimeout(() => card.classList.add("show-mobile"), 120);
        });
    });

    positionItems();
    update();
    render();
}

function dismissFloating(){
    if(currentFloating){ currentFloating.remove(); currentFloating = null; }
}

function positionItems(){
    itemEls.forEach((el, i) => {
        const theta = (i / items.length) * Math.PI * 2;
        const x = Math.cos(theta) * radius;
        const y = Math.sin(theta) * radius;
        el.style.left = `calc(50% + ${x}px - 60px)`; 
        el.style.top = `calc(50% + ${y}px - 60px)`;
    });
}

/* ── UPDATE DATA CARD ── */
function update(){
    if(itemEls.length === 0) return;
    
    itemEls.forEach(e => e.classList.remove("active"));
    itemEls[index].classList.add("active");

    const item = items[index];
    
    activeSection = {
        id: item.id,
        name: item.title
    };

    const colors = getSectionColor(item.title);
    document.body.style.setProperty('--bg-color', colors.base);
    document.body.style.setProperty('--gradient-1', colors.color1);
    document.body.style.setProperty('--gradient-2', colors.color2);
    document.body.style.setProperty('--gradient-3', colors.color3);

    title.innerText = item.title;
    cardTitle.innerText = item.title;

    let totalOngoing = 0;
    let totalImpendingExpiry = 0;
    let totalAvailableCPC = 0;
    let totalP_SumReview = 0;

    const hariIni = new Date();
    const enamBulanLagi = new Date();
    enamBulanLagi.setMonth(hariIni.getMonth() + 6);

    item.units.forEach(u => {
        const contractsList = u.contract || [];
        contractsList.forEach(c => {
            if (c.p_sum_exceeded === true || c.status === "prov_sum_overrun") {
                totalP_SumReview++;
                return; 
            }

            if(!c.contract_end) return;
            const tarikhTamat = new Date(c.contract_end);

            if (tarikhTamat < hariIni) {
                totalAvailableCPC++;
            } else if (tarikhTamat >= hariIni && tarikhTamat <= enamBulanLagi) {
                totalImpendingExpiry++;
            } else {
                totalOngoing++;
            }
        });
    });

    cardDesc.innerHTML = `
        <div class="status-row">
            <span>Ongoing Contracts</span>
            <span class="status-badge" style="background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3);">
                ${totalOngoing}
            </span>
        </div>
        
        <div class="status-row">
            <span>Contracts Near Expiry (Within 6M)</span>
            <span class="status-badge" style="background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.3);">
                ${totalImpendingExpiry}
            </span>
        </div>
        
        <div class="status-row">
            <span>Available for CPC</span>
            <span class="status-badge" style="background: rgba(147,51,234,0.15); color: #c084fc; border: 1px solid rgba(147,51,234,0.3);">
                ${totalAvailableCPC}
            </span>
        </div>

        <div class="status-row">
            <span>Provisional Sum Review Required</span>
            <span class="status-badge" style="background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3);">
                ${totalP_SumReview}
            </span>
        </div>
    `;

    openBtn.innerText = "Open Dashboard";

    if(!isMobile){
        card.classList.remove("show");
        void card.offsetWidth;
        card.classList.add("show");
    }
}

/* ── RENDER WHEEL ROTATION ── */
function render(){
    if(itemEls.length === 0) return;
    
    wheel.style.transform = `translateY(-50%) rotate(${baseAngle}deg)`; 
    itemEls.forEach(el => { 
        el.style.transform = `rotate(${-baseAngle}deg) scale(0.9)`; 
    }); 
    itemEls[index].style.transform = `rotate(${-baseAngle}deg) scale(1.25)`;
}

function next(){ index=(index+1)%items.length; baseAngle-=stepAngle; update(); render(); }
function prev(){ index=(index-1+items.length)%items.length; baseAngle+=stepAngle; update(); render(); }

/* ── SCROLL WHEEL ── */
let buffer = 0;
window.addEventListener("wheel", e => {
    if(lock) return;
    lock = true;
    buffer += e.deltaY;
    if(buffer > 80){ next(); buffer=0; }
    if(buffer < -80){ prev(); buffer=0; }
    setTimeout(() => lock=false, 120);
}, { passive:true });

/* ── SWIPE MOBILE ── */
let startX = 0;
const isCardOpen = () => card.classList.contains("show-mobile");

window.addEventListener("touchstart", e => {
    if(isCardOpen()) return;
    startX = e.touches[0].clientX;
}, { passive:true });

window.addEventListener("touchend", e => {
    if(isCardOpen()) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) < 40) return;
    if(diff > 0) next(); else prev();
}, { passive:true });

/* ── DISMISS ON CLICK OUTSIDE ── */
document.addEventListener("click", e => {
    if(!isMobile) return;
    if(!card.contains(e.target) && !e.target.closest(".item") && e.target.id !== "openBtn"){
        card.classList.remove("show-mobile");
        document.body.classList.remove("hide-wheel");
        dismissFloating();
    }
});

window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft" || e.key === "ArrowUp"){ prev(); }
    if(e.key === "ArrowRight" || e.key === "ArrowDown"){ next(); }
});
</script>
</body>
