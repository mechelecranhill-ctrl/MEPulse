<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendaftaran Pengguna Baharu</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --ios-blue:#007AFF;
    --ios-green:#34C759;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    radial-gradient(circle at top,
    rgba(255,255,255,.15),
    transparent 35%),

    linear-gradient(
    60deg,
    #0b3d91 0%,
    #0077b6 40%,
    #00b4d8 100%);
}

body::before{
    content:"";
    position:fixed;
    inset:-20%;
    z-index:-1;

    background:
    radial-gradient(circle at 20% 80%,
    rgba(255,255,255,.18),
    transparent 25%),

    radial-gradient(circle at 80% 20%,
    rgba(255,255,255,.10),
    transparent 30%);

    filter:blur(40px);
    animation:fogMove 10s ease-in-out infinite alternate;
}

@keyframes fogMove{
    from{
        transform:translateX(-30px);
    }
    to{
        transform:translateX(30px) translateY(-20px);
    }
}

.glass-card{
    width:100%;
    max-width:500px;

    background:rgba(255,255,255,.25);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.4);

    border-radius:30px;

    padding:30px;

    box-shadow:
    0 8px 32px rgba(0,0,0,.15);
}

.logo{
    width:90px;
    height:90px;

    margin:auto auto 20px;

    border-radius:25px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,.25);

    color:white;
    font-size:38px;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:rgba(255,255,255,.9);
    font-size:13px;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;

    font-size:11px;
    font-weight:700;
    color:white;

    text-transform:uppercase;
}

input,
select{
    width:100%;
    padding:14px;

    border:none;
    outline:none;

    border-radius:15px;

    background:rgba(255,255,255,.45);

    font-size:14px;
}

.btn-primary{
    width:100%;
    margin-top:25px;

    padding:15px;

    border:none;
    border-radius:16px;

    background:var(--ios-blue);

    color:white;

    font-weight:700;
    font-size:15px;

    cursor:pointer;
}

.btn-primary:hover{
    opacity:.9;
}

.note{
    text-align:center;
    margin-top:15px;
    color:white;
    font-size:12px;
}

.success{
    display:none;

    margin-top:15px;

    background:rgba(52,199,89,.2);

    border:1px solid rgba(52,199,89,.4);

    color:white;

    padding:12px;
    border-radius:12px;
}

@media(max-width:768px){

.glass-card{
    padding:22px;
    border-radius:25px;
}

}

</style>
</head>

<body>

<div class="glass-card">

    <div class="logo">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <h2>Pendaftaran Pertama</h2>

    <div class="subtitle">
        Lengkapkan maklumat anda sebelum menggunakan sistem
    </div>

    <form id="signupForm">

        <label>Nama Penuh</label>
        <input type="text"
               id="fullname"
               placeholder="Nama Penuh"
               required>

        <label>Email</label>
        <input type="email"
               id="email"
               placeholder="nama@email.com"
               required>

        <label>No Telefon</label>
        <input type="tel"
               id="phone"
               placeholder="0123456789"
               required>

        <label>Jawatan</label>
        <input type="text"
               id="position"
               placeholder="Contoh: Jurutera"
               required>

        <label>Unit</label>
        <select id="unit" required>
            <option value="">Pilih Unit</option>
            <option>Mechanical</option>
            <option>Electrical</option>
            <option>Civil</option>
            <option>Building</option>
        </select>

        <label>Kata Laluan</label>
        <input type="password"
               id="password"
               placeholder="********"
               required>

        <label>Sahkan Kata Laluan</label>
        <input type="password"
               id="confirmPassword"
               placeholder="********"
               required>

        <button type="submit" class="btn-primary">
            <i class="fa-solid fa-user-check"></i>
            Lengkapkan Pendaftaran
        </button>

    </form>

    <div class="success" id="successBox">
        Akaun berjaya didaftarkan.
    </div>

    <div class="note">
        Contract Management System
    </div>

</div>

<script>

document
.getElementById('signupForm')
.addEventListener('submit', function(e){

    e.preventDefault();

    const password =
    document.getElementById('password').value;

    const confirm =
    document.getElementById('confirmPassword').value;

    if(password !== confirm){

        alert("Kata laluan tidak sepadan");

        return;
    }

    const data = {

        fullname:
        document.getElementById('fullname').value,

        email:
        document.getElementById('email').value,

        phone:
        document.getElementById('phone').value,

        position:
        document.getElementById('position').value,

        unit:
        document.getElementById('unit').value

    };

    console.log(data);

    document
    .getElementById('successBox')
    .style.display='block';

    setTimeout(()=>{

        alert(
        'Pendaftaran berjaya. Redirect ke Dashboard.'
        );

        // window.location.href='dashboard.html';

    },1000);

});

</script>

</body>
</html>
