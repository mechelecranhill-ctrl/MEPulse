<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Datang</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
        radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),
        linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%);
}

.glass-card{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.4);

    border-radius:30px;

    padding:35px 25px;
    text-align:center;

    box-shadow:
    0 8px 32px rgba(0,0,0,.15);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;

    border-radius:25px;

    background:rgba(255,255,255,.3);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
    color:white;
}

h1{
    margin-top:20px;
    color:white;
    font-size:26px;
}

.subtitle{
    margin-top:10px;
    color:rgba(255,255,255,.9);
    font-size:14px;
    line-height:1.6;
}

.info-box{
    margin-top:25px;

    background:rgba(255,255,255,.15);

    border-radius:18px;

    padding:15px;
    text-align:left;
}

.info-item{
    display:flex;
    gap:12px;
    margin-bottom:12px;
    color:white;
    font-size:13px;
}

.info-item:last-child{
    margin-bottom:0;
}

.info-item i{
    width:20px;
    text-align:center;
}

.btn-start{
    width:100%;
    margin-top:25px;

    padding:15px;

    border:none;
    border-radius:18px;

    background:white;
    color:#0b3d91;

    font-size:15px;
    font-weight:700;

    cursor:pointer;
}

.version{
    margin-top:18px;
    color:rgba(255,255,255,.75);
    font-size:11px;
}
</style>
</head>

<body>

<div class="glass-card">

    <div class="logo">
        <i class="fa-solid fa-file-contract"></i>
    </div>

    <h1>Selamat Datang</h1>

    <div class="subtitle">
        Sistem Pengurusan Kontrak & Work Order
    </div>

    <div class="info-box">

        <div class="info-item">
            <i class="fa-solid fa-file-pen"></i>
            <span>Daftar Work Order</span>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-file-contract"></i>
            <span>Pengurusan Kontrak</span>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-file-invoice-dollar"></i>
            <span>Interim Claim Tracking</span>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-chart-line"></i>
            <span>Pemantauan Perbelanjaan</span>
        </div>

    </div>

    <button class="btn-start" onclick="startApp()">
        Mula Menggunakan Sistem
    </button>

    <div class="version">
        Version 1.0
    </div>

</div>

<script>
function startApp(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
