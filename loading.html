<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading System</title>

<style>
:root{
    --glass: rgba(255,255,255,.12);
    --border: rgba(255,255,255,.25);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top, rgba(255,255,255,.15), transparent 30%),
        linear-gradient(180deg,#003566 0%,#0077b6 50%,#00b4d8 100%);
}

/* Cahaya air */
body::before{
    content:"";
    position:absolute;
    inset:-20%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.08), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,.10), transparent 30%);
    filter:blur(40px);
    animation:waterGlow 8s ease-in-out infinite alternate;
}

@keyframes waterGlow{
    from{transform:translateX(-30px);}
    to{transform:translateX(30px);}
}

.aquarium{
    position:relative;
    width:100%;
    height:100%;
}

/* Ikan */

.fish{
    position:absolute;
    filter:drop-shadow(0 0 15px rgba(255,255,255,.25));

    /* pusing supaya menghadap kiri */
    transform:scaleX(-1);
}

.fish1{
    top:30%;
    right:-120px;
    font-size:70px;
    animation:swim1 12s linear infinite;
}

.fish2{
    top:55%;
    right:-180px;
    font-size:90px;
    animation:swim2 16s linear infinite;
}

.fish3{
    top:70%;
    right:-100px;
    font-size:55px;
    animation:swim3 10s linear infinite;
}

@keyframes swim1{

    from{
        transform:translateX(0) scaleX(-1);
    }

    to{
        transform:translateX(calc(-100vw - 400px))
                  scaleX(-1);
    }
}

@keyframes swim2{

    from{
        transform:translateX(0) scaleX(-1);
    }

    to{
        transform:translateX(calc(-100vw - 500px))
                  scaleX(-1);
    }
}

@keyframes swim3{

    from{
        transform:translateX(0) scaleX(-1);
    }

    to{
        transform:translateX(calc(-100vw - 350px))
                  scaleX(-1);
    }
}

@keyframes swim1{
    from{left:-120px;}
    to{left:120%;}
}

@keyframes swim2{
    from{left:-180px;}
    to{left:120%;}
}

@keyframes swim3{
    from{left:-100px;}
    to{left:120%;}
}

/* Gelembung */
.bubble{
    position:absolute;
    bottom:-50px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(5px);
    animation:rise linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Card */
.loader-card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:320px;
    padding:30px;

    background:var(--glass);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid var(--border);
    border-radius:28px;

    text-align:center;

    box-shadow:
        0 10px 40px rgba(0,0,0,.15);
}

.loader-card h1{
    color:white;
    font-size:24px;
    margin-bottom:8px;
}

.loader-card p{
    color:rgba(255,255,255,.85);
    font-size:13px;
}

/* Progress */
.progress{
    margin-top:20px;
    height:10px;
    background:rgba(255,255,255,.15);
    border-radius:999px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #caf0f8,
        white
    );
    border-radius:999px;
    animation:loading 5s linear forwards;
}

@keyframes loading{
    from{width:0%;}
    to{width:100%;}
}

.percent{
    margin-top:15px;
    color:white;
    font-size:28px;
    font-weight:700;
}

.footer{
    margin-top:10px;
    font-size:11px;
    color:rgba(255,255,255,.7);
}
</style>
</head>
<body>

<div class="aquarium">

    <div class="fish fish1">🐠</div>
    <div class="fish fish2">🐟</div>
    <div class="fish fish3">🐡</div>

    <div class="loader-card">
        <h1>Contract System</h1>
        <p>Menyelam ke dalam pangkalan data...</p>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>

        <div class="percent" id="percent">0%</div>

        <div class="footer">
            Ranhill SAJ Internal System
        </div>
    </div>

</div>

<script>

// gelembung automatik
for(let i=0;i<40;i++){

    const bubble=document.createElement("div");

    bubble.className="bubble";

    const size=Math.random()*25+8;

    bubble.style.width=size+"px";
    bubble.style.height=size+"px";

    bubble.style.left=Math.random()*100+"vw";

    bubble.style.animationDuration=
        (Math.random()*6+6)+"s";

    bubble.style.animationDelay=
        Math.random()*5+"s";

    document.querySelector(".aquarium")
        .appendChild(bubble);
}

// percentage
let p=0;

const timer=setInterval(()=>{

    p++;

    document.getElementById("percent")
        .innerText=p+"%";

    if(p>=100){

        clearInterval(timer);

        // tukar ke page utama
        window.location.href="index.html";

    }

},50);

</script>

</body>
</html>
