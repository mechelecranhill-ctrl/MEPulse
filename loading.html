<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
:root{
    --ios-blue:#007AFF;
    --ios-gradient1:#0b3d91;
    --ios-gradient2:#0077b6;
    --ios-gradient3:#00b4d8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, system-ui, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(60deg,var(--ios-gradient1),var(--ios-gradient2),var(--ios-gradient3));
    overflow:hidden;
    position:relative;
}

/* fog effect */
body::before{
    content:"";
    position:absolute;
    inset:-50%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 40%);
    filter:blur(50px);
    animation:moveFog 8s ease-in-out infinite alternate;
}

@keyframes moveFog{
    from{transform:translate(-20px,-10px);}
    to{transform:translate(20px,10px);}
}

.loader-box{
    text-align:center;
    z-index:2;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    width:260px;
}

.spinner{
    width:60px;
    height:60px;
    border:5px solid rgba(255,255,255,0.3);
    border-top:5px solid white;
    border-radius:50%;
    margin:0 auto 15px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

h2{
    color:white;
    font-size:18px;
    margin-bottom:8px;
}

p{
    color:rgba(255,255,255,0.8);
    font-size:12px;
}

.progress{
    margin-top:15px;
    height:6px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:white;
    animation:load 3s ease forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>

<body>

<div class="loader-box">
    <div class="spinner"></div>
    <h2>Loading Sistem</h2>
    <p>Sila tunggu sebentar...</p>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>
</div>

<script>
setTimeout(()=>{
    // tukar ke page utama
    window.location.href = "index.html";
}, 3000);
</script>

</body>
</html>
