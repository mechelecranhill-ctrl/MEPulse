<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #a1c4fd;
            font-family: 'SF Pro Display', sans-serif, Arial;
            margin: 0; padding: 20px;
            color: #1d1d1f;
        }
        .container { max-width: 500px; margin: auto; }
        .header {
            background: rgba(255,255,255,0.8);
            padding: 20px; border-radius: 20px;
            text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .staf-card {
            background: white;
            padding: 15px; border-radius: 15px;
            margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .info-section { flex: 1; padding-right: 10px; }
        .status-section { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

        .badge {
            padding: 6px 12px; border-radius: 10px;
            font-size: 10px; font-weight: bold; color: white;
            min-width: 90px; text-align: center;
        }
        .delete-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #FF3B30;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .delete-btn:hover { background: #FF3B30; color: white; }

        .status-hadir { background: #34C759; } 
        .status-kerja { background: #007AFF; } 
        .status-cuti { background: #FF3B30; } 

        .btn-group { display: flex; gap: 8px; }

        .refresh-btn { 
            background: #007AFF; color: white; border: none; 
            padding: 8px 12px; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 12px;
        }

        .tv-btn {
            background: #5856D6; color: white; border: none;
            padding: 8px 12px; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 12px;
        }

        .refresh-btn:disabled, .tv-btn:disabled, .res-btn:disabled { opacity: 0.6; pointer-events: none; }

        .res-btn {
            background: #34C759; color: white; border: none;
            padding: 8px 12px; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 12px;
        }

        h2 { margin: 10px 0 0 0; letter-spacing: 1px; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <button onclick="window.location.href='index.html'" style="border:none; background:none; color:#007AFF; cursor:pointer; font-weight: bold; font-size: 14px;">
                <i class="fa-solid fa-chevron-left"></i> RETURN
            </button>

            <div class="btn-group">
                <button class="tv-btn" onclick="window.location.href='dashboard-tv.html'">
                    <i class="fa-solid fa-tv"></i> TV MODE
                </button>
                <button class="res-btn" onclick="window.location.href='dashboard-response.html'">
                    <i class="fa-solid fa-clipboard-list"></i> RESPONSE
                </button>
                <button id="refBtnText" class="refresh-btn" onclick="fetchAllStatus(true)">
                    <i id="refIcon" class="fa-solid fa-rotate"></i> REFRESH
                </button>
            </div>
        </div>
        <h2>ATTENDANCE RECORDS</h2>
        <p id="todayDate" style="font-size:12px; opacity:0.6; font-weight: bold; margin-top: 5px;"></p>
    </div>

    <div id="mainList">Retrieving Attendance Lists</div>
</div>

<script>
    const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

    async function fetchAllStatus(forceRefresh = false) {
        const list = document.getElementById('mainList');
        const icon = document.getElementById('refIcon');
        const btn = document.getElementById('refBtnText');

        list.innerHTML = "<div style='text-align:center; padding:20px;'>CHECKING DATABASE</div>";

        if(forceRefresh && icon && btn) {
            btn.disabled = true;
            icon.classList.add('fa-spin');
        }

        const hierarki = {
            'KETUA JABATAN': 1, 'KETUA SEKSYEN': 2, 'EKSEKUTIF KANAN': 3,
            'EKSEKUTIF': 4, 'JURUTEKNIK': 5, 'PENYELIA PENTADBIRAN': 6,
            'PEMBANTU PENTADBIRAN': 7, 'KERANI': 8
        };

        try {
            let allStaff = [];
            const CACHE_KEY = 'staff_data_cache';
            const CACHE_TIME_KEY = 'staff_data_time';
            const ONE_DAY = 24 * 60 * 60 * 1000;

            if (forceRefresh) {
                console.log("Memadam cache staf lama secara paksa...");
                localStorage.removeItem(CACHE_KEY);
                localStorage.removeItem(CACHE_TIME_KEY);
            }

            const cachedData = localStorage.getItem(CACHE_KEY);
            const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
            const now = new Date().getTime();

            if (cachedData && cachedTime && (now - cachedTime < ONE_DAY)) {
                console.log("Menggunakan data staf dari cache browser...");
                allStaff = JSON.parse(cachedData);
            } else {
                console.log("Tarik data staf terkini dari Supabase...");
                const resS = await fetch(SB_URL + '/rest/v1/staff?select=*', {
                    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
                });
                allStaff = await resS.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(allStaff));
                localStorage.setItem(CACHE_TIME_KEY, now.toString());
            }

            console.log("Tarik status ketiadaan live terkini dari Supabase...");
            const resA = await fetch(SB_URL + '/rest/v1/attendance?select=*', {
                headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            const allAtt = await resA.json();

            // FIX 1: Dapatkan tarikh hari ini yang bersih tanpa gangguan waktu jam/minit
            const sekarang = new Date();
            const hariIni = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate()).getTime();

            allStaff.sort((a, b) => {
                const jA = (a.position || "").toUpperCase().trim();
                const jB = (b.position || "").toUpperCase().trim();
                return (hierarki[jA] || 99) - (hierarki[jB] || 99) ||
                    (a.name || "").localeCompare(b.name || "");
            });

            list.innerHTML = "";

            allStaff.forEach(staf => {
                const sNama = (staf.name || "").toUpperCase().trim();

                const record = allAtt.find(a => {
                    const namaAtt = (a.name || "").toUpperCase().trim();
                    if (namaAtt !== sNama) return false;

                    // FIX 2: Parse tarikh format YYYY-MM-DD dengan jaminan zon masa neutral
                    const tMulaParts = a.start_date.split('-');
                    const tAkhirParts = a.end_date.split('-');
                    
                    const tMula = new Date(tMulaParts[0], tMulaParts[1] - 1, tMulaParts[2]).getTime();
                    const tAkhir = new Date(tAkhirParts[0], tAkhirParts[1] - 1, tAkhirParts[2]).getTime();
                    
                    // Semak jika tarikh hari ini berada dalam julat cuti/onsite staf
                    return hariIni >= tMula && hariIni <= tAkhir;
                });

                let sText = "HADIR";
                let sClass = "status-hadir";
                let sSub = (staf.position || "").toUpperCase();
                let deleteButtonHtml = "";

                if (record) {
                    sText = (record.reason || "LUAR").toUpperCase();
                    sClass = (sText.includes("CUTI") || sText.includes("SAKIT") || sText.includes("HALFDAY")) ? "status-cuti" : "status-kerja";
                    sSub = sSub + " • SEHINGGA: " + record.end_date;

                    deleteButtonHtml = `
                        <button class="delete-btn" onclick="padamRekod('${sNama}','${record.start_date}')">
                            <i class="fa-solid fa-xmark"></i> HADIR
                        </button>`;
                }

                list.innerHTML += `
                    <div class="staf-card">
                        <div class="info-section">
                            <div style="font-weight:bold; font-size:14px;">${sNama}</div>
                            <div style="font-size:10px; color:gray; margin-top:3px;">${sSub}</div>
                        </div>
                        <div class="status-section">
                            <div class="badge ${sClass}">${sText}</div>
                            ${deleteButtonHtml}
                        </div>
                    </div>`;
            });

            if (forceRefresh && icon && btn) {
                alert("✅ Senarai staf & rekod kehadiran telah dikemas kini!");
            }

        } catch (err) {
            list.innerHTML = "<div style='color:red; text-align:center;'>RALAT: " + err.message.toUpperCase() + "</div>";
        } finally {
            if (icon && btn) {
                btn.disabled = false;
                icon.classList.remove('fa-spin');
            }
        }
    }

    async function padamRekod(nama, tarikh) {
        if (!confirm(`ADAKAH ANDA PASTI ${nama} TELAH HADIR? REKOD KETIADAAN HARI INI AKAN DIPADAM.`)) return;

        try {
            const res = await fetch(`${SB_URL}/rest/v1/attendance?name=eq.${nama}&start_date=eq.${tarikh}`, {
                method: 'DELETE',
                headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });

            if (res.ok) {
                alert("REKOD DIPADAM. STATUS KEMBALI KEPADA HADIR.");
                fetchAllStatus(false);
            } else {
                throw new Error("Gagal padam rekod");
            }
        } catch (err) {
            alert("RALAT: " + err.message);
        }
    }

    const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('todayDate').innerText = new Date().toLocaleDateString('ms-MY', opsi).toUpperCase();

    window.onload = () => fetchAllStatus(false);
</script>

</body>
</html>
