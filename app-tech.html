<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Tetapan Layout Utama */
        body { 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Sidebar: Lebar tetap, tidak menolak kandungan */
        app-sidebar { 
            width: 250px; /* Anda boleh adjust lebar ini */
            flex-shrink: 0; 
            height: 100%;
            overflow-y: auto;
        }

        /* Main Wrapper: Mengisi semua ruang baki di sebelah kanan */
        .main-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Glass Header */
        .glass-header {
            height: 70px;
            background: linear-gradient(60deg, #2d3436 0%, #636e72 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <app-sidebar></app-sidebar>

    <div class="main-wrapper bg-gray-100">
        
        <header class="glass-header">
            <h1 class="text-xl font-bold">Technician Dashboard</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <section class="bg-white rounded-xl shadow p-5 border-t-4 border-blue-500">
                    <h2 class="font-bold text-gray-700 mb-4">Quotation Status</h2>
                    <div id="quotations-container">Loading...</div>
                </section>

                <section class="bg-white rounded-xl shadow p-5 border-t-4 border-emerald-500">
                    <h2 class="font-bold text-gray-700 mb-4">Blueform Status</h2>
                    <div id="blueforms-container">Loading...</div>
                </section>
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
