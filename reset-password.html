<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&E Connect - Reset Password</title>

<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100dvh;
    font-family:'Lato',sans-serif;
    background:
    linear-gradient(60deg, #0b3d91 0%, #0077b6 40%, #00b4d8 100%);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:340px;
    max-width:90%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:18px;
    padding:28px 24px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card h2{
    font-weight:400;
    letter-spacing:1px;
    margin-top:0;
    margin-bottom:6px;
}

.card p.sub{
    font-size:13px;
    color:rgba(255,255,255,.8);
    margin-top:0;
    margin-bottom:22px;
    line-height:1.5;
}

.password-wrapper{
    position:relative;
    width:100%;
    margin-bottom:12px;
}

input{
    width:100%;
    padding:14px 16px;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.20);
    border-radius:14px;
    color:white;
    box-sizing:border-box;
    outline:none;
    font-size:14px;
    padding-right:50px;
}

input::placeholder{
    color:rgba(255,255,255,.75);
}

input:focus{
    border-color:rgba(255,255,255,.45);
    background:rgba(255,255,255,.20);
    box-shadow:0 0 0 3px rgba(255,255,255,.10);
}

.toggle-password{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:rgba(255,255,255,.85);
}

button{
    width:100%;
    margin-top:8px;
    border-radius:14px;
    height:48px;
    border:1px solid rgba(34,197,94,.35);
    background:rgba(34,197,94,.18);
    color:rgba(0,0,0,.85);
    font-weight:700;
    cursor:pointer;
    box-shadow:0 8px 25px rgba(34,197,94,.25);
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    filter:brightness(1.08);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
}

.status{
    font-size:13px;
    margin-top:14px;
    min-height:18px;
}

.status.error{ color:#ffb3b3; }
.status.success{ color:#b3ffc6; }

.hidden{ display:none; }

a.back{
    display:inline-block;
    margin-top:18px;
    font-size:12px;
    color:rgba(255,255,255,.8);
    text-decoration:none;
}
a.back:hover{ text-decoration:underline; }

</style>
</head>

<body>

<div class="card">

    <h2>Set Password Baru</h2>
    <p class="sub" id="subText">Sila tunggu, mengesahkan link reset...</p>

    <div id="formArea" class="hidden">
        <div class="password-wrapper">
            <input id="newPassword" type="password" placeholder="Password Baru">
            <span class="toggle-password" data-target="newPassword"><i class="fa-solid fa-eye"></i></span>
        </div>
        <div class="password-wrapper">
            <input id="confirmPassword" type="password" placeholder="Sahkan Password Baru">
            <span class="toggle-password" data-target="confirmPassword"><i class="fa-solid fa-eye"></i></span>
        </div>
        <button id="submitBtn" onclick="submitNewPassword()">Kemaskini Password</button>
    </div>

    <div id="statusMsg" class="status"></div>

    <a class="back" href="login.html">&larr; Kembali ke Login</a>

</div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

window.sbClient = window.sbClient || supabase.createClient(SB_URL, SB_KEY);
const sbClient = window.sbClient;

const subText = document.getElementById("subText");
const formArea = document.getElementById("formArea");
const statusMsg = document.getElementById("statusMsg");

let sessionReady = false;

function setStatus(msg, type){
    statusMsg.textContent = msg || "";
    statusMsg.className = "status" + (type ? " " + type : "");
}

async function initRecovery(){

    // Flow 1 (PKCE): link mengandungi ?code=xxxx
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if(code){
        const { error } = await sbClient.auth.exchangeCodeForSession(window.location.href);
        if(error){
            console.error(error);
            subText.textContent = "Link reset tidak sah atau sudah tamat tempoh. Sila mohon link baru dari halaman login.";
            setStatus("", "");
            return;
        }
        sessionReady = true;
        subText.textContent = "Sila masukkan password baru anda.";
        formArea.classList.remove("hidden");
        return;
    }

    // Flow 2 (implicit): supabase-js auto-detect token dalam URL hash (#access_token=...&type=recovery)
    // dan akan trigger event PASSWORD_RECOVERY melalui onAuthStateChange.
    sbClient.auth.onAuthStateChange((event, session) => {
        if(event === "PASSWORD_RECOVERY"){
            sessionReady = true;
            subText.textContent = "Sila masukkan password baru anda.";
            formArea.classList.remove("hidden");
        }
    });

    // Fallback: kalau selepas 2.5s tiada event/kod dikesan, mungkin page dibuka terus (bukan dari link email)
    setTimeout(() => {
        if(!sessionReady){
            subText.textContent = "Tiada link reset sah dikesan. Sila mohon link reset dari halaman login (Forgot Password).";
        }
    }, 2500);
}

async function submitNewPassword(){
    if(!sessionReady){
        setStatus("Sesi reset tidak sah. Sila mohon link baru.", "error");
        return;
    }

    const p1 = document.getElementById("newPassword").value;
    const p2 = document.getElementById("confirmPassword").value;

    if(!p1 || !p2){
        setStatus("Sila isi kedua-dua field password.", "error");
        return;
    }

    if(p1.length < 6){
        setStatus("Password mesti sekurang-kurangnya 6 aksara.", "error");
        return;
    }

    if(p1 !== p2){
        setStatus("Password tidak sepadan.", "error");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Mengemaskini...";

    try {
        const { error } = await sbClient.auth.updateUser({ password: p1 });

        if(error){
            console.error(error);
            setStatus("Gagal kemaskini: " + error.message, "error");
            btn.disabled = false;
            btn.textContent = "Kemaskini Password";
            return;
        }

        setStatus("Password berjaya dikemaskini! Mengalihkan ke halaman login...", "success");
        formArea.classList.add("hidden");

        // Log keluar sesi recovery ni supaya staff kena login semula dengan password baru
        await sbClient.auth.signOut();

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1800);

    } catch(err){
        console.error(err);
        setStatus("Server error.", "error");
        btn.disabled = false;
        btn.textContent = "Kemaskini Password";
    }
}

document.querySelectorAll(".toggle-password").forEach(span => {
    span.addEventListener("click", () => {
        const targetId = span.getAttribute("data-target");
        const input = document.getElementById(targetId);
        const icon = span.querySelector("i");

        if(input.type === "password"){
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    });
});

initRecovery();

</script>
</body>
</html>
