<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Directory</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f2f2f7;
    overflow-x: hidden; /* Elakkan skrin lari ke kanan */
}

.header {
    height: 60px;
    background: white;
    display: flex;
    align-items: center;
    padding: 0 15px;
    gap: 15px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
}

.back-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #007AFF;
    flex-shrink: 0;
}

.container {
    padding: 15px;
    box-sizing: border-box;
    width: 100%;
}

.search-box {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    margin-bottom: 15px;
    box-sizing: border-box;
    font-size: 15px;
}

.tree-group {
    margin-bottom: 25px;
}

.tree-title {
    font-size: 11px;
    font-weight: 700;
    color: #666;
    margin: 0 0 10px 8px;
    letter-spacing: 1px;
}

.tree-wrapper {
    position: relative;
    padding-left: 20px;
}

.tree-wrapper::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #d1d1d6;
}

.staff-card {
    position: relative;
    background: white;
    border-radius: 18px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    box-sizing: border-box;
    width: 100%;
}

.staff-card::before {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    width: 12px;
    height: 2px;
    background: #d1d1d6;
}

.staff-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1;
}

.staff-avatar {
    width: 45px;
    height: 45px;
    border-radius: 14px;
    background: linear-gradient(135deg, #007AFF, #5AC8FA);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
}

.staff-info {
    min-width: 0;
    flex: 1;
}

/* KEMASKINI KHAS UNTUK NAMA STAFF */
.staff-info h4 {
    margin: 3px 0;
    font-size: 14px;
    font-weight: 700;
    color: #000;
    
    /* Membenarkan teks turun baris baru */
    white-space: normal;       
    
    /* Memastikan pemotongan berlaku pada ruang/jarak sahaja, bukan tengah perkataan */
    word-break: keep-all;      
    overflow-wrap: break-word; 
    
    /* Menghadkan paparan maksimum kepada 2 baris sahaja */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* MAKLUMAT LAIN KEKAL 1 BARIS DAN ADA '...' JIKA TERLAMPAU PANJANG */
.staff-info p {
    margin: 3px 0;
    font-size: 12px;
    color: #666;
    line-height: 1.4;
    white-space: nowrap;     
    overflow: hidden;        
    text-overflow: ellipsis; 
}

.staff-info i {
    width: 16px;
    color: #007AFF;
    margin-right: 4px;
}

.action-group {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-self: center; /* Memastikan butang sentiasa berada di tengah kad */
}

.icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 13px;
}

.edit-btn {
    background: #007AFF;
}

.delete-btn {
    background: #FF3B30;
}

.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 55px;
    height: 55px;
    border-radius: 18px;
    background: #34C759;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 99;
}

@media (max-width: 360px) {
    .container {
        padding: 10px;
    }
    .tree-wrapper {
        padding-left: 15px;
    }
    .staff-avatar {
        width: 38px;
        height: 38px;
        font-size: 14px;
    }
    .icon-btn {
        width: 30px;
        height: 30px;
        font-size: 11px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="window.location.href='index.html'">
        <i class="fa fa-chevron-left"></i>
    </div>
    <h3 style="margin:0;">User Directory</h3>
</div>

<div class="container">
    <input type="text"
           id="searchStaff"
           class="search-box"
           placeholder="Cari staff..."
           onkeyup="renderStaff()">

    <div id="staffList"></div>
</div>

<div class="fab" onclick="addStaff()">
    <i class="fa fa-plus"></i>
</div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    
    const headers = {
        apikey: SB_KEY,
        Authorization: 'Bearer ' + SB_KEY,
        'Content-Type':'application/json'
    };

    const hierarki = {
        'KETUA JABATAN': 1,
        'KETUA SEKSYEN': 2,
        'EKSEKUTIF KANAN': 3,
        'EKSEKUTIF': 4,
        'JURUTEKNIK': 5,
        'PENYELIA PENTADBIRAN': 6,
        'PEMBANTU PENTADBIRAN': 7,
        'KERANI': 8
    };

    let staffData = [];
    let unitData = [];
let selectedStaffId = null;
    let sectionData=[];
let selectedSectionStaff=null;

    async function loadUnits(){

    const res = await fetch(
        `${SB_URL}/rest/v1/units?select=id,unit_name`,
        {headers}
    );

    unitData = await res.json();
}
    async function loadSections(){

const res = await fetch(
`${SB_URL}/rest/v1/me_sections?select=id,section_name`,
{
headers
});

sectionData = await res.json();

}

    async function loadStaff(){
        try {
            const res = await fetch(
                `${SB_URL}/rest/v1/staff?select=id,name,position,employee_id,phone_no,email`,
                { headers }
            );

            const data = await res.json();

            if(!res.ok){
                alert(JSON.stringify(data,null,2));
                return;
            }

            staffData = data;
            renderStaff();
        } catch(err) {
            console.error(err);
        }
    }

    function renderStaff(){
        const keyword = document.getElementById('searchStaff').value.toLowerCase();
        let filtered = [...staffData];

        filtered = filtered.filter(s => {
            return (
                s.name?.toLowerCase().includes(keyword) ||
                s.position?.toLowerCase().includes(keyword)
            );
        });

        filtered.sort((a,b)=>{
            const ra = hierarki[a.position?.toUpperCase()] || 99;
            const rb = hierarki[b.position?.toUpperCase()] || 99;
            if(ra !== rb) return ra-rb;
            return a.name.localeCompare(b.name);
        });

        let grouped = {};
        filtered.forEach(s=>{
            const position = s.position?.toUpperCase() || 'LAIN-LAIN';
            if(!grouped[position]) grouped[position] = [];
            grouped[position].push(s);
        });

        let html = '';
        Object.keys(grouped).forEach(position=>{
            html += `
            <div class="tree-group">
                <div class="tree-title">${position}</div>
                <div class="tree-wrapper">
            `;

            grouped[position].forEach(s=>{
                const initials = s.name
                    .split(' ')
                    .map(x=>x[0])
                    .join('')
                    .substring(0,2);

                html += `
                <div class="staff-card">
                    <div class="staff-left">
                        <div class="staff-avatar">${initials}</div>
                        <div class="staff-info">
                            <h4>${s.name.toUpperCase()}</h4>
                            <p><strong>${s.position}</strong></p>
                            <p><i class="fa fa-id-badge"></i>Employee ID : ${s.employee_id || '-'}</p>
                            <p><i class="fa fa-phone"></i>${s.phone_no || '-'}</p>
                            <p><i class="fa fa-envelope"></i>${s.email || '-'}</p>
                        </div>
                    </div>
                    <div class="action-group">

<button class="icon-btn"
style="background:#5856D6"
onclick="assignSection('${s.id}','${s.name}')">

<i class="fa fa-layer-group"></i>

</button>

    <button class="icon-btn" 
        style="background:#34C759"
        onclick="assignUnit('${s.id}','${s.name}')">
        <i class="fa fa-sitemap"></i>
    </button>

    <button class="icon-btn edit-btn" onclick="editStaff('${s.id}')">
        <i class="fa fa-pen"></i>
    </button>

    <button class="icon-btn delete-btn" onclick="deleteStaff('${s.id}', '${s.name}')">
        <i class="fa fa-trash"></i>
    </button>

</div>
                </div>
                `;
            });

            html += `</div></div>`;
        });

        document.getElementById('staffList').innerHTML = html;
    }

    let editingStaff = null;

    function addStaff(existing=null){
        editingStaff = existing;
        document.getElementById("modalTitle").innerText = existing ? "Edit Staff" : "New Staff";
        document.getElementById("fName").value = existing?.name || "";
        document.getElementById("fPosition").value = existing?.position || "";
        document.getElementById("fEmployee").value = existing?.employee_id || "";
        document.getElementById("fPhone").value = existing?.phone_no || "";
        document.getElementById("fEmail").value = existing?.email || "";
        document.getElementById("staffModal").style.display="flex";
    }

    function closeModal(){
        document.getElementById("staffModal").style.display="none";
    }

    function editStaff(id){
        const staff = staffData.find(s=>s.id===id);
        if(staff) addStaff(staff);
    }

    async function saveStaff(){
        const name = document.getElementById("fName").value;
        const position = document.getElementById("fPosition").value;
        const employee_id = document.getElementById("fEmployee").value;
        const phone_no = document.getElementById("fPhone").value;
        const email = document.getElementById("fEmail").value;

        if(!name || !email) {
            alert("Nama dan Emel wajib diisi!");
            return;
        }

        const body = { name, position, employee_id, phone_no, email };

        try {
            let res;
            
            if (!editingStaff) {
                const defaultPassword = "StaffPassword123!"; 

                const authRes = await fetch(`${SB_URL}/auth/v1/signup`, {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify({
                        email: email,
                        password: defaultPassword
                    })
                });

                const authData = await authRes.json();

                if (!authRes.ok) {
                    alert("Ralat Pendaftaran Supabase Auth: " + (authData.msg || JSON.stringify(authData)));
                    return; 
                }
            }

            if(editingStaff){
                res = await fetch(
                    `${SB_URL}/rest/v1/staff?id=eq.${editingStaff.id}`,
                    {
                        method: "PATCH",
                        headers: {
                            ...headers,
                            "Prefer": "return=minimal"
                        },
                        body: JSON.stringify(body)
                    }
                );
            } else {
                res = await fetch(
                    `${SB_URL}/rest/v1/staff`,
                    {
                        method: "POST",
                        headers: {
                            ...headers,
                            "Prefer": "return=minimal"
                        },
                        body: JSON.stringify(body)
                    }
                );
            }

            if (!res.ok) {
                const errData = await res.json();
                alert("Ralat Simpan Data Database: " + JSON.stringify(errData));
                return;
            }

            alert(editingStaff ? "Staff berjaya dikemaskini!" : "Staff baru didaftarkan ke Database & Supabase Auth!");
            closeModal();
            loadStaff(); 

        } catch(err) {
            alert(err.message);
        }
    }

    async function deleteStaff(id, name){
        const ok = confirm(`PADAM ${name.toUpperCase()} ?`);
        if(!ok) return;

        try {
            const res = await fetch(
                `${SB_URL}/rest/v1/staff?id=eq.${id}`,
                {
                    method: 'DELETE',
                    headers: {
                        ...headers,
                        "Prefer": "return=minimal"
                    }
                }
            );

            if (!res.ok) {
                const errData = await res.json();
                alert("Gagal memadam: " + JSON.stringify(errData));
                return;
            }

            loadStaff();
        } catch(err) {
            alert(err.message);
        }
    }

    async function assignSection(staffId,name){

selectedSectionStaff = staffId;


const res = await fetch(
`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${staffId}&select=section_id`,
{
headers
});


const assigned = await res.json();


let selected =
assigned.map(x=>x.section_id);



let html="";


sectionData.forEach(s=>{


let checked =
selected.includes(s.id)
?"checked":"";


html += `

<label style="
display:flex;
gap:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:8px">


<input 
type="checkbox"
class="sectionCheck"
value="${s.id}"
${checked}>


${s.section_name}


</label>

`;

});


document.getElementById("sectionList").innerHTML=html;


document.getElementById("sectionModal")
.style.display="flex";


}

    async function saveSectionAssignment(){


await fetch(
`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${selectedSectionStaff}`,
{
method:"DELETE",
headers
});


let data =
[...document.querySelectorAll(".sectionCheck:checked")]
.map(x=>({

staff_id:selectedSectionStaff,

section_id:Number(x.value)

}));


if(data.length){

await fetch(
`${SB_URL}/rest/v1/staff_section_assignment`,
{
method:"POST",
headers:{
...headers,
"Prefer":"return=minimal"
},
body:JSON.stringify(data)
});

}


alert("Section berjaya disimpan");

closeSectionModal();


}

    async function assignUnit(staffId,name){

    selectedStaffId = staffId;

    document.getElementById("assignTitle").innerHTML =
    "Assign Unit : " + name;


    const res = await fetch(
        `${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${staffId}&select=unit_id`,
        {headers}
    );


    const assigned = await res.json();

    let assignedIds =
        assigned.map(x=>x.unit_id);


    let html="";


    unitData.forEach(u=>{

        let checked =
        assignedIds.includes(u.id)
        ? "checked"
        : "";


        html +=`

        <label style="
        display:flex;
        gap:10px;
        padding:10px;
        background:#f5f5f5;
        border-radius:10px;
        margin-bottom:8px">

        <input 
        type="checkbox"
        class="unitCheck"
        value="${u.id}"
        ${checked}>

        ${u.unit_name}

        </label>

        `;

    });


    document.getElementById("unitList").innerHTML=html;

    document.getElementById("unitModal")
    .style.display="flex";

}
    async function saveUnitAssignment(){


    // buang assignment lama

    await fetch(
    `${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${selectedStaffId}`,
    {
        method:"DELETE",
        headers
    });



    let selected =
    [...document.querySelectorAll(".unitCheck:checked")]
    .map(x=>({

        staff_id:selectedStaffId,
        unit_id:Number(x.value)

    }));


    if(selected.length){

        await fetch(
        `${SB_URL}/rest/v1/staff_unit_assignment`,
        {
            method:"POST",
            headers:{
                ...headers,
                "Prefer":"return=minimal"
            },
            body:JSON.stringify(selected)
        });

    }


    alert("Unit berjaya disimpan");

    closeUnitModal();

}

    function closeUnitModal(){

document.getElementById("unitModal")
.style.display="none";

}

    window.onload = async function(){

await loadUnits();

await loadSections();

await loadStaff();

}
    
</script>

<div id="staffModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); justify-content:center; align-items:center; z-index:9999;">
    <div style="background:#fff; width:420px; max-width:90%; border-radius:20px; padding:20px; box-sizing: border-box;">
        <h3 id="modalTitle" style="margin-top:0;">Staff</h3>
        
        <input id="fName" class="search-box" placeholder="Staff Name">
        <input id="fPosition" class="search-box" placeholder="Position">
        <input id="fEmployee" class="search-box" placeholder="Employee ID">
        <input id="fPhone" class="search-box" placeholder="Phone No">
        <input id="fEmail" class="search-box" placeholder="Email">

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button onclick="closeModal()" style="padding:10px 18px; border:none; border-radius:10px; cursor:pointer;">Cancel</button>
            <button onclick="saveStaff()" style="padding:10px 18px; border:none; border-radius:10px; background:#007AFF; color:#fff; cursor:pointer;">Save</button>
        </div>
    </div>
</div>

    <div id="unitModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999">


<div style="
background:white;
width:400px;
max-width:90%;
border-radius:20px;
padding:20px">


<h3 id="assignTitle">
Assign Unit
</h3>


<div id="unitList"></div>


<div style="
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:15px">


<button onclick="closeUnitModal()">
Cancel
</button>


<button 
onclick="saveUnitAssignment()"
style="
background:#34C759;
color:white;
padding:10px 15px;
border-radius:10px;
border:none">
Save
</button>


</div>


</div>
</div>
    
</body>
</html>
