<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Directory</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">


<style>

body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f2f2f7;
    overflow-x:hidden;
}


.header {

    height:60px;
    background:white;
    display:flex;
    align-items:center;
    padding:0 15px;
    gap:15px;
    box-shadow:0 1px 8px rgba(0,0,0,.05);
    position:sticky;
    top:0;
    z-index:100;

}


.back-btn {

    width:36px;
    height:36px;
    border-radius:10px;
    background:#f2f2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:#007AFF;

}



.container{

    padding:15px;
    width:100%;
    max-width:760px;
    margin:0 auto;
    box-sizing:border-box;

}



.search-box{

    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    margin-bottom:18px;
    font-size:15px;
    box-sizing:border-box;
    box-shadow:0 2px 8px rgba(0,0,0,.05);

}


/* =========================
   ORG / FAMILY TREE
========================= */

.org-tree{

    position:relative;
    padding-left:14px;

}


.org-tree::before{

    content:'';
    position:absolute;
    left:12px;
    top:4px;
    bottom:4px;
    width:2px;
    background:linear-gradient(#c7d2e0,#e2e6ee 70%,#eef0f4);

}


.tier-block{

    position:relative;
    margin-bottom:14px;

}


.tier-header{

    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    user-select:none;
    padding:6px 10px 6px 0;

}


.tier-node{

    position:relative;
    z-index:2;
    width:24px;
    height:24px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:11px;
    font-weight:800;
    flex-shrink:0;
    box-shadow:0 0 0 4px #f2f2f7, 0 2px 6px rgba(0,0,0,.15);

}


.tier-meta{

    display:flex;
    align-items:baseline;
    gap:8px;
    flex:1;
    min-width:0;

}


.tier-name{

    font-size:13px;
    font-weight:800;
    color:#222;
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

}


.tier-count{

    font-size:11px;
    font-weight:600;
    color:#8e8e93;
    white-space:nowrap;

}


.tier-chevron{

    color:#8e8e93;
    font-size:13px;
    transition:transform .2s ease;

}


.tier-chevron.collapsed{

    transform:rotate(-90deg);

}


.tier-branch{

    position:relative;
    margin-left:34px;
    padding-left:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:8px;

}


.tier-branch.hidden{

    display:none;

}


.tier-branch::before{

    content:'';
    position:absolute;
    left:0;
    top:-8px;
    bottom:22px;
    width:2px;
    background:#dcdfe6;

}


.staff-card{

    position:relative;
    background:white;
    border-radius:16px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);

}


.staff-card::before{

    content:'';
    position:absolute;
    left:-18px;
    top:26px;
    width:18px;
    height:2px;
    background:#dcdfe6;

}


.staff-left{

    display:flex;
    gap:12px;
    flex:1;
    min-width:0;

}



.staff-avatar{

    width:42px;
    height:42px;
    border-radius:13px;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:13px;
    flex-shrink:0;

}



.staff-info{

    min-width:0;
    flex:1;

}



.staff-info h4{

    margin:0 0 4px 0;
    font-size:14px;
    font-weight:700;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

}


.staff-chips{

    display:flex;
    flex-wrap:wrap;
    gap:6px;

}


.chip{

    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:11px;
    color:#666;
    background:#f2f2f7;
    padding:3px 8px;
    border-radius:8px;
    white-space:nowrap;
    max-width:150px;
    overflow:hidden;
    text-overflow:ellipsis;

}



.action-group{

    display:flex;
    gap:6px;
    flex-shrink:0;

}



.icon-btn{

    width:32px;
    height:32px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    flex-shrink:0;

}


.edit-btn{
    background:#007AFF;
}


.delete-btn{
    background:#FF3B30;
}


.empty-state{

    text-align:center;
    color:#8e8e93;
    font-size:13px;
    padding:40px 10px;

}



.fab{

    position:fixed;
    right:20px;
    bottom:20px;
    width:55px;
    height:55px;
    border-radius:18px;
    background:#34C759;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    box-shadow:0 4px 14px rgba(52,199,89,.4);

}


/* =========================
   MOBILE
========================= */

@media (max-width:480px){

    .staff-card{
        flex-direction:column;
        align-items:stretch;
    }

    .action-group{
        justify-content:flex-end;
        border-top:1px solid #f2f2f7;
        padding-top:8px;
    }

    .chip{
        max-width:120px;
    }

    .tier-branch{
        margin-left:26px;
        padding-left:14px;
    }

    .tier-name{
        font-size:12px;
    }

}

</style>

</head>


<body>


<div class="header">

<div class="back-btn" onclick="location.href='index.html'">

<i class="fa fa-chevron-left"></i>

</div>


<h3>User Directory</h3>


</div>



<div class="container">


<input id="searchStaff"
class="search-box"
placeholder="Cari staff..."
onkeyup="renderStaff()">



<div id="staffList"></div>


</div>



<div class="fab" onclick="addStaff()">

<i class="fa fa-plus"></i>

</div>





<script>


const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';


const headers={

apikey:SB_KEY,
Authorization:'Bearer '+SB_KEY,
'Content-Type':'application/json'

};



const hierarki={

"KETUA JABATAN":1,
"KETUA SEKSYEN":2,
"EKSEKUTIF KANAN":3,
"EKSEKUTIF":4,
"JURUTEKNIK":5,
"PENYELIA PENTADBIRAN":6,
"PEMBANTU PENTADBIRAN":7,
"KERANI":8

};


// colour scale from top rank (deep) to lower rank (light) -- encodes hierarchy depth
const rankColors=[
"#1D1D3B",
"#33339E",
"#5856D6",
"#5E5CE6",
"#007AFF",
"#0091D6",
"#32ADE6",
"#5AC8FA"
];

const unrankedColor="#AEAEB2";



let staffData=[];
let unitData=[];
let sectionData=[];


let selectedStaffId=null;
let selectedSectionStaff=null;

    let editingStaff=null;

let collapsedTiers=new Set();



async function loadUnits(){


let res=await fetch(

`${SB_URL}/rest/v1/units?select=id,unit_name,section_id,me_sections(section_name)`,

{headers}

);


let data=await res.json();


if(!res.ok){

console.error(data);

return;

}


unitData=data;


}


async function loadSections(){


let res=await fetch(

`${SB_URL}/rest/v1/me_sections?select=id,section_name`,

{headers}

);


let data=await res.json();


if(!res.ok){

console.error(data);

return;

}


sectionData=data;


}

async function loadStaff(){


let res=await fetch(

`${SB_URL}/rest/v1/staff?select=id,name,position,employee_id,phone_no,email`,

{headers}

);



let data=await res.json();



if(!res.ok){

console.error(data);

alert(
"Load staff gagal: "+JSON.stringify(data)
);

return;

}



staffData=data;


renderStaff();


}






function canAssignSection(position){


position=position?.toUpperCase();


return (

position==="KETUA SEKSYEN" ||
position==="KETUA JABATAN"

);


}



function tierRank(position){

return hierarki[position?.toUpperCase()] || 99;

}


function tierColor(rank){

if(rank>=1 && rank<=rankColors.length)
return rankColors[rank-1];

return unrankedColor;

}


function toggleTier(tierKey){

if(collapsedTiers.has(tierKey))
collapsedTiers.delete(tierKey);
else
collapsedTiers.add(tierKey);

renderStaff();

}







function renderStaff(){


let keyword=
document.getElementById("searchStaff").value.toLowerCase();



let data=staffData.filter(s=>

s.name.toLowerCase().includes(keyword)
||
s.position.toLowerCase().includes(keyword)

);



if(!data.length){

document.getElementById("staffList").innerHTML=
`<div class="empty-state"><i class="fa fa-users" style="font-size:24px;display:block;margin-bottom:8px;"></i>Tiada staff dijumpai</div>`;

return;

}



// group staff by position (tier)

let groups={};


data.forEach(s=>{

let key=s.position || "LAIN-LAIN";

if(!groups[key])
groups[key]=[];

groups[key].push(s);

});



let tierKeys=Object.keys(groups).sort((a,b)=>

tierRank(a)-tierRank(b)

);



let html=`<div class="org-tree">`;



tierKeys.forEach(tier=>{


let rank=tierRank(tier);

let color=tierColor(rank);

let members=groups[tier].sort((a,b)=>

a.name.localeCompare(b.name)

);

let isCollapsed=collapsedTiers.has(tier);



html+=`

<div class="tier-block">


<div class="tier-header" data-tier="${escapeAttr(tier)}">

<div class="tier-node" style="background:${color}">
${rank<=8?rank:'-'}
</div>

<div class="tier-meta">
<span class="tier-name">${tier}</span>
<span class="tier-count">${members.length} orang</span>
</div>

<i class="fa fa-chevron-down tier-chevron ${isCollapsed?'collapsed':''}"></i>

</div>


<div class="tier-branch ${isCollapsed?'hidden':''}">

`;



members.forEach(s=>{


let initials=s.name
.split(" ")
.map(x=>x[0])
.join("")
.substring(0,2);



html+=`

<div class="staff-card">


<div class="staff-left">


<div class="staff-avatar" style="background:${color}">

${initials}

</div>



<div class="staff-info">


<h4>${s.name}</h4>


<div class="staff-chips">

<span class="chip"><i class="fa fa-id-badge"></i>${s.employee_id||'-'}</span>

<span class="chip"><i class="fa fa-phone"></i>${s.phone_no||'-'}</span>

<span class="chip"><i class="fa fa-envelope"></i>${s.email||'-'}</span>

</div>


</div>


</div>




<div class="action-group">



${canAssignSection(s.position)?`

<button class="icon-btn"
style="background:#5856D6"
onclick="assignSection('${s.id}','${s.name}')">

<i class="fa fa-layer-group"></i>

</button>

`:''}




<button class="icon-btn"
style="background:#34C759"
onclick="assignUnit('${s.id}','${s.name}')">

<i class="fa fa-sitemap"></i>

</button>



<button class="icon-btn edit-btn"
onclick="editStaff('${s.id}')">

<i class="fa fa-pen"></i>

</button>



<button class="icon-btn delete-btn"
onclick="deleteStaff('${s.id}','${s.name}')">

<i class="fa fa-trash"></i>

</button>



</div>


</div>

`;


});



html+=`</div></div>`;


});



html+=`</div>`;



document.getElementById("staffList").innerHTML=html;


// wire up tier collapse/expand (avoids quote-escaping issues with position names)

document.querySelectorAll(".tier-header").forEach(el=>{

el.addEventListener("click",()=>{

toggleTier(el.dataset.tier);

});

});


}


function escapeAttr(str){

return String(str)
.replaceAll('"',"&quot;")
.replaceAll("'","&#39;");

}



window.onload=async()=>{


await loadUnits();

await loadSections();

await loadStaff();


};



</script>

    <!-- =========================
     STAFF MODAL
========================= -->

<div id="staffModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999;">


<div style="
background:white;
width:420px;
max-width:90%;
border-radius:20px;
padding:20px;">


<h3 id="modalTitle">
Staff
</h3>


<input id="fName"
class="search-box"
placeholder="Staff Name">


<input id="fPosition"
class="search-box"
placeholder="Position">


<input id="fEmployee"
class="search-box"
placeholder="Employee ID">


<input id="fPhone"
class="search-box"
placeholder="Phone No">


<input id="fEmail"
class="search-box"
placeholder="Email">



<div style="
display:flex;
justify-content:flex-end;
gap:10px;">


<button onclick="closeModal()">
Cancel
</button>


<button onclick="saveStaff()"
style="
background:#007AFF;
color:white;
padding:10px 18px;
border:none;
border-radius:10px;">

Save

</button>


</div>


</div>

</div>





<!-- =========================
     UNIT MODAL
========================= -->


<div id="unitModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999;">



<div style="
background:white;
width:400px;
max-width:90%;
border-radius:20px;
padding:20px;">


<h3 id="assignTitle">
Assign Unit
</h3>


<div id="unitList"></div>



<div style="
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:15px;">


<button onclick="closeUnitModal()">
Cancel
</button>



<button onclick="saveUnitAssignment()"
style="
background:#34C759;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;">

Save

</button>


</div>


</div>

</div>






<!-- =========================
     SECTION MODAL
========================= -->


<div id="sectionModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999;">



<div style="
background:white;
width:400px;
max-width:90%;
border-radius:20px;
padding:20px;">


<h3>
Assign Section
</h3>


<div id="sectionList"></div>



<div style="
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:15px;">


<button onclick="closeSectionModal()">
Cancel
</button>



<button onclick="saveSectionAssignment()"
style="
background:#5856D6;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;">

Save

</button>


</div>


</div>

</div>






<script>

// =========================
// STAFF ADD / EDIT
// =========================


function addStaff(existing=null){


editingStaff=existing;


document.getElementById("modalTitle").innerHTML =
existing ? "Edit Staff" : "New Staff";


document.getElementById("fName").value =
existing?.name || "";


document.getElementById("fPosition").value =
existing?.position || "";


document.getElementById("fEmployee").value =
existing?.employee_id || "";


document.getElementById("fPhone").value =
existing?.phone_no || "";


document.getElementById("fEmail").value =
existing?.email || "";


document.getElementById("staffModal")
.style.display="flex";


}



function editStaff(id){


let staff =
staffData.find(x=>x.id===id);


if(staff)
addStaff(staff);


}




function closeModal(){

document.getElementById("staffModal")
.style.display="none";

}





// =========================
// SAVE STAFF + AUTH
// =========================


async function saveStaff(){


let body={

name:fName.value,

position:fPosition.value,

employee_id:fEmployee.value,

phone_no:fPhone.value,

email:fEmail.value

};



if(!body.name || !body.email){

alert("Nama dan Email wajib");

return;

}



let res;



if(!editingStaff){


// CREATE AUTH USER


let auth =
await fetch(

`${SB_URL}/auth/v1/signup`,

{

method:"POST",

headers,

body:JSON.stringify({

email:body.email,

password:"1234"

})

});


if(!auth.ok){

alert("Gagal create Auth");

return;

}


}



if(editingStaff){


res =
await fetch(

`${SB_URL}/rest/v1/staff?id=eq.${editingStaff.id}`,

{

method:"PATCH",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(body)

});


}

else{


res =
await fetch(

`${SB_URL}/rest/v1/staff`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(body)

});


}




if(!res.ok){

alert("Gagal simpan staff");

return;

}


alert("Berjaya");


closeModal();

loadStaff();


}







// =========================
// DELETE STAFF
// =========================


async function deleteStaff(id,name){


if(!confirm(
`PADAM ${name}?`
))
return;



await fetch(

`${SB_URL}/rest/v1/staff?id=eq.${id}`,

{

method:"DELETE",

headers

});


loadStaff();


}







// =========================
// ASSIGN UNIT
// =========================



async function assignUnit(id,name){


selectedStaffId=id;


assignTitle.innerHTML=
"Assign Unit : "+name;



let res =
await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${id}&select=unit_id`,

{headers}

);



let current =
await res.json();



let selected =
current.map(x=>x.unit_id);



let html="";



unitData.forEach(u=>{


html+=`

<label style="
display:flex;
gap:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:8px;">


<input type="checkbox"
class="unitCheck"
value="${u.id}"
${selected.includes(u.id)?"checked":""}>


${u.unit_name}


</label>

`;


});



unitList.innerHTML=html;


unitModal.style.display="flex";


}






async function saveUnitAssignment(){


await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${selectedStaffId}`,

{

method:"DELETE",
headers

});


let data =
[...document.querySelectorAll(".unitCheck:checked")]
.map(x=>({

staff_id:selectedStaffId,

unit_id:Number(x.value)

}));



if(data.length){


await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(data)

});


}



alert("Unit disimpan");


closeUnitModal();


}




function closeUnitModal(){

unitModal.style.display="none";

}







// =========================
// ASSIGN SECTION
// =========================



async function assignSection(id,name){


selectedSectionStaff=id;



let res =
await fetch(

`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${id}&select=section_id`,

{headers}

);



let current =
await res.json();



let selected =
current.map(x=>x.section_id);



let html="";



sectionData.forEach(s=>{


html+=`

<label style="
display:flex;
gap:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:8px;">


<input type="checkbox"
class="sectionCheck"
value="${s.id}"
${selected.includes(s.id)?"checked":""}>


${s.section_name}


</label>

`;


});



sectionList.innerHTML=html;


sectionModal.style.display="flex";


}







async function saveSectionAssignment(){



await fetch(

`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${selectedSectionStaff}`,

{

method:"DELETE",
headers

});


let data =
[...document.querySelectorAll(".sectionCheck:checked")]
.map(x=>({

staff_id:selectedSectionStaff,

section_id:Number(x.value)

}));




if(data.length){


await fetch(

`${SB_URL}/rest/v1/staff_section_assignment`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(data)

});


}



alert("Section disimpan");


closeSectionModal();


}





function closeSectionModal(){

sectionModal.style.display="none";

}



</script>
</body>
</html>
