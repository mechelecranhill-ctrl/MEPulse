<!DOCTYPE html>
<html lang="ms">
<head>

<style>

body{
    margin:0;
    font-family:-apple-system,sans-serif;
    background:#f2f2f7;
}

.header{
    height:60px;
    background:white;
    display:flex;
    align-items:center;

    gap:15px;
    box-shadow:0 1px 8px rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:100;
}

.back-btn{
    width:36px;
    height:36px;
    border-radius:10px;
    background:#f2f2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:#007AFF;
}

.container{
    padding:15px;
}

.search-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    margin-bottom:15px;
    box-sizing:border-box;
    font-size:15px;
}

.staff-card{
    background:white;
    border-radius:18px;
    padding:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.staff-info h4{
    margin:0;
    font-size:14px;
}

.staff-info p{
    margin:3px 0 0;
    font-size:11px;
    color:#666;
}

.action-group{
    display:flex;
    gap:8px;
}

.icon-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
}

.edit-btn{
    background:#007AFF;
}

.delete-btn{
    background:#FF3B30;
}

.fab{
    position:fixed;
    right:20px;
    bottom:20px;
    width:55px;
    height:55px;
    border-radius:18px;
    background:#34C759;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.tree-group{
    margin-bottom:25px;
}

.tree-title{
    font-size:11px;
    font-weight:700;
    color:#666;
    margin:0 0 10px 8px;
    letter-spacing:1px;
}

.tree-wrapper{
    position:relative;
    padding-left:20px;
}

.tree-wrapper::before{
    content:'';
    position:absolute;
    left:8px;
    top:0;
    bottom:0;
    width:2px;
    background:#d1d1d6;
}

.staff-card{
    position:relative;
    background:white;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.staff-card::before{
    content:'';
    position:absolute;
    left:-12px;
    top:50%;
    width:12px;
    height:2px;
    background:#d1d1d6;
}

.staff-avatar{
    width:45px;
    height:45px;
    border-radius:14px;
    background:linear-gradient(135deg,#007AFF,#5AC8FA);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:16px;
    flex-shrink:0;
}

.staff-left{
    display:flex;
    align-items:center;
    gap:12px;
}
    .staff-info h4{
    margin:0;
    font-size:14px;
}

.staff-info p{
    margin:3px 0;
    font-size:12px;
    color:#666;
    line-height:1.4;
}

.staff-info i{
    width:16px;
    color:#007AFF;
    margin-right:4px;
}
</style>
</head>
<body>

<div class="header">

    <div class="back-btn" onclick="window.location.href='index.html'">
        <i class="fa fa-chevron-left"></i>
    </div>

    <h3 style="margin:0;">User Directory</h3>

</div>

<div class="container">

    <input type="text"
           id="searchStaff"
           class="search-box"
           placeholder="Cari staff..."
           onkeyup="renderStaff()">

    <div id="staffList"></div>

</div>

<div class="fab" onclick="addStaff()">
    <i class="fa fa-plus"></i>
</div>

<script>

    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    
const headers = {
    apikey: SB_KEY,
    Authorization: 'Bearer ' + SB_KEY,
    'Content-Type':'application/json'
};

const hierarki = {
    'KETUA JABATAN': 1,
    'KETUA SEKSYEN': 2,
    'EKSEKUTIF KANAN': 3,
    'EKSEKUTIF': 4,
    'JURUTEKNIK': 5,
    'PENYELIA PENTADBIRAN': 6,
    'PEMBANTU PENTADBIRAN': 7,
    'KERANI': 8
};

let staffData = [];

async function loadStaff(){

    try{

        const res = await fetch(
            `${SB_URL}/rest/v1/staff?select=id,name,position,employee_id,phone_no,email`,
            { headers }
        );

        const data = await res.json();

        console.log("Status:", res.status);
        console.log("Response:", data);

        if(!res.ok){
            alert(JSON.stringify(data,null,2));
            return;
        }

        staffData = data;

        renderStaff();

    }catch(err){

        console.error(err);

    }

}
function renderStaff(){

    const keyword = document.getElementById('searchStaff')
        .value
        .toLowerCase();

    let filtered = [...staffData];

    filtered = filtered.filter(s => {

        return (
            s.name?.toLowerCase().includes(keyword) ||
            s.position?.toLowerCase().includes(keyword)
        );

    });

    filtered.sort((a,b)=>{

        const ra = hierarki[a.position?.toUpperCase()] || 99;
        const rb = hierarki[b.position?.toUpperCase()] || 99;

        if(ra !== rb) return ra-rb;

        return a.name.localeCompare(b.name);

    });

    let grouped = {};

    filtered.forEach(s=>{

        const position = s.position?.toUpperCase() || 'LAIN-LAIN';

        if(!grouped[position]){
            grouped[position] = [];
        }

        grouped[position].push(s);

    });

    let html = '';

    Object.keys(grouped).forEach(position=>{

        html += `

        <div class="tree-group">

            <div class="tree-title">
                ${position}
            </div>

            <div class="tree-wrapper">

        `;

        grouped[position].forEach(s=>{

            const initials = s.name
                .split(' ')
                .map(x=>x[0])
                .join('')
                .substring(0,2);

            html += `

            <div class="staff-card">

                <div class="staff-left">

                    <div class="staff-avatar">
                        ${initials}
                    </div>

                    <div class="staff-info">
    <h4>${s.name.toUpperCase()}</h4>

    <p><strong>${s.position}</strong></p>

    <p>
        <i class="fa fa-id-badge"></i>
        Employee ID :
        ${s.employee_id || '-'}
    </p>

    <p>
        <i class="fa fa-phone"></i>
        ${s.phone_no || '-'}
    </p>

    <p>
        <i class="fa fa-envelope"></i>
        ${s.email || '-'}
    </p>

</div>

                </div>

                <div class="action-group">

                    <button class="icon-btn edit-btn"
                            onclick="editStaff('${s.id}')">

                        <i class="fa fa-pen"></i>

                    </button>

                    <button class="icon-btn delete-btn"
                            onclick="deleteStaff('${s.id}', '${s.name}')">

                        <i class="fa fa-trash"></i>

                    </button>

                </div>

            </div>

            `;

        });

        html += `</div></div>`;

    });

    document.getElementById('staffList').innerHTML = html;

}

let editingStaff = null;

function addStaff(existing=null){

    editingStaff = existing;

    document.getElementById("modalTitle").innerText =
        existing ? "Edit Staff" : "New Staff";

    document.getElementById("fName").value =
        existing?.name || "";

    document.getElementById("fPosition").value =
        existing?.position || "";

    document.getElementById("fEmployee").value =
        existing?.employee_id || "";

    document.getElementById("fPhone").value =
        existing?.phone_no || "";

    document.getElementById("fEmail").value =
        existing?.email || "";

    document.getElementById("staffModal").style.display="flex";
}

function closeModal(){
    document.getElementById("staffModal").style.display="none";
}

function editStaff(id){

    const staff = staffData.find(s=>s.id===id);

    if(staff){
        addStaff(staff);
    }
}
    async function saveStaff(){
    const body = {
        name: document.getElementById("fName").value,
        position: document.getElementById("fPosition").value,
        employee_id: document.getElementById("fEmployee").value,
        phone_no: document.getElementById("fPhone").value,
        email: document.getElementById("fEmail").value
    };

    try {
        let res;
        if(editingStaff){
            // Ditukar ke sintaksis standard query Supabase
            res = await fetch(
                `${SB_URL}/rest/v1/staff?id=eq.${editingStaff.id}`,
                {
                    method: "PATCH",
                    headers: {
                        ...headers,
                        "Prefer": "return=minimal" // Memastikan Supabase memproses kemas kini tanpa ralat pemulangan data
                    },
                    body: JSON.stringify(body)
                }
            );
        } else {
            res = await fetch(
                `${SB_URL}/rest/v1/staff`,
                {
                    method: "POST",
                    headers: {
                        ...headers,
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(body)
                }
            );
        }

        if (!res.ok) {
            const errData = await res.json();
            alert("Ralat: " + JSON.stringify(errData));
            return;
        }

        closeModal();
        loadStaff(); // Memuatkan semula senarai terkini

    } catch(err) {
        alert(err.message);
    }
}


async function deleteStaff(id, name){
    const ok = confirm(`PADAM ${name.toUpperCase()} ?`);
    if(!ok) return;

    try {
        const res = await fetch(
            `${SB_URL}/rest/v1/staff?id=eq.${id}`,
            {
                method: 'DELETE',
                headers: {
                    ...headers,
                    "Prefer": "return=minimal"
                }
            }
        );

        if (!res.ok) {
            const errData = await res.json();
            alert("Gagal memadam: " + JSON.stringify(errData));
            return;
        }

        loadStaff();

    } catch(err) {
        alert(err.message);
    }
}


window.onload = loadStaff;

</script>

        <div id="staffModal" style="display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999;">

<div style="
background:#fff;
width:420px;
max-width:95%;
border-radius:20px;
padding:20px;">

<h3 id="modalTitle">Staff</h3>

<input id="fName" class="search-box" placeholder="Staff Name">

<input id="fPosition" class="search-box" placeholder="Position">

<input id="fEmployee" class="search-box" placeholder="Employee ID">

<input id="fPhone" class="search-box" placeholder="Phone No">

<input id="fEmail" class="search-box" placeholder="Email">

<div style="display:flex;justify-content:flex-end;gap:10px">

<button onclick="closeModal()"
style="padding:10px 18px;border:none;border-radius:10px;">
Cancel
</button>

<button onclick="saveStaff()"
style="padding:10px 18px;border:none;border-radius:10px;background:#007AFF;color:#fff;">
Save
</button>

</div>

</div>
</div>
    
</body>
</html>
