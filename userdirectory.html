<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Directory</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg-main: #f4f5f7;
    --bg-card: #ffffff;
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --accent-blue: #0071e3;
    --accent-green: #34c759;
    --accent-purple: #5856d6;
    --accent-red: #ff3b30;
    --radius-lg: 16px;
    --radius-md: 12px;
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.04);
    --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
    height: 65px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.2px;
}

.back-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    background: rgba(0,0,0,0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent-blue);
    transition: background 0.2s;
}

.back-btn:hover {
    background: rgba(0,0,0,0.06);
}

/* Container & Search */
.container {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
    box-sizing: border-box;
}

.search-box {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--radius-md);
    margin-bottom: 30px;
    font-size: 15px;
    background: var(--bg-card);
    box-sizing: border-box;
    transition: all 0.2s;
    outline: none;
    box-shadow: var(--shadow-soft);
}

.search-box:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
}

/* Typography Hierarchy */
.tree-group {
    margin-bottom: 35px;
}

.section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 30px 0 15px 5px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.section-title i {
    color: var(--accent-blue);
    font-size: 16px;
}

.unit-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 25px 0 15px 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.unit-title i {
    color: var(--text-muted);
}

/* Layout Wrapper */
.tree-wrapper {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 5px;
    margin-bottom: 15px;
}

/* Staff Card - Aesthetic Remake */
.staff-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(0,0,0,0.02);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.staff-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

.staff-left {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
}

.staff-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 20px;
    background: #f2f2f7;
    color: #a1a1a6;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.03);
}

.staff-info {
    flex-grow: 1;
    min-width: 0;
}

.staff-info h4 {
    margin: 0 0 4px 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.staff-info p {
    margin: 0;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
}

.expand-hint {
    color: #c7c7cc;
    font-size: 12px;
    transition: transform 0.2s;
    margin-left: auto;
}

.staff-card.expanded .expand-hint {
    transform: rotate(180deg);
}

/* Details Section (Hidden by default) */
.staff-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
}

.staff-card.expanded .staff-details {
    max-height: 240px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,0,0,0.05);
}

.staff-details p {
    margin: 8px 0;
    font-size: 13px;
    color: #48484a;
    display: flex;
    align-items: center;
    gap: 10px;
}

.staff-details p i {
    width: 16px;
    color: var(--text-muted);
    text-align: center;
}

/* Action Buttons */
.action-group {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
}

.icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: opacity 0.2s, transform 0.1s;
}

.icon-btn:hover {
    opacity: 0.9;
    transform: scale(1.05);
}

.edit-btn { background: var(--accent-blue); }
.delete-btn { background: var(--accent-red); }

/* Floating Action Button */
.fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--text-main);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    z-index: 99;
}

.fab:hover {
    transform: scale(1.05);
    background: #2c2c2e;
}

.empty-state {
    text-align: center;
    color: var(--text-muted);
    margin-top: 60px;
    font-size: 15px;
}

/* Beautiful Modal Style */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeIn 0.2s ease;
}

.modal-content {
    background: var(--bg-card);
    width: 400px;
    max-width: 90%;
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    box-sizing: border-box;
}

.modal-content h3 {
    margin: 0 0 20px 0;
    font-size: 18px;
    font-weight: 600;
}

.modal-content .search-box {
    margin-bottom: 12px;
    box-shadow: none;
    background: #f2f2f7;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
}

.modal-actions button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
}

.modal-actions button:first-child {
    background: #f2f2f7;
    color: #text-main;
}

.modal-actions button:last-child {
    background: var(--accent-blue);
    color: white;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="header">
    <div class="back-btn" onclick="location.href='index.html'">
        <i class="fa fa-chevron-left"></i>
    </div>
    <h3>User Directory</h3>
</div>

<div class="container">
    <input id="searchStaff" class="search-box" placeholder="Cari staff atau jawatan..." onkeyup="renderStaff()">
    <div id="staffList"></div>
</div>

<div class="fab" onclick="addStaff()">
    <i class="fa fa-plus"></i>
</div>

<div id="staffModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">Staff</h3>
        <input id="fName" class="search-box" placeholder="Staff Name">
        <input id="fPosition" class="search-box" placeholder="Position">
        <input id="fEmployee" class="search-box" placeholder="Employee ID">
        <input id="fPhone" class="search-box" placeholder="Phone No">
        <input id="fEmail" class="search-box" placeholder="Email">
        <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button onclick="saveStaff()">Save</button>
        </div>
    </div>
</div>

<div id="unitModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="assignTitle">Assign Unit</h3>
        <div id="unitList"></div>
        <div class="modal-actions">
            <button onclick="closeUnitModal()">Cancel</button>
            <button onclick="saveUnitAssignment()" style="background:var(--accent-green)!important;">Save</button>
        </div>
    </div>
</div>

<div id="sectionModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Assign Section</h3>
        <div id="sectionList"></div>
        <div class="modal-actions">
            <button onclick="closeSectionModal()">Cancel</button>
            <button onclick="saveSectionAssignment()" style="background:var(--accent-purple)!important;">Save</button>
        </div>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers={
    apikey:SB_KEY,
    Authorization:'Bearer '+SB_KEY,
    'Content-Type':'application/json'
};

const hierarki={
    "KETUA JABATAN":1,
    "KETUA SEKSYEN":2,
    "EKSEKUTIF KANAN":3,
    "EKSEKUTIF":4,
    "JURUTEKNIK":5,
    "PENYELIA PENTADBIRAN":6,
    "PEMBANTU PENTADBIRAN":7,
    "KERANI":8
};

let staffData=[];
let unitData=[];
let sectionData=[];
let staffSectionAssignments=[];
let staffUnitAssignments=[];
let selectedStaffId=null;
let selectedSectionStaff=null;
let editingStaff=null;

async function loadUnits(){
    let res=await fetch(`${SB_URL}/rest/v1/units?select=id,unit_name,section_id,me_sections(section_name)`, {headers});
    unitData=await res.json();
}

async function loadSections(){
    let res=await fetch(`${SB_URL}/rest/v1/me_sections?select=id,section_name`, {headers});
    sectionData=await res.json();
}

async function loadAssignments(){
    let res1=await fetch(`${SB_URL}/rest/v1/staff_section_assignment?select=staff_id,section_id`, {headers});
    staffSectionAssignments = await res1.json();

    let res2=await fetch(`${SB_URL}/rest/v1/staff_unit_assignment?select=staff_id,unit_id`, {headers});
    staffUnitAssignments = await res2.json();
}

async function loadStaff(){
    let res=await fetch(`${SB_URL}/rest/v1/staff?select=id,name,position,employee_id,phone_no,email`, {headers});
    staffData=await res.json();
    renderStaff();
}

function canAssignSection(position){
    position=position?.toUpperCase();
    return (position==="KETUA SEKSYEN" || position==="KETUA JABATAN");
}

function toggleCard(el, evt){
    if(evt.target.closest(".action-group")) return;
    el.classList.toggle("expanded");
}

// Aesthetic Staff Card Rendering with default human avatar
function staffCardHtml(s){
    let avatarHtml = `<i class="fa-solid fa-user"></i>`;

    return `
    <div class="staff-card" onclick="toggleCard(this, event)">
        <div class="staff-left">
            <div class="staff-avatar">${avatarHtml}</div>
            <div class="staff-info">
                <h4>${s.name}</h4>
                <p>${s.position}</p>
            </div>
            <div class="expand-hint">
                <i class="fa fa-chevron-down"></i>
            </div>
        </div>

        <div class="staff-details">
            <p><i class="fa fa-id-badge"></i> ${s.employee_id||'-'}</p>
            <p><i class="fa fa-phone"></i> ${s.phone_no||'-'}</p>
            <p><i class="fa fa-envelope"></i> ${s.email||'-'}</p>
            
            <div class="action-group">
                ${canAssignSection(s.position)?`
                <button class="icon-btn" style="background:var(--accent-purple)" onclick="assignSection('${s.id}','${s.name}')">
                    <i class="fa fa-layer-group"></i>
                </button>
                `:''}
                <button class="icon-btn" style="background:var(--accent-green)" onclick="assignUnit('${s.id}','${s.name}')">
                    <i class="fa fa-sitemap"></i>
                </button>
                <button class="icon-btn edit-btn" onclick="editStaff('${s.id}')">
                    <i class="fa fa-pen"></i>
                </button>
                <button class="icon-btn delete-btn" onclick="deleteStaff('${s.id}','${s.name}')">
                    <i class="fa fa-trash"></i>
                </button>
            </div>
        </div>
    </div>
    `;
}

function sortByHierarki(a,b){
    return ((hierarki[a.position]||99) - (hierarki[b.position]||99));
}

function renderStaff(){
    let keyword=document.getElementById("searchStaff").value.toLowerCase();

    let filteredIds = new Set(
        staffData.filter(s=> s.name.toLowerCase().includes(keyword) || s.position.toLowerCase().includes(keyword)).map(s=>s.id)
    );

    let kjIds = new Set(staffData.filter(s=> s.position?.toUpperCase()==="KETUA JABATAN").map(s=>s.id));
    let html="";

    // KETUA JABATAN
    let kjStaff = staffData.filter(s=> kjIds.has(s.id) && filteredIds.has(s.id)).sort(sortByHierarki);
    if(kjStaff.length){
        html += `
        <div class="section-title"><i class="fa fa-crown"></i> Ketua Jabatan</div>
        <div class="tree-wrapper">${kjStaff.map(staffCardHtml).join("")}</div>
        `;
    }

    // SECTIONS & UNITS
    sectionData.forEach(sec=>{
        let sectionStaffIds = staffSectionAssignments.filter(a=>a.section_id===sec.id).map(a=>a.staff_id);
        let sectionStaff = staffData.filter(s=> sectionStaffIds.includes(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id)).sort(sortByHierarki);
        let unitsInSection = unitData.filter(u=>u.section_id===sec.id);
        let unitBlocks="";
        let sectionHasContent = sectionStaff.length > 0;

        unitsInSection.forEach(u=>{
            let unitStaffIds = staffUnitAssignments.filter(a=>a.unit_id===u.id).map(a=>a.staff_id);
            let unitStaff = staffData.filter(s=> unitStaffIds.includes(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id)).sort(sortByHierarki);
            
            if(unitStaff.length===0) return;
            sectionHasContent = true;

            unitBlocks += `
            <div class="unit-title"><i class="fa fa-angle-right"></i> ${u.unit_name}</div>
            <div class="tree-wrapper">${unitStaff.map(staffCardHtml).join("")}</div>
            `;
        });

        if(!sectionHasContent) return;

        html += `
        <div class="tree-group">
            <div class="section-title"><i class="fa fa-building"></i> ${sec.section_name}</div>
            ${sectionStaff.length ? `<div class="tree-wrapper">${sectionStaff.map(staffCardHtml).join("")}</div>` : ""}
            ${unitBlocks}
        </div>
        `;
    });

    // UNASSIGNED
    let assignedIds = new Set([
        ...staffSectionAssignments.map(a=>a.staff_id),
        ...staffUnitAssignments.map(a=>a.staff_id)
    ]);

    let unassigned = staffData.filter(s=> !assignedIds.has(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id)).sort(sortByHierarki);
    if(unassigned.length){
        html += `
        <div class="tree-group">
            <div class="section-title"><i class="fa fa-circle-question"></i> Belum Ditetapkan</div>
            <div class="tree-wrapper">${unassigned.map(staffCardHtml).join("")}</div>
        </div>
        `;
    }

    if(!html){
        html = `<div class="empty-state">Tiada staff dijumpai</div>`;
    }

    document.getElementById("staffList").innerHTML=html;
}

window.onload=async()=>{
    await loadUnits();
    await loadSections();
    await loadAssignments();
    await loadStaff();
};

// MODAL CONTROLS
function addStaff(existing=null){
    editingStaff=existing;
    document.getElementById("modalTitle").innerHTML = existing ? "Edit Staff" : "New Staff";
    document.getElementById("fName").value = existing?.name || "";
    document.getElementById("fPosition").value = existing?.position || "";
    document.getElementById("fEmployee").value = existing?.employee_id || "";
    document.getElementById("fPhone").value = existing?.phone_no || "";
    document.getElementById("fEmail").value = existing?.email || "";
    document.getElementById("staffModal").style.display="flex";
}

function editStaff(id){
    let staff = staffData.find(x=>x.id===id);
    if(staff) addStaff(staff);
}

function closeModal(){ document.getElementById("staffModal").style.display="none"; }

async function saveStaff(){
    let body={ name:fName.value, position:fPosition.value, employee_id:fEmployee.value, phone_no:fPhone.value, email:fEmail.value };
    if(!body.name || !body.email){ alert("Nama dan Email wajib"); return; }

    let res;
    if(!editingStaff){
        let auth = await fetch(`${SB_URL}/auth/v1/signup`, {
            method:"POST", headers, body:JSON.stringify({ email:body.email, password:"StaffPassword123!" })
        });
        if(!auth.ok){ alert("Gagal create Auth"); return; }
    }

    if(editingStaff){
        res = await fetch(`${SB_URL}/rest/v1/staff?id=eq.${editingStaff.id}`, { method:"PATCH", headers:{...headers, "Prefer":"return=minimal"}, body:JSON.stringify(body) });
    } else {
        res = await fetch(`${SB_URL}/rest/v1/staff`, { method:"POST", headers:{...headers, "Prefer":"return=minimal"}, body:JSON.stringify(body) });
    }

    if(!res.ok){ alert("Gagal simpan staff"); return; }
    closeModal();
    loadStaff();
}

async function deleteStaff(id,name){
    if(!confirm(`PADAM ${name}?`)) return;
    await fetch(`${SB_URL}/rest/v1/staff?id=eq.${id}`, { method:"DELETE", headers });
    loadStaff();
}

async function assignUnit(id,name){
    selectedStaffId=id;
    assignTitle.innerHTML= "Assign Unit : "+name;
    let res = await fetch(`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${id}&select=unit_id`, {headers});
    let current = await res.json();
    let selected = current.map(x=>x.unit_id);
    let html="";

    unitData.forEach(u=>{
        html+=`
        <label style="display:flex; gap:10px; padding:12px; background:#f2f2f7; border-radius:10px; margin-bottom:8px; font-size:14px; cursor:pointer;">
            <input type="checkbox" class="unitCheck" value="${u.id}" ${selected.includes(u.id)?"checked":""}>
            ${u.unit_name}
        </label>`;
    });
    unitList.innerHTML=html;
    unitModal.style.display="flex";
}

async function saveUnitAssignment(){
    await fetch(`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${selectedStaffId}`, { method:"DELETE", headers });
    let data = [...document.querySelectorAll(".unitCheck:checked")].map(x=>({ staff_id:selectedStaffId, unit_id:Number(x.value) }));
    if(data.length){
        await fetch(`${SB_URL}/rest/v1/staff_unit_assignment`, { method:"POST", headers:{...headers, "Prefer":"return=minimal"}, body:JSON.stringify(data) });
    }
    closeUnitModal();
    await loadAssignments();
    renderStaff();
}

function closeUnitModal(){ unitModal.style.display="none"; }

async function assignSection(id,name){
    selectedSectionStaff=id;
    let res = await fetch(`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${id}&select=section_id`, {headers});
    let current = await res.json();
    let selected = current.map(x=>x.section_id);
    let html="";

    sectionData.forEach(s=>{
        html+=`
        <label style="display:flex; gap:10px; padding:12px; background:#f2f2f7; border-radius:10px; margin-bottom:8px; font-size:14px; cursor:pointer;">
            <input type="checkbox" class="sectionCheck" value="${s.id}" ${selected.includes(s.id)?"checked":""}>
            ${s.section_name}
        </label>`;
    });
    sectionList.innerHTML=html;
    sectionModal.style.display="flex";
}

async function saveSectionAssignment(){
    await fetch(`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${selectedSectionStaff}`, { method:"DELETE", headers });
    let data = [...document.querySelectorAll(".sectionCheck:checked")].map(x=>({ staff_id:selectedSectionStaff, section_id:Number(x.value) }));
    if(data.length){
        await fetch(`${SB_URL}/rest/v1/staff_section_assignment`, { method:"POST", headers:{...headers, "Prefer":"return=minimal"}, body:JSON.stringify(data) });
    }
    closeSectionModal();
    await loadAssignments();
    renderStaff();
}

function closeSectionModal(){ sectionModal.style.display="none"; }
</script>
</body>
</html>
