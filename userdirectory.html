<style>

body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f2f2f7;

.header {

    height:60px;

    display:flex;
    align-items:center;
    padding:0 15px;
    gap:15px;

}


.back-btn {

    width:36px;

    border-radius:10px;
    background:#f2f2f7;

    padding:15px;

.tree-title{

.section-title{

    font-size:13px;

.unit-title{

.tree-wrapper{

    display:flex;

    justify-content:center;
    gap:20px;

    position:relative;
    padding:20px;

}


.tree-wrapper::before{

    display:none;

}

.staff-card{

    width:260px;

    background:white;

    border-radius:20px;

    padding:18px;

    display:flex;

    flex-direction:column;

    align-items:center;

    text-align:center;

    box-shadow:
    0 5px 20px rgba(0,0,0,.08);

    position:relative;

}

.staff-left{

    display:flex;

    flex-direction:column;

    align-items:center;

}
.staff-avatar{

width:65px;
height:65px;

border-radius:50%;

font-size:22px;

margin-bottom:10px;

}

.staff-info{

    min-width:0;

}



.staff-info h4{

    margin:3px 0;
    font-size:14px;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

}

.staff-info p{

    margin:3px 0;
    font-size:12px;
    color:#666;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

}

.action-group{

margin-top:15px;

justify-content:center;

}
.icon-btn{

    width:34px;
    height:34px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;

}


.edit-btn{
    background:#007AFF;
}


.delete-btn{
    background:#FF3B30;
}



.fab{

    position:fixed;
    right:20px;
    bottom:20px;
    width:55px;
    height:55px;
    border-radius:18px;
    background:#34C759;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;

}

.empty-state{
    text-align:center;
    color:#999;
    margin-top:40px;
    font-size:14px;
}

    .unit-title,
.section-title{

text-align:center;

justify-content:center;

margin-top:25px;

}


.unit-title::after{

content:"";

display:block;

height:30px;

border-left:2px solid #ccc;

margin:auto;

}


.section-title::after{

content:"";

display:block;

height:30px;

border-left:2px solid #ccc;

margin:auto;

}

</style>

</head>


<body>


<div class="header">

<div class="back-btn" onclick="location.href='index.html'">

<i class="fa fa-chevron-left"></i>

</div>


<h3>User Directory</h3>


</div>



<div class="container">


<input id="searchStaff"
class="search-box"
placeholder="Cari staff..."
onkeyup="renderStaff()">



<div id="staffList"></div>


</div>



<div class="fab" onclick="addStaff()">

<i class="fa fa-plus"></i>

</div>





<script>


const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';


const headers={

apikey:SB_KEY,
Authorization:'Bearer '+SB_KEY,
'Content-Type':'application/json'

};



const hierarki={

"KETUA JABATAN":1,
"KETUA SEKSYEN":2,
"EKSEKUTIF KANAN":3,
"EKSEKUTIF":4,
"JURUTEKNIK":5,
"PENYELIA PENTADBIRAN":6,
"PEMBANTU PENTADBIRAN":7,
"KERANI":8

};



let staffData=[];
let unitData=[];
let sectionData=[];

let staffSectionAssignments=[];
let staffUnitAssignments=[];


let selectedStaffId=null;
let selectedSectionStaff=null;

    let editingStaff=null;



async function loadUnits(){


let res=await fetch(

`${SB_URL}/rest/v1/units?select=id,unit_name,section_id,me_sections(section_name)`,

{headers}

);


let data=await res.json();


if(!res.ok){

console.error(data);

return;

}


unitData=data;


}


async function loadSections(){


let res=await fetch(

`${SB_URL}/rest/v1/me_sections?select=id,section_name`,

{headers}

);


let data=await res.json();


if(!res.ok){

console.error(data);

return;

}


sectionData=data;


}



// =========================
// LOAD SECTION / UNIT ASSIGNMENTS
// (needed to group staff by seksyen & unit)
// =========================


async function loadAssignments(){


let res1=await fetch(

`${SB_URL}/rest/v1/staff_section_assignment?select=staff_id,section_id`,

{headers}

);


staffSectionAssignments = await res1.json();


if(!res1.ok){

console.error(staffSectionAssignments);

staffSectionAssignments=[];

}



let res2=await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment?select=staff_id,unit_id`,

{headers}

);


staffUnitAssignments = await res2.json();


if(!res2.ok){

console.error(staffUnitAssignments);

staffUnitAssignments=[];

}


}



async function loadStaff(){


let res=await fetch(

`${SB_URL}/rest/v1/staff?select=id,name,position,employee_id,phone_no,email`,

{headers}

);



let data=await res.json();



if(!res.ok){

console.error(data);

alert(
"Load staff gagal: "+JSON.stringify(data)
);

return;

}



staffData=data;


renderStaff();


}






function canAssignSection(position){


position=position?.toUpperCase();


return (

position==="KETUA SEKSYEN" ||
position==="KETUA JABATAN"

);


}




// =========================
// RENDER ONE STAFF CARD
// =========================


function staffCardHtml(s){


let initials = s.name
.split(" ")
.map(x=>x[0])
.join("")
.substring(0,2);


return `

<div class="staff-card">


<div class="staff-left">


<div class="staff-avatar">

${initials}

</div>



<div class="staff-info">


<h4>${s.name}</h4>


<p><b>${s.position}</b></p>


<p>
<i class="fa fa-id-badge"></i>
${s.employee_id||'-'}
</p>


<p>
<i class="fa fa-phone"></i>
${s.phone_no||'-'}
</p>


<p>
<i class="fa fa-envelope"></i>
${s.email||'-'}
</p>


</div>


</div>




<div class="action-group">



${canAssignSection(s.position)?`

<button class="icon-btn"
style="background:#5856D6"
onclick="assignSection('${s.id}','${s.name}')">

<i class="fa fa-layer-group"></i>

</button>

`:''}




<button class="icon-btn"
style="background:#34C759"
onclick="assignUnit('${s.id}','${s.name}')">

<i class="fa fa-sitemap"></i>

</button>



<button class="icon-btn edit-btn"
onclick="editStaff('${s.id}')">

<i class="fa fa-pen"></i>

</button>



<button class="icon-btn delete-btn"
onclick="deleteStaff('${s.id}','${s.name}')">

<i class="fa fa-trash"></i>

</button>



</div>


</div>

`;


}



function sortByHierarki(a,b){

return (
(hierarki[a.position]||99)
-
(hierarki[b.position]||99)
);

}




// =========================
// RENDER STAFF - GROUPED BY SEKSYEN & UNIT
// =========================


function renderStaff(){


let keyword=
document.getElementById("searchStaff").value.toLowerCase();



let filteredIds = new Set(

staffData.filter(s=>

s.name.toLowerCase().includes(keyword)
||
s.position.toLowerCase().includes(keyword)

).map(s=>s.id)

);


// staff yang position dia KETUA JABATAN - tak perlu tunjuk berulang kat setiap seksyen/unit
let kjIds = new Set(
  staffData.filter(s=> s.position?.toUpperCase()==="KETUA JABATAN")
  .map(s=>s.id)
);



let html="";


// ===== TUNJUK KETUA JABATAN SEKALI SAHAJA DI ATAS =====

let kjStaff = staffData
  .filter(s=> kjIds.has(s.id) && filteredIds.has(s.id))
  .sort(sortByHierarki);

if(kjStaff.length){

  html += `

  <div class="tree-group">

  <div class="section-title">
  <i class="fa fa-crown"></i>
  Ketua Jabatan
  </div>

  <div class="tree-wrapper">
  ${kjStaff.map(staffCardHtml).join("")}
  </div>

  </div>

  `;

}



sectionData.forEach(sec=>{


// staff assigned direct ke section (KECUALIKAN Ketua Jabatan)

let sectionStaffIds = staffSectionAssignments
.filter(a=>a.section_id===sec.id)
.map(a=>a.staff_id);


let sectionStaff = staffData
.filter(s=> sectionStaffIds.includes(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id))
.sort(sortByHierarki);


let unitsInSection = unitData
.filter(u=>u.section_id===sec.id);


let unitBlocks="";

let sectionHasContent = sectionStaff.length>0;



unitsInSection.forEach(u=>{


let unitStaffIds = staffUnitAssignments
.filter(a=>a.unit_id===u.id)
.map(a=>a.staff_id);


// KECUALIKAN Ketua Jabatan daripada unit jugak
let unitStaff = staffData
.filter(s=> unitStaffIds.includes(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id))
.sort(sortByHierarki);


if(unitStaff.length===0) return;


sectionHasContent = true;


unitBlocks += `

<div class="unit-title">
<i class="fa fa-sitemap"></i>
${u.unit_name}
</div>

<div class="tree-wrapper">
${unitStaff.map(staffCardHtml).join("")}
</div>

`;


});



if(!sectionHasContent) return;



html += `

<div class="tree-group">

<div class="section-title">
<i class="fa fa-building"></i>
${sec.section_name}
</div>

${sectionStaff.length ? `
<div class="tree-wrapper">
${sectionStaff.map(staffCardHtml).join("")}
</div>
` : ""}

${unitBlocks}

</div>

`;


});



// staff yang tak assigned ke section/unit mana-mana (KECUALIKAN Ketua Jabatan sebab dah tunjuk kat atas)


let assignedIds = new Set([

...staffSectionAssignments.map(a=>a.staff_id),
...staffUnitAssignments.map(a=>a.staff_id)

]);


let unassigned = staffData
.filter(s=> !assignedIds.has(s.id) && filteredIds.has(s.id) && !kjIds.has(s.id))
.sort(sortByHierarki);


if(unassigned.length){

html += `

<div class="tree-group">

<div class="section-title">
<i class="fa fa-circle-question"></i>
Belum Ditetapkan
</div>

<div class="tree-wrapper">
${unassigned.map(staffCardHtml).join("")}
</div>

</div>

`;

}



if(!html){

html = `<div class="empty-state">Tiada staff dijumpai</div>`;

}



document.getElementById("staffList").innerHTML=html;



}

window.onload=async()=>{


await loadUnits();

await loadSections();

await loadAssignments();

await loadStaff();


};



</script>

    <!-- =========================

<div id="unitModal"

<button onclick="saveUnitAssignment()"

Save

</button>


</div>


</div>

</div>






<!-- =========================

========================= -->


<div id="sectionModal"
style="
display:none;

justify-content:center;

z-index:9999;">



<div style="

<h3>
Assign Section
</h3>


<div id="sectionList"></div>



<div style="

<button onclick="closeSectionModal()">
Cancel
</button>



<button onclick="saveSectionAssignment()"
style="

</button>


</div>

<script>

// =========================
// STAFF ADD / EDIT
// =========================


function addStaff(existing=null){


editingStaff=existing;


document.getElementById("modalTitle").innerHTML =
existing ? "Edit Staff" : "New Staff";


document.getElementById("fName").value =
existing?.name || "";


document.getElementById("fPosition").value =
existing?.position || "";


document.getElementById("fEmployee").value =
existing?.employee_id || "";


document.getElementById("fPhone").value =
existing?.phone_no || "";


document.getElementById("fEmail").value =
existing?.email || "";


document.getElementById("staffModal")
.style.display="flex";


}



function editStaff(id){


let staff =
staffData.find(x=>x.id===id);


if(staff)
addStaff(staff);


}




function closeModal(){

document.getElementById("staffModal")
.style.display="none";

}





// =========================
// SAVE STAFF + AUTH
// =========================


async function saveStaff(){


let body={

name:fName.value,

position:fPosition.value,

employee_id:fEmployee.value,

phone_no:fPhone.value,

email:fEmail.value

};



if(!body.name || !body.email){

alert("Nama dan Email wajib");

return;

}



let res;



if(!editingStaff){


// CREATE AUTH USER


let auth =
await fetch(

`${SB_URL}/auth/v1/signup`,

{

method:"POST",

headers,

body:JSON.stringify({

email:body.email,

password:"StaffPassword123!"

})

});


if(!auth.ok){

alert("Gagal create Auth");

return;

}


}



if(editingStaff){


res =
await fetch(

`${SB_URL}/rest/v1/staff?id=eq.${editingStaff.id}`,

{

method:"PATCH",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(body)

});


}

else{


res =
await fetch(

`${SB_URL}/rest/v1/staff`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(body)

});


}




if(!res.ok){

alert("Gagal simpan staff");

return;

}


alert("Berjaya");


closeModal();

loadStaff();


}







// =========================
// DELETE STAFF
// =========================


async function deleteStaff(id,name){


if(!confirm(
`PADAM ${name}?`
))
return;



await fetch(

`${SB_URL}/rest/v1/staff?id=eq.${id}`,

{

method:"DELETE",

headers

});


loadStaff();


}







// =========================
// ASSIGN UNIT
// =========================



async function assignUnit(id,name){


selectedStaffId=id;


assignTitle.innerHTML=
"Assign Unit : "+name;



let res =
await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${id}&select=unit_id`,

{headers}

);



let current =
await res.json();



let selected =
current.map(x=>x.unit_id);



let html="";



unitData.forEach(u=>{


html+=`

<label style="
display:flex;
gap:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:8px;">


<input type="checkbox"
class="unitCheck"
value="${u.id}"
${selected.includes(u.id)?"checked":""}>


${u.unit_name}


</label>

`;


});



unitList.innerHTML=html;


unitModal.style.display="flex";


}






async function saveUnitAssignment(){


await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment?staff_id=eq.${selectedStaffId}`,

{

method:"DELETE",
headers

});


let data =
[...document.querySelectorAll(".unitCheck:checked")]
.map(x=>({

staff_id:selectedStaffId,

unit_id:Number(x.value)

}));



if(data.length){


await fetch(

`${SB_URL}/rest/v1/staff_unit_assignment`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(data)

});


}



alert("Unit disimpan");


closeUnitModal();


// refresh assignments so grouped view stays in sync

await loadAssignments();

renderStaff();


}




function closeUnitModal(){

unitModal.style.display="none";

}







// =========================
// ASSIGN SECTION
// =========================



async function assignSection(id,name){


selectedSectionStaff=id;



let res =
await fetch(

`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${id}&select=section_id`,

{headers}

);



let current =
await res.json();



let selected =
current.map(x=>x.section_id);



let html="";



sectionData.forEach(s=>{


html+=`

<label style="
display:flex;
gap:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:8px;">


<input type="checkbox"
class="sectionCheck"
value="${s.id}"
${selected.includes(s.id)?"checked":""}>


${s.section_name}


</label>

`;


});



sectionList.innerHTML=html;


sectionModal.style.display="flex";


}







async function saveSectionAssignment(){



await fetch(

`${SB_URL}/rest/v1/staff_section_assignment?staff_id=eq.${selectedSectionStaff}`,

{

method:"DELETE",
headers

});


let data =
[...document.querySelectorAll(".sectionCheck:checked")]
.map(x=>({

staff_id:selectedSectionStaff,

section_id:Number(x.value)

}));




if(data.length){


await fetch(

`${SB_URL}/rest/v1/staff_section_assignment`,

{

method:"POST",

headers:{
...headers,
"Prefer":"return=minimal"
},

body:JSON.stringify(data)

});


}



alert("Section disimpan");


closeSectionModal();


// refresh assignments so grouped view stays in sync

await loadAssignments();

renderStaff();


}





function closeSectionModal(){

sectionModal.style.display="none";

}



</script>
