<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&E Connect Sign In</title>

<link rel="preload" href="fish.svg" as="image" type="image/svg+xml">
<link rel="preload" href="logo.svg" as="image" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
}

body{
    font-family:'Lato',sans-serif;
    background:#fff;
}

.header{
    position:relative;
    text-align:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    color:white;

    overflow:visible;
}

.header::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(255,255,255,.18),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(255,255,255,.10),
        transparent 30%);

    filter:blur(40px);

    animation:fogMove 10s ease-in-out infinite alternate;
}

@keyframes fogMove{

    from{
        transform:translateX(-30px) translateY(0);
    }

    to{
        transform:translateX(30px) translateY(-20px);
    }

}

.flex{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.inner-header{
    position:relative;
    z-index:20; 
    height:65dvh;
    width:100%;
    margin:0;
    padding:0;

    flex-direction:column;
}

.login-box{
    position:absolute;
    top:calc(50% + 90px);
    left:50%;
    transform:translateX(-50%) translateY(20px);

    width:320px;
    max-width:90%;

    display:flex;
    flex-direction:column;
    gap:10px;

    opacity:0;
    pointer-events:none;

    z-index:10000;
}
.login-box input{
    width:100%;
    padding:14px 16px;

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.20);

    border-radius:14px;

    color:white;

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    box-sizing:border-box;

    outline:none;

    transition:.25s;
}

.login-box input::placeholder{
    color:rgba(255,255,255,.75);
}

.login-box input:focus{
    border-color:rgba(255,255,255,.45);

    background:rgba(255,255,255,.20);

    box-shadow:
        0 0 0 3px rgba(255,255,255,.10);
}
.password-wrapper{
    position:relative;
    width:100%;
}

.password-wrapper input{
    padding-right:50px;
}

.toggle-password{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);

    width:24px;
    height:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    color:rgba(255,255,255,.85);
}
.toggle-password i{
    font-size:18px;
    line-height:1;
}
.login-box button{
    margin-top:5px;
    border-radius:14px;
    height:48px;
    padding:0 16px;
        cursor: pointer;

    background: rgba(34,197,94,0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(34,197,94,0.35);

    color: rgba(0,0,0,0.85);
    font-weight: 700;

    box-shadow:
        0 8px 25px rgba(34,197,94,0.25);

    transition: .25s;
}
.login-box button:hover{
    transform:translateY(-2px);
    filter:brightness(1.08);
}
.login-box.show{
    animation: fadeLogin .8s ease forwards;
    pointer-events:auto;
}
@keyframes fadeLogin {
    from {
        opacity:0;
        transform:translateX(-50%) translateY(30px);
    }
    to {
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }
}

.fish{
    position:absolute;

    width:140px;
    height:auto;

    right:-220px;
    top:42%;

    transform:translateY(-50%);

    z-index:30;

    opacity:0;

    filter:
    drop-shadow(0 8px 20px rgba(0,0,0,.25));
}

.fish.start{
    animation:
    fishSwim 3s ease forwards;
}

@keyframes fishSwim{

    0%{
        right:-220px;
        opacity:0;

        transform:
        translateY(-50%);
    }

    10%{
        opacity:1;
    }

    45%{
        right:50%;

        transform:
        translate(50%,-50%);
    }

    60%{
        right:50%;
        opacity:1;

        transform:
        translate(50%,-50%)
        scale(1.05);
    }

    100%{
        right:120%;
        opacity:0;

        transform:
        translateY(-50%);
    }

}

h1{
    font-weight:300;
    letter-spacing:2px;
    font-size:48px;
    margin-top:20px;

    opacity:0;

    filter:
    drop-shadow(0 0 12px rgba(255,255,255,.35));
}

h1.start{
    animation:
    fadeUp 1s ease forwards;

    animation-delay:2s;
}

.logo{
    width:140px;
    height:auto;

    opacity:0;

    clip-path:circle(0% at 50% 50%);

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.35))
    drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

.logo.start{
    animation:
    waterReveal 1.4s cubic-bezier(.2,.8,.2,1) forwards,
    floatLogo 7s ease-in-out infinite 4s;

    animation-delay:2s,4s;
}
@keyframes waterReveal{

    0%{
        opacity:0;
        clip-path:circle(0% at 50% 50%);
        filter:blur(10px);
        transform:scale(.8);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
        clip-path:circle(150% at 50% 50%);
        filter:blur(0px);
        transform:scale(1);
    }
}

@keyframes floatLogo{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

.waves{
    position:relative;
    width:100%;
    height:15vh;
    margin-bottom:-7px;

    min-height:100px;
    max-height:150px;
z-index: 1;
}

.parallax > use{
    animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes move-forever{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}
.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-top: 2px;
}
.content{
    position:relative;
    height:20dvh;
    text-align:center;
    background:white;
}

p{
    letter-spacing:1px;
    font-size:14px;
    color:#333;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.back-text{
    font-size:12px;
    color:white;
    opacity:0.8;
    text-decoration:none;

    display:flex;
    align-items:center;
    gap:6px;

    cursor:pointer;
}

.back-text:hover{
    opacity:1;
    text-decoration:underline;
}

@media(max-width:768px){

    .waves{
        height:40px;
        min-height:40px;
    }

    .content{
        height:30vh;
    }

    h1{
        font-size:24px;
    }

    .logo{
        width:110px;
    }

}

input{
    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:14px;

    box-sizing:border-box;

    outline:none;
}

.logo-click{
    position:relative;
    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-ripple{
    position:absolute;

    width:140px;
    height:140px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,.45);

    opacity:0;

    pointer-events:none;
}

.logo-ripple.start.ripple-a{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:3.2s;
}

.logo-ripple.start.ripple-b{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:4.2s;
}

@keyframes logoRipple{

    0%{
        transform:scale(.8);
        opacity:0;
    }

    15%{
        opacity:.6;
    }

    100%{
        transform:scale(2.2);
        opacity:0;
    }

}

</style>

</head>

<body>
<div class="header">

    <div class="inner-header flex">
<img src="fish.svg" class="fish">

        <div class="logo-click">

    <div class="logo-ripple ripple-a"></div>
    <div class="logo-ripple ripple-b"></div>

    <img
        src="logo.svg"
        class="logo">

</div>

        <h1>M&E Connect</h1>

<div id="loginBox" class="login-box">

    <input id="username" type="text" placeholder="Employee ID">
<div class="password-wrapper">
    <input id="password" type="password" placeholder="Password">

    <span id="togglePassword" class="toggle-password">
        <i class="fa-solid fa-eye"></i>
    </span>
</div>

    <div class="login-options">

    <div>
    <a href="#" onclick="goBack()" class="back-text">
        <i class="fa fa-arrow-left"></i> Main Menu
    </a>
</div>

    <div style="font-size:12px;">
        <a href="#" onclick="forgotPassword()" style="color:#fff; opacity:0.8; text-decoration:none;">
            Forgot password?
        </a>
    </div>

</div>

    <button onclick="login()">
        Login
    </button>

</div>

    </div>

    <div>

        <svg class="waves"
             xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink"
             viewBox="0 24 150 28"
             preserveAspectRatio="none"
             shape-rendering="auto">

            <defs>

                <path id="gentle-wave"
                      d="M-160 44c30 0 58-18 88-18s58 18 88 18
                         58-18 88-18 58 18 88 18v44h-352z" />

            </defs>

            <g class="parallax">

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="0"
                     fill="rgba(255,255,255,0.7)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="3"
                     fill="rgba(255,255,255,0.5)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="5"
                     fill="rgba(255,255,255,0.3)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="7"
                     fill="#ffffff" />

            </g>

        </svg>

    </div>

</div>

<div class="content flex">

    <p>M&E | Mechanical & Electrical Department</p>

</div>

<script>

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";

const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks";

// PENTING: guna nama lain (sbClient) — jangan namakan const sebagai "supabase",
// sebab "supabase" dah jadi objek global (window.supabase) bila CDN
// @supabase/supabase-js dimuatkan. const supabase = supabase.createClient(...)
// akan clash dengan global tu dan bagi ralat "Identifier 'supabase' has
// already been declared".
window.sbClient = window.sbClient || supabase.createClient(SB_URL, SB_KEY);
const sbClient = window.sbClient;

async function login(){
    const employeeId = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!employeeId || !pass){
        alert("Sila masukkan Employee ID dan Password.");
        return;
    }

    // 1. MASTER ADMIN (@dm1n) - Kekalkan fungsi bypass sedia ada anda
    if(employeeId === "@dm1n" && pass === "@AnakAnakSyurga1"){
        localStorage.setItem("loggedIn","true");
        localStorage.setItem("userId", "@dm1n");
        localStorage.setItem("role", "admin");
        localStorage.setItem("staff_name", "System Admin");
        localStorage.setItem("me_user", employeeId);
        localStorage.setItem("lastActivity", Date.now());
        localStorage.removeItem("sessionExpired");
        window.location.href = "sections.html";
        return;
    }

    // 2. CARI EMEL BERDASARKAN EMPLOYEE ID (staff isi Employee ID, bukan emel)
    try {
        const { data: lookupData, error: lookupError } = await sbClient
            .from('staff')
            .select('email')
            .eq('employee_id', employeeId)
            .single();

        if (lookupError || !lookupData || !lookupData.email) {
            alert("User not exists");
            return;
        }

        const staffEmail = lookupData.email;

        // 3. LOGIN MENGGUNAKAN SUPABASE AUTH API (guna emel yang dah dicari)
        console.log("Cuba login dengan emel:", staffEmail);

        const { data: authData, error: authError } = await sbClient.auth.signInWithPassword({
            email: staffEmail,
            password: pass
        });

        if (authError) {
            console.error("Supabase auth error:", authError);
            alert("Gagal Login: " + authError.message);
            return;
        }

        // Ambil data profil penuh daripada jadual staff menggunakan UUID (authData.user.id)
        const { data: staffData, error: staffError } = await sbClient
            .from('staff')
            .select('*')
            .eq('id', authData.user.id)
            .single();

        if (staffError || !staffData) {
            alert("Data profil kakitangan tidak ditemui.");
            return;
        }

        // JIKA BERJAYA, SIMPAN DATA SESI
localStorage.setItem("loggedIn","true");
localStorage.setItem("userId", staffData.employee_id);
localStorage.setItem("role", staffData.position);
localStorage.setItem("staff_name", staffData.name);
localStorage.setItem("staff_avatar", staffData.avatar_url || "");
localStorage.setItem("me_user", staffData.employee_id);
localStorage.setItem("lastActivity", Date.now());
localStorage.removeItem("sessionExpired");

// ==========================================
// TAMBAH BARIS INI UNTUK SIMPAN TOKEN JWT RLS
// ==========================================
if (authData.session && authData.session.access_token) {
    localStorage.setItem("supabase_token", authData.session.access_token);
}
// ==========================================

window.location.href = "sections.html";

    } catch(err){
        console.error(err);
        alert("Server error");
    }
}

async function forgotPassword(){
    const employeeId = prompt("Masukkan Employee ID anda untuk reset password:");

    if(!employeeId || !employeeId.trim()){
        return;
    }

    const empId = employeeId.trim();

    try {
        const { data: lookupData, error: lookupError } = await sbClient
            .from('staff')
            .select('email')
            .eq('employee_id', empId)
            .single();

        if (lookupError || !lookupData || !lookupData.email) {
            alert("Employee ID tidak dijumpai. Sila hubungi admin.");
            return;
        }

        const staffEmail = lookupData.email;

        const { error: resetError } = await sbClient.auth.resetPasswordForEmail(
            staffEmail,
            { redirectTo: window.location.origin + window.location.pathname.replace(/login\.html$/, "") + "reset-password.html" }
        );

        if (resetError) {
            console.error("Reset password error:", resetError);
            alert("Gagal hantar email reset: " + resetError.message);
            return;
        }

        alert("Email reset password telah dihantar ke " + staffEmail + ". Sila semak inbox (dan folder spam).");

    } catch(err){
        console.error(err);
        alert("Server error");
    }
}

window.addEventListener("load", () => {

const savedUser = localStorage.getItem("me_user");

if(savedUser){
    document.getElementById("username").value = savedUser;
}
    const fish =
    document.querySelector(".fish");

    const logo =
    document.querySelector(".logo");

    const title =
    document.querySelector("h1");

    const ripples =
    document.querySelectorAll(".logo-ripple");

    function startAnimation(){

        fish.classList.add("start");

        logo.classList.add("start");

        title.classList.add("start");

        ripples.forEach(r => {
            r.classList.add("start");
        });
setTimeout(()=>{

    document
    .getElementById("loginBox")
    .classList.add("show");

},3200);

    }

    if(fish.complete){

        startAnimation();

    } else {

        fish.onload = startAnimation;

    }

});
const togglePassword =
document.getElementById("togglePassword");

const passwordInput =
document.getElementById("password");

const icon =
togglePassword.querySelector("i");

togglePassword.addEventListener("click", () => {

    if(passwordInput.type === "password"){

        passwordInput.type = "text";

        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");

    } else {

        passwordInput.type = "password";

        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");

    }

});

function goBack(){
    window.location.href = "index.html";
}

</script>
</body>
</html>
