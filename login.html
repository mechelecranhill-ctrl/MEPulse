<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mechanical & Electrical Department</title>

<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
}

body{
    font-family:'Lato',sans-serif;
    background:#fff;
}

.header{
    position:relative;
    text-align:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    color:white;

    overflow:visible;
}

.header::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(255,255,255,.18),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(255,255,255,.10),
        transparent 30%);

    filter:blur(40px);

    animation:fogMove 10s ease-in-out infinite alternate;
}

@keyframes fogMove{

    from{
        transform:translateX(-30px) translateY(0);
    }

    to{
        transform:translateX(30px) translateY(-20px);
    }

}

.flex{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.inner-header{
    position:relative;
    z-index:20; 
    height:65dvh;
    width:100%;
    margin:0;
    padding:0;

    flex-direction:column;
}

.login-box{
    position:absolute;
    top:calc(50% + 90px);
    left:50%;
    transform:translateX(-50%) translateY(20px);

    width:320px;
    max-width:90%;

    display:flex;
    flex-direction:column;
    gap:10px;

    opacity:0;
    pointer-events:none;

    z-index:10000;
}
.login-box input{
    width:100%;
    padding:14px 16px;

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.20);

    border-radius:14px;

    color:white;

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    box-sizing:border-box;

    outline:none;

    transition:.25s;
}

.login-box input::placeholder{
    color:rgba(255,255,255,.75);
}

.login-box input:focus{
    border-color:rgba(255,255,255,.45);

    background:rgba(255,255,255,.20);

    box-shadow:
        0 0 0 3px rgba(255,255,255,.10);
}
.login-box button{
    margin-top:5px;
    border-radius:14px;

    background: rgba(34,197,94,0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(34,197,94,0.35);

    color: rgba(0,0,0,0.85);
    font-weight: 700;

    box-shadow:
        0 8px 25px rgba(34,197,94,0.25);

    transition: .25s;
}
.login-box button:hover{
    transform:translateY(-2px);
    filter:brightness(1.08);
}
.login-box.show{
    animation: fadeLogin .8s ease forwards;
    pointer-events:auto;
}
@keyframes fadeLogin {
    from {
        opacity:0;
        transform:translateX(-50%) translateY(30px);
    }
    to {
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }
}

.fish{
    position:absolute;

    width:140px;
    height:auto;

    right:-220px;
    top:42%;

    transform:translateY(-50%);

    z-index:30;

    opacity:0;

    filter:
    drop-shadow(0 8px 20px rgba(0,0,0,.25));
}

.fish.start{
    animation:
    fishSwim 3s ease forwards;
}

@keyframes fishSwim{

    0%{
        right:-220px;
        opacity:0;

        transform:
        translateY(-50%);
    }

    10%{
        opacity:1;
    }

    45%{
        right:50%;

        transform:
        translate(50%,-50%);
    }

    60%{
        right:50%;
        opacity:1;

        transform:
        translate(50%,-50%)
        scale(1.05);
    }

    100%{
        right:120%;
        opacity:0;

        transform:
        translateY(-50%);
    }

}

h1{
    font-weight:300;
    letter-spacing:2px;
    font-size:48px;
    margin-top:20px;

    opacity:0;

    filter:
    drop-shadow(0 0 12px rgba(255,255,255,.35));
}

h1.start{
    animation:
    fadeUp 1s ease forwards;

    animation-delay:2s;
}

.logo{
    width:140px;
    height:auto;

    opacity:0;

    clip-path:circle(0% at 50% 50%);

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.35))
    drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

.logo.start{
    animation:
    waterReveal 1.4s cubic-bezier(.2,.8,.2,1) forwards,
    floatLogo 7s ease-in-out infinite 4s;

    animation-delay:2s,4s;
}
@keyframes waterReveal{

    0%{
        opacity:0;
        clip-path:circle(0% at 50% 50%);
        filter:blur(10px);
        transform:scale(.8);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
        clip-path:circle(150% at 50% 50%);
        filter:blur(0px);
        transform:scale(1);
    }
}

@keyframes floatLogo{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

.waves{
    position:relative;
    width:100%;
    height:15vh;
    margin-bottom:-7px;

    min-height:100px;
    max-height:150px;
z-index: 1;
}

.parallax > use{
    animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes move-forever{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}
.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-top: 2px;
}
.content{
    position:relative;
    height:20dvh;
    text-align:center;
    background:white;
}

p{
    letter-spacing:1px;
    font-size:14px;
    color:#333;
}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:768px){

    .waves{
        height:40px;
        min-height:40px;
    }

    .content{
        height:30vh;
    }

    h1{
        font-size:24px;
    }

    .logo{
        width:110px;
    }

}

input{
    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:14px;

    box-sizing:border-box;

    outline:none;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:16px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.25);

    color:white;
    font-weight:700;
    cursor:pointer;
    transition:.25s;

    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

button:hover{
    transform:scale(1.02);
    filter:brightness(1.08);
}

@keyframes cardIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
.logo-click{
    cursor:pointer;
    position:relative;
    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-ripple{
    position:absolute;

    width:140px;
    height:140px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,.45);

    opacity:0;

    pointer-events:none;
}

.logo-ripple.start.ripple-a{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:3.2s;
}

.logo-ripple.start.ripple-b{
    animation:
    logoRipple 3s ease-out infinite;

    animation-delay:4.2s;
}

@keyframes logoRipple{

    0%{
        transform:scale(.8);
        opacity:0;
    }

    15%{
        opacity:.6;
    }

    100%{
        transform:scale(2.2);
        opacity:0;
    }

}

</style>

</head>

<body>

</div>
