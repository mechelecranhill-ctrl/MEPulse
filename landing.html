<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Control Wheel V3 (Fixed)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui;
}

body{
    height:100vh;
    background:radial-gradient(circle at center,#0b1a2b,#050816);
    overflow:hidden;
}

/* STAGE */
.stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
}

/* WHEEL */
.wheel{
    position:absolute;
    width:min(650px, 90vw);
    height:min(650px, 90vw);
    left:calc(-1 * min(325px, 45vw));
    top:50%;
    transform:translateY(-50%) rotate(0deg);
    transition:transform 0.7s cubic-bezier(.22,1,.36,1);
    transform-origin:center center;
}

/* GLOW */
.wheel::before{
    content:"";
    position:absolute;
    inset:60px;
    border-radius:50%;
    border:1px solid rgba(56,189,248,0.15);
    box-shadow:0 0 60px rgba(56,189,248,0.08);
}

/* ITEM */
.item{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-weight:600;
    backdrop-filter:blur(14px);
    transition:0.3s;
    opacity:0.5;
    transform:scale(0.9);
}

/* ACTIVE */
.item.active{
    background:rgba(56,189,248,0.25);
    border-color:rgba(56,189,248,0.6);
    box-shadow:0 0 25px rgba(56,189,248,0.25);
    opacity:1;
    transform:scale(1.25);
}

/* PANEL */
.panel{
    position:absolute;
    right:80px;
    color:white;
}

.panel h1{
    font-size:46px;
}

.panel p{
    opacity:0.6;
}

@media (max-width:768px){

    .wheel{
        width:500px;
        height:500px;
        left:-250px;
    }

    .item{
        width:90px;
        height:90px;
        font-size:14px;
    }

    .panel{
        right:20px;
        max-width:45vw;
    }

    .panel h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="stage">
    <div class="wheel" id="wheel"></div>
</div>

<div class="panel">
    <h1 id="title">M&E</h1>
    <p>Section</p>
</div>

<script>

window.addEventListener("DOMContentLoaded", () => {

const wheel = document.getElementById("wheel");
const title = document.getElementById("title");

const items = ["M&E","CM","PM","Asset","Reports","Export","Analytics","Logs"];

let index = 0;
let angle = 0;
let lock = false;

let radius = getRadius();
let itemSize = getItemSize();

const stepAngle = 360 / items.length;

function getRadius(){
    const w = window.innerWidth;
    return w < 480 ? 130 :
           w < 768 ? 170 : 240;
}

function getItemSize(){
    const w = window.innerWidth;
    return w < 480 ? 80 :
           w < 768 ? 95 : 120;
}

/* CREATE ITEMS */
items.forEach((name)=>{
    const el = document.createElement("div");
    el.className = "item";
    el.innerText = name;
    wheel.appendChild(el);
});

const itemEls = document.querySelectorAll(".item");

/* POSITION (IMPORTANT FIX) */
function positionItems(){
    itemEls.forEach((el,i)=>{
        const theta = (i/items.length)*Math.PI*2;
        const x = Math.cos(theta)*radius;
        const y = Math.sin(theta)*radius;

        el.style.width = itemSize + "px";
        el.style.height = itemSize + "px";

        el.style.left = `calc(50% + ${x}px - ${itemSize/2}px)`;
        el.style.top  = `calc(50% + ${y}px - ${itemSize/2}px)`;
    });
}

/* UPDATE */
function update(){
    itemEls.forEach(el => el.classList.remove("active"));
    itemEls[index].classList.add("active");
    title.innerText = items[index];
}

/* RENDER */
function render(){

    wheel.style.transform =
        `translateY(-50%) rotate(${angle}deg)`;

    itemEls.forEach(el=>{
        el.style.transform =
            `rotate(${-angle}deg) scale(0.9)`;
    });

    itemEls[index].style.transform =
        `rotate(${-angle}deg) scale(1.25)`;
}

/* NAV */
function next(){
    index = (index + 1) % items.length;
    angle -= stepAngle;
    update();
    render();
}

function prev(){
    index = (index - 1 + items.length) % items.length;
    angle += stepAngle;
    update();
    render();
}

/* SCROLL */
let scrollBuffer = 0;

window.addEventListener("wheel",(e)=>{

    if(lock) return;
    lock = true;

    scrollBuffer += e.deltaY;

    const threshold = 80;

    if(scrollBuffer > threshold){
        next();
        scrollBuffer = 0;
    }

    if(scrollBuffer < -threshold){
        prev();
        scrollBuffer = 0;
    }

    setTimeout(()=> lock = false, 120);

},{passive:true});

/* TOUCH */
let startX = 0;

window.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

window.addEventListener("touchend",(e)=>{

    const diff = startX - e.changedTouches[0].clientX;

    if(Math.abs(diff) < 40) return;

    if(diff > 0) next();
    else prev();
});

/* RESIZE FIX (IMPORTANT) */
window.addEventListener("resize", () => {

    radius = getRadius();
    itemSize = getItemSize();

    positionItems();
    render();
});

/* INIT */
positionItems();
update();
render();

});

</script>

</body>
</html>
