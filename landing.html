<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Center Circle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#07111f;
}

/* BULATAN */
.circle{
    width:300px;
    height:300px;
    border-radius:50%;
    
    background:
        radial-gradient(circle at 30% 30%,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.02));

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 60px rgba(56,189,248,0.2),
        inset 0 0 40px rgba(56,189,248,0.1);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:24px;
    font-weight:600;
}
</style>
</head>
<body>

<div class="circle">
    M&E
</div>

</body>
</html>
