<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Sections</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui;
}

:root {
    --bg-color: #a1c4fd;
    --glass-white: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.6);
    --text-primary: #1d1d1f;
    --text-secondary: rgba(0,0,0,0.6);
    --ios-blue: #007AFF;
    --input-bg: rgba(255, 255, 255, 0.4);
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    font-family: Inter, system-ui;
}

/* FULL BACKGROUND REPLACED */
html, body {
    height: 100dvh;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: var(--bg-color);
}

/* MAIN BODY BACKGROUND EFFECT */
body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    position:relative;

    background:
    radial-gradient(circle at top,
        rgba(255,255,255,.15),
        transparent 35%),

    linear-gradient(
        60deg,
        #0b3d91 0%,
        #0077b6 40%,
        #00b4d8 100%
    );

    background-attachment:fixed;
}

/* FOG / LIGHT MOVING EFFECT */
body::before{
    content:"";
    position:fixed;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 80%,
        rgba(255,255,255,.18),
        transparent 25%),

    radial-gradient(circle at 80% 20%,
        rgba(255,255,255,.10),
        transparent 30%);

    filter:blur(40px);
    animation:fogMove 10s ease-in-out infinite alternate;
    z-index:0;
}

@keyframes fogMove{
    from{
        transform:translateX(-30px) translateY(0);
    }
    to{
        transform:translateX(30px) translateY(-20px);
    }
}

/* STAGE */
.stage{
    position:relative;
z-index:2;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
}

/* WHEEL */
.wheel{
    position:absolute;
    width:650px;
    height:650px;
    left:-325px;
    top:50%;
    transform:translateY(-50%) rotate(0deg);
    transition:transform 0.7s cubic-bezier(.22,1,.36,1);
    transform-origin:center center;
}

/* GLOW */
.wheel::before{
    content:"";
    position:absolute;
    inset:60px;
    border-radius:50%;
    border:1px solid rgba(56,189,248,0.15);
    box-shadow:0 0 60px rgba(56,189,248,0.08);
}

/* ITEM */
.item{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-weight:600;
    backdrop-filter:blur(14px);
    transition:0.3s;
    opacity:0.5;
    transform:scale(0.9);
}

/* ACTIVE */
.item.active{
    background:rgba(56,189,248,0.25);
    border-color:rgba(56,189,248,0.6);
    box-shadow:0 0 25px rgba(56,189,248,0.25);
    opacity:1;
    transform:scale(1.25);
}

/* PANEL */
.panel{
    position:absolute;
z-index:2;
    right:80px;
    color:white;
}

.panel h1{
    font-size:46px;
}

.panel p{
    opacity:0.6;
}
    /* INFO CARD */
.info-card{
    position:absolute;
    right:80px;
    top:58%;
    width:340px;

    padding:24px;
    border-radius:24px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    color:white;

    opacity:0;
    transform:translateX(50px);

    animation:none;
}

/* ANIMATION */
@keyframes fadeInRight{
    from{
        opacity:0;
        transform:translateX(50px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

.info-card.show{
    animation:fadeInRight .45s ease forwards;
}

.info-card h2{
    margin-bottom:10px;
    font-size:22px;
}

.info-card p{
    opacity:.7;
    line-height:1.6;
}
    /* MOBILE */
@media (max-width:768px){

    .panel{
        display:none;
    }

    .info-card{
        position:fixed;
        left:20px;
        right:20px;
        top:auto;
        bottom:20px;
        width:auto;

        opacity:0;
        visibility:hidden;

        transform:translateY(40px);

        transition:
            opacity .3s ease,
            transform .3s ease,
            visibility .3s;
    }

    .info-card.show-mobile{
        opacity:1;
        visibility:visible;
        transform:translateY(0);
    }
}
</style>

    <link rel="stylesheet" href="style.css">

<script src="auth.js"></script>
<script src="session.js"></script>
<script src="sidebar.js" defer></script>
    
</head>

<body>

    <app-sidebar></app-sidebar>

<div class="stage">
    <div class="wheel" id="wheel"></div>
</div>

<div class="panel">
    <h1 id="title">M&E</h1>
    <p>Department Sections</p>
</div>

    <div class="info-card" id="infoCard">
    <h2 id="cardTitle">M&E</h2>
    <p id="cardDesc">
        Mechanical & Electrical management dashboard.
    </p>
</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {

    if(typeof checkSession === "function"){
        await checkSession();
    }

    loadSections();
});
    
    const role = localStorage.getItem("role");
const isAdmin = role === "admin";

const SB_URL = "https://ywmsvowroxzhrjwrhsru.supabase.co";
const SB_KEY = "...";

const headers = {
    apikey: SB_KEY,
    Authorization: `Bearer ${SB_KEY}`
};
const wheel = document.getElementById("wheel");
const title = document.getElementById("title");
    const card = document.getElementById("infoCard");
const cardTitle = document.getElementById("cardTitle");
const cardDesc = document.getElementById("cardDesc");

const radius = 240;

let index = 0;
let angle = 0;
let lock = false;

    const isMobile = window.innerWidth <= 768;

    async function loadSections(){

    try{

        const res = await fetch(
            `${SB_URL}/rest/v1/me_sections?select=*`,
            { headers }
        );

        items = await res.json();

        items = items.map(sec => ({
            title: sec.section_name,
            desc: sec.section_name
        }));

        stepAngle = 360 / items.length;

        createWheel();

    }catch(err){
        console.error(err);
    }
}

function createWheel(){

    wheel.innerHTML = "";

    items.forEach(item=>{

        const el = document.createElement("div");

        el.className = "item";
        el.innerText = item.title;

        wheel.appendChild(el);
    });

    itemEls = document.querySelectorAll(".item");

    itemEls.forEach((el,i)=>{

        el.addEventListener("click",()=>{

            if(isMobile){

                index = i;

                angle = -(stepAngle * i);

                update();
                render();

                card.classList.add("show-mobile");
            }

        });

    });

    positionItems();
    update();
    render();
}

let itemEls = [];

    itemEls.forEach((el,i)=>{

    el.addEventListener("click",()=>{

        if(!isMobile) return;

        if(i !== index) return;

        card.classList.add("show-mobile");
    });

});

/* POSITION ITEMS */
function positionItems(){
    itemEls.forEach((el,i)=>{
        const theta = (i/items.length)*Math.PI*2;
        const x = Math.cos(theta)*radius;
        const y = Math.sin(theta)*radius;

        el.style.left = `calc(50% + ${x}px - 60px)`;
        el.style.top  = `calc(50% + ${y}px - 60px)`;
    });
}

/* UPDATE ACTIVE */
function update(){

    itemEls.forEach(el => el.classList.remove("active"));
    itemEls[index].classList.add("active");

    title.innerText = items[index].title;

    cardTitle.innerText = items[index].title;
    cardDesc.innerText = items[index].desc;

    if(isMobile){
        card.classList.remove("show-mobile");
    }

    if(!isMobile){

        card.classList.remove("show");

        void card.offsetWidth;

        card.classList.add("show");
    }
}

/* RENDER (FIXED CORE) */
function render(){

    wheel.style.transform =
        `translateY(-50%) rotate(${angle}deg)`;

    itemEls.forEach(el=>{
        el.style.transform =
            `rotate(${-angle}deg) scale(0.9)`;
    });

    itemEls[index].style.transform =
        `rotate(${-angle}deg) scale(1.25)`;
}

/* NEXT */
function next(){
    index = (index + 1) % items.length;
    angle -= stepAngle;
    update();
    render();
}

/* PREV */
function prev(){
    index = (index - 1 + items.length) % items.length;
    angle += stepAngle;
    update();
    render();
}

/* MOUSE WHEEL (BUFFER SMOOTH) */
let scrollBuffer = 0;

window.addEventListener("wheel",(e)=>{

    if(lock) return;
    lock = true;

    scrollBuffer += e.deltaY;

    const threshold = 80;

    if(scrollBuffer > threshold){
        next();
        scrollBuffer = 0;
    }

    if(scrollBuffer < -threshold){
        prev();
        scrollBuffer = 0;
    }

    setTimeout(()=> lock = false, 120);

},{passive:true});

/* TOUCH */
let startX = 0;

window.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

window.addEventListener("touchend",(e)=>{

    const diff = startX - e.changedTouches[0].clientX;

    if(Math.abs(diff) < 40) return;

    if(diff > 0) next();
    else prev();

});

    document.addEventListener("click",(e)=>{

    if(!isMobile) return;

    if(
        !card.contains(e.target) &&
        !e.target.closest(".item")
    ){
        card.classList.remove("show-mobile");
    }

});

    if(isMobile){
    card.classList.remove("show");
    card.classList.remove("show-mobile");
}

</script>

</body>
</html>
