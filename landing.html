<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Control Wheel V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui;
}

body{
    height:100vh;
    background:radial-gradient(circle at center,#0b1a2b,#050816);
    overflow:hidden;
}

/* STAGE */
.stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
}

/* WHEEL (HALF HIDDEN LEFT) */
.wheel{
    position:absolute;
    width:650px;
    height:650px;
    left:-325px;
    top:50%;
    transform:translateY(-50%) rotate(0deg);

    transition:transform 0.15s linear;
}

/* GLOW RING */
.wheel::before{
    content:"";
    position:absolute;
    inset:60px;
    border-radius:50%;
    border:1px solid rgba(56,189,248,0.15);
    box-shadow:0 0 60px rgba(56,189,248,0.08);
}

/* ITEM */
.item{
    position:absolute;
    width:120px;
    height:120px;

    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    color:white;
    font-weight:600;

    backdrop-filter:blur(14px);

    transition:0.3s;
    opacity:0.5;
    transform:scale(0.9);
}

/* ACTIVE */
.item.active{
    background:rgba(56,189,248,0.25);
    border-color:rgba(56,189,248,0.6);
    box-shadow:0 0 25px rgba(56,189,248,0.25);
    opacity:1;
    transform:scale(1.25);
}

/* RIGHT PANEL */
.panel{
    position:absolute;
    right:80px;
    color:white;
}

.panel h1{
    font-size:46px;
}

.panel p{
    opacity:0.6;
}
</style>
</head>

<body>

<div class="stage">
    <div class="wheel" id="wheel"></div>
</div>

<div class="panel">
    <h1 id="title">M&E</h1>
    <p>Ultra Control Wheel V2</p>
</div>

<script>

const wheel = document.getElementById("wheel");
const title = document.getElementById("title");

const items = ["M&E","CM","PM","Asset","Reports","Export","Analytics","Logs"];

const radius = 240;
const stepAngle = 360 / items.length;

let index = 0;
let angle = 0;
let lock = false;

const itemEls = document.querySelectorAll(".item");

/* POSITION FIXED CIRCLE */
function positionItems(){

    itemEls.forEach((el,i)=>{
        const theta = (i/items.length)*Math.PI*2;

        const x = Math.cos(theta)*radius;
        const y = Math.sin(theta)*radius;

        el.style.left = `calc(50% + ${x}px - 60px)`;
        el.style.top  = `calc(50% + ${y}px - 60px)`;
    });
}

/* UPDATE ACTIVE */
function update(){
    itemEls.forEach(el=>el.classList.remove("active"));
    itemEls[index].classList.add("active");
    title.innerText = items[index];
}

/* SNAP ROTATION */
function snap(){
    angle = -index * stepAngle;

    wheel.style.transition =
        "transform 0.7s cubic-bezier(.22,1,.36,1)";

    wheel.style.transform =
        `translateY(-50%) rotate(${angle}deg)`;

    setTimeout(()=>{
        wheel.style.transition = "transform 0.15s linear";
    },700);
}

/* INIT */
positionItems();
update();
snap();

/* SCROLL CONTROL */
window.addEventListener("wheel",(e)=>{

    if(lock) return;
    lock = true;

    if(e.deltaY > 0 || e.deltaX > 0){
        index = (index + 1) % items.length;
    } else {
        index = (index - 1 + items.length) % items.length;
    }

    update();
    snap();

    setTimeout(()=> lock = false, 250);

},{passive:true});

</script>

</body>
</html>
