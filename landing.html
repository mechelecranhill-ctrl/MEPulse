<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Radial Carousel</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#050816;
  --glass:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.08);
  --text:#eaf6ff;
  --accent:#38bdf8;
  --muted:#9fb3c8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#14213d,#050816);
  overflow:hidden;
}

/* OUTER HALF CIRCLE CONTAINER */
.container{
  position:relative;
  width:420px;
  height:420px;
  border-radius:50%;
  overflow:hidden; /* 👈 IMPORTANT: hide left side */
}

/* VISUAL GUIDE RING */
.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:1px solid var(--stroke);
  transform:rotate(-90deg);
  transition:1s ease;
}

/* CENTER HUB */
.center{
  position:absolute;
  width:140px;
  height:140px;
  border-radius:50%;
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(14px);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* ITEM */
.item{
  position:absolute;
  width:85px;
  height:85px;
  border-radius:14px;
  background:var(--glass);
  border:1px solid var(--stroke);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.item:hover{
  transform:scale(1.1);
  border-color:rgba(56,189,248,0.4);
  box-shadow:0 0 18px rgba(56,189,248,0.15);
}

.item i{
  color:var(--accent);
  margin-bottom:5px;
}

/* CONTROLS */
.controls{
  position:absolute;
  bottom:-70px;
  display:flex;
  gap:10px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:var(--glass);
  color:var(--text);
  cursor:pointer;
}

button:hover{
  border-color:var(--accent);
}
</style>
</head>

<body>

<div class="container">

  <div class="ring" id="ring"></div>

  <div class="center">
    <h3>Command Core</h3>
    <small style="color:var(--muted)">Semi Ocean System</small>
  </div>

</div>

<div class="controls">
  <button onclick="spin(-30)">⟲ Rotate</button>
  <button onclick="spin(30)">Rotate ⟳</button>
</div>

<script>
const ring = document.getElementById("ring");

const itemsData = [
  {icon:"fa-file-contract", name:"Contracts"},
  {icon:"fa-screwdriver-wrench", name:"Maintenance"},
  {icon:"fa-bolt", name:"Electrical"},
  {icon:"fa-box", name:"Assets"},
  {icon:"fa-chart-line", name:"Reports"},
  {icon:"fa-file-export", name:"Export"},
  {icon:"fa-water", name:"Ocean"}
];

let angle = 0;
const radius = 160;

/* CREATE HALF ARC (0° to 180° only) */
itemsData.forEach((data, i)=>{

  const item = document.createElement("div");
  item.className = "item";

  item.innerHTML = `
    <i class="fas ${data.icon}"></i>
    <small>${data.name}</small>
  `;

  ring.appendChild(item);

  // Spread only HALF CIRCLE (180 degrees)
  const step = Math.PI / (itemsData.length - 1);
  const theta = step * i;

  const x = Math.cos(theta) * radius;
  const y = Math.sin(theta) * radius;

  item.style.left = `calc(50% + ${x}px - 42px)`;
  item.style.top  = `calc(50% - ${y}px - 42px)`;
});

/* ROTATION */
function spin(val){
  angle += val;
  ring.style.transform = `rotate(${angle}deg)`;
}
</script>

</body>
</html>
