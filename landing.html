<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Wheel FIXED</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:radial-gradient(circle at center,#0b1a2b,#050816);
}

/* CENTER STAGE (IMPORTANT FIX) */
.stage{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* WHEEL CENTERED (NO NEGATIVE LEFT ANYMORE) */
.wheel{
    position:absolute;
    width:min(600px, 90vmin);
    height:min(600px, 90vmin);
    border-radius:50%;
    transform:rotate(0deg);
    transition:transform 0.7s cubic-bezier(.22,1,.36,1);
}

/* glow */
.wheel::before{
    content:"";
    position:absolute;
    inset:60px;
    border-radius:50%;
    border:1px solid rgba(56,189,248,0.15);
    box-shadow:0 0 60px rgba(56,189,248,0.08);
}

/* ITEM */
.item{
    position:absolute;
    width:110px;
    height:110px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:600;
    backdrop-filter:blur(12px);
    opacity:0.5;
    transform:scale(0.9);
    transition:0.3s;
}

/* ACTIVE */
.item.active{
    background:rgba(56,189,248,0.25);
    border-color:rgba(56,189,248,0.6);
    box-shadow:0 0 25px rgba(56,189,248,0.25);
    opacity:1;
    transform:scale(1.25);
}

/* PANEL */
.panel{
    position:absolute;
    right:20px;
    top:20px;
    color:white;
    text-align:right;
}

.panel h1{
    font-size:32px;
}

/* MOBILE FIX */
@media(max-width:768px){
    .panel h1{font-size:24px;}
}
</style>
</head>

<body>

<div class="stage">
    <div class="wheel" id="wheel"></div>
</div>

<div class="panel">
    <h1 id="title">M&E</h1>
    <p>Ultra Wheel</p>
</div>

<script>

window.addEventListener("DOMContentLoaded", () => {

const wheel = document.getElementById("wheel");
const title = document.getElementById("title");

const items = ["M&E","CM","PM","Asset","Reports","Export","Analytics","Logs"];

let index = 0;
let angle = 0;
let lock = false;

const stepAngle = 360 / items.length;

/* RESPONSIVE RADIUS (IMPORTANT FIX) */
function getRadius(){
    return Math.min(window.innerWidth, window.innerHeight) * 0.28;
}

let radius = getRadius();

/* CREATE ITEMS */
items.forEach(name=>{
    const el = document.createElement("div");
    el.className = "item";
    el.innerText = name;
    wheel.appendChild(el);
});

const itemEls = document.querySelectorAll(".item");

/* POSITION */
function positionItems(){
    itemEls.forEach((el,i)=>{
        const theta = (i/items.length)*Math.PI*2;
        const x = Math.cos(theta)*radius;
        const y = Math.sin(theta)*radius;

        el.style.left = `calc(50% + ${x}px - 55px)`;
        el.style.top  = `calc(50% + ${y}px - 55px)`;
    });
}

/* UPDATE */
function update(){
    itemEls.forEach(el => el.classList.remove("active"));
    itemEls[index].classList.add("active");
    title.innerText = items[index];
}

/* RENDER */
function render(){
    wheel.style.transform = `rotate(${angle}deg)`;

    itemEls.forEach(el=>{
        el.style.transform = `rotate(${-angle}deg) scale(0.9)`;
    });

    itemEls[index].style.transform = `rotate(${-angle}deg) scale(1.25)`;
}

/* NEXT/PREV */
function next(){
    index = (index + 1) % items.length;
    angle -= stepAngle;
    update();
    render();
}

function prev(){
    index = (index - 1 + items.length) % items.length;
    angle += stepAngle;
    update();
    render();
}

/* SCROLL */
let buffer = 0;

window.addEventListener("wheel",(e)=>{
    if(lock) return;
    lock = true;

    buffer += e.deltaY;

    if(buffer > 60){
        next();
        buffer = 0;
    }

    if(buffer < -60){
        prev();
        buffer = 0;
    }

    setTimeout(()=>lock=false,120);
},{passive:true});

/* TOUCH */
let startX = 0;

window.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
});

window.addEventListener("touchend",e=>{
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff)<40) return;
    diff>0 ? next() : prev();
});

/* RESIZE FIX */
window.addEventListener("resize",()=>{
    radius = getRadius();
    positionItems();
    render();
});

/* INIT */
positionItems();
update();
render();

});
</script>

</body>
</html>
