<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Waves</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#00acc1;
}

.container{
    position:relative;
    width:100%;
    height:100vh;

    background:linear-gradient(
        60deg,
        rgba(84,58,183,1) 0%,
        rgba(0,172,193,1) 100%
    );
}

.waves{
    position:absolute;
    bottom:0;
    left:0;

    width:200%;
    height:200px;

    display:flex;

    animation: waveMove 12s linear infinite;
}

.wave-svg{
    width:50%;
    height:100%;
    flex-shrink:0;
}

@keyframes waveMove{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="waves">

<svg class="wave-svg"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 24 150 28"
     preserveAspectRatio="none">

    <defs>
        <path id="wave-path"
              d="
              M-160 44
              c30 0 58-18 88-18
              s58 18 88 18
              58-18 88-18
              58 18 88 18
              v44h-500z"/>
    </defs>

    <g>

        <use href="#wave-path"
             x="0"
             y="0"
             fill="rgba(255,255,255,0.7)" />

        <use href="#wave-path"
             x="0"
             y="3"
             fill="rgba(255,255,255,0.5)" />

        <use href="#wave-path"
             x="0"
             y="5"
             fill="rgba(255,255,255,0.3)" />

        <use href="#wave-path"
             x="0"
             y="7"
             fill="#fff" />

    </g>

</svg>

<!-- DUPLICATE -->
<svg class="wave-svg"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 24 150 28"
     preserveAspectRatio="none">

    <use href="#wave-path"
         x="0"
         y="0"
         fill="rgba(255,255,255,0.7)" />

    <use href="#wave-path"
         x="0"
         y="3"
         fill="rgba(255,255,255,0.5)" />

    <use href="#wave-path"
         x="0"
         y="5"
         fill="rgba(255,255,255,0.3)" />

    <use href="#wave-path"
         x="0"
         y="7"
         fill="#fff" />

</svg>

</div>

</div>

</body>
</html>
