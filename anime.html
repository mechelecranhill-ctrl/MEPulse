<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Waves</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#00acc1;
}

.container{
    position:relative;
    width:100%;
    height:100vh;

    background:linear-gradient(
        60deg,
        rgba(84,58,183,1) 0%,
        rgba(0,172,193,1) 100%
    );
}

.waves{
    position:absolute;
    bottom:0;
    left:0;
    right:0;

    width:100%;
    height:200px;

    display:block;
}

.parallax > use{
    animation: moveWave 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes moveWave{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}

</style>
</head>

<body>

<div class="container">

<svg class="waves"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 24 150 28"
width="100%"
height="200"
     preserveAspectRatio="none">

    <defs>
        <path id="gentle-wave"
              d="M-160 44
                 c30 0 58-18 88-18
                 s58 18 88 18
                 58-18 88-18
                 v44h-352z" />
    </defs>

    <g class="parallax">

        <use xlink:href="#gentle-wave"
             x="48"
             y="0"
             fill="rgba(255,255,255,0.7)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="3"
             fill="rgba(255,255,255,0.5)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="5"
             fill="rgba(255,255,255,0.3)" />

        <use xlink:href="#gentle-wave"
             x="48"
             y="7"
             fill="#ffffff" />

    </g>

</svg>

</div>

</body>
</html>
