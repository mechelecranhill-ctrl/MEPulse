<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta https-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IMAN</title>

</head>

<style>
body {
margin: 0;
}

.container {
position: relative;
text-align: center;
background: linear-gradient{
60deg,
rgba(84, 58, 183, 1) 0%,
rgba(0, 172, 193, 1) 100%
);
color: white;
}

.waves {
position: relative;
width:100%;
height: 20vh;
margin-bottom: -7px;
min-height: 100px;
max-height: 350px;
}

.waves-effect > use {
animation: movement 25s cubic-bezier(0.55, 0.5, 0.45, 0.5) infinite;
}

.waves-effect > use:nth-child(1) {
animation-delay: -2s;
animation-duration: 7s;
}

.waves-effect > use:nth-child(2) {
animation-delay: -3s;
animation-duration: 10s;
}

.waves-effect > use:nth-child(3) {
animation-delay: -4s;
animation-duration: 13s;
}

.waves-effect > use:nth-child(4) {
animation-delay: -5s;
animation-duration: 20s;

@keyframe movement {
0% {
transform: translate3d(-90px, 0, 0);
}
100% {
transform: translate3d(85px, 0, 0);
}
}

@media (max-width: 768px) {
.wavees {
height: 3em;
min-height: 60px;
}
}
}
      </style>
</head>
<body>
  <div class="container">
    <div>
      <svg class="waves" xlmns="https://www.w3.org/2000/svg"
        xmlns:xlink="https://www.w3.org/1999/xlink"
        viewbox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs> <path id="wave"
                 d="M-160 44c30 0 58-18 88-18s 58 18 88 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="waves-effect">
          <use xlink:href="#wave" x="48" y="0"
            fill="rgba(255,255,255,0.7)" />
                    <use xlink:href="#wave" x="48" y="3"
            fill="rgba(255,255,255,0.5)" />
                    <use xlink:href="#wave" x="48" y="5"
            fill="rgba(255,255,255,0.3)" />
                    <use xlink:href="#wave" x="48" y="7"
            fill="3fff" />
        </g>g>
      </svg>
    </div>
</body>
</html>
