<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Fix</title>

<style>

body{
    margin:0;
    overflow:hidden;
}

.container{
    position:relative;
    width:100%;
    height:100vh;

    background:linear-gradient(
        60deg,
        rgba(84,58,183,1) 0%,
        rgba(0,172,193,1) 100%
    );
}

.waves{
    position:absolute;
    bottom:0;
    width:100%;
    height:260px; /* tambah tinggi */
}

.parallax > use{
    animation:moveWave 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes moveWave{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}

</style>
</head>

<body>

<div class="container">

<svg class="waves"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 150 60"
     preserveAspectRatio="none">

    <defs>
        <path id="wave"
              d="
              M-160 30
              C-130 10 -100 10 -70 30
              S-10 50 20 30
              S80 10 110 30
              S170 50 200 30
              V60
              H-160
              Z">
        </path>
    </defs>

    <g class="parallax">

        <use xlink:href="#wave"
             x="0"
             y="0"
             fill="rgba(255,255,255,0.7)" />

        <use xlink:href="#wave"
             x="0"
             y="5"
             fill="rgba(255,255,255,0.5)" />

        <use xlink:href="#wave"
             x="0"
             y="10"
             fill="rgba(255,255,255,0.3)" />

        <use xlink:href="#wave"
             x="0"
             y="15"
             fill="#ffffff" />

    </g>

</svg>

</div>

</body>
</html>
