<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple CSS Waves</title>

<link href="https://fonts.googleapis.com/css?family=Lato:300,400&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow-x:hidden;
    font-family:'Lato',sans-serif;
}

/* HEADER */

.header{
    position:relative;
    text-align:center;

    background:linear-gradient(
        60deg,
        rgba(84,58,183,1) 0%,
        rgba(0,172,193,1) 100%
    );

    color:white;
}

/* FLEX */

.flex{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* CONTENT ATAS */

.inner-header{
    height:65vh;
    width:100%;
    margin:0;
    padding:0;
    flex-direction:column;
}

h1{
    font-weight:300;
    letter-spacing:2px;
    font-size:48px;
    margin-top:20px;
}

p{
    letter-spacing:1px;
    font-size:14px;
    color:#333;
}

/* LOGO */

.logo{
    width:80px;
    fill:white;
}

/* WAVES */

.waves{
    position:relative;
    width:100%;
    height:15vh;
    margin-bottom:-7px;

    min-height:100px;
    max-height:150px;
}

.parallax > use{
    animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

/* ANIMATION */

@keyframes move-forever{

    0%{
        transform:translate3d(-90px,0,0);
    }

    100%{
        transform:translate3d(85px,0,0);
    }

}

/* BAWAH */

.content{
    position:relative;
    height:20vh;
    text-align:center;
    background:white;
}

/* MOBILE */

@media(max-width:768px){

    .waves{
        height:40px;
        min-height:40px;
    }

    .content{
        height:30vh;
    }

    h1{
        font-size:24px;
    }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <!-- CONTENT -->
    <div class="inner-header flex">

        <!-- LOGO -->
        <svg version="1.1"
             class="logo"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 500 500">

            <path fill="#FFFFFF"
                  stroke="#000000"
                  stroke-width="10"
                  stroke-miterlimit="10"
                  d="M57,283" />

            <g>
                <path fill="#fff"
                      d="M250.4,0.8C112.7,0.8,1,112.4,1,250.2c0,137.7,111.7,249.4,249.4,249.4
                      c137.7,0,249.4-111.7,249.4-249.4
                      C499.8,112.4,388.1,0.8,250.4,0.8z">
                </path>
            </g>

        </svg>

        <h1>Simple CSS Waves</h1>

    </div>

    <!-- WAVES -->
    <div>

        <svg class="waves"
             xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink"
             viewBox="0 24 150 28"
             preserveAspectRatio="none"
             shape-rendering="auto">

            <defs>

                <path id="gentle-wave"
                      d="M-160 44c30 0 58-18 88-18s58 18 88 18
                         58-18 88-18 58 18 88 18v44h-352z" />

            </defs>

            <g class="parallax">

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="0"
                     fill="rgba(255,255,255,0.7)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="3"
                     fill="rgba(255,255,255,0.5)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="5"
                     fill="rgba(255,255,255,0.3)" />

                <use xlink:href="#gentle-wave"
                     x="48"
                     y="7"
                     fill="#ffffff" />

            </g>

        </svg>

    </div>

</div>

<!-- CONTENT -->
<div class="content flex">

    <p>By Goodkatz | Free to use</p>

</div>

</body>
</html>
