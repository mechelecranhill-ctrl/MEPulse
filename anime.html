<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Waves</title>

<style>

body{
    margin:0;
    overflow:hidden;
}

.container{
    position:relative;
    width:100%;
    height:100vh;

    background:linear-gradient(
        60deg,
        #543ab7 0%,
        #00acc1 100%
    );
}

.waves{
    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:220px;

    display:block;
}

.parallax > use{
    animation:waveMove 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax > use:nth-child(1){
    animation-delay:-2s;
    animation-duration:7s;
}

.parallax > use:nth-child(2){
    animation-delay:-3s;
    animation-duration:10s;
}

.parallax > use:nth-child(3){
    animation-delay:-4s;
    animation-duration:13s;
}

.parallax > use:nth-child(4){
    animation-delay:-5s;
    animation-duration:20s;
}

@keyframes waveMove{

    0%{
        transform:translateX(-90px);
    }

    100%{
        transform:translateX(85px);
    }

}

</style>
</head>

<body>

<div class="container">

<svg class="waves"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1440 320"
     preserveAspectRatio="none">

    <defs>

        <path id="wave-path"
              d="
              M0,160
              C240,260 480,60 720,160
              C960,260 1200,60 1440,160
              L1440,320
              L0,320
              Z">
        </path>

    </defs>

    <g class="parallax">

        <use href="#wave-path"
             x="0"
             y="0"
             fill="rgba(255,255,255,0.7)">
        </use>

        <use href="#wave-path"
             x="0"
             y="25"
             fill="rgba(255,255,255,0.5)">
        </use>

        <use href="#wave-path"
             x="0"
             y="50"
             fill="rgba(255,255,255,0.3)">
        </use>

        <use href="#wave-path"
             x="0"
             y="75"
             fill="#ffffff">
        </use>

    </g>

</svg>

</div>

</body>
</html>
