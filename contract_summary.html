<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>

<button onclick="exportExcel()">Export Excel</button>

<script>
function exportExcel(){
    if (!window.contractData) {
        alert("Data belum sedia");
        return;
    }

    const c = window.contractData;
    const wb = XLSX.utils.book_new();
    
    // 1. STRUKTUR DATA (MENGIKUT ROW DAN COLUMN GAMBAR)
    // Row 1 kosong, Row 2 Tajuk, Row 5 mula maklumat kontrak
    const ws_data = [
        [], // Row 1
        ["", c.contract_name || ""], // Row 2 (Column B)
        [], // Row 3
        [], // Row 4
        ["", "CONTRACT NO.", "", ":", c.contract_code || "-"], // Row 5
        ["", "CONTRACTOR", "", ":", c.contractor || "-"],     // Row 6
        ["", "CONTRACT PERIOD", "", ":", c.contract_period || "-"], // Row 7
        ["", "CONTRACT SUM", "", ":", "RM" + Number(c.contract_sum || 0).toLocaleString(undefined, {minimumFractionDigits: 2})], // Row 8
        ["", "PERFORMANCE GUARANTEE SUM", "", ":", c.pg_sum || "-"], // Row 9
        [], // Row 10
        [], // Row 11
        [], // Row 12
        // Row 13: Header Jadual
        ["ITEM", "DESCRIPTION", "", "AS PER CONTRACT", "INTERIM NO.1", "INTERIM NO.2", "INTERIM NO.3", "INTERIM NO.4", "INTERIM NO.5", "INTERIM NO.6", "INTERIM NO.7", "INTERIM NO.8", "INTERIM NO.9", "INTERIM NO.10"],
        // Row 14: Unit RM
        ["", "", "", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM"]
    ];

    // Tambah Data Item (Mula Row 15)
    const items = [
        ["A", "GENERAL & PRELIMINARIES", 24500.00],
        ["B", "PREVENTIVE MAINTENANCE & SERVICE CHARGES", 156000.00],
        ["C", "PROACTIVE MAINTENANCE & OVERHAUL SERVICE CHARGES", 1365900.00],
        ["D", "CALIBRATION & VERIFICATION CHARGES", 425550.00],
        ["E", "WORKMANSHIP CHARGES", 96000.00],
        ["F", "SUPPLY & DELIVERY OF SPARE PART", 340434.00],
        ["G", "PROVISIONAL SUM", 2200000.00]
    ];

    items.forEach(item => {
        let row = [item[0], item[1], "", item[2]];
        for(let i=0; i<10; i++) row.push("-"); 
        ws_data.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // ==========================================
    // 2. STYLING (IKUT GAMBAR)
    // ==========================================

    // Tajuk (B2) - Bold & Wrap
    ws["B2"].s = {
        font: { bold: true, sz: 11 },
        alignment: { wrapText: true, vertical: "center", horizontal: "center" }
    };

    // Data Kontrak (E5:E9) - Bold
    ["E5","E6","E7","E8","E9"].forEach(ref => {
        if(ws[ref]) ws[ref].s = { font: { bold: true } };
    });

    // Header Jadual (Row 13 & 14) - Kelabu & Border
    for(let c=0; c<=13; c++) {
        [13, 14].forEach(r => {
            const cellRef = XLSX.utils.encode_cell({r: r-1, c: c});
            if(ws[cellRef]) {
                ws[cellRef].s = {
                    fill: { fgColor: { rgb: "D3D3D3" } },
                    font: { bold: true, sz: 9 },
                    border: { top:{style:"thin"}, bottom:{style:"thin"}, left:{style:"thin"}, right:{style:"thin"} },
                    alignment: { horizontal: "center", vertical: "center" }
                };
            }
        });
    }

    // Warna Oren (Row 19 - Item E) & Kuning (Row 20 - Item F)
    for(let c=0; c<=13; c++) {
        const cellE = XLSX.utils.encode_cell({r: 18, c: c}); // Item E
        const cellF = XLSX.utils.encode_cell({r: 19, c: c}); // Item F
        const cellG = XLSX.utils.encode_cell({r: 20, c: c}); // Item G
        
        if(ws[cellE]) ws[cellE].s = { fill: { fgColor: { rgb: "FFCC99" } }, border: { outline: true } };
        if(ws[cellF]) ws[cellF].s = { fill: { fgColor: { rgb: "FFFF00" } }, border: { outline: true } };
        if(ws[cellG]) ws[cellG].s = { fill: { fgColor: { rgb: "FFFF00" } }, border: { outline: true } };
    }

    // ==========================================
    // 3. MERGE & SETTING
    // ==========================================
    ws["!merges"] = [
        { s: { r: 1, c: 1 }, e: { r: 3, c: 14 } }, // Tajuk B2:O4
        { s: { r: 12, c: 0 }, e: { r: 13, c: 0 } }, // Merge ITEM
        { s: { r: 12, c: 1 }, e: { r: 13, c: 2 } }  // Merge DESCRIPTION (B:C)
    ];

    ws['!rows'] = ws_data.map(() => ({ hpt: 15.75 }));
    ws["!cols"] = [
        {wch: 5},  // A (ITEM)
        {wch: 35}, // B (DESC)
        {wch: 2},  // C (Gap)
        {wch: 18}, // D (AS PER CONTRACT)
        {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}, // Interim 1-5
        {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}  // Interim 6-10
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Summary");
    XLSX.writeFile(wb, "Contract_Summary_Precise.xlsx");
}
</script>
</body>
</html>
