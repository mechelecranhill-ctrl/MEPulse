<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Summary (Excel View)</title> 

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body{ font-family:-apple-system,system-ui,sans-serif; margin:0; background:#f5f7fb; padding:20px; }
.header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.card{ background:white; padding:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
.btn{ padding:10px 14px; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
.btn-blue{ background:#007AFF; color:white; }
.btn-dark{ background:#333; color:white; }
#excelTable { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
#excelTable th { background: #f3f3f3; border: 1px solid #ccc; padding: 8px; text-align: left; }
#excelTable td { border: 1px solid #ddd; padding: 8px; }
</style>
</head>

<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Contract Summary</h2>
        <small style="color:#666;">Eksport: Kolum C (Simbol :) | Kolum D (Data)</small>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-blue" onclick="exportExcel()">
            <i class="fa fa-file-excel"></i> Export Excel
        </button>
        <button class="btn btn-dark" onclick="goBack()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="card">
    <div style="overflow:auto;">
        <table id="excelTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Contract Code</th>
                    <th>Contractor</th>
                    <th>Total Contract (RM)</th>
                </tr>
            </thead>
            <tbody id="excelBody">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

async function exportExcel() {
    if (!window.contractData) {
        alert("Data belum sedia");
        return;
    }

    const c = window.contractData;
    const wb = XLSX.utils.book_new();

    // 1. Ambil data pecahan seksyen (Section Breakdown)
    // Mengandaikan c.contract_sections_breakdown adalah JSON object dari Supabase
    const sections = c.contract_sections_breakdown || {};

    // 2. Header Maklumat Kontrak (Row 1 - 12)
    const ws_data = [
        [], // Row 1
        ["", c.contract_name || "SUMMARY OF CONTRACT"], // Row 2 (B2)
        [], // Row 3
        [], // Row 4
        ["", "CONTRACT NO.", ":", c.contract_code || "-"], // Row 5
        ["", "CONTRACTOR", ":", c.contractor || "-"],      // Row 6
        ["", "CONTRACT PERIOD", ":", c.contract_period || "-"], // Row 7
        ["", "CONTRACT SUM", ":", "RM " + Number(c.contract_sum || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })], // Row 8
        ["", "PERFORMANCE GUARANTEE SUM", ":", c.pg_sum || "-"], // Row 9
        [], [], [], // Row 10, 11, 12
        
        // 3. Header Jadual Utama (Row 13 & 14)
        ["ITEM", "DESCRIPTION", "", "AS PER CONTRACT", "INTERIM NO.1", "INTERIM NO.2", "INTERIM NO.3", "INTERIM NO.4", "INTERIM NO.5", "INTERIM NO.6", "INTERIM NO.7", "INTERIM NO.8", "INTERIM NO.9", "INTERIM NO.10"],
        ["", "", "", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM"]
    ];

    // 4. Data Items (A-G) - Diambil secara dinamik dari sections
    const itemKeys = ["A", "B", "C", "D", "E", "F", "G"];
    itemKeys.forEach(key => {
        const itemData = sections[key] || { desc: "-", total: 0 };
        let row = [
            key, 
            itemData.desc, 
            "", 
            itemData.total // Kolum D (As Per Contract)
        ];
        
        // Tambah Placeholder untuk Interim (E hingga N)
        // Jika anda ada data interim (contoh: itemData.interim1), anda boleh masukkan di sini
        for (let i = 1; i <= 10; i++) {
            row.push("-"); 
        }
        ws_data.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // --- STYLING MENGGUNAKAN xlsx-js-style ---
    
    // Tajuk Besar (B2)
    ws["B2"].s = { 
        font: { bold: true, sz: 14, color: { rgb: "000000" } }, 
        alignment: { horizontal: "left", vertical: "center" } 
    };

    // Styling Maklumat Kontrak (B5:D9)
    const infoRows = [5, 6, 7, 8, 9];
    infoRows.forEach(r => {
        const labelCell = `B${r}`;
        const colonCell = `C${r}`;
        const valueCell = `D${r}`;
        
        if(ws[labelCell]) ws[labelCell].s = { font: { bold: true, sz: 10 } };
        if(ws[colonCell]) ws[colonCell].s = { alignment: { horizontal: "center" } };
        if(ws[valueCell]) ws[valueCell].s = { font: { sz: 10 } };
    });

    // Border & Header Table (Row 13 ke atas)
    const tableStartRow = 12; // Index 0-based
    const tableEndRow = ws_data.length - 1;
    const tableEndCol = 13; // Kolum N

    for (let r = tableStartRow; r <= tableEndRow; r++) {
        for (let col = 0; col <= tableEndCol; col++) {
            const cellRef = XLSX.utils.encode_cell({ r: r, c: col });
            if (!ws[cellRef]) ws[cellRef] = { t: 's', v: '' };
            if (!ws[cellRef].s) ws[cellRef].s = {};
            
            ws[cellRef].s.border = {
                top: { style: "thin" }, bottom: { style: "thin" },
                left: { style: "thin" }, right: { style: "thin" }
            };

            // Header Row Styling (Grey)
            if (r === 12 || r === 13) {
                ws[cellRef].s.fill = { fgColor: { rgb: "EAEAEA" } };
                ws[cellRef].s.font = { bold: true, sz: 9 };
                ws[cellRef].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
            }
        }
    }

    // --- WARNA KHAS UNTUK ITEM E, F, G (Berdasarkan Index Row) ---
    const specialRows = [
        { rowIdx: 18, rgb: "FFCC99" }, // Item E (Index 18)
        { rowIdx: 19, rgb: "FFFF00" }, // Item F (Index 19)
        { rowIdx: 20, rgb: "FFFF00" }  // Item G (Index 20)
    ];

    specialRows.forEach(cfg => {
        for (let col = 0; col <= tableEndCol; col++) {
            const cellRef = XLSX.utils.encode_cell({ r: cfg.rowIdx, c: col });
            if (ws[cellRef]) {
                ws[cellRef].s.fill = { fgColor: { rgb: cfg.rgb } };
                ws[cellRef].s.font = { sz: 9 };
            }
        }
    });

    // Pengurusan Merges
    ws["!merges"] = [
        { s: { r: 1, c: 1 }, e: { r: 1, c: 5 } },      // Merge Title
        { s: { r: 12, c: 0 }, e: { r: 13, c: 0 } },   // Merge Header ITEM
        { s: { r: 12, c: 1 }, e: { r: 13, c: 2 } },   // Merge Header DESCRIPTION
        { s: { r: 12, c: 3 }, e: { r: 12, c: 3 } }    // AS PER CONTRACT
    ];

    // Lebar Kolum
    ws["!cols"] = [
        { wch: 6 }, { wch: 45 }, { wch: 3 }, { wch: 20 }, // A, B, C, D
        { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, // Interim 1-5
        { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }  // Interim 6-10
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Contract Summary");
    XLSX.writeFile(wb, `Summary_${c.contract_code || 'Contract'}.xlsx`);
}
async function loadSummary(){
    if(!contractId) return;
    try {
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers });
        const data = await res.json();
        if (data && data.length > 0) {
            const c = data[0];
            window.contractData = c;
            document.getElementById('excelBody').innerHTML = `
                <tr>
                    <td>1</td>
                    <td>${c.contract_code || '-'}</td>
                    <td>${c.contractor || '-'}</td>
                    <td>${Number(c.contract_sum || 0).toLocaleString()}</td>
                </tr>
            `;
        }
    } catch(err) { console.error(err); }
}

function goBack(){ window.history.back(); }
loadSummary();
</script>

</body>
</html>
