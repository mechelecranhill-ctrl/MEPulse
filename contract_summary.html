<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Summary (Excel View)</title> 

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body{ font-family:-apple-system,system-ui,sans-serif; margin:0; background:#f5f7fb; padding:20px; }
.header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.card{ background:white; padding:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
.btn{ padding:10px 14px; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
.btn-blue{ background:#007AFF; color:white; }
.btn-dark{ background:#333; color:white; }
#excelTable { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
#excelTable th { background: #f3f3f3; border: 1px solid #ccc; padding: 8px; text-align: left; }
#excelTable td { border: 1px solid #ddd; padding: 8px; }
</style>
</head>

<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Contract Summary</h2>
        <small style="color:#666;">Eksport: Kolum C (Simbol :) | Kolum D (Data)</small>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-blue" onclick="exportExcel()">
            <i class="fa fa-file-excel"></i> Export Excel
        </button>
        <button class="btn btn-dark" onclick="goBack()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="card">
    <div style="overflow:auto;">
        <table id="excelTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Contract Code</th>
                    <th>Contractor</th>
                    <th>Total Contract (RM)</th>
                </tr>
            </thead>
            <tbody id="excelBody">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

function exportExcel() {
    if (!window.contractData) {
        alert("Data belum sedia");
        return;
    }

    const c = window.contractData;
    const wb = XLSX.utils.book_new();

    // 1. Header Maklumat Kontrak
    const ws_data = [
        [], // Row 1
        ["", c.contract_name || "SUMMARY OF CONTRACT"], // Row 2
        [], [],
        ["", "CONTRACT NO.", ":", c.contract_code || "-"], // Row 5
        ["", "CONTRACTOR", ":", c.contractor || "-"],
        ["", "CONTRACT PERIOD", ":", c.contract_period || "-"],
        ["", "CONTRACT SUM", ":", "RM " + Number(c.contract_sum || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })],
        ["", "PERFORMANCE GUARANTEE SUM", ":", c.pg_sum || "-"],
        [], [], [],
        
        // 2. Header Jadual (Row 13 & 14)
        ["ITEM", "DESCRIPTION", "", "AS PER CONTRACT", "INTERIM NO.1", "INTERIM NO.2", "INTERIM NO.3", "INTERIM NO.4", "INTERIM NO.5", "INTERIM NO.6", "INTERIM NO.7", "INTERIM NO.8", "INTERIM NO.9", "INTERIM NO.10"],
        ["", "", "", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM", "RM"]
    ];

    // 3. Data Items (A-G)
    const items = [
        ["A", "GENERAL & PRELIMINARIES", 24500.00],
        ["B", "PREVENTIVE MAINTENANCE & SERVICE CHARGES", 156000.00],
        ["C", "PROACTIVE MAINTENANCE & OVERHAUL SERVICE CHARGES", 1365900.00],
        ["D", "CALIBRATION & VERIFICATION CHARGES", 425550.00],
        ["E", "WORKMANSHIP CHARGES", 96000.00],
        ["F", "SUPPLY & DELIVERY OF SPARE PART", 340434.00],
        ["G", "PROVISIONAL SUM", 2200000.00]
    ];

    items.forEach(item => {
        // Kolum A=item[0], B=item[1], C="", D=item[2]
        let row = [item[0], item[1], "", item[2]]; 
        for (let i = 1; i <= 10; i++) { row.push("-"); }
        ws_data.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // --- PENGURUSAN MERGES (PENTING) ---
    const lastRowIdx = ws_data.length - 1;
    
    let merges = [
        { s: { r: 1, c: 1 }, e: { r: 3, c: 13 } },    // Tajuk Besar
        { s: { r: 12, c: 0 }, e: { r: 13, c: 0 } },  // Header ITEM (A13:A14)
        { s: { r: 12, c: 1 }, e: { r: 13, c: 2 } }   // Header DESCRIPTION (B13:C14)
    ];

    // Merge Kolum B & C untuk setiap baris data (Item A hingga G)
    // Row data bermula dari index 14 (Row 15 dalam Excel)
    for (let i = 14; i <= lastRowIdx; i++) {
        merges.push({ s: { r: i, c: 1 }, e: { r: i, c: 2 } });
    }
    ws["!merges"] = merges;

    // --- STYLING ---
    const tableEndCol = 13; // Kolum N

    for (let r = 12; r <= lastRowIdx; r++) {
        for (let col = 0; col <= tableEndCol; col++) {
            const cellRef = XLSX.utils.encode_cell({ r: r, c: col });
            if (!ws[cellRef]) ws[cellRef] = { t: 's', v: '' };
            if (!ws[cellRef].s) ws[cellRef].s = {};

            // Border untuk semua sel jadual
            ws[cellRef].s.border = {
                top: { style: "thin" }, bottom: { style: "thin" },
                left: { style: "thin" }, right: { style: "thin" }
            };

            // Alignment untuk Description (Kolum B)
            if (col === 1 && r >= 14) {
                ws[cellRef].s.alignment = { horizontal: "left", vertical: "center", wrapText: true };
            }
        }
    }

    // Warna Khas (Gunakan index baris yang dinamik jika perlu)
    const rowsToColor = [
        { idx: 18, rgb: "FFCC99" }, // Item E
        { idx: 19, rgb: "FFFF00" }, // Item F
        { idx: 20, rgb: "FFFF00" }  // Item G
    ];

    rowsToColor.forEach(cfg => {
        for (let col = 0; col <= tableEndCol; col++) {
            const cellRef = XLSX.utils.encode_cell({ r: cfg.idx, c: col });
            if (ws[cellRef]) ws[cellRef].s.fill = { fgColor: { rgb: cfg.rgb } };
        }
    });

    ws["!cols"] = [
        { wch: 6 }, { wch: 40 }, { wch: 3 }, { wch: 18 },
        { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 },
        { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Summary");
    XLSX.writeFile(wb, `Summary_${c.contract_code || 'Contract'}.xlsx`);
}
async function loadSummary(){
    if(!contractId) return;
    try {
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers });
        const data = await res.json();
        if (data && data.length > 0) {
            const c = data[0];
            window.contractData = c;
            document.getElementById('excelBody').innerHTML = `
                <tr>
                    <td>1</td>
                    <td>${c.contract_code || '-'}</td>
                    <td>${c.contractor || '-'}</td>
                    <td>${Number(c.contract_sum || 0).toLocaleString()}</td>
                </tr>
            `;
        }
    } catch(err) { console.error(err); }
}

function goBack(){ window.history.back(); }
loadSummary();
</script>

</body>
</html>
