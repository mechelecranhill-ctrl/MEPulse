<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Summary (Excel View)</title> 

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body{ font-family:-apple-system,system-ui,sans-serif; margin:0; background:#f5f7fb; padding:20px; }
.header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.card{ background:white; padding:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
.btn{ padding:10px 14px; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
.btn-blue{ background:#007AFF; color:white; }
.btn-dark{ background:#333; color:white; }
#excelTable { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
#excelTable th { background: #f3f3f3; border: 1px solid #ccc; padding: 8px; text-align: left; }
#excelTable td { border: 1px solid #ddd; padding: 8px; }
</style>
</head>

<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Contract Summary</h2>
        <small style="color:#666;">Eksport: Kolum C (Simbol :) | Kolum D (Data)</small>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-blue" onclick="exportExcel()">
            <i class="fa fa-file-excel"></i> Export Excel
        </button>
        <button class="btn btn-dark" onclick="goBack()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="card">
    <div style="overflow:auto;">
        <table id="excelTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Contract Code</th>
                    <th>Contractor</th>
                    <th>Total Contract (RM)</th>
                </tr>
            </thead>
            <tbody id="excelBody">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

async function exportExcel() {

    if (!window.contractData) {
        alert("Data belum sedia");
        return;
    }

    const c = window.contractData;

    /* LOAD INTERIMS */

const intRes = await fetch(
    `${SB_URL}/rest/v1/interims?contract_id=eq.${c.id}&order=created_at.asc`,
    { headers }
);

const interimsRaw = await intRes.json();

console.log("INTERIMS:", interimsRaw);

const interims = Array.isArray(interimsRaw)
    ? interimsRaw
    : [];

/* LOAD WORK ORDERS */

const woRes = await fetch(
    `${SB_URL}/rest/v1/wor_korder?contract_id=eq.${c.id}`,
    { headers }
);

const workordersRaw = await woRes.json();

console.log("WORKORDERS:", workordersRaw);

const workorders = Array.isArray(workordersRaw)
    ? workordersRaw
    : [];

    const wb = XLSX.utils.book_new();

    const sections = c.contract_sections_breakdown || {};
    const sectionNames = Object.keys(sections);

    const interimCount = interims.length;

    /* =========================
       HEADER
    ========================= */

    const ws_data = [
        [],
        ["", c.contract_name || "SUMMARY OF CONTRACT"],
        [],
        [],
        ["", "CONTRACT NO.", ":", c.contract_code || "-"],
        ["", "CONTRACTOR", ":", c.contractor || "-"],
        ["", "CONTRACT PERIOD", ":", c.contract_period || "-"],
        ["", "CONTRACT SUM", ":", Number(c.contract_sum || 0)],
        ["", "PERFORMANCE GUARANTEE SUM", ":", c.pg_sum || "-"],
        [],
        [],
        []
    ];

    /* =========================
       TABLE HEADER
    ========================= */

    let header1 = [
        "ITEM",
        "DESCRIPTION",
        "AS PER CONTRACT"
    ];

    for(let i=1;i<=interimCount;i++){
        header1.push(`INTERIM ${i}`);
    }

    header1.push(
        "TOTAL CLAIM",
        "CONTRACT BALANCE",
        "ON GOING WORKS",
        "ON GOING CONTRACT BALANCE"
    );

    let header2 = [];

    for(let i=0;i<header1.length;i++){
        header2.push("RM");
    }

    header2[0] = "";
    header2[1] = "";

    ws_data.push(header1);
    ws_data.push(header2);

    /* =========================
       SECTION ROWS
    ========================= */

    sectionNames.forEach((sec,index)=>{

        const letter = String.fromCharCode(65+index);

        const contractAmt =
            Number(sections[sec]?.amt || 0);

        let row = [
            letter,
            sections[sec]?.desc || sec,
            contractAmt
        ];

        let totalClaim = 0;

        /* INTERIMS */

        interims.forEach(int=>{

            const val =
                Number(
                    int.claim_breakdown?.[sec]?.amt || 0
                );

            totalClaim += val;

            row.push(val || "-");

        });

        /* CONTRACT BALANCE */

        const contractBalance =
            contractAmt - totalClaim;

        /* ONGOING */

        let ongoing = 0;

        workorders
        .filter(w=>w.status !== 'Claimed')
        .forEach(w=>{

            const cat = w.section_category || {};

            ongoing += Number(
                cat[sec]?.amt || 0
            );

            if(
                sec === "PROVISIONAL SUM" &&
                !cat["PROVISIONAL SUM"]
            ){
                ongoing += Number(w.additional || 0);
            }

        });

        const afterWO =
            contractBalance - ongoing;

        row.push(
            totalClaim,
            contractBalance,
            ongoing,
            afterWO
        );

        ws_data.push(row);

    });

    /* =========================
       SALVAGE ROW
    ========================= */

    let salvageRow = [
        "",
        "SALVAGE VALUE",
        "-"
    ];

    let salvageTotal = 0;

    interims.forEach(int=>{

        const val =
            Number(int.salvage_value || 0);

        salvageTotal += val;

        salvageRow.push(val || "-");

    });

    salvageRow.push(
        salvageTotal,
        "",
        "",
        ""
    );

    ws_data.push(salvageRow);

    /* =========================
       PG ROW
    ========================= */

    let pgRow = [
        "",
        "PERFORMANCE GUARANTEE SUM",
        "-"
    ];

    let pgTotal = 0;

    interims.forEach(int=>{

        const val =
            Number(
                int.performance_guarantee_sum || 0
            );

        pgTotal += val;

        pgRow.push(val || "-");

    });

    pgRow.push(
        pgTotal,
        "",
        "",
        ""
    );

    ws_data.push(pgRow);

    /* =========================
       TOTAL BALANCE
    ========================= */

    let totalOngoingBalance = 0;

    sectionNames.forEach(sec=>{

        const contractAmt =
            Number(sections[sec]?.amt || 0);

        let claimed = 0;

        interims.forEach(int=>{

            claimed += Number(
                int.claim_breakdown?.[sec]?.amt || 0
            );

        });

        let ongoing = 0;

        workorders
        .filter(w=>w.status !== 'Claimed')
        .forEach(w=>{

            const cat = w.section_category || {};

            ongoing += Number(
                cat[sec]?.amt || 0
            );

            if(
                sec === "PROVISIONAL SUM" &&
                !cat["PROVISIONAL SUM"]
            ){
                ongoing += Number(w.additional || 0);
            }

        });

        totalOngoingBalance +=
            contractAmt - claimed - ongoing;

    });

    totalOngoingBalance += salvageTotal;
    totalOngoingBalance += pgTotal;

    /* =========================
       TOTAL ROW
    ========================= */

    let totalContract = 0;

    sectionNames.forEach(sec=>{
        totalContract +=
            Number(sections[sec]?.amt || 0);
    });

    let totalClaim = 0;

    interims.forEach(int=>{
        totalClaim +=
            Number(int.net_amount || 0);
    });

    let totalRow = [
        "TOTAL",
        "",
        totalContract
    ];

    interims.forEach(int=>{

        totalRow.push(
            Number(int.net_amount || 0)
        );

    });

    totalRow.push(
        totalClaim,
        "",
        "",
        totalOngoingBalance
    );

    ws_data.push(totalRow);

    /* =========================
       CREATE SHEET
    ========================= */

    const ws =
        XLSX.utils.aoa_to_sheet(ws_data);
    const lastCol = header1.length - 1;

    /* =========================
   MERGES
========================= */

const lastRowIdx = ws_data.length - 1;

let merges = [

    /* TITLE */
    {
        s:{ r:1, c:1 },
        e:{ r:3, c:lastCol }
    },

    /* ITEM HEADER */
    {
        s:{ r:12, c:0 },
        e:{ r:13, c:0 }
    },

    /* DESCRIPTION HEADER */
    {
        s:{ r:12, c:1 },
        e:{ r:13, c:1 }
    }

];

/* merge description rows */

for(let r=14; r<=lastRowIdx; r++){

    merges.push({
        s:{ r:r, c:1 },
        e:{ r:r, c:1 }
    });

}

ws["!merges"] = merges;

/* =========================
   STYLING
========================= */

for(let r=12; r<=lastRowIdx; r++){

    for(let cidx=0; cidx<=lastCol; cidx++){

        const cellRef =
            XLSX.utils.encode_cell({
                r:r,
                c:cidx
            });

        if(!ws[cellRef]){
            ws[cellRef] = {
                t:'s',
                v:''
            };
        }

        if(!ws[cellRef].s){
            ws[cellRef].s = {};
        }

        /* BORDER */

        ws[cellRef].s.border = {

            top:{ style:"thin" },
            bottom:{ style:"thin" },
            left:{ style:"thin" },
            right:{ style:"thin" }

        };

        /* ALIGNMENT */

        if(cidx === 1){

            ws[cellRef].s.alignment = {

                horizontal:"left",
                vertical:"center",
                wrapText:true

            };

        }else{

            ws[cellRef].s.alignment = {

                horizontal:"center",
                vertical:"center",
                wrapText:true

            };

        }

        /* HEADER */

        if(r===12 || r===13){

            ws[cellRef].s.font = {

                bold:true,
                sz:9

            };

            ws[cellRef].s.fill = {

                fgColor:{ rgb:"EAEAEA" }

            };

        }

    }

}

/* =========================
   TITLE STYLE
========================= */

if(ws["B2"]){

    ws["B2"].s = {

        font:{
            bold:true,
            sz:12
        },

        alignment:{
            horizontal:"center",
            vertical:"center",
            wrapText:true
        }

    };

}

/* =========================
   CONTRACT INFO STYLE
========================= */

for(let r=4; r<=8; r++){

    for(let cidx=1; cidx<=3; cidx++){

        const cellRef =
            XLSX.utils.encode_cell({
                r:r,
                c:cidx
            });

        if(ws[cellRef]){

            if(!ws[cellRef].s)
                ws[cellRef].s = {};

            ws[cellRef].s.font = {
                bold:true
            };

            ws[cellRef].s.alignment = {

                vertical:"center",
                wrapText:true

            };

        }

    }

}

/* =========================
   DYNAMIC ROW COLORS
========================= */

for(let r=14; r<=lastRowIdx; r++){

    const itemCell = ws[
        XLSX.utils.encode_cell({
            r:r,
            c:0
        })
    ];

    if(itemCell){

        let color = null;

        const letter =
            itemCell.v
            .toString()
            .toUpperCase();

        if(letter === "E")
            color = "FFCC99";

        if(letter === "F" || letter === "G")
            color = "FFFF00";

        if(color){

            for(let cidx=0; cidx<=lastCol; cidx++){

                const cell =
                    ws[
                        XLSX.utils.encode_cell({
                            r:r,
                            c:cidx
                        })
                    ];

                if(cell){

                    cell.s.fill = {

                        fgColor:{
                            rgb:color
                        }

                    };

                }

            }

        }

    }

}

/* =========================
   COLUMN WIDTH
========================= */

const cols = [

    { wch:6 },   // ITEM
    { wch:45 },  // DESCRIPTION
    { wch:20 }   // AS PER CONTRACT

];

/* INTERIMS */

for(let i=0; i<interimCount; i++){

    cols.push({ wch:15 });

}

/* TOTALS */

cols.push(
    { wch:18 },
    { wch:18 },
    { wch:18 },
    { wch:22 }
);

ws["!cols"] = cols;
    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Summary"
    );

    XLSX.writeFile(
        wb,
        `Summary_${c.contract_code || 'Contract'}.xlsx`
    );
}
async function loadSummary(){
    if(!contractId) return;
    try {
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers });
        const data = await res.json();
        if (data && data.length > 0) {
            const c = data[0];
            window.contractData = c;
            document.getElementById('excelBody').innerHTML = `
                <tr>
                    <td>1</td>
                    <td>${c.contract_code || '-'}</td>
                    <td>${c.contractor || '-'}</td>
                    <td>${Number(c.contract_sum || 0).toLocaleString()}</td>
                </tr>
            `;
        }
    } catch(err) { console.error(err); }
}

function goBack(){ window.history.back(); }
loadSummary();
</script>

</body>
</html>
