<!DOCTYPE html> 
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Generating Excel...</title> 
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f7fb; color: #333; }
        .loader { text-align: center; }
    </style>
</head>
<body>

<div class="loader">
    <h3>Sila Tunggu...</h3>
    <p>Fail Excel sedang dijana dengan Sheet tambahan...</p>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

function formatDateMY(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-"; 
    const months = ["JANUARI", "FEBRUARI", "MAC", "APRIL", "MEI", "JUN", "JULAI", "OGOS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DISEMBER"];
    return `${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

function formatShortDate(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-";
    return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
}

async function startAutoDownload() {
    if(!contractId) return;
    
    try {
        const [conRes, intRes, woRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers }),
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${contractId}&order=created_at.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}`, { headers })
        ]);

        const contracts = await conRes.json();
        const interims = await intRes.json();
        const workorders = await woRes.json();

        if (contracts && contracts.length > 0) {
            const c = contracts[0];
            let unitName = "UNIT";
            try {
                const unitRes = await fetch(`${SB_URL}/rest/v1/units?id=eq.${c.unit_id}`, { headers });
                const units = await unitRes.json();
                if (units && units.length > 0) unitName = units[0].unit_name;
            } catch (e) {}

            const startYear = c.contract_start ? new Date(c.contract_start).getFullYear() : "????";
            const endYear = c.contract_end ? new Date(c.contract_end).getFullYear() : "????";
            const fileName = `${unitName} ${startYear} - ${endYear} ${c.contract_code || "-"} SUMMARY.xlsx`;

            const period = `${formatDateMY(c.contract_start)} ~ ${formatDateMY(c.contract_end)}`;
            const pgSumFormatted = Number(c.performance_guarantee_total || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const sections = c.contract_sections_breakdown || {};
            const sectionNames = Object.keys(sections);
            const wb = XLSX.utils.book_new();

            // ==========================================
            // SHEET 1: SUMMARY (KEKAL SEPERTI ASAL)
            // ==========================================
            let merges = [{ s: { r: 1, c: 1 }, e: { r: 2, c: 13 } }]; 
            const fmtCurrency = '#,##0.00;\\(#,##0.00\\);"-"'; 
            const fmtRM = '"RM"#,##0.00'; 
            const pgInfo = `RM ${pgSumFormatted} (${c.insurance_no || '-'})`;

            let ws_data = [
                [], 
                ["", c.contract_name || "SUMMARY OF CONTRACT"], 
                [], [], 
                ["", "CONTRACT NO.", ":", c.contract_code || "-"], 
                ["", "CONTRACTOR", ":", c.contractor || "-"],
                ["", "CONTRACT PERIOD", ":", period],
                ["", "CONTRACT SUM", ":", Number(c.contract_sum || 0)],
                ["", "PERFORMANCE GUARANTEE SUM", ":", pgInfo],
                [] 
            ];

            function buildTableSet(startInt, endInt, isLastSet) {
                const startRow = ws_data.length;
                let h1 = ["ITEM", "DESCRIPTION", "", "AS PER CONTRACT"];
                for (let i = startInt; i <= endInt; i++) h1.push(`INTERIM NO.${i}`);
                if (isLastSet) h1.push("TOTAL CLAIM", "CONTRACT BALANCE", "ON GOING WORKS", "ON GOING CONTRACT BALANCE");
                let h2 = ["", "", "", ""];
                for (let i = startInt; i <= endInt; i++) {
                    const dRec = interims[i - 1]?.date_received;
                    h2.push(dRec ? formatShortDate(dRec) : "-");
                }
                if (isLastSet) h2.push("", "", "", "");
                let h3 = h1.map((h, i) => (i < 3 ? "" : "RM"));
                ws_data.push(h1, h2, h3);
                merges.push({ s: { r: startRow, c: 0 }, e: { r: startRow + 2, c: 0 } }, { s: { r: startRow, c: 1 }, e: { r: startRow + 2, c: 2 } });

                sectionNames.forEach((sec, idx) => {
                    const currentRowIdx = ws_data.length;
                    const letter = String.fromCharCode(65 + idx);
                    const contractAmt = Number(sections[sec]?.amt || 0);
                    let row = [letter, sections[sec]?.desc || sec, "", contractAmt];
                    for (let i = startInt; i <= endInt; i++) row.push(Number(interims[i - 1]?.claim_breakdown?.[sec]?.amt || 0));
                    if (isLastSet) {
                        let totalC = 0; interims.forEach(int => totalC += Number(int.claim_breakdown?.[sec]?.amt || 0));
                        let ong = 0; workorders.filter(w => w.status !== 'Claimed').forEach(w => {
                            const cat = w.section_category || {}; ong += Number(cat[sec]?.amt || 0);
                            if (sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]) ong += Number(w.additional || 0);
                        });
                        row.push(totalC, (contractAmt - totalC), ong, (contractAmt - totalC - ong));
                    }
                    ws_data.push(row);
                    merges.push({ s: { r: currentRowIdx, c: 1 }, e: { r: currentRowIdx, c: 2 } });
                });

                const addSpec = (label, key, isNet = false) => {
                    const rIdx = ws_data.length;
                    let row = ["", label, "", 0];
                    if(isNet) row[3] = sectionNames.reduce((acc, s) => acc + Number(sections[s]?.amt || 0), 0);
                    for (let i = startInt; i <= endInt; i++) row.push(isNet ? Number(interims[i - 1]?.net_amount || 0) : Number(interims[i - 1]?.[key] || 0));
                    if (isLastSet) row.push(0, 0, 0, 0); 
                    ws_data.push(row);
                    merges.push({ s: { r: rIdx, c: 1 }, e: { r: rIdx, c: 2 } });
                };
                addSpec("PERFORMANCE GUARANTEE SUM", "performance_guarantee_sum");
                addSpec("SALVAGE VALUE", "salvage_value");
                addSpec("TOTAL BRING TO INTERIM PAYMENT", "", true);
                ws_data.push([]); 
            }

            buildTableSet(1, 10, false);
            buildTableSet(11, 20, false);
            buildTableSet(21, 26, true);

            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            ws["!merges"] = merges;
            for (let r = 0; r <= ws_data.length - 1; r++) {
                for (let cidx = 0; cidx <= 40; cidx++) {
                    const ref = XLSX.utils.encode_cell({ r: r, c: cidx });
                    if (!ws[ref]) continue;
                    if (!ws[ref].s) ws[ref].s = {};
                    if (r < 10) {
                        if (r === 7 && cidx === 3) { ws[ref].t = 'n'; ws[ref].z = fmtRM; }
                        ws[ref].s.alignment = { horizontal: (cidx === 1 || cidx === 3 ? "left" : "center") };
                    } else {
                        ws[ref].s.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
                        ws[ref].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                        if (typeof ws[ref].v === 'number' && cidx >= 3) { ws[ref].t = 'n'; ws[ref].z = fmtCurrency; }
                        const valStr = ws[ref].v ? ws[ref].v.toString() : "";
                        if (valStr.includes("INTERIM NO") || valStr === "ITEM" || valStr === "DESCRIPTION" || valStr === "RM") { 
                            ws[ref].s.fill = { fgColor: { rgb: "EAEAEA" } }; ws[ref].s.font = { bold: true }; 
                        }
                    }
                }
            }
            ws["!cols"] = [{ wch: 8 }, { wch: 40 }, { wch: 3 }, { wch: 25 }];
            for (let i = 0; i < 35; i++) ws["!cols"].push({ wch: 14 });
            XLSX.utils.book_append_sheet(wb, ws, "Summary");

            // ==========================================
            // SHEET 2: BUDGET USAGE (SHEET BARU)
            // ==========================================
            let ws2_data = [
                [], [], // Bermula row 3 (Indeks 2)
                ["TOTAL LABOUR CHARGES", "RM", 96000.00, "", "", "", "ON GOING SUPPLY OF SPARE PART BALANCE", "8.75%"],
                [],
                ["TOTAL SUPPLY OF SPARE PART", "RM", 340434.00, "", "", "", "ON GOING LABOUR CHARGES BALANCE", "49.84%"],
                [],
                ["TOTAL PROVISIONAL SUM", "RM", 2200000.00, "", "", "", "ON GOING PROV SUM BALANCE", "16.41%"],
                [],
                ["TOTAL APPROVED CM WORKS", "RM", 2017660.10, "", "", "", "TOTAL G&P CLAIMED", "0%"],
                ["TOTAL CM WORKS CLAIMED", "RM", 1089086.63, "54%", "", "", "BAL. G&P NOT CLAIM", "100%"],
                ["BAL. CM WORKS NOT CLAIM", "RM", 928573.47, "46%", "", "", "", ""],
                [],
                ["", "", "", "", "", "", "TOTAL PM WORKS CLAIMED", "31%"],
                ["TOTAL PENDING CLAIM", "RM", 1052073.47, "45%", "", "", "BAL. PM WORKS NOT CLAIM", "69%"],
                [],
                ["", "", "", "", "", "", "TOTAL CALIBRATION WORKS CLAIMED", "0%"],
                ["", "", "", "", "", "", "BAL. CALIBRATION WORKS NOT CLAIM", "21%"],
                [], [], [], [],
                ["CM BUDGET USAGE BY DISTRICT"],
                [],
                ["SEGAMAT", "RM", 466519.29, "23%"],
                ["MUAR", "RM", 590599.93, "29%"],
                ["BATU PAHAT", "RM", 416224.72, "21%"],
                ["KLUANG", "RM", 321510.21, "16%"],
                ["MERSING", "RM", 222805.95, "11%"],
                ["TOTAL USAGE OF CM BUDGET", "RM", 2017660.10]
            ];

            const ws2 = XLSX.utils.aoa_to_sheet(ws2_data);
            
            // Styling Sheet 2
            const styleRow = (r, c, color, bold = true) => {
                const ref = XLSX.utils.encode_cell({ r, c });
                if(!ws2[ref]) ws2[ref] = { v: "" };
                ws2[ref].s = { 
                    fill: { fgColor: { rgb: color } }, 
                    font: { bold: bold },
                    border: { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } }
                };
            };

            // Warna mengikut Gambar
            [0, 1, 2].forEach(c => styleRow(2, c, "FFCC99")); // Labour (Oren)
            [0, 1, 2].forEach(c => styleRow(4, c, "FFFF00")); // Spare Part (Kuning)
            [0, 1, 2].forEach(c => styleRow(6, c, "FFFF00")); // Prov Sum (Kuning)
            [0, 1, 2].forEach(c => styleRow(8, c, "FFCC99")); // Approved (Oren)
            [0, 1, 2, 3].forEach(c => styleRow(13, c, "FF0000")); // Pending Claim (Merah)
            ws2[XLSX.utils.encode_cell({r:13, c:0})].s.font.color = { rgb: "FFFFFF" };

            // Kolom Kanan (Kuning & Oren)
            [6, 7].forEach(c => {
                styleRow(2, c, "FFFF00"); 
                styleRow(4, c, "FFCC99");
                styleRow(6, c, "FFFF00");
            });

            ws2["!cols"] = [{ wch: 30 }, { wch: 5 }, { wch: 15 }, { wch: 10 }, { wch: 5 }, { wch: 5 }, { wch: 35 }, { wch: 10 }];
            XLSX.utils.book_append_sheet(wb, ws2, "Budget Usage");

            XLSX.writeFile(wb, fileName);
            setTimeout(() => { window.history.back(); }, 2000);
        }
    } catch(err) { 
        console.error(err);
        alert("Ralat memproses data.");
    }
}

startAutoDownload();
</script>

</body>
</html>
