function formatDateMY(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-"; 
    const months = ["JANUARI", "FEBRUARI", "MAC", "APRIL", "MEI", "JUN", "JULAI", "OGOS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DISEMBER"];
    return `${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

function formatShortDate(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-";
    return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
}

    const currentLastCol = 3 + (sectionCount * 2) + 2;

    for (let c = 0; c <= currentLastCol; c++) {

        const ref = XLSX.utils.encode_cell({ r: r, c: c });

        if (!ws3[ref]) {
            ws3[ref] = { v: "", t: "s", s: {} };
        }

        if (!ws3[ref].s) ws3[ref].s = {};

        const val = ws3[ref].v ? ws3[ref].v.toString() : "";

        // =========================
        // DEFAULT ALIGNMENT
        // =========================
        ws3[ref].s.alignment = {
            horizontal: "center",
            vertical: "center",
            wrapText: true
        };

        if (c === 1) {
            ws3[ref].s.alignment.horizontal = "left";
        }

        // =========================
// HEADER STYLE
// =========================
if (
    daerahList.includes(val) ||
    val.includes("SENARAI PERMOHONAN") ||
    val === "NO." ||
    val === "DESCRIPTION" ||
    val === "LOCATION" ||
    val === "WORK ORDER" ||
    val === "QUOTATION" ||
    val === "PAYMENT" ||
    val === "(RM)" || 
    val === "QUOTATION APPROVAL DATE" ||
    val === "STATUS / PAID AS PER INTERIM NO" ||

    // tambah section description sekali
    dynamicSectionKeys.some(key => 
        val === (sections[key]?.desc || key)
    )
) {

    ws3[ref].s.fill = {
        fgColor: { rgb: "EAEAEA" } // kelabu
    };

    ws3[ref].s.font = {
        bold: true,
        color: { rgb: "000000" }
    };

    ws3[ref].s.alignment = {
        horizontal: "center",
        vertical: "center",
        wrapText: true
    };
}

        // =========================
        // BORDER
        // =========================
        if (
            r > 0 &&
            ws3_data[r] &&
            ws3_data[r].length > 0 &&
            !daerahList.includes(ws3_data[r][0])
        ) {

            ws3[ref].s.border = {
                top: { style: "thin" },
                bottom: { style: "thin" },
                left: { style: "thin" },
                right: { style: "thin" }
            };
        }

        // =========================
        // GRAND TOTAL STYLE
        // =========================
        if (isGrandTotalRow) {

            ws3[ref].s.font = {
                bold: true
            };

            ws3[ref].s.fill = {
                fgColor: { rgb: "EAEAEA" }
            };

            ws3[ref].s.border = {
                top: { style: "double" },
                bottom: { style: "double" },
                left: { style: "double" },
                right: { style: "double" }
            };

            if (c === 0) {
                ws3[ref].s.alignment = {
                    horizontal: "center",
                    vertical: "center"
                };
            }
        }

        // =========================
        // NUMBER FORMAT + WARNA
        // =========================
        if (r > 6 && typeof ws3[ref].v === 'number') {

            let currentSecIdx;

            // QUOTATION SECTION
            if (c >= 4 && c < 4 + sectionCount) {
                currentSecIdx = c - 4;
            }

            // PAYMENT SECTION
            else if (
                c >= 4 + sectionCount &&
                c < 4 + (sectionCount * 2)
            ) {
                currentSecIdx = c - (4 + sectionCount);
            }

            if (currentSecIdx !== undefined) {

                const secKey = dynamicSectionKeys[currentSecIdx];
                const secDesc = (sections[secKey]?.desc || secKey).toUpperCase();

                // CHECK ADA PAYMENT / INTERIM
// =========================
// HIGHLIGHT ROW CLAIMED
// =========================

const isPaymentColumn = (
    c >= 4 + sectionCount &&
    c < 4 + (sectionCount * 2)
);

const hasInterim = Number(ws3[ref].v || 0) > 0;

// highlight row claimed sahaja
// EXCLUDE grand total
if (
    isPaymentColumn &&
    hasInterim &&
    !isGrandTotalRow
) {

    for (let cc = 0; cc <= currentLastCol; cc++) {

        const rowRef = XLSX.utils.encode_cell({
            r: r,
            c: cc
        });

        if (!ws3[rowRef]) continue;

        if (!ws3[rowRef].s) ws3[rowRef].s = {};

        // jangan overwrite header
        const rowVal = ws3[rowRef].v
            ? ws3[rowRef].v.toString()
            : "";

        const isHeaderCell =
            rowVal === "NO." ||
            rowVal === "DESCRIPTION" ||
            rowVal === "LOCATION" ||
            rowVal === "WORK ORDER" ||
            rowVal === "QUOTATION" ||
            rowVal === "PAYMENT" ||
            rowVal === "(RM)" ||
            rowVal === "QUOTATION APPROVAL DATE" ||
            rowVal === "STATUS / PAID AS PER INTERIM NO";

        if (!isHeaderCell) {

            ws3[rowRef].s.fill = {
                fgColor: { rgb: "C6EFCE" }
            };

            ws3[rowRef].s.font = {
                ...(ws3[rowRef].s.font || {}),
                color: { rgb: "006100" }
            };
        }
    }
}
                // LABOUR
                if (
                    !isPaymentColumn &&
                    (
                        secDesc.includes("LABOUR") ||
                        secDesc.includes("WORKMANSHIP")
                    )
                ) 
                {

                    ws3[ref].s.fill = {
                        fgColor: { rgb: "FFCC99" }
                    };
                }

                // SPARE / PROVISIONAL
                else if (
    !isPaymentColumn &&
    (
        secDesc.includes("SPARE") ||
        secDesc.includes("PROVISIONAL")
    )
) {

                    ws3[ref].s.fill = {
                        fgColor: { rgb: "FFFF00" }
                    };
                }

                // REFURBISHMENT
                else if (
    !isPaymentColumn &&
    secDesc.includes("REFURBISHMENT")
) {

                    ws3[ref].s.fill = {
                        fgColor: { rgb: "A9A9A9" }
                    };
                }
                if (isGrandTotalRow) {

    ws3[ref].s.font = {
        ...(ws3[ref].s.font || {}),
        bold: true,
        color: { rgb: "000000" }
    };
}
            }

            ws3[ref].t = 'n';
            ws3[ref].z = fmtCurrency;
        }
    }
}  

            ws3["!rows"] = ws3_data.map(() => ({ hpt: 15.75 }));
            let ws3Cols = [
    { wch: 5 },   // NO
    { wch: 40 },  // DESCRIPTION
    { wch: 20 },  // LOCATION
    { wch: 15 }   // WORK ORDER
];

// quotation columns
for(let i=0; i<sectionCount; i++) {
    ws3Cols.push({ wch: 12 });
}

// payment columns
for(let i=0; i<sectionCount; i++) {
    ws3Cols.push({ wch: 12 });
}

// final columns
ws3Cols.push({ wch: 15 });
ws3Cols.push({ wch: 20 });

ws3["!cols"] = ws3Cols;

            XLSX.utils.book_append_sheet(wb, ws3, "List Work Order");

// ===== PWA SAFE DOWNLOAD LOGIC =====
            const wbout = XLSX.write(wb, {
                bookType: 'xlsx',
                type: 'array'
            });

            const blob = new Blob([wbout], {
                type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            });

            const url = URL.createObjectURL(blob);
            const btn = document.getElementById('download-btn');
            const statusText = document.getElementById('status-text');
            const subText = document.getElementById('sub-text');

            // Fungsi untuk proses muat turun
            const triggerDownload = () => {
                const a = document.createElement("a");
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    statusText.innerText = "Selesai!";
                    subText.innerText = "Fail telah dihantar ke sistem muat turun anda.";
                }, 1000);
            };

            // Paparkan butang untuk PWA
            statusText.innerText = "Fail Sedia!";
            subText.innerText = "Sila klik butang di bawah jika muat turun tidak bermula.";
            btn.style.display = "inline-block";

            btn.onclick = () => {
                triggerDownload();
            };

            // Cuba trigger automatik
            try {
                triggerDownload();
            } catch (e) {
                console.log("Auto-download disekat, menunggu klik pengguna.");
            }

        } else {   
            alert("Tiada data kontrak dijumpai.");
        }
    } catch(err) { 
        console.error("Ralat Utama:", err);
        alert("Ralat memproses data: " + err.message);
    }
}
    startAutoDownload();
</script>
</body>
</html>
