<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Summary (Excel View)</title> 

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:-apple-system,system-ui,sans-serif;
    margin:0;
    background:#f5f7fb;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.btn{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.btn-blue{ background:#007AFF; color:white; }
.btn-dark{ background:#333; color:white; }

#excelTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: white;
}

#excelTable th {
    background: #f3f3f3;
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
}

#excelTable td {
    border: 1px solid #ddd;
    padding: 8px;
}
</style>
</head>

<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Contract Summary</h2>
        <small style="color:#666;">Eksport ikut format gambar Excel</small>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-blue" onclick="exportExcel()">
            <i class="fa fa-file-excel"></i> Export Excel
        </button>
        <button class="btn btn-dark" onclick="goBack()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="card">
    <div style="overflow:auto;">
        <table id="excelTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Contract Code</th>
                    <th>Contractor</th>
                    <th>Total Contract (RM)</th>
                </tr>
            </thead>
            <tbody id="excelBody">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json'
};

const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

function exportExcel(){
    if (!window.contractData) return;

    const c = window.contractData;
    const wb = XLSX.utils.book_new();
    
    // Array 2D untuk data (Setiap array dalam adalah satu row)
    const ws_data = [];

    // Row 1: Kosong
    ws_data.push([]); 
    
    // Row 2: Tajuk Panjang (Start Column B)
    ws_data.push(["", c.contract_name || "-"]); 

    // Row 3 & 4: Kosong
    ws_data.push([]);
    ws_data.push([]);

    // Row 5 - 9: Maklumat (Column B: Label, Column D: ":", Column E: Data)
    ws_data.push(["", "CONTRACT NO.", "", ":", c.contract_code || "-"]);
    ws_data.push(["", "CONTRACTOR", "", ":", c.contractor || "-"]);
    ws_data.push(["", "CONTRACT PERIOD", "", ":", c.contract_period || "-"]);
    ws_data.push(["", "CONTRACT SUM", "", ":", "RM" + Number(c.contract_sum || 0).toLocaleString(undefined, {minimumFractionDigits: 2})]);
    ws_data.push(["", "PERFORMANCE GUARANTEE SUM", "", ":", c.pg_sum || "-"]);

    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // ==========================================
    // FORMATTING (COL WIDTH & MERGE)
    // ==========================================
    
    // Set lebar kolum supaya sama macam Excel dalam gambar
    ws["!cols"] = [
        { wch: 2 },  // A
        { wch: 35 }, // B (Label)
        { wch: 5 },  // C
        { wch: 3 },  // D (:)
        { wch: 60 }  // E (Data)
    ];

    // Merge tajuk utama (Row 2, dari Column B hingga Column O/P lebih kurang)
    ws["!merges"] = [
        { s: { r: 1, c: 1 }, e: { r: 2, c: 10 } } 
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Summary");
    XLSX.writeFile(wb, "Contract_Summary_Format.xlsx");
}

async function loadSummary(){
    if(!contractId) return;
    try {
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers });
        const data = await res.json();
        const c = data[0];
        window.contractData = c;

        document.getElementById('excelBody').innerHTML = `
            <tr>
                <td>1</td>
                <td>${c.contract_code}</td>
                <td>${c.contractor}</td>
                <td>${Number(c.contract_sum).toLocaleString()}</td>
            </tr>
        `;
    } catch(err) { console.error(err); }
}

function goBack(){ window.history.back(); }
loadSummary();
</script>

</body>
</html>
