<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

function formatDateMY(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-"; 
    const months = ["JANUARI", "FEBRUARI", "MAC", "APRIL", "MEI", "JUN", "JULAI", "OGOS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DISEMBER"];
    return `${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

function formatShortDate(dateStr) {
    if (!dateStr) return "-";
    const date = new Date(dateStr);
    if (isNaN(date)) return "-";
    return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
}

async function startAutoDownload() {
    if(!contractId) return;
    
    try {
        const [conRes, intRes, woRes] = await Promise.all([
            fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers }),
            fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${contractId}&order=created_at.asc`, { headers }),
            fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${contractId}`, { headers })
        ]);

        const contracts = await conRes.json();
        const interims = await intRes.json();
        const workorders = await woRes.json();

        if (contracts && contracts.length > 0) {
            const c = contracts[0];
            let unitName = "UNIT";
            try {
                const unitRes = await fetch(`${SB_URL}/rest/v1/units?id=eq.${c.unit_id}`, { headers });
                const units = await unitRes.json();
                if (units && units.length > 0) unitName = units[0].unit_name;
            } catch (e) {}

            const startYear = c.contract_start ? new Date(c.contract_start).getFullYear() : "????";
            const endYear = c.contract_end ? new Date(c.contract_end).getFullYear() : "????";
            const safeCode = (c.contract_code || "-").replace(/[/\\?%*:|"<>]/g, '-');
            const fileName = `${unitName} ${startYear}-${endYear} ${safeCode} SUMMARY.xlsx`;

            const period = `${formatDateMY(c.contract_start)} ~ ${formatDateMY(c.contract_end)}`;
            const pgSumFormatted = Number(c.performance_guarantee_total || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            const sections = c.contract_sections_breakdown || {};
            const sectionNames = Object.keys(sections);
            const wb = XLSX.utils.book_new();
            
            let merges = [{ s: { r: 1, c: 1 }, e: { r: 2, c: 13 } }]; 
            const fmtCurrency = '#,##0.00;\\(#,##0.00\\);"-"'; 
            const fmtRM = '"RM"#,##0.00'; 
            const pgInfo = `RM ${pgSumFormatted} (${c.insurance_no || '-'})`;

            let ws_data = [
                [], 
                ["", c.contract_name || "SUMMARY OF CONTRACT"], 
                [], [], 
                ["", "CONTRACT NO.", ":", c.contract_code || "-"], 
                ["", "CONTRACTOR", ":", c.contractor || "-"],
                ["", "CONTRACT PERIOD", ":", period],
                ["", "CONTRACT SUM", ":", Number(c.contract_sum || 0)],
                ["", "PERFORMANCE GUARANTEE SUM", ":", pgInfo],
                [] 
            ];

            function buildTableSet(startInt, endInt, isLastSet) {
                const startRow = ws_data.length;
                let h1 = ["ITEM", "DESCRIPTION", "", "AS PER CONTRACT"];
                for (let i = startInt; i <= endInt; i++) h1.push(`INTERIM NO.${i}`);
                if (isLastSet) h1.push("TOTAL CLAIM", "CONTRACT BALANCE", "ON GOING WORKS", "ON GOING CONTRACT BALANCE");
                
                let h2 = ["", "", "", ""];
                for (let i = startInt; i <= endInt; i++) {
                    const dRec = interims[i - 1]?.date_received;
                    h2.push(dRec ? formatShortDate(dRec) : "-");
                }
                if (isLastSet) h2.push("", "", "", "");

                let h3 = h1.map((h, i) => (i < 4 ? "" : "RM"));
                ws_data.push(h1, h2, h3);

                merges.push({ s: { r: startRow, c: 0 }, e: { r: startRow + 2, c: 0 } });
                merges.push({ s: { r: startRow, c: 1 }, e: { r: startRow + 2, c: 2 } });
                merges.push({ s: { r: startRow, c: 3 }, e: { r: startRow + 2, c: 3 } });

                sectionNames.forEach((sec, idx) => {
                    const currentRowIdx = ws_data.length;
                    const letter = String.fromCharCode(65 + idx);
                    const contractAmt = Number(sections[sec]?.amt || 0);
                    let row = [letter, sections[sec]?.desc || sec, "", contractAmt];

                    for (let i = startInt; i <= endInt; i++) {
                        const val = Number(interims[i - 1]?.claim_breakdown?.[sec]?.amt || 0);
                        row.push(val || 0);
                    }

                    if (isLastSet) {
                        let totalClaimAll = 0;
                        interims.forEach(int => totalClaimAll += Number(int.claim_breakdown?.[sec]?.amt || 0));
                        let ongoing = 0;
                        workorders.filter(w => w.status !== 'Claimed').forEach(w => {
                            const cat = w.section_category || {};
                            ongoing += Number(cat[sec]?.amt || 0);
                            if (sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]) ongoing += Number(w.additional || 0);
                        });
                        const balance = contractAmt - totalClaimAll;
                        row.push(totalClaimAll, balance, ongoing, (balance - ongoing));
                    }
                    ws_data.push(row);
                    merges.push({ s: { r: currentRowIdx, c: 1 }, e: { r: currentRowIdx, c: 2 } });
                });

                const addSpecialRow = (label, interimKey, isNet = false) => {
                    const rIdx = ws_data.length;
                    let row = ["", label, "", 0];
                    if(isNet) {
                        let sumContract = 0;
                        sectionNames.forEach(s => sumContract += Number(sections[s]?.amt || 0));
                        row[3] = sumContract;
                    }
                    for (let i = startInt; i <= endInt; i++) {
                        const val = isNet ? Number(interims[i - 1]?.net_amount || 0) : Number(interims[i - 1]?.[interimKey] || 0);
                        row.push(val || 0);
                    }
                    if (isLastSet) {
                        let totalClaimSum = 0;
                        interims.forEach(int => totalClaimSum += Number(isNet ? int.net_amount : (int[interimKey] || 0)));
                        if (isNet) {
                            let totalContractAmt = 0;
                            sectionNames.forEach(s => totalContractAmt += Number(sections[s]?.amt || 0));
                            let totalOngoingSum = 0;
                            workorders.filter(w => w.status !== 'Claimed').forEach(w => {
                                if(w.section_category) {
                                    sectionNames.forEach(s => totalOngoingSum += Number(w.section_category[s]?.amt || 0));
                                } else { totalOngoingSum += Number(w.total_amount || 0); }
                            });
                            const totalBalance = totalContractAmt - totalClaimSum;
                            row.push(totalClaimSum, totalBalance, totalOngoingSum, (totalBalance - totalOngoingSum));
                        } else { row.push(totalClaimSum, 0, 0, 0); }
                    }
                    ws_data.push(row);
                    merges.push({ s: { r: rIdx, c: 1 }, e: { r: rIdx, c: 2 } });
                };

                addSpecialRow("PERFORMANCE GUARANTEE SUM", "performance_guarantee_sum");
                addSpecialRow("SALVAGE VALUE", "salvage_value");
                addSpecialRow("TOTAL BRING TO INTERIM PAYMENT", "", true);
                ws_data.push([]); 
            }

            buildTableSet(1, 10, false);
            buildTableSet(11, 20, false);
            buildTableSet(21, 26, true);

            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            ws["!merges"] = merges;
            const lastRowIdx = ws_data.length - 1;

            // STYLING SHEET 1
            for (let r = 0; r <= lastRowIdx; r++) {
                for (let cidx = 0; cidx <= 40; cidx++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: cidx });
                    if (!ws[cellRef]) continue;
                    if (!ws[cellRef].s) ws[cellRef].s = {};
                    if (r === 1 && cidx === 1) {
                        ws[cellRef].s = { font: { bold: true, sz: 12 }, alignment: { horizontal: "center", vertical: "center", wrapText: true } };
                        continue;
                    }
                    if (r < 10) {
                        if (r === 7 && cidx === 3) { ws[cellRef].t = 'n'; ws[cellRef].z = fmtRM; }
                        ws[cellRef].s.font = { bold: (cidx !== 1) };
                        ws[cellRef].s.alignment = { horizontal: (cidx === 1 || cidx === 3 ? "left" : "center") };
                        continue; 
                    }

                    const rowAboveValue = ws[XLSX.utils.encode_cell({ r: r-1, c: cidx })]?.v;
                    if (rowAboveValue && rowAboveValue.toString().includes("INTERIM NO")) {
                        ws[cellRef].s.fill = { fgColor: { rgb: "EAEAEA" } };
                    }
                    ws[cellRef].s.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
                    ws[cellRef].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                    if (cidx === 1) ws[cellRef].s.alignment.horizontal = "left";
                    if (typeof ws[cellRef].v === 'number' && cidx >= 3) { ws[cellRef].t = 'n'; ws[cellRef].z = fmtCurrency; }
                    if (cidx >= 14) ws[cellRef].s.font = { bold: true };
                    
                    const valStr = ws[cellRef].v ? ws[cellRef].v.toString() : "";
                    const isHeaderRow = valStr.includes("INTERIM NO") || valStr === "ITEM" || valStr === "DESCRIPTION" || valStr === "AS PER CONTRACT" || valStr.includes("CLAIM") || valStr.includes("BALANCE") || valStr.includes("WORKS");
                    if (isHeaderRow || valStr === "RM") { 
                        ws[cellRef].s.fill = { fgColor: { rgb: "EAEAEA" } }; 
                        ws[cellRef].s.font = { bold: true }; 
                    }
                    
                    const rowDesc = ws[XLSX.utils.encode_cell({ r: r, c: 1 })]?.v?.toString().toUpperCase() || "";

                    if (rowDesc) {
                        // 1. Logik Warna Latar Belakang
                        if (rowDesc.includes("LABOUR") || rowDesc.includes("WORKMANSHIP")) {
                            ws[cellRef].s.fill = { fgColor: { rgb: "FFCC99" } };
                        } 
                        else if (rowDesc.includes("SPARE") || rowDesc.includes("PROVISIONAL")) {
                            ws[cellRef].s.fill = { fgColor: { rgb: "FFFF00" } };
                        } 
                        else if (rowDesc.includes("REFURBISHMENT")) {
                            ws[cellRef].s.fill = { fgColor: { rgb: "A9A9A9" } };
                        }
                        // 2. Logik BOLD & FONT HITAM (Untuk semua baris total di bahagian bawah)
                        if (rowDesc.includes("TOTAL BRING TO INTERIM")) {
                            ws[cellRef].s.font = { bold: true, color: { rgb: "000000" } };
                        } else {
                            // Pastikan font selain header/total tetap hitam tapi tak bold 
                            if (!ws[cellRef].s.font) ws[cellRef].s.font = {};
                            ws[cellRef].s.font.color = { rgb: "000000" };
                        }
                    }
                }
            }
            ws["!cols"] = [{ wch: 8 }, { wch: 40 }, { wch: 3 }, { wch: 25 }];
            for (let i = 0; i < 35; i++) ws["!cols"].push({ wch: 14 });
            XLSX.utils.book_append_sheet(wb, ws, "Summary");

            // ==========================================
            // LOGIK PENGIRAAN UNTUK SHEET 2 (START)
            // ==========================================
            let sumLab = 0, sumSpa = 0, sumPrv = 0;
            let balLab = 0, balSpa = 0, balPrv = 0;

            sectionNames.forEach(sec => {
                const desc = (sections[sec]?.desc || sec).toUpperCase();
                const contractAmt = Number(sections[sec]?.amt || 0);
                let totalClaimed = 0;
                interims.forEach(int => totalClaimed += Number(int.claim_breakdown?.[sec]?.amt || 0));
                
                let ongoing = 0;
                workorders.filter(w => w.status !== 'Claimed').forEach(w => {
                    const cat = w.section_category || {};
                    ongoing += Number(cat[sec]?.amt || 0);
                    if (sec === "PROVISIONAL SUM" && !cat["PROVISIONAL SUM"]) ongoing += Number(w.additional || 0);
                });

                const currentBal = (contractAmt - totalClaimed) - ongoing;

                if (desc.includes("LABOUR") || desc.includes("WORKMANSHIP")) { sumLab += contractAmt; balLab += currentBal; }
                else if (desc.includes("SPARE")) { sumSpa += contractAmt; balSpa += currentBal; }
                else if (desc.includes("PROVISIONAL")) { sumPrv += contractAmt; balPrv += currentBal; }
            });

            const getP = (b, t) => t > 0 ? Math.round((b/t)*100) + "%" : "0%";
            // ==========================================
            // LOGIK PENGIRAAN UNTUK SHEET 2
            // ==========================================

            let ws2_data = [
                [], [], 
                ["TOTAL LABOUR CHARGES", "RM", sumLab, "", "", "", "ON GOING LABOUR CHARGES BALANCE", getP(balLab, sumLab)],
                [],
                ["TOTAL SUPPLY OF SPARE PART", "RM", sumSpa, "", "", "", "ON GOING SUPPLY OF SPARE PART BALANCE", getP(balSpa, sumSpa)],
                [],
                ["TOTAL PROVISIONAL SUM", "RM", sumPrv, "", "", "", "ON GOING PROV SUM BALANCE", getP(balPrv, sumPrv)],
                [],
                ["TOTAL APPROVED CM WORKS", "RM", 0, "", "", "", "TOTAL G&P CLAIMED", "0%"],
                ["TOTAL CM WORKS CLAIMED", "RM", 0, "0%", "", "", "BAL. G&P NOT CLAIM", "100%"],
                ["BAL. CM WORKS NOT CLAIM", "RM", 0, "0%", "", "", "", ""],
                [],
                ["", "", "", "", "", "", "TOTAL PM WORKS CLAIMED", "0%"],
                ["TOTAL PENDING CLAIM", "RM", 0, "0%", "", "", "BAL. PM WORKS NOT CLAIM", "100%"],
                [],
                ["", "", "", "", "", "", "TOTAL CALIBRATION WORKS CLAIMED", "0%"],
                ["", "", "", "", "", "", "BAL. CALIBRATION WORKS NOT CLAIM", "100%"],
                [], [], [], [],
                ["CM BUDGET USAGE BY DISTRICT"],
                [],
                ["SEGAMAT", "RM", 0, "0%"],
                ["MUAR", "RM", 0, "0%"],
                ["BATU PAHAT", "RM", 0, "0%"],
                ["KLUANG", "RM", 0, "0%"],
                ["MERSING", "RM", 0, "0%"],
                ["TOTAL USAGE OF CM BUDGET", "RM", 0]
            ];
            
            const ws2 = XLSX.utils.aoa_to_sheet(ws2_data);
            for(let r=0; r<ws2_data.length; r++) {
                for(let c=0; c<8; c++) {
                    const ref = XLSX.utils.encode_cell({r:r, c:c});
                    if(!ws2[ref]) continue;
                    if(!ws2[ref].s) ws2[ref].s = {};
                    if(ws2[ref].v !== "" && r > 1) ws2[ref].s.border = { top:{style:"thin"}, bottom:{style:"thin"}, left:{style:"thin"}, right:{style:"thin"} };
                    if(typeof ws2[ref].v === 'number' && c === 2) { ws2[ref].t = 'n'; ws2[ref].z = fmtCurrency; }
                    if(r===2 && c<3) ws2[ref].s.fill = { fgColor: { rgb: "FFCC99" } }; 
                    if(r===4 && c<3) ws2[ref].s.fill = { fgColor: { rgb: "FFFF00" } }; 
                    if(r===6 && c<3) ws2[ref].s.fill = { fgColor: { rgb: "FFFF00" } }; 
                    if(r===8 && c<3) ws2[ref].s.fill = { fgColor: { rgb: "FFCC99" } }; 
                    if(r===13 && c<4) { ws2[ref].s.fill = { fgColor: { rgb: "FF0000" } }; ws2[ref].s.font = { color: { rgb: "FFFFFF" }, bold: true }; }
                    if(c >= 6) {
                        if(r===2 || r===6) ws2[ref].s.fill = { fgColor: { rgb: "FFFF00" } };
                        if(r===4) ws2[ref].s.fill = { fgColor: { rgb: "FFCC99" } };
                    }
                    if(r === 21) ws2[ref].s.font = { bold: true };
                }
            }
            ws2["!cols"] = [{ wch: 35 }, { wch: 5 }, { wch: 15 }, { wch: 10 }, { wch: 5 }, { wch: 5 }, { wch: 40 }, { wch: 10 }];
            XLSX.utils.book_append_sheet(wb, ws2, "Budget Usage");
            
            // ==========================================
            // SHEET 3: LIST WORK ORDER (IKUT PECAHAN DAERAH)
            // ==========================================
            
            // 1. Dapatkan senarai daerah daripada string di database
            const districtString = c.district || "SEGAMAT,MUAR,BATU PAHAT,KLUANG,MERSING";
            const daerahList = districtString.split(',').map(d => d.trim());

            let ws3_data = [];
            let currentMerges = [];

            // 2. Loop setiap daerah untuk bina jadual
            daerahList.forEach((daerah) => {
                const startRow = ws3_data.length;

                // Tajuk Daerah & Header
                ws3_data.push([daerah.toUpperCase()]); 
                ws3_data.push([]);
                ws3_data.push(["SENARAI PERMOHONAN KERJA-KERJA KONTRAK PENYELENGGARAAN"]);
                ws3_data.push([]);
                
                // Header Jadual
                ws3_data.push(["NO.", "DESCRIPTION", "LOCATION", "WORK ORDER", "QUOTATION", "", "", "", "PAYMENT", "", "", "", "QUOTATION APPROVAL DATE", "STATUS / PAID AS PER INTERIM NO"]);
                ws3_data.push(["", "", "", "", "LABOUR CHARGES", "SUPPLY SPARE PARTS", "S.O.R (CONTRACT)", "NON S.O.R", "LABOUR CHARGES", "SUPPLY SPARE PARTS", "S.O.R (CONTRACT)", "NON S.O.R", "", ""]);
                ws3_data.push(["", "", "", "", "(RM)", "(RM)", "(RM)", "(RM)", "(RM)", "(RM)", "(RM)", "(RM)", "", ""]);

                // Simpan maklumat merge untuk header daerah ini
                currentMerges.push({ s: { r: startRow, c: 0 }, e: { r: startRow, c: 13 } }); // Tajuk Daerah
                currentMerges.push({ s: { r: startRow + 2, c: 0 }, e: { r: startRow + 2, c: 13 } }); // Sub-tajuk
                currentMerges.push({ s: { r: startRow + 4, c: 0 }, e: { r: startRow + 6, c: 0 } }); // NO.
                currentMerges.push({ s: { r: startRow + 4, c: 1 }, e: { r: startRow + 6, c: 1 } }); // DESC
                currentMerges.push({ s: { r: startRow + 4, c: 2 }, e: { r: startRow + 6, c: 2 } }); // LOC
                currentMerges.push({ s: { r: startRow + 4, c: 3 }, e: { r: startRow + 6, c: 3 } }); // WO
                currentMerges.push({ s: { r: startRow + 4, c: 4 }, e: { r: startRow + 4, c: 7 } }); // QUOTATION Group
                currentMerges.push({ s: { r: startRow + 4, c: 8 }, e: { r: startRow + 4, c: 11 } }); // PAYMENT Group
                currentMerges.push({ s: { r: startRow + 4, c: 12 }, e: { r: startRow + 6, c: 12 } }); // DATE
                currentMerges.push({ s: { r: startRow + 4, c: 13 }, e: { r: startRow + 6, c: 13 } }); // STATUS

                // 3. Tapis data workorders mengikut daerah semasa
                const filteredWO = workorders.filter(wo => (wo.district || "").toUpperCase() === daerah.toUpperCase());

                let dTotal = { qLab: 0, qSpa: 0, qSor: 0, qNon: 0, pLab: 0, pSpa: 0, pSor: 0, pNon: 0 };

                if (filteredWO.length > 0) {

                    filteredWO.forEach((wo, index) => {
                        const cat = wo.section_category || {};
                        const qL = Number(cat["LABOUR"]?.amt || 0);
                        const qS = Number(cat["SPARE"]?.amt || 0);
                        const qN = Number(wo.additional || 0);
                        const pL = Number(wo.payment_labour || 0);
                        const pS = Number(wo.payment_spare || 0);
                        const pN = Number(wo.payment_non_sor || 0);

                        // Tambah ke total daerah
                        dTotal.qLab += qL; dTotal.qSpa += qS; dTotal.qNon += qN;
                        dTotal.pLab += pL; dTotal.pSpa += pS; dTotal.pNon += pN;
           
                        ws3_data.push([
                            index + 1, wo.description || "-", wo.location || "-", wo.wo_number || "-",
                            qL, qS, 0, qN, pL, pS, 0, pN,
                            formatShortDate(wo.approval_date),
                            wo.status === 'Claimed' ? `PAID (INT ${wo.interim_no || ''})` : (wo.status || "PENDING")
                        ]);
                    });
                } else {
                    ws3_data.push(["", "TIADA REKOD KERJA", "", "", 0, 0, 0, 0, 0, 0, 0, 0, "", ""]);
                }

                const totalRowIdx = ws3_data.length;
                ws3_data.push([ 
                    "", "GRAND TOTAL", "", "", 
                    dTotal.qLab, dTotal.qSpa, 0, dTotal.qNon, 
                    dTotal.pLab, dTotal.pSpa, 0, dTotal.pNon, 
                    "", ""
                ]);
                // Merge untuk perkataan "GRAND TOTAL" (Kolum A, B, C, D) 
                currentMerges.push({ s: { r: totalRowIdx, c: 0 }, e: { r: totalRowIdx, c: 3 } });
                // Jarakkan 3 baris sebelum daerah seterusnya
                ws3_data.push([], [], []);
            });

            const ws3 = XLSX.utils.aoa_to_sheet(ws3_data);
            ws3["!merges"] = currentMerges;

            // 4. Styling Dinamik untuk Sheet 3
            for (let r = 0; r < ws3_data.length; r++) {

                const isGrandTotalRow = ws3_data[r] && ws3_data[r][1] === "GRAND TOTAL";
                
                for (let c = 0; c < 14; c++) {
                    const ref = XLSX.utils.encode_cell({ r: r, c: c });
                    if (!ws3[ref]) continue;
                    if (!ws3[ref].s) ws3[ref].s = {};

                    const val = ws3[ref].v ? ws3[ref].v.toString() : "";

                    if (isGrandTotalRow) {
                        ws3[ref].s.font = { bold: true }; // Tebalkan keseluruhan baris
                        ws3[ref].s.fill = { fgColor: { rgb: "EAEAEA" } }; // Warna kelabu lembut
                        ws3[ref].s.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
                      
                        // Alignment tengah untuk teks "GRAND TOTAL" yang di-merge
                        if (c === 0) {
                            ws3[ref].s.alignment = { horizontal: "center", vertical: "center" };
                        }
                    }
                    
                    // Styling Header (Background Kelabu)
                    if (daerahList.includes(val) || val.includes("SENARAI PERMOHONAN") || val === "NO." || val === "DESCRIPTION" || val === "LABOUR CHARGES" || val === "(RM)") {
                        ws3[ref].s.fill = { fgColor: { rgb: "EAEAEA" } };
                        ws3[ref].s.font = { bold: true };
                        ws3[ref].s.alignment = { horizontal: "center", vertical: "center" };
                    }

                    // Border untuk baris yang ada data (kecuali tajuk besar)
                    if (r > 0 && !daerahList.includes(ws3_data[r][0]) && !isGrandTotalRow) {
                        ws3[ref].s.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
                        ws3[ref].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                        if (c === 1) ws3[ref].s.alignment.horizontal = "left";
                    }

                    // Warna Column Data (Ikut logic asal anda)
                    if (r > 6 && typeof ws3[ref].v === 'number') {
                        if (c === 4 || c === 8) ws3[ref].s.fill = { fgColor: { rgb: "FFCC99" } }; 
                        if (c === 5 || c === 6 || c === 9 || c === 10) ws3[ref].s.fill = { fgColor: { rgb: "FFFF00" } }; 
                        if (c === 7 || c === 11) ws3[ref].s.fill = { fgColor: { rgb: "A9A9A9" } }; 
                        ws3[ref].t = 'n'; ws3[ref].z = fmtCurrency;
                       
                        if (isGrandTotalRow) {
                            ws3[ref].s.font = { bold: true };
                    }
                }
            }

            ws3["!cols"] = [{ wch: 5 }, { wch: 40 }, { wch: 20 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 20 }];
            XLSX.utils.book_append_sheet(wb, ws3, "List Work Order");
            XLSX.writeFile(wb, fileName);
            setTimeout(() => { window.history.back(); }, 2000);
        }
    } catch(err) { 
        console.error(err);
        alert("Ralat memproses data.");
    }
}
startAutoDownload();
</script>
