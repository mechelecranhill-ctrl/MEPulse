<!DOCTYPE html> 
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Summary (Excel View)</title> 

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body{
    font-family:-apple-system,system-ui,sans-serif;
    margin:0;
    background:#f5f7fb;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.btn{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.btn-blue{ background:#007AFF; color:white; }
.btn-dark{ background:#333; color:white; }

#excelTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: white;
}

#excelTable th {
    background: #f3f3f3;
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
}

#excelTable td {
    border: 1px solid #ddd;
    padding: 8px;
}
</style>
</head>

<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Contract Summary</h2>
        <small style="color:#666;">Eksport ikut format gambar Excel</small>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-blue" onclick="exportExcel()">
            <i class="fa fa-file-excel"></i> Export Excel
        </button>
        <button class="btn btn-dark" onclick="goBack()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="card">
    <div style="overflow:auto;">
        <table id="excelTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Contract Code</th>
                    <th>Contractor</th>
                    <th>Total Contract (RM)</th>
                </tr>
            </thead>
            <tbody id="excelBody">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';

const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json'
};

const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');

function exportExcel(){
    if (!window.contractData) {
        alert("Data belum sedia");
        return;
    }

    const c = window.contractData;
    const wb = XLSX.utils.book_new();
    
    // 1. Bina Sheet menggunakan AOA
    const ws_data = [
        [], // Row 1
        ["", c.contract_name || ""], // Row 2 (Tajuk Utama)
        [], // Row 3
        [], // Row 4
        ["", "CONTRACT NO.", "", ":", c.contract_code || "-"], // Row 5
        ["", "CONTRACTOR", "", ":", c.contractor || "-"],     // Row 6
        ["", "CONTRACT PERIOD", "", ":", c.contract_period || "-"], // Row 7
        ["", "CONTRACT SUM", "", ":", "RM" + Number(c.contract_sum || 0).toLocaleString(undefined, {minimumFractionDigits: 2})], // Row 8
        ["", "PERFORMANCE GUARANTEE SUM", "", ":", c.pg_sum || "-"] // Row 9
    ];

    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // 2. Tambah Gaya BOLD (Gunakan xlsx-js-style)
    // Menebalkan Tajuk Utama (B2)
    if(ws["B2"]) {
        ws["B2"].s = {
            font: { bold: true, sz: 12 },
            alignment: { wrapText: true, vertical: "center", horizontal: "center" }
        };
    }

    // Menebalkan Data di Kolum E (E5 hingga E9)
    const dataRows = [5, 6, 7, 8, 9];
    dataRows.forEach(row => {
        const cellRef = "E" + row;
        if(ws[cellRef]) {
            ws[cellRef].s = {
                font: { bold: true }
            };
        }
    });

    // 3. MERGE CELLS (Tajuk dari B2 sehingga P4)
    ws["!merges"] = [
        { 
            s: { r: 1, c: 1 }, // Row 2, Col B
            e: { r: 3, c: 15 }  // Row 4, Col P
        }
    ];

    // 4. SET SEMUA BARIS KEPADA 15.75
    ws['!rows'] = [];
    for (let i = 0; i < ws_data.length; i++) {
        ws['!rows'].push({ hpt: 15.75 });
    }

    // 5. SET LEBAR KOLUM
    const colWidths = [
        { wch: 2 },  { wch: 35 }, { wch: 5 }, { wch: 3 }, { wch: 45 }
    ];
    for(let i = 5; i <= 15; i++) { colWidths.push({ wch: 10 }); }
    ws["!cols"] = colWidths;

    XLSX.utils.book_append_sheet(wb, ws, "Summary");
    XLSX.writeFile(wb, "Contract_Summary_Bold.xlsx");
}
async function loadSummary(){
    if(!contractId) return;
    try {
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${contractId}`, { headers });
        const data = await res.json();
        const c = data[0];
        window.contractData = c;

        document.getElementById('excelBody').innerHTML = `
            <tr>
                <td>1</td>
                <td>${c.contract_code}</td>
                <td>${c.contractor}</td>
                <td>${Number(c.contract_sum).toLocaleString()}</td>
            </tr>
        `;
    } catch(err) { console.error(err); }
}

function goBack(){ window.history.back(); }
loadSummary();
</script>

</body>
</html>
