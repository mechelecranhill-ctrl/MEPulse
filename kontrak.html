<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M&E-Connect v1.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); background-attachment: fixed; margin: 0; padding: 15px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); }
        .page { display: none; } .page.active { display: block; }
        
        /* Dashboard Baru - Contract Balance & Deductions */
        .dash-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dash-code { font-weight: bold; color: var(--ios-blue); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; }
        .stat-box { padding: 5px; border-radius: 8px; }
        .stat-label { font-size: 9px; text-transform: uppercase; color: #666; font-weight: bold; }
        .stat-val { font-size: 13px; font-weight: 700; margin-top: 3px; }
        .val-balance { color: var(--ios-green); }
        .val-id { color: var(--ios-orange); }
        .val-interim { color: var(--ios-blue); }

        /* UI Elements */
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: white; font-size: 14px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ios-blue); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .nav-link { color: var(--ios-blue); font-weight: 600; cursor: pointer; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="homePage" class="page active">
        <h2 style="text-align:center; margin-bottom:20px;">Dashboard Kontrak</h2>
        
        <div id="dashboardContainer">
            <p style="text-align:center; font-size:12px; color:#666;">Memuatkan data baki...</p>
        </div>

        <div class="glass-card" style="cursor:pointer" onclick="showPage('kontrakPage')">📂 Direktori Kontrak</div>
        <div class="glass-card" style="cursor:pointer" onclick="showPage('registerWorkPage')">📝 Daftar ID Kerja</div>
        <div class="glass-card" style="cursor:pointer; border: 1px solid var(--ios-orange);" onclick="showPage('interimPage')">📑 Kemaskini Interim</div>
        <div class="glass-card" style="cursor:pointer; background: rgba(0,0,0,0.05);" onclick="showPage('adminPage')">⚙️ Admin Kontrak</div>
    </div>

    <div id="kontrakPage" class="page">... (List Kontrak) ...</div>
    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

    window.onload = updateDashboard;

    // DASHBOARD BARU: BALANCE VS ID DEDUCTION VS INTERIM DEDUCTION
    async function updateDashboard() {
        const container = document.getElementById('dashboardContainer');
        try {
            // 1. Ambil data kontrak (Baki Semasa)
            const resC = await fetch(`${SB_URL}/rest/v1/contract?select=id,contract_code,contract_sections_breakdown`, { headers });
            const contracts = await resC.json();

            // 2. Ambil data ID Kerja (Deductions from Work Orders)
            const resW = await fetch(`${SB_URL}/rest/v1/work_orders?select=contract_id,amount_spent,status`, { headers });
            const works = await resW.json();

            // 3. Ambil data Interim (Deductions from Claims)
            const resI = await fetch(`${SB_URL}/rest/v1/interims?select=contract_id,claim_amount`, { headers });
            const interims = await resI.json();

            let html = '';
            contracts.forEach(c => {
                // Kira baki semasa dari breakdown
                let currentBal = 0;
                if(c.contract_sections_breakdown) {
                    Object.values(c.contract_sections_breakdown).forEach(v => currentBal += (v.amt || 0));
                }

                // Kira jumlah potongan dari ID Kerja (Status Pending/Daftar)
                const totalID = works
                    .filter(w => w.contract_id === c.id)
                    .reduce((sum, w) => sum + (w.amount_spent || 0), 0);

                // Kira jumlah potongan dari Interim (Claimed)
                const totalInterim = interims
                    .filter(i => i.contract_id === c.id)
                    .reduce((sum, i) => sum + (i.claim_amount || 0), 0);

                html += `
                <div class="dash-item">
                    <div class="dash-code">
                        <span>${c.contract_code}</span>
                        <span style="font-size:10px; color:#999;">ID: ${c.id}</span>
                    </div>
                    <div class="stat-row">
                        <div class="stat-box">
                            <div class="stat-label">Baki Semasa</div>
                            <div class="stat-val val-balance">RM ${currentBal.toLocaleString()}</div>
                        </div>
                        <div class="stat-box" style="border-left: 1px solid #eee; border-right: 1px solid #eee;">
                            <div class="stat-label">Potongan ID</div>
                            <div class="stat-val val-id">- RM ${totalID.toLocaleString()}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Potongan Int.</div>
                            <div class="stat-val val-interim">- RM ${totalInterim.toLocaleString()}</div>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html || '<p style="text-align:center;">Tiada data kontrak.</p>';

        } catch (e) {
            container.innerHTML = '<p style="color:red; text-align:center;">Ralat memuatkan dashboard.</p>';
            console.error(e);
        }
    }

    // Fungsi navigasi asal (showPage)
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        if(id === 'homePage') updateDashboard();
        // ... fungsi-fungsi fetch anda yang lain tetap di sini ...
    }

    // Logik updateContractBalance, submitInterim, dll tetap sama (Kekal)
</script>

</body>
</html>
