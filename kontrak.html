<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M&E-Connect v1.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            background-attachment: fixed; 
            margin: 0; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--ios-blue); transition: 0.2s;
            margin-right: 15px;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); 
            width: 100%;
            max-width: 700px;
        }

        .menu-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border: 1px solid transparent;
            color: #333;
        }
        .menu-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.8); }
        .menu-item.active { 
            border-color: var(--ios-blue);
            background: var(--ios-blue);
            color: white;
        }

        .page { display: none; width: 100%; justify-content: center; flex-direction: column; align-items: center; } 
        .page.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-size: 10px; font-weight: 700; color: #4b4b4b; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255, 255, 255, 0.4); font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ios-blue); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .excel-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 11px; margin-top: 10px; }
        .excel-table th { background: #f1f1f1; padding: 8px; text-align: left; }
        .excel-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .balance-badge {
            display: flex; justify-content: space-between; padding: 10px 12px;
            background: white; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--ios-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body onload="initApp()">

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <button class="back-btn" onclick="window.location.href='dashboard-contract.html'"><i class="fa fa-chevron-left"></i></button>
            <div style="font-weight: 800; font-size: 18px;">REGISTRATION</div>
        </div>
        <div class="sidebar-content">
            <div id="menu_registerWorkPage" class="menu-item" onclick="showPage('registerWorkPage', this)">
                <i class="fa-solid fa-file-pen" style="margin-right:12px;"></i> Work Order (ID)
            </div>
            <div id="menu_adminPage" class="menu-item" onclick="showPage('adminPage', this)">
                <i class="fa-solid fa-file-contract" style="margin-right:12px;"></i> Kontrak Baru
            </div>
            <div id="menu_interimPage" class="menu-item" onclick="showPage('interimPage', this)">
                <i class="fa-solid fa-file-invoice-dollar" style="margin-right:12px;"></i> Interim Claims
            </div>
            <div id="menu_voPage" class="menu-item" onclick="showPage('voPage', this)">
                <i class="fa-solid fa-triangle-exclamation" style="margin-right:12px;"></i> Variation Order (VO)
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="registerWorkPage" class="page">
            <div class="glass-card">
                <h3><i class="fa-solid fa-file-pen"></i> Pendaftaran Work Order</h3>
                <label>Pilih Kontrak</label>
                <select id="w_contract_id" onchange="loadBQForWO()"><option value="">Pilih Kontrak</option></select>
                
                <label>ID Kerja (Contoh: C 123456)</label>
                <input type="text" id="w_id" placeholder="Masukkan ID Kerja">
                
                <div id="wo_sections_input">
                    </div>
                
                <button onclick="saveWorkOrder()" class="btn-primary">Simpan Work Order</button>
            </div>
        </div>

        <div id="adminPage" class="page">
            <div class="glass-card">
                <h3><i class="fa-solid fa-file-contract"></i> Kontrak Baru</h3>
                <label>Kod Kontrak</label>
                <input type="text" id="c_code" placeholder="Contoh: JKR/ME/2024...">
                
                <label>Nama Kontrak</label>
                <textarea id="c_name" rows="2"></textarea>

                <div id="bq_sections_area">
                    <label>Pecahan BQ (Section)</label>
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="text" id="bq_sec_name" placeholder="Nama Sec (cth: A)">
                        <input type="number" id="bq_sec_val" placeholder="Nilai (RM)">
                        <button onclick="addBQSection()" style="width:50px; border-radius:10px; border:none; background:var(--ios-green); color:white;">+</button>
                    </div>
                    <ul id="bq_list_ui" style="font-size:12px; background:rgba(255,255,255,0.3); border-radius:10px; padding:10px;"></ul>
                </div>

                <button onclick="saveContract()" class="btn-primary">Daftar Kontrak</button>
            </div>
        </div>

        <div id="interimPage" class="page">
            <div class="glass-card">
                <h3><i class="fa-solid fa-file-invoice-dollar"></i> Interim Claim (Virtual)</h3>
                <label>Pilih Kontrak</label>
                <select id="i_contract_id" onchange="refreshVirtualBalance()"><option value="">Pilih Kontrak</option></select>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>No. Interim</label><input type="number" id="i_no" placeholder="Contoh: 1"></div>
                    <div><label>Tarikh</label><input type="date" id="i_date_received"></div>
                </div>

                <label>Tampal ID Kerja (Bulk Paste)</label>
                <textarea id="i_paste_area" rows="3" placeholder="Tampal ID Kerja dari Excel di sini..."></textarea>
                <button type="button" class="btn-primary" onclick="processExcelPaste()">Cari & Masukkan ID</button>
                
                <table class="excel-table">
                    <thead><tr><th>ID Kerja</th><th>Status</th><th>Amaun (RM)</th><th>Hapus</th></tr></thead>
                    <tbody id="i_work_tbody"></tbody>
                </table>

                <div id="virtual_dashboard" style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.5); border-radius:15px;">
                    <label style="margin-bottom:10px;">Ringkasan Baki Peruntukan (Virtual)</label>
                    <div id="balance_list"></div>
                </div>
                
                <div id="i_total_display" style="margin-top:15px; text-align:right; font-weight:bold; color:var(--ios-orange); font-size: 16px;">Jumlah Claim: RM 0.00</div>
                <button onclick="submitInterim()" class="btn-primary" style="background:var(--ios-orange); margin-top:20px;">Hantar Interim</button>
            </div>
        </div>

        <div id="voPage" class="page">
            <div class="glass-card">
                <h3><i class="fa-solid fa-triangle-exclamation"></i> Variation Order (VO)</h3>
                <label>Pilih Kontrak</label>
                <select id="v_contract_id"><option value="">Pilih Kontrak</option></select>
                
                <label>Nama/No. VO</label>
                <input type="text" id="v_title" placeholder="Contoh: VO No. 1">
                
                <label>Pilih Section BQ yang terlibat</label>
                <select id="v_sec_target"></select>

                <label>Amaun Tambahan (RM)</label>
                <input type="number" id="v_amt" placeholder="0.00">

                <button onclick="saveVO()" class="btn-primary" style="background:var(--ios-red);">Tambah VO</button>
            </div>
        </div>

    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    let tempBQ = {};

    function initApp() {
        showPage('interimPage', document.getElementById('menu_interimPage'));
        loadContracts();
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'voPage') loadVOSections();
    }

    // --- LOGIK KONTRAK ---
    function addBQSection() {
        const sec = document.getElementById('bq_sec_name').value.toUpperCase();
        const val = parseFloat(document.getElementById('bq_sec_val').value);
        if(!sec || isNaN(val)) return;
        tempBQ[sec] = { val: val, desc: "Section " + sec };
        renderBQList();
    }

    function renderBQList() {
        const list = document.getElementById('bq_list_ui');
        list.innerHTML = '';
        for(let s in tempBQ) list.innerHTML += `<li>Section ${s}: RM ${tempBQ[s].val.toLocaleString()}</li>`;
    }

    async function saveContract() {
        const code = document.getElementById('c_code').value;
        const name = document.getElementById('c_name').value;
        if(!code || Object.keys(tempBQ).length === 0) return alert("Lengkapkan maklumat kontrak!");

        const res = await fetch(`${SB_URL}/rest/v1/contract`, {
            method: 'POST', headers,
            body: JSON.stringify({ contract_code: code, contract_name: name, contract_sections_breakdown: tempBQ })
        });
        if(res.ok) { alert("Kontrak Berjaya!"); location.reload(); }
    }

    // --- LOGIK WORK ORDER ---
    async function loadBQForWO() {
        const cId = document.getElementById('w_contract_id').value;
        const res = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
        const data = await res.json();
        const bq = data[0].contract_sections_breakdown;
        const container = document.getElementById('wo_sections_input');
        container.innerHTML = '<label>Amaun Mengikut Section</label>';
        for(let s in bq) {
            container.innerHTML += `<div style="margin-bottom:5px;">${s}: <input type="number" class="wo-sec-input" data-sec="${s}" value="0"></div>`;
        }
    }

    async function saveWorkOrder() {
        const cId = document.getElementById('w_contract_id').value;
        const wId = document.getElementById('w_id').value;
        const cost = {};
        document.querySelectorAll('.wo-sec-input').forEach(i => cost[i.dataset.sec] = parseFloat(i.value) || 0);

        const res = await fetch(`${SB_URL}/rest/v1/work_orders`, {
            method: 'POST', headers,
            body: JSON.stringify({ contract_id: cId, work_id: wId, cost_breakdown: cost })
        });
        if(res.ok) alert("Work Order Berjaya!");
    }

    // --- LOGIK INTERIM (Sama seperti sebelum ini) ---
    async function loadContracts() {
        const res = await fetch(`${SB_URL}/rest/v1/contract?select=*`, { headers });
        const data = await res.json();
        const selectors = ['i_contract_id', 'w_contract_id', 'v_contract_id'];
        selectors.forEach(s => {
            const el = document.getElementById(s);
            el.innerHTML = '<option value="">Pilih Kontrak</option>';
            data.forEach(c => el.innerHTML += `<option value="${c.id}">${c.contract_code}</option>`);
        });
    }

    async function processExcelPaste() {
        const cId = document.getElementById('i_contract_id').value;
        const rawText = document.getElementById('i_paste_area').value;
        const rawIDs = rawText.split(/[\n\t, ]+/).map(s => s.trim()).filter(s => s !== "");
        const formattedIDs = rawIDs.map(id => {
             let clean = id.replace(/\s/g, '').toUpperCase();
             return (clean.startsWith('C') && clean.length > 1) ? 'C ' + clean.substring(1) : clean;
        });
        const idQuery = `("${formattedIDs.join('","')}")`;
        const res = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${cId}&work_id=in.${idQuery}`, { headers });
        const data = await res.json();
        data.forEach(work => {
            if (document.querySelector(`tr[data-id="${work.work_id}"]`)) return;
            const total = Object.values(work.cost_breakdown).reduce((a, b) => a + b, 0);
            const row = document.getElementById('i_work_tbody').insertRow();
            row.dataset.id = work.work_id;
            row.dataset.breakdown = JSON.stringify(work.cost_breakdown);
            row.innerHTML = `<td>${work.work_id}</td><td>✅ Ready</td><td>RM ${total.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                             <td><i class="fa fa-trash" style="color:red; cursor:pointer;" onclick="this.parentElement.parentElement.remove(); refreshVirtualBalance();"></i></td>`;
        });
        refreshVirtualBalance();
    }

    async function refreshVirtualBalance() {
        const cId = document.getElementById('i_contract_id').value;
        if(!cId) return;
        const resC = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
        const contract = (await resC.json())[0];
        const bq = contract.contract_sections_breakdown;
        const vo = contract.vo_breakdown || {};
        const resI = await fetch(`${SB_URL}/rest/v1/interims?contract_id=eq.${cId}`, { headers });
        const pastInterims = await resI.json();
        const resW = await fetch(`${SB_URL}/rest/v1/work_orders?contract_id=eq.${cId}`, { headers });
        const allWorkOrders = await resW.json();

        const currentClaimIDs = [];
        const currentClaimBreakdown = {};
        document.querySelectorAll('#i_work_tbody tr').forEach(row => {
            currentClaimIDs.push(row.dataset.id);
            const b = JSON.parse(row.dataset.breakdown);
            for(let sec in b) currentClaimBreakdown[sec] = (currentClaimBreakdown[sec] || 0) + b[sec];
        });

        const listDiv = document.getElementById('balance_list');
        listDiv.innerHTML = '';
        for (let sec in bq) {
            let totalLimit = bq[sec].val + (vo[sec] || 0);
            let usedInterim = 0;
            pastInterims.forEach(i => usedInterim += (i.claim_breakdown[sec] || 0));
            let unclaimed = 0;
            allWorkOrders.forEach(wo => {
                if(!pastInterims.some(i => i.work_order_ids.includes(wo.work_id)) && !currentClaimIDs.includes(wo.work_id))
                    unclaimed += (wo.cost_breakdown[sec] || 0);
            });
            let skrg = (currentClaimBreakdown[sec] || 0);
            let baki = totalLimit - usedInterim - unclaimed - skrg;
            listDiv.innerHTML += `
                <div class="balance-badge">
                    <span><strong>${sec}</strong></span>
                    <span>Baki Virtual: <b style="color:${baki<0?'red':'green'}">RM ${baki.toLocaleString()}</b></span>
                </div>`;
        }
    }

    async function submitInterim() {
        const cId = document.getElementById('i_contract_id').value;
        const rows = document.querySelectorAll('#i_work_tbody tr');
        const ids = []; const breakdown = {};
        rows.forEach(row => {
            ids.push(row.dataset.id);
            const b = JSON.parse(row.dataset.breakdown);
            for(let sec in b) breakdown[sec] = (breakdown[sec] || 0) + b[sec];
        });
        const res = await fetch(`${SB_URL}/rest/v1/interims`, {
            method: 'POST', headers,
            body: JSON.stringify({ contract_id: cId, interim_no: document.getElementById('i_no').value, work_order_ids: ids, claim_breakdown: breakdown })
        });
        if(res.ok) location.reload();
    }
</script>
</body>
</html>
