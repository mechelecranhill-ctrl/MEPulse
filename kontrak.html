<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M&E-Connect v1.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-red: #FF3B30; 
            --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6); 
            --glass: rgba(255,255,255,0.8);
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            background-attachment: fixed; 
            margin: 0; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            background: #e5e5ea; border: none;
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--ios-blue); transition: 0.2s;
            margin-right: 15px;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1); 
            width: 100%;
            max-width: 700px;
            transition: transform 0.2s;
        }

        /* Menu Sidebar */
        .menu-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border: 1px solid transparent;
            color: #333;
        }
        .menu-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.8); }
        .menu-item.active { 
            border-color: var(--ios-blue);
            background: var(--ios-blue);
            color: white;
        }

        /* Hide all pages by default */
        .page { display: none; width: 100%; justify-content: center; } 
        .page.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Styles */
        label { font-size: 10px; font-weight: 700; color: #4b4b4b; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255, 255, 255, 0.4); font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ios-blue); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .excel-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 11px; margin-top: 10px; }
        .excel-table th { background: #f1f1f1; padding: 8px; text-align: left; }
        .excel-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .funding-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }

    </style>
</head>
<body onload="initApp()">

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <button class="back-btn" onclick="window.location.href='dashboard-contract.html'"><i class="fa fa-chevron-left"></i></button>
            <div style="font-weight: 800; font-size: 18px;">REGISTRATION FORMS</div>
        </div>
        
        <div class="sidebar-content">
            <p style="font-size: 12px; color: #666; font-weight: 700; margin-bottom: 15px;">MENU UTAMA</p>
            
            <div id="menu_registerWorkPage" class="menu-item" onclick="showPage('registerWorkPage', this)">
                <i class="fa-solid fa-file-pen" style="margin-right:12px;"></i> Pendaftaran Work Order (ID)
            </div>
            <div id="menu_adminPage" class="menu-item" onclick="showPage('adminPage', this)">
                <i class="fa-solid fa-file-contract" style="margin-right:12px;"></i> Pengurusan Kontrak
            </div>
            <div id="menu_interimPage" class="menu-item" onclick="showPage('interimPage', this)">
                <i class="fa-solid fa-file-invoice-dollar" style="margin-right:12px;"></i> Interim Claims
            </div>
            <div id="menu_voPage" class="menu-item" onclick="showPage('voPage', this)">
                <i class="fa-solid fa-triangle-exclamation" style="margin-right:12px;"></i> Variation Order (VO)
            </div>
            <div id="menu_settingsPage" class="menu-item" onclick="showPage('settingsPage', this)">
                <i class="fa-solid fa-gear" style="margin-right:12px;"></i> Tetapan Unit
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="registerWorkPage" class="page">
            <div class="glass-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-file-pen"></i> Borang Work Order</h3>
                <form id="workOrderForm">
                    <label>Pilih Kontrak</label>
                    <select id="w_contract_id" onchange="onContractSelect()" required><option value="">Pilih Kontrak</option></select>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label>ID Kerja</label><input type="text" id="w_id" placeholder="C 123456" required></div>
                        <div><label>Proceed Blueform</label><input type="date" id="w_qpb_date" required></div>
                    </div>
                    <input type="text" id="w_location" placeholder="Lokasi (Cth: JEMENTAH)">
                    <label>Pilih Daerah</label>
                    <select id="w_dist" required><option value="">Pilih Kontrak Dahulu</option></select>
                    <textarea id="w_desc" rows="2" placeholder="Keterangan"></textarea>
                    <label>Pecahan Kos</label>
                    <div id="w_sections_container" class="funding-grid"></div>
                    <div style="margin-top:15px; padding:10px; background:rgba(0,122,255,0.1); border-radius:10px; display:flex; justify-content:space-between;">
                        <strong>Jumlah:</strong><span id="total_display" style="color:var(--ios-blue); font-weight:bold;">RM 0.00</span>
                    </div>
                    <button type="submit" class="btn-primary" style="background:var(--ios-green);">Daftar & Tolak Baki</button>
                </form>
            </div>
        </div>

        <div id="interimPage" class="page">
            <div class="glass-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-file-invoice-dollar"></i> Kemaskini Interim Claim</h3>
                <label>Pilih Kontrak</label>
                <select id="i_contract_id" onchange="loadInterimData()"><option value="">Pilih Kontrak</option></select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>No. Interim</label><input type="number" id="i_no"></div>
                    <div><label>Tarikh Terima</label><input type="date" id="i_date_received"></div>
                </div>
                <label>Salvage Value (RM)</label>
                <input type="number" id="i_salvage" placeholder="0.00" step="0.01">
                <div id="i_sec_inputs"></div>
                <label>Tampal ID Kerja</label>
                <textarea id="i_paste_area" rows="3" placeholder="Tampal ID di sini..."></textarea>
                <button type="button" class="btn-primary" onclick="processExcelPaste()">Cari ID</button>
                <table class="excel-table">
                    <thead><tr><th>ID Kerja</th><th>Seq</th><th>Amaun</th><th>Hapus</th></tr></thead>
                    <tbody id="i_work_tbody"></tbody>
                </table>
                <button onclick="submitInterim()" class="btn-primary" style="background:var(--ios-orange);">Hantar & Selaras Baki</button>
            </div>
        </div>

        <div id="voPage" class="page">
            <div class="glass-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-triangle-exclamation"></i> Borang Variation Order (VO)</h3>
                <label>Pilih Kontrak</label>
                <select id="vo_contract_id" onchange="onVOContractSelect()" required><option value="">Pilih Kontrak</option></select>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Nama VO</label>
                        <input type="text" id="vo_name" placeholder="Cth: VO 01" required>
                    </div>
                    <div>
                        <label>Masukkan Ke Section</label>
                        <select id="vo_target_sec" required><option value="">Pilih Kontrak Dahulu</option></select>
                    </div>
                </div>

                <label>Jumlah Tambahan (RM)</label>
                <input type="number" id="vo_amt" step="0.01" placeholder="0.00" required>
                
                <label>Keterangan</label>
                <textarea id="vo_desc" rows="3" placeholder="Sebab kenaikan kos..."></textarea>
                
                <button onclick="submitVO()" class="btn-primary" style="background:var(--ios-red);">Daftar VO & Kemaskini Baki</button>
            </div>
        </div>

        <div id="adminPage" class="page">
            <div class="glass-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-file-contract"></i> Borang Kontrak</h3>
                <form id="contractForm">
                    <label>Unit</label>
                    <select id="c_unit_id" required></select>
                    <label>Kod Kontrak</label>
                    <input type="text" id="c_code" placeholder="Cth: RanhillSAJ/KP/T/57/2024" required>
                    <label>Tajuk Kontrak</label>
                    <textarea id="c_name" placeholder="Tajuk Kontrak" required></textarea>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label>Tarikh Mula</label><input type="date" id="c_start" required></div>
                        <div><label>Tarikh Tamat</label><input type="date" id="c_end" required></div>
                    </div>
                    <label>Kontraktor</label>
                    <input type="text" id="c_contractor" placeholder="Nama Syarikat" required>
                    <label>Daerah</label>
                    <input type="text" id="c_dist" placeholder="Segamat, Muar" required>
                    <label>Kod Kawasan</label>
                    <input type="text" id="c_area" placeholder="Segamat:SGT, Muar:MR" required>
                    <label>Pecahan Section BQ</label>
                    <div id="b_inputs">
                        <div class="sec-input-wrapper" style="background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; margin-bottom:5px;">
                            <strong class="sec-label">SECTION A</strong>
                            <input type="text" class="b_n" value="SECTION A" hidden>
                            <input type="text" class="b_d" placeholder="Keterangan" required>
                            <input type="number" class="b_v" placeholder="Jumlah RM" step="0.01" required oninput="calculateContractSum()">
                        </div>
                    </div>
                    <button type="button" onclick="addB()" style="background:none; color:var(--ios-blue); border:1px dashed var(--ios-blue); font-size:12px; padding:10px; width:100%; border-radius:10px; cursor:pointer;">+ TAMBAH SECTION</button>
                    <div style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 10px; border-left: 5px solid var(--ios-blue);">
                        <label style="margin-top:0;">Jumlah Keseluruhan Kontrak</label>
                        <div id="c_sum_display" style="font-size: 18px; font-weight: 800; color: #333;">RM 0.00</div>
                    </div>
                    <button type="submit" class="btn-primary">Daftar Kontrak</button>
                </form>
            </div>
        </div>

        <div id="settingsPage" class="page">
            <div class="glass-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-gear"></i> Pendaftaran Unit</h3>
                <form id="unitForm">
                    <input type="text" id="new_unit_name" placeholder="Cth: INSTRUMENTASI" required>
                    <button type="submit" class="btn-primary">Simpan Unit</button>
                </form>
                <div id="unitListDisplay" style="margin-top:20px; font-size:13px;"></div>
            </div>
        </div>

    </div>

<script>
    const SB_URL = 'https://ywmsvowroxzhrjwrhsru.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bXN2b3dyb3h6aHJqd3Joc3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU5MzcsImV4cCI6MjA4Nzg4MTkzN30.OHJ-I_T3QID8y8eaoOBWeG2nKd2FhHfzG4P515Rzfks';
    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    function initApp() {
        showPage('registerWorkPage', document.getElementById('menu_registerWorkPage'));
    }

    function showPage(id, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        
        const targetPage = document.getElementById(id);
        if(targetPage) targetPage.classList.add('active');
        if(element) element.classList.add('active');

        // Trigger data loading based on page
        if(['registerWorkPage', 'interimPage', 'adminPage', 'settingsPage', 'voPage'].includes(id)) fetchUnits();
        if(['registerWorkPage', 'interimPage', 'voPage'].includes(id)) loadContractsToDropdowns();
    }

    // VO FUNCTIONS (MODIFIED TO WORK AS PAGE)
    function onVOContractSelect() {
        const opt = document.getElementById('vo_contract_id').selectedOptions[0];
        const sSec = document.getElementById('vo_target_sec');
        sSec.innerHTML = '<option value="">Pilih Section</option>';
        if(opt && opt.dataset.b) {
            const b = JSON.parse(opt.dataset.b);
            Object.keys(b).sort().forEach(sec => sSec.innerHTML += `<option value="${sec}">${sec}</option>`);
        }
    }

    async function submitVO() {
        const cId = document.getElementById('vo_contract_id').value;
        const voName = document.getElementById('vo_name').value.trim().toUpperCase();
        const targetSec = document.getElementById('vo_target_sec').value;
        const voAmt = parseFloat(document.getElementById('vo_amt').value);
        if (!cId || !voName || !voAmt || !targetSec) return alert("Lengkapkan borang VO!");

        const resGet = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, { headers });
        const contract = (await resGet.json())[0];
        let vBreak = contract.vo_breakdown || {};
        if (vBreak[voName]) return alert("Nama VO sedia ada!");

        vBreak[voName] = { "amt": voAmt, "sec": targetSec, "desc": document.getElementById('vo_desc').value, "date": new Date().toISOString() };
        const newVoTotal = (parseFloat(contract.total_vo_amount) || 0) + voAmt;

        const resUpd = await fetch(`${SB_URL}/rest/v1/contract?id=eq.${cId}`, {
            method: 'PATCH', headers,
            body: JSON.stringify({ vo_breakdown: vBreak, total_vo_amount: newVoTotal })
        });

        if(resUpd.ok) { 
            alert("VO Berjaya Didaftarkan!"); 
            showPage('registerWorkPage', document.getElementById('menu_registerWorkPage'));
        }
    }

    // CORE DATABASE FUNCTIONS
    async function fetchUnits() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/units?select=*`, { headers });
            const units = await res.json();
            const sAdmin = document.getElementById('c_unit_id');
            if(sAdmin) {
                sAdmin.innerHTML = '<option value="">Pilih Unit</option>';
                units.forEach(u => sAdmin.innerHTML += `<option value="${u.id}">${u.unit_name}</option>`);
            }
        } catch (e) { console.error("Error fetching units", e); }
    }

    async function loadContractsToDropdowns() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/contract?select=*`, { headers });
            const data = await res.json();
            ['w_contract_id', 'i_contract_id', 'vo_contract_id'].forEach(id => {
                const s = document.getElementById(id); if(!s) return;
                s.innerHTML = '<option value="">Pilih Kontrak</option>';
                data.forEach(c => {
                    const opt = document.createElement('option'); opt.value = c.id; opt.text = c.contract_code;
                    opt.dataset.b = JSON.stringify(c.contract_sections_breakdown); 
                    opt.dataset.dist = c.district;
                    s.appendChild(opt);
                });
            });
        } catch (e) { console.error("Error loading contracts", e); }
    }

    function onContractSelect() {
        const opt = document.getElementById('w_contract_id').selectedOptions[0];
        const dSel = document.getElementById('w_dist');
        if(!dSel) return;
        dSel.innerHTML = '<option value="">Pilih Daerah</option>';
        if(opt && opt.dataset.dist) opt.dataset.dist.split(',').forEach(d => dSel.innerHTML += `<option value="${d.trim()}">${d.trim()}</option>`);
        const container = document.getElementById('w_sections_container'); container.innerHTML = '';
        if(opt && opt.dataset.b) {
            const b = JSON.parse(opt.dataset.b);
            Object.keys(b).sort().forEach(sec => {
                container.innerHTML += `<div class="funding-item"><label>${sec}</label><input type="number" class="w_sec_amt" data-sec="${sec}" oninput="calcTotalWork()" step="0.01"></div>`;
            });
        }
    }

    function calculateContractSum() {
        let total = 0;
        document.querySelectorAll('.b_v').forEach(input => total += parseFloat(input.value) || 0);
        document.getElementById('c_sum_display').innerText = `RM ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        return total;
    }

    function addB() {
        const container = document.getElementById('b_inputs');
        const currentCount = container.querySelectorAll('.sec-input-wrapper').length;
        const nextLetter = String.fromCharCode(65 + currentCount);
        const sectionName = `SECTION ${nextLetter}`;
        const d = document.createElement('div'); 
        d.className = "sec-input-wrapper";
        d.style = "background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; margin-bottom:5px; position:relative;";
        d.innerHTML = `
            <div onclick="this.parentElement.remove(); reIndexSections(); calculateContractSum();" style="position:absolute; right:10px; top:10px; color:red; cursor:pointer; font-weight:bold;">✕</div>
            <strong class="sec-label">${sectionName}</strong>
            <input type="text" class="b_n" value="${sectionName}" hidden>
            <input type="text" class="b_d" placeholder="Keterangan" required>
            <input type="number" class="b_v" placeholder="Jumlah RM" step="0.01" required oninput="calculateContractSum()">
        `;
        container.appendChild(d);
        calculateContractSum();
    }

    function reIndexSections() {
        document.querySelectorAll('.sec-input-wrapper').forEach((w, index) => {
            const letter = String.fromCharCode(65 + index);
            const name = `SECTION ${letter}`;
            w.querySelector('.sec-label').innerText = name;
            w.querySelector('.b_n').value = name;
        });
    }

    function calcTotalWork() {
        let total = 0; document.querySelectorAll('.w_sec_amt').forEach(i => total += parseFloat(i.value) || 0);
        document.getElementById('total_display').innerText = `RM ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
</script>
</body>
</html>
